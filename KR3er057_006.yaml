body:
  text: 卷六數集傷寒門雷公真君曰傷寒兩感隔經相傳每每殺人如第一日宜在太陽第二日宜在陽明第三日宜在少陽第四日宜在太陰第五日宜在少陰第六日宜在厥陰此順經傳也今第一日太陽即傳陽明第二日陽明即傳少陽第三日少陽即傳太陰第四日太陰即傳少陰第五日少陰即傳厥陰此過經傳也更有第一日太陽即傳少陽第二日陽明即傳太陰第三日少陽即傳少陰第四日太陰即傳厥陰此隔經傳也第一日太陽即傳少陰第二日陽明即傳太陰第三日少陽即傳厥陰此兩感傳也順傳者原有生機至七日而病自愈過傳者有生有死矣隔傳者死多於生矣兩感而傳者三日水漿不入不知人即死雖仲景張公立門原有治法然亦止可救其不死者而不能將死者而重生之也我今憫世人之枉死特傳二方一救過經傳之傷寒一救隔經傳之傷寒過經傳方名救過起死湯麻黃一錢柴胡一錢厚朴一錢石膏五錢知母一錢青蒿五錢半夏一錢黃芩一錢茯苓五錢炒梔子五分當歸三錢水煎服一劑即生蓋過經之傳必然變症紛紜斷非初起之一二日也所以方中不用桂枝以散太陽之邪止用麻黃以散其表傷寒至三四日內熱必甚故以石膏知母為君以瀉陽明之火邪陽明火退而厥陰之木不舒則木以生火邪退者復聚故又用青蒿柴胡梔子以涼散之木不自焚而各經之邪不攻自散況又有茯苓之重用健脾行濕引火下行盡從膀胱而出之乎且黃芩以清肺厚朴以逐穢半夏以清痰又用之咸宜五臟無非生氣矣所以不必問其日數但見有過經之傳者即以此方投之無不慶更生也隔經傳方名救隔起死湯人參五錢石膏五錢知母一錢青蒿一兩柴胡二錢白芍三錢半夏一錢炒梔子三錢甘草一錢水煎服隔經之傳必至三日而症乃明雖已過陽明而餘火未散故少陰之火助其焰少陽之火失其權若不仍用石膏知母則陽明之火勢不退而少陰之火勢不息也故必須用此二味為主然徒用二味而太陰脾土不急為救援則火極凌亢何以存其生氣故又用人參以助生氣但生氣既存而厥陰受邪則木氣乾燥勢必克太陰之脾土僅存之生氣又安能保乎故又用柴芍梔蒿以涼散其木中之邪木之邪散則木氣得養自然不去剋土而太陰之氣生太陰土有生氣貝陽明之火必消歸無有矣又何至焚燒自滅其少陰之臟哉況方中半夏清痰甘草和中又用之無不宜乎起死為生實非虛語故一見有隔經之傳即以此方投之必能轉敗為功也或疑青蒿用之太多不知青蒿不獨瀉肝木之火尤能瀉陽明之焰且性靜而不動更能補陰火旺之時補陰重藥又不敢用惟青蒿借其攻中能補同人參兼用實能生陰陽之氣於無何有之鄉若但用人參止生陽氣而不能生陰氣矣陰生則陽火無權制伏之道實非世人所能測也其兩感傳者近岐天師已傳四方可以救死豫不必再傳遠公固請奇方以救世我於第三日少陽與厥陰兩感水漿不入不知人者再傳一方以佐天師之未逮方名救臟湯人參一兩麥冬三兩當歸一兩天花粉三錢元參二兩白芍二兩荊芥二錢水煎服余方多當歸者助肝膽以生血也多加麥冬者救肺氣之絶以制肝膽之木使火不旺而血易生而後胃氣有養臟腑可救其壞也與天師方大同小異各有妙用傷寒發狂至登高而歌棄衣而走見水而入罵詈呼號不避親疏者去生遠矣仲景以竹葉石膏湯救之妙矣蓋陽明之火其勢最烈一發而不可救非用大劑白虎湯何能止其燎原之勢而世人畏首畏尾往往用之而特小其劑是猶杯水救車薪之焰也故用石膏必須至三四兩或半斤一劑煎服火勢始能少退狂亦可少止也然石膏性猛雖善退火未免損傷胃氣必須與人參兼用為妙我今傳一方用白虎湯之半而另加藥味方名祛熱生胃湯石膏三兩知母三錢人參五錢元參三兩茯苓一兩麥冬三兩車前子五錢水煎服此方石膏知母以瀉胃火人參以生胃氣元參去浮遊之焰麥冬生肺中之陰茯苓車前引火下行於膀胱從小便而出且火盛者口必渴口渴必多飲水吾用此二味以分濕則水流而火自隨水而散矣方中瀉火又不傷氣似勝於白虎湯一劑而狂定二劑而口渴減半三劑而口渴止火亦息正不必用四劑也凡有火熱而發狂或汗如雨下口渴舌燥或如芒刺者以此方投之立救斷不至於死也傷寒發斑死症也然而斑亦有不同有遍身發斑者有止心窩內發斑者遍身發斑症似重而反輕心窩發斑症似輕而轉重蓋遍身發斑內熱已盡發於外心窩發斑熱存於心中而不得出必須用化斑之藥以解其熱毒之在中也我有一方最神名起斑湯升麻二錢當歸一兩元參三兩荊芥三錢黃連三錢天花粉五錢甘草一錢茯神三錢水煎服火毒結於內必須盡情發出然內無血以養心則心中更熱火毒益熾而不能外越也故用當歸元參以滋心中之血用黃連以涼心中之火天花粉以消心中之痰然而無開關之散則火藏於內而不得泄故又用升麻荊芥以發之甘草茯神以和之自然引火出外而不內蓄矣火既外越斑亦漸消又何至於喪命哉傷寒太陽症結胸症具煩躁者主死言不可下即下而亦死也夫結胸而加煩躁此胃氣之將絶也胃氣欲絶津液何生津液既無心何所養故結胸而又煩躁所以症或不可治也雖然津液之竭非五臟之自絶亦因結胸之故耳是必攻其中堅使結胸症愈而津液自生死症可望重蘇也我今傳一奇方名化結湯天花粉五錢枳殼一錢陳皮五分麥芽三錢天門冬三錢桑白皮三錢神麯三錢水煎服一劑即結胸開而津液自生也此方用天花粉以代瓜蔞不至陷胸之過猛然而天花粉即瓜蔞之根也最善陷胸而無性猛之憂枳殼消食寬中麥芽與桑白皮同用而化導更速神麯陳皮調胃實有神功天門冬善生津液佐天花粉有水乳之合世人未知也天花粉得天門冬化痰化食殊有不可測識之效所以既結者能開必死者可活若以大陷胸湯蕩滌之於已汗已下之後鮮不速其死矣傷寒有臟結之症載在太陽經中其實臟結非太陽經病也然則仲景載在太陽經者何故正辨太陽經有似臟結之一症不可用攻故載之以辨明也臟結之症小腹之內與兩臍之旁相連牽痛以至前陰之筋亦痛重者有筋青而死者此乃陰邪而結於陰地也原無表證如何可作表治必須攻裡為得我有一方專補其陰中之虛而少佐之祛寒之味則陰邪自散而死症可生方名散結救臟湯人參一兩白朮五錢甘草一錢附子一錢當歸一兩肉桂五分水煎服白朮利腰臍之氣人參救元陽之絶當歸活周身之血血活而腰臍之氣更利也甘草和中以定痛附桂散寒以祛邪臟中既溫結者自解矣用攻於補之內祛寒於補之中其奏功為獨異耳傷寒陽明症中有直視譫語喘滿者死而下利者亦死之文此必症犯直視譫語而又喘滿下利一齊同見也苟有一症未兼尚不宜死倘三症皆見明是死證矣雖然直視譫語之生多是胃火之盛自焚其心而腎水不能來濟於是火愈盛而無制喘滿者火炎而氣欲上脫也下利者火降而氣欲下脫也此猶欲脫未脫之危症苟治之得法猶可望生吾有奇方名曰援脫散石膏五錢人參一兩麥冬一兩白芍一兩竹茹三錢水煎服此方用人參以救脫肜石膏以平火用麥冬以平喘白芍以止利用竹茹以清心自然氣不絶而可救也傷寒壞症乃已汗已吐已下而身仍熱如火此不解之症也其時自然各死症紛見矣我用何法以生之乎夫已汗而不解者乃不宜汗而汗之已吐而不解者乃不宜吐而吐之已下而不解者乃不宜下而下之也於不宜汗而救其失汗於不宜吐而救其失吐於不宜下而救其失下固是生之之法然而終無一定之法也我今特傳奇方於三者之失而統救之名救壞湯人參五錢茯苓五錢柴胡一錢白芍一兩元參五錢麥冬五錢白芥子二錢當歸五錢陳皮五分水煎服此方妙在全不去救失吐失汗失下之症反用參苓歸芍大補之劑少加柴胡以和解之自能退火而生胃氣倘鑑其失吐而重吐之失汗而重汗之失下而重下之孱弱之驅何能勝如是之摧殘哉必死而已矣故必用吾方而後死者可生也傷寒少陰症惡寒身蜷而下利手足逆冷不治之病也蓋陰盛無陽腹中無非寒氣陽已將絶而又下利不止則陽隨利而出不死何待雖然陽氣將絶終非已絶也急用補陽氣之藥挽回於無何有之鄉則將絶者不絶方用人參二兩附子二錢甘草二錢乾薑二錢白朮一兩茯苓五錢水煎服方名救逆止利湯一劑而逆回二劑而利止三劑全愈矣此方用人參附子回元陽於頃刻以追其散失祛其陰寒之氣用白朮茯苓以分消水濕而仍固其元陽用甘草乾薑調和腹中而使之內熱則外寒不祛而自散又何有餘邪之伏莽哉自然寒者不寒而蜷者不蜷逆者不逆而利者不利也寒蜷逆利之盡去安得而不生乎傷寒少陰症吐利兼作又加煩悶手足四逆者死病也上吐下瀉且兼煩躁則陰陽擾亂拂抑而無生氣可知況加手足四肢之逆冷是脾胃之氣又將絶也自是死症無疑然而治之於早未嘗不可救如一見此等症急以人參二兩白朮二兩肉桂二錢丁香二錢灌之尚可救耳方名止逆奠安湯人參救元陽之絶原有奇功白朮救脾胃之崩實有至效丁香止嘔肉桂溫中又能止瀉救中土之危亡奠上下之變亂轉生機於頃刻杜死禍於須臾舍此方又何有別方哉傷寒少陰症下利雖止而頭眩昏暈亦是死症蓋陽雖回而陰已絶下多亡陰竟至陰絶原無救法雖然陰陽之道未嘗不兩相根而兩相生也今因陰絶而諸陽之上聚於頭者紛然亂動所以眩冒陽欲脫而未脫夫陽既未絶補其陽而陽氣生陽生則陰之絶者可以重續陰生於陽之中也方用參桂湯人參二兩肉桂二錢煎服可救人參返陽氣於無何有之鄉是止能返陽氣也如何陰絶者亦能回之不知人參雖屬陽而中存陰氣陽居其八陰居其二陽既回矣陰氣亦從之而漸返肉桂雖是純陽之品而性走肝腎仍是補陰之聖藥故用之而成功也傷寒少陰症四逆惡寒身蜷脈不至不煩而躁本是死症而吾以為可救者何全在脈不至不煩而躁也夫病至四肢之逆其陰陽之將絶可知脈之不至未必非寒極而伏也不然陽絶則心宜煩矣而何以不煩但嫌其不煩而躁則陽未絶而將絶為可畏耳陽既欲絶則陰亦隨之而絶矣故一補其陽陽回而陰亦回矣陰陽之道有一線未絶俱為可救譬如得餘火之星星引之可以焚林況真陰真陽非有形之水火也乃先天之氣耳一得接續便有生機故一見此等之症急以生生湯救之可以重生方用人參三兩附子三錢炒棗仁五錢水煎服此方得人參以回其陰陽得附子以祛其寒逆加棗仁以安心則心定而躁可去躁定而脈自出矣死中求生其在斯方乎傷寒少陰病六七日息高者死息高見於六七日之間明是少陰之症而非太陽之症也息高與氣喘大殊太陽之症乃氣喘氣喘本於邪盛少陰之症乃息高息高本於氣虛而息高與氣喘終何以辨之氣喘者鼻息粗大息高者鼻息微小耳此乃下元之真氣欲絶而未絶牽連氣海之間故上行而作氣急之狀能上而不能下也最危最急之候方用止息湯人參三兩熟地三兩牛膝三錢麥冬二兩破故紙三錢胡桃仁一個乾薑五分水煎服此方大補關元氣海復引火之下行絶不去祛寒逐邪庶幾氣可回而息高者可平也倘疑是太陽喘症而妄用桂枝湯殺人於頃刻矣故必用止息湯救之十人中亦可望生五六人然必須多服久服始得苟或服一劑而輒止亦未能收功者又不可不知傷寒少陰病脈微沉細但欲臥汗出不煩自欲嘔吐至五六日自利復煩躁不能臥寐者死症也傷寒而脈微沉細明是陰症況欲臥而不欲動乎汗已出矣內無陽症可知心中不煩時欲嘔吐此陽邪已散而陰邪作崇急以祛寒為是乃失此不溫至五六日而下利是上下俱亂也此時倘不煩躁則腎中之真陽未散今又加煩躁不得臥寐明是奔越而不可回之兆矣非死症而何然而其先原因失治以至於不可救非本不可救而成此擾亂之症也我有奇方名轉陽援絶湯用人參一兩白朮一兩炒棗仁一兩茯神五錢肉桂二錢水煎服一劑即可安臥而回春矣此方用人參以救絶用白朮茯神以分消水濕而止下利又用肉桂以溫中而去寒加棗仁以安心而解躁用之得宜自然奏功如響也傷寒脈遲自然是寒誤與黃芩湯以解熱則益加寒矣寒甚宜不能食今反能食病名除中仲景為是死症者何也夫能食者是胃氣有餘如何反日死症不知胃寒而加之寒藥反致能食者此胃氣欲絶轉現假食之象以欺人也此不過一時能食非可久之道病名除中者正言其胃中之氣除去而不可留也雖然此病雖是死症而吾以為猶有生機終以其能食胃氣將除而未除可用藥以留其胃氣也方用參苓湯加減人參一兩茯苓五錢肉桂一錢陳皮三分甘草一錢水煎服此方參苓健脾開胃肉桂祛寒陳皮化食甘草留中相製得宜自然轉敗為功而死者可重生矣傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死此仲景原文也夫傷寒陰症發厥灸其厥陰之經亦不得已之法原不及湯藥之神也灸厥陰不還聽其死者亦僅對貧寒之子而説以其不能備參藥也倘以參附湯救之未有不生者我今憐憫世人另傳一方名還厥湯用白朮四兩附子三錢乾薑三錢水煎服一劑而蘇凡見有厥逆等症即以此方投之無不神效如響蓋白朮最利腰臍陰寒之初入原從腰臍始吾利其腰臍則腎宮已有生氣況佐之附子乾薑則無微不達而邪又安留乎況白朮健脾開胃中州安奠四肢邊旁有不陽回頃刻者乎傷寒發熱下利又加厥逆中心煩躁而不得臥者死症也身熱未退邪猶在中今既發厥身雖熱而邪將散矣宜下利之自止乃不止而心中轉添煩躁不得臥此血乾而心無以養陽氣將外散也不死何待又將何法以生之亦惟有補元陽之氣而已矣方用參朮湯人參三兩白朮三兩炒棗仁一兩麥冬三錢水煎服此方參術補氣氣足而血自生血生而煩躁可定況又佐之棗仁以安魂麥冬以益肺有不奏功如神者乎縱不能盡人可救亦必救十之七八也傷寒發熱而能發厥便有可生之機以發厥則邪能外出也然厥可一二而不可頻頻況身熱而下利至甚如何可久厥而不止乎其為死症何疑蓋下寒而上熱鬱結於中而陰陽之氣不能彼此之相接也必須和其陰陽而通達其上下則死可變生方用人參三兩白朮五錢甘草一錢蘇子一錢附子二錢水煎服此方通達上下以和其陰陽之氣自然厥止而利亦止厥利既止死可變生倘服後而厥仍不止則亦無藥之可救正不必再與之也蓋陰陽已絶而上下之氣不能接續矣傷寒熱六七日不下利忽然變為下利者已是危症況又汗出不止乎是亡陽也有陰無陽死症明甚吾何以救之哉夫陽之外越因於陰之內祛也欲陰之安然於中而不外祛必先使陽之壯於內而不外出急以人參三兩北五味一錢煎湯救之可生然而貧寒之子安可得參我另定一方用白朮三兩黃耆三兩當歸一兩北五味一錢白芍五錢水煎服此方補氣補血以救陽氣之外越陽回則汗自止汗止而下利未必遽止方中特用當歸白芍者正所以止利也水瀉則當歸是所禁用下利非水瀉也正取當歸之滑白芍之酸兩相和合以成止利之功況又有五味之收斂不特收汗並且澀利若遇貧賤之子無銀備參者急投此方亦可救危亡於頃刻傷寒下利手足厥冷以致無脈急灸其關元之脈者以寒極而脈伏非灸則脈不能出也今灸之而脈仍不出反作微喘此氣逆而不下乃奔於上而欲絶也本是死症而吾以為可生者正以其無脈也夫人死而後無脈今人未死而先無脈非無也乃伏也灸之不還豈真無脈之可還乎無脈應死矣而仍未死止作微喘是脈欲還而不能遽還也方用人參一兩麥冬一兩牛膝三錢熟地五錢甘草一錢附子一錢名為還脈湯一劑而脈驟出者死苟得漸漸脈出可望生全矣傷寒下利後脈絶手足厥冷猝時還脈而手足盡溫者生此亦用灸法而脈還者也然亦必手足溫者可生正見陽氣之尚留耳倘脈不還則手足之逆冷終無溫熱之時是陽不可返而死不可生矣今將何以救之哉不知脈之不返者因灸法而不能返也灸之力微終不及藥之力厚吾以人參三兩灌之則脈自然驟出矣夫少陰下利厥逆無脈者服白通湯惡脈之驟出茲厥陰下利厥逆脈絶者用灸法欲脈之猝還一死一生者何也一用灸而一用藥也可見用藥之能速出脈不於此益信乎吾所以用獨參湯救之而可生也傷寒下利日十餘行脈反實者死何也蓋下多亡陰宜脈之虛弱矣今不虛而反實現假實之象也明是正氣耗絶為邪氣所障邪盛則正氣消亡欲不死不可得矣然則何以救之哉仍補其虛而不必論脈之實與不實也方名還真湯人參一兩茯苓二兩白芍一兩水煎服此方人參以固元陽茯苓以止脫瀉白芍以生真陰陰生而陽長利止而脫固則正氣既強虛者不虛而後邪氣自敗實者不實也假象變為真虛則死症變為真生矣産後感太陽風邪大喘大吐大嘔不治之症也喘則元陽將絶況大喘乎吐則胃氣將亡況大吐乎嘔則脾氣將脫況大嘔乎産後氣血大弱如何禁此三者自是死症無疑吾欲於死裡求生將用何方以救之仍然大補氣血而少加止吐止嘔止喘之藥而太陽風邪反作末治而已矣方用轉氣救産湯人參三兩麥冬三兩白朮一兩當歸一兩川芎三錢荊芥一錢桂枝三分水煎服一劑而喘轉嘔吐止便有生機否則仍死也人參奪元氣於欲絶未絶之間麥冬安肺氣於將亡未亡之候白朮救脾胃之氣於將崩未崩之時當歸川芎不過生血而已荊芥仍引血歸經而兼散邪助桂枝祛風而同入膀胱下行而不上逆也方中酌量實有深意非漫然或多或少而輕用之大約此方救此症亦有七八人生者總不可惜人參而少用之耳産後感冒風邪是太陽之症口吐膿血頭痛欲破心煩不止腹痛如死或作結胸皆在不救以産後氣血大虧不可祛邪而病又犯甚拙不能直治其傷故耳如口吐膿血者血不下行而上行也頭痛欲破者血不能養陽而陽欲與陰絶也心煩不止者心血已盡腎水不上滋也腹痛如死者腹中寒極腎有寒侵命門火欲外遁也或作結胸胃中停食不化胃氣將絶也諸症少見一症已是難救況一齊共見乎必死無疑矣子欲以一方救之何也蓋産後感邪原不必深計惟補其正而邪自退豫用佛手散多加人參而佐之肉桂荊芥不必治諸症而諸症自必皆去當歸二兩川芎一兩人參三兩荊芥二錢肉桂一錢一劑即見功再劑而全愈蓋佛手散原是治産後聖方加之人參則功力更大生新去舊散邪歸經止痛安心開胃消食所以奏效皆神也産後減少陽風邪譫語不止煩燥不已更加驚悸者死蓋少陽膽經也膽中無計則不能潤心心中無血則不能養心於是心中恍惚譫語生矣而煩躁驚悸相因而至總皆無血之故無血補血如何即是死症不知膽木受邪不發表則血無以生然徒發表則血更耗散顧此失彼所以難救然而非真不可救也吾用佛手散加減治之便可生全方用當歸二兩川芎一兩人參一兩炒棗仁一兩麥冬三錢竹茹一團丹砂一錢熟地五錢水煎服此方歸芎生血以養心又加人參棗仁麥冬竹茹丹砂無非安心之藥而熟地又是補腎之妙劑上下相需心腎兩濟又何煩躁之不除驚悸之不定而譫語之不止者乎産後感中陽明之風邪大喘大汗者亦不治蓋風邪入於陽明寒變為熱故大喘大汗平人得此病原該用白虎湯而産婦血氣虧損如何可用乎雖然大補産婦之氣血而兼治陽明之邪火未必不降而大喘大汗未必不除也方用補虛降火湯麥冬一兩人參五錢元參五錢桑葉十四片蘇子五分水煎服此方人參麥冬補氣元參降火桑葉止汗蘇子定喘助正而不攻邪退邪而不損正實有奇功也産後感陽明之邪發狂亡陽者不救之症也狂症多是實熱産後發狂又是虛熱矣實熱可瀉火而狂定虛熱豈可瀉火以定狂哉然吾以為可救者正以其亡陽也亡陽多是氣虛雖實熱而氣仍虛也故瀉實熱之火不可不兼用人參況産後原是虛症乎大約亡陽之症用藥一止汗便有生機吾今不去定狂先去止汗方用救陽湯人參三兩桑葉三十片麥冬二兩元參一兩青蒿五錢水煎服一劑而汗止再劑而狂定不可用三劑也二劑後即單用人參麥冬北五味當歸川芎調理自然安也此方止可救亡陽之急症而不可據之為治産之神方蓋青蒿雖補未免散多於補不過借其散中有補以祛胃中之火一時權宜之計倘多服又恐損産婦氣血矣所以二劑後必須改用他方妊婦臨月忽感少陰經風邪惡寒蜷臥手足冷者不治之症也少陰腎經也無論傳經至少陰與直中入少陰苟得此症多不能治蓋少陰腎經宜溫而不宜寒今風寒入之則命門之火微而腎宮無非寒氣勢必子宮亦寒手足冷者脾胃寒極之非也脾胃至於寒極不死何待而吾以為可生者以胎之未下也急以溫熱藥救之方名散寒救胎湯人參一兩白朮二兩肉桂一錢乾薑一錢甘草一錢水煎服一劑而寒散不惡寒矣再劑而手足溫不蜷臥矣三劑全愈夫人參白朮所以固氣肉桂乾薑所以散寒甘草和中亦可已矣不知肉桂乾薑雖是散寒用之於臨月之時何愁胎墮然必竟二味性甚猛烈得甘草以和之則二味單去祛腹中之寒而不去催胎中之子助人參白朮以掃除更有殊功耳豈漫然而多用之哉妊婦臨月感少陰經症噁心腹痛手足厥逆者不治亦以寒入腎宮上侵於心不獨下浸於腹已也較上症更重夫腎水滋心何以反至克心蓋腎之真水心藉之養腎之邪水心得之亡今腎感寒邪挾腎水而上凌於心故心腹兩相作痛手足一齊厥逆此候至急至危我將何術以救之亦仍治其少陰之邪而已方用回陽救産湯人參一兩肉桂一錢乾薑一錢白朮五錢甘草一錢當歸一兩水煎服此方妙在加當歸蓋少陰之邪敢上侵於心者欺心中之無血也用當歸以補血助人參之力以援心則心中有養而肉桂乾薑無非祛寒蕩邪之品況有白朮甘草之利腰臍而調心腹乎自然痛止而逆除矣仲景謂子生則可治用獨參湯以救之亦救之於生子之後而非救之於未生子之前也子未生之前當急用吾方子既生之後當急用仲景方産婦臨月忽感少陰症者急以人參白朮大劑溫之不應則死此仲景之文也似乎舍人參白朮無可救之藥矣吾以為單用人參白朮尚非萬全苟用人參白朮不應急加入附子肉桂乾薑未必不應如響也吾今酌定一方名全生救難湯人參一兩白朮一兩附子一錢甘草五分水煎服可治凡感少陰經之邪者神效産婦三四日至六七日忽然手足蜷臥息高氣喘噁心腹痛者不救此症蓋感少陰之寒邪而在內之真陽逼越於上焦上假熱而下真寒也倘治之不得法有死而已急用平喘祛寒散人參二兩麥冬五錢肉桂二錢白朮三兩吳茱萸五分水煎服二劑喘止二劑痛止此方亦補氣反逆之聖藥祛寒定喘之神方但服之不如法往往僨事必須將藥煎好俟其微寒而頓服之蓋藥性熱而病大寒所謂宜順其性也産婦半月後至將滿月亦患前症又不可用前方矣當改用護産湯人參五錢茯苓五錢附子一錢白朮五錢當歸一兩熟地一兩山茱萸五錢麥冬五錢牛膝一錢水煎服蓋産婦已産至半月以後與將滿月不比新産血氣之大虧也故參可少用而補陽之中又可用補陰之劑有附子以祛寒何患陰滯而不行哉産婦産後手足青一身黑不救此陰寒之最重而毒氣之最酷者也原無方法可以回生然見其未死而不救毋寧備一方救之而不生吾令酌定一方名開青散黑湯人參四兩白朮四兩附子一錢當歸一兩肉桂三錢水煎服此方服下手足之青少退身不黑便有生機否則仍死也蓋毒深而不可解寒結而不可開耳産後足純青心下痛雖較上症少輕而寒毒之攻心則一故亦主死以前方投之往往多效不比一身盡黑者之難救也蓋此症由下而上一散其下寒而上寒即解所以易於奏效産後少陰感邪腎水上泛嘔吐下利真陽飛越者亦死症也蓋産婦腎水原枯如何上泛而至嘔吐不知腎水之泛濫因腎火之衰微也火為寒所祛水亦隨寒而趨此症犯在平人尚然難救況産婦乎而吾以為可救者有腎水之存耳急用補陽之藥入於補陰之中引火歸原水自然下行而不致上泛方用補火引水湯人參五錢白朮一兩熟地一兩山茱萸五錢茯苓一兩附子一錢肉桂三錢車前子一錢水煎服一劑而腎水不泛濫矣此方火補命門之火仍於水中補之故水得火而有歸途火得水而有生氣兩相合而兩相成也産後四五日忽感風邪發厥者死症也厥症多是熱而産後發厥豈有熱之理是熱亦虛熱也欲治厥而身虛不可散邪欲清熱而身虛不可用涼所以往往難治謂是死症而實非盡是死症也我定一方名轉厥安産方當歸一兩人參一兩附子一錢水煎服一劑即厥定而人生矣蓋産後發厥乃陽氣既虛而陰血文耗復感寒邪以成之者也我用人參以回元氣於無何有之鄉用當歸以生血於敗瘀未復之後用附子以祛除外來之邪故正回而邪散血生而厥除也産後吐蛔蟲者不治之症也以胃氣將絶蟲不能安身耳夫蛔蟲在人之胃中大寒不居太熱亦不居今産後吐蛔必在發厥之後其吐蛔也必然盡情吐出非偶然吐一條也更有成團逐塊而吐出者真是惡症吾欲生之何也正因其吐蛔之尚可生也蓋人臟既絶蟲亦寂然今紛然上吐是胃中尚有氣以逼迫之吾安其胃氣則蟲自定而人可生方用安蛔救産湯人參一兩白朮一兩棐子仁一兩白薇三錢肉桂一錢神麯五分水煎服二劑而蛔定矣此方參術以生胃氣棐子白薇肉桂以殺蟲所以奏功獨神耳産後口吐血膿又復發斑此千人中偶一有之本是不救然治之得法亦有不死者此症蓋因夏月感受暑熱之氣未及發出一至生産而火毒大彰又因身虛而火勢猶不能一時盡發故口吐膿血以妄行而身生斑點以拂亂也論理産後不宜用涼藥化斑然此等症又不得不用涼藥為權宜之計吾今酌定一方名為化火救産湯人參五錢當歸一兩川芎五錢麥冬五錢荊芥三錢元參一兩升麻一錢水煎服一劑而血膿止再劑而斑稀三劑而斑化矣不可用四劑也三劑後當改用佛手散大劑多飲自然無後患否則恐有變寒之患吾方原不大寒即變寒而可救倘從前一見斑即用黃連解毒之藥以救一時之急及至熱退寒生往往有寒戰而死者涼藥可輕用乎故寧可服吾方以漸退斑而緩降血不可用霸藥以取快於一時也産後患厥陰症嘔吐兩脅脹滿者必便血不治之症也蓋傷肝而血乃下行本無血而又傷血豈有不死之理而吾必欲救之將恃何法乎正因其便血耳倘肝受風邪而不下行則邪留兩脅反是腹心之病今血盡趨大便而出是肝中之邪散吾清其大腸之火似可奏功矣但産婦宜溫補不宜清理用涼藥以消其火非所以救産後之婦也不知火之有餘乃水之不足大補其水則火自消歸無有矣方用平肝救血湯當歸一兩川芎五錢麥冬一兩三七根末一錢水煎服一劑而血止兩脅之脹滿亦除矣又何至上嘔食而下便血哉産後下利厥逆躁不得臥或厥不得止俱是死症蓋下利則亡陰厥逆則亡陽已是難救況躁不得臥是血無以養心矣而厥更不止則汗出又無已也欲不死得乎我欲於死中求生舍人參當歸無別藥也方名參歸湯人參二兩當歸二兩荊芥一錢水煎服用參歸補氣血以生新則舊血可止舊血止而新血益生自然有血以養心厥可定而心可安躁可釋也中寒門雷公真君曰陰寒宜中少陰經腎中手足青黑者不治之症也蓋陰毒結成於脾胃之間而腎中之火全然外越如何可救然而心尚不痛則心中尚有星星餘火存於其中急用救心蕩寒湯人參三兩良薑三錢附子三錢白朮三兩水煎服助心中之火不使遽絶則相火得君火之焰而漸歸火勢既旺寒邪失威自然火生土而脾胃之氣轉一陽來復大地皆陽春手足四肢盡變溫和矣此方妙在良薑入心同附子斬關直入然非參術之多用亦不能返元陽於無何有之鄉也故必須多用而共成其功耳陰寒直中腎經面青鼻黑腹中痛欲死囊縮較前症更重矣死亡頃刻救之少遲必一身盡黑而死急用救亡丹人參五錢白朮三兩附子一個乾薑三錢肉桂五錢水煎急灌之吾方似較仲景張公之用熱更重不知此症全是一團死氣現於身之上下若不用此等猛烈大熱重劑又何以逐陰寒而追亡魂祛毒氣而奪陽魄哉故人參反若可少用而附桂不可不多用也然而白朮又何以多用之耶不知白朮最利腰臍腹痛欲死非此不能通達故多用之以驅駕桂附以成其祛除掃蕩之功而秦返魄還魂之效耳陰寒直中腎經心痛欲死嘔吐不納食下利清水本是不治之病蓋寒邪犯心而脾胃將絶急不待時此時覓藥緩不濟事速用針刺心上一分出紫血少許然後用逐寒返魂湯救之人參一兩良薑三錢附子五錢茯苓五錢白朮三兩丁香一錢此方專入心以逐祛返元陽於頃刻心若定而諸邪退走脾胃自安不至上下之逆庶可重生否則因循觀望必至身死矣陰寒直中腎經兩脅作痛手足指甲盡青囊縮拽之而不出蜷曲而臥亦不治之症也此乃陰寒從腎以入肝而肝氣欲絶故筋先受病將死也雖症較前三症少輕而能死人則一余又將何法以生之乎夫肝木之絶由於腎氣之先絶欲救肝不得不先救腎方用救腎活肝湯白朮三兩當歸一兩人參五錢熟地一兩山茱萸五錢附子一錢肉桂二錢水煎服此方祛寒之中仍用回陽之藥然加入熟地山茱萸則參術無過燥之憂附桂有相資之益肝得火而溫亦得水而養自然筋活而青去囊寬而縮解也陰寒而直中腎經舌黑眼閉下身盡黑上身盡青大便出小便自遺此更危急之症雖有仙方恐難全活而豫必欲生之因定一方雖不敢曰人儘可救亦庶幾於十人中而救一二人乎方名救心湯人參五兩附子一個白朮半斤肉桂一兩菖蒲五分良薑三錢水煎服此方參術多用者恐少則力量不能勝任以駕御夫桂附之熱藥也故必多加而後可望其通達上下以盡祛周身之寒毒倘得大便止而小便不遺便有生機再進一劑則眼開而舌黑可去身黑身青俱可盡解也苟服藥後仍前大小便之不禁不必再服藥聽其身死而已矣大約此方救此病十人中亦可救三四人凡人直中陰寒冷氣犯於小腹不從傳經傷寒而自寒者命曰直中陰經陰經者少陰腎經其症必畏寒腹痛作嘔手足厥逆有手足俱青甚則筋青囊縮若不急以溫熱之藥治之有立時而死者最可懼之症也方用蕩寒湯白朮三兩肉桂三錢丁香一錢吳茱萸一錢水煎服一劑而陰消陽回不必再劑也此方妙在獨用白朮至三兩則腰臍之與大利又得肉桂以溫熱其命門之火丁香吳茱萸止嘔逆而反厥逆則陰寒之邪何處潛藏故一劑而回春也中暑門雷公真君曰中暑亡陽汗出不止立時氣脫者死症也蓋亡陽則陽氣盡從汗出故氣盡而死法當急補其陽氣則陽氣接續陰氣而不至有遽脫之憂用獨參湯妙矣而貧家何從得參不若以當歸補血湯用當歸一兩黃耆二兩加桑葉三十片救之蓋二味價廉而功亦不亞於人參且桑葉又有補陰之功無陰則陽不化黃耆補氣得當歸則補血得桑葉則尤能生陰也中暑發狂氣喘汗如雨下如喪神失守亦死亡頃刻也蓋熱極無水以養神心中自焚逼汗於外亡陽而且失神也急宜用白虎湯救之然少亦不濟也必須石膏用四兩人參亦用四兩加黃連三錢水煎服一劑而神定二劑而汗止矣或疑心中無水而身何以有汗不知發狂之症口未有不渴者口渴必飲水自救水入腹中不行心而行脾脾必灌注於肺肺主皮毛故從外泄然則汗乃外來之水非內存之液也況汗從外泄陽氣亦從之而出陽出而心中之陰氣亦且隨之而散亡所以喪神失守耳吾以黃連平其心火石膏除其胃火而大加人參以救其亡陽之脫庶幾火散而正氣獨存神存而外邪皆失也中暑循衣摸床以手撮空本是死症然而可救者以暑氣之在心解心中之熱則五臟即有生氣方用獨參湯三兩加黃連三錢灌之而循衣摸床撮空等症遽止者即生蓋人參救心氣之絶而黃連散心中之火火散氣回其生也必矣中暑猝倒心痛欲死者不治之症也暑氣最熱而心乃火宮以火入火何以相犯而竟至心痛欲死也不知心火君火也暑火邪火也邪火凌心與邪水浸心原無彼此之異故寒暑之氣不犯則已犯則未有不猝然心痛者也心君至靜有膻中之間隔犯心者犯膻中也邪犯膻中便猝然心痛此時即以祛暑之藥直引入膻中則暑散火退而心君泰然也方用散暑救心湯青蒿一兩黃連三錢人參三錢茯神五錢白朮三錢香薷一錢藿香五錢半夏一錢水煎服一劑而痛即止此方神效者妙在青蒿同用直入膻中逐暑無形所以止痛如響耳中暑忽倒口吐白沫將欲發狂身如火燒紫斑爛然者多不可救而豫謂有一線可救者正以其紫斑之發出也倘不發出則火毒內藏必至攻心而亡今嫌其斑雖發出而其色純紫則毒氣太盛恐難化耳方用救斑再蘇湯元參三兩升麻三錢荊芥三錢黃連三錢黃芩三錢麥冬三兩天冬一兩青蒿一兩水煎服一劑而斑色變紅再劑而斑紅變淡三劑而斑色盡消便慶再蘇也否則終亦必亡而已矣夏日感暑至生霍亂欲吐而不能不吐不可最急之病也用香薷飲亦得生然有用之而不納隨飲即吐尤為至凶法當從治我有妙方名轉治湯白朮三錢茯苓三錢芍藥五錢藿香一錢紫蘇五分陳皮五分天花粉一錢肉桂五分香薷五分白豆蔻一粒水煎冷服下喉即納霍亂即定矣此方之妙妙在用芍藥為君而佐之白朮茯苓則肝氣自平不束下克脾土則霍亂自定況又有解暑之藥乎尤妙在用肉桂香薷藿香溫熱之藥順暑熱之氣引邪下行而暗解紛紜此實有神鬼不測之機而用之於刀圭之內也霍亂腹痛欲吐不能欲瀉不得四肢厥逆身青囊縮必死之症也豫亦何必再為立方然而其人一刻不亡豈可聽之而不救乎此症乃下虛寒而上感暑熱之氣陰陽拂亂上下不接最危最急之候法當用陰陽水探吐之若不應急以救亂湯治之人參五錢香薷三錢吳茱萸三錢茯苓三錢白朮三錢附子五分藿香一錢木瓜三錢水煎服下喉而氣即回矣真治乾霍亂之神方也若濕霍亂又不可用此方用白朮五錢香薷一錢青蒿五錢茯苓五錢陳皮一錢砂仁三粒一劑即回春也産後忽感中暑霍亂吐瀉法在不救然而亦有用藥救之而能生者總不可用香薷也方用消暑活産丹人參一兩當歸二兩川芎一兩肉桂二錢青蒿一錢水煎服一劑即愈蓋産婦止補氣血氣血既回暑氣自散況方中又有祛寒解暑之味乎所以奏功獨神也或疑感暑是熱胡為反用肉桂不知産婦氣血大虛遍身是寒一感暑氣便覺相拂非有大熱之氣深入腹中也不過略感暑氣與本身之寒兩相攻擊以致霍亂今仍用肉桂以溫其虛寒以青蒿而解其微暑用之於大劑補氣補血之中是以駕御而不敢有變亂之形此立方之妙而建功之神也又何必疑哉夏令火熱爍石流金人有一時感犯暑邪上吐下瀉立刻死者最可懼之症也切勿輕用香薷飲亦莫妄用白虎湯我有一方名曰解熱消暑散青蒿一兩乾葛一錢香薷一錢茯苓一兩白朮三錢白扁豆二錢陳皮一錢治之即安此方妙在用青蒿茯苓為君青蒿最能解暑而去熱一物而兩用之引其暑熱盡從膀胱而出而乾葛香薷之類不過佐青蒿以去暑也尤妙少用白朮以健脾胃之氣則暑熱退而胃氣不傷勝於香薷飲多矣水濕門雷公真君曰水氣凌心包之絡厄逆不止死症也而吾以為可救者心包為水氣所凌惟恐犯心所以厄逆不止者欲號召五臟之氣共救水氣之犯心也水氣凌心包以成厄逆之症亦止須分消其水濕之氣而厄逆自除也方用止厄湯茯神一兩蒼朮三錢白朮三錢薏仁一兩芡實五錢半夏一錢人參三錢陳皮一錢丁香五分吳茱萸三分水煎服一劑而厄即止二劑而厄即愈此方健胃固脾雖利濕分水而不消真氣故能補心包而壯心君之位不必治厄而厄有定矣水濕結在膀胱點滴不能出以致目突口張足腫氣喘者不治之症也而吾以為可治者膀胱與腎為表裡膀胱之開合腎司權也水濕結在膀胱者腎氣不能行於膀胱耳吾通其腎氣而膀胱自通諸症自愈矣方用通腎消水湯熟地一兩山茱萸五錢車前子三錢茯神五錢肉桂一錢牛膝一錢山藥一兩薏仁一兩水煎服此方專治腎以通膀胱之氣膀胱得腎氣而水自難藏水不能藏而下行則氣亦自順而不逆又何至有目突氣喘之病哉上病漸消而下病尋愈足腫之水不覺盡歸於膀胱從溺而盡出也黃疸之症一身盡黃兩目亦黃卻是死症倘初起即治之亦未必即死也我有奇方名為消黃去疸湯茵陳三錢薏仁三兩茯苓二兩車前子三兩肉桂三分水煎服一連四劑黃去疸消矣黃疸雖成於濕熱畢竟脾虛不能分消水濕以致鬱而成黃吾用茯苓薏仁車前大劑為君分消水濕仍是健脾固氣之藥少用茵陳以解濕熱用肉桂引入膀胱盡從小便而出無事張皇而暗解其濕熱之橫此方之淡而妙簡而神也四劑之後減半加白朮一兩煎湯飲之再用四劑則全愈而無後患矣黃疸之症原不宜死然治之不得法往往生變為死蓋黃疸外感之濕易治內傷之濕難醫外感單治濕而疸隨愈內傷單治濕而疸難痊瀉水則氣愈消發汗則精愈泄又何能黃疸之速愈哉我有方單治內傷而得黃疸者名治內消疸湯白朮一兩茯苓一兩薏仁一兩茵陳二錢炒梔子二錢陳皮五分水煎服此方妙在用白朮茯苓薏仁之多使健脾又復利水助茵陳梔子以消濕熱盡從膀胱內消不必又去退皮膚之濕而皮膚之濕自消大約此方用至十劑無不消者不必十劑之外服十劑減半去梔子再服五劑則全愈人亦健旺矣至妙至神之方有益無損可為治內傷而成濕者之法産婦感水腫以致面浮手足浮心脹者不治之症也然而此浮非水氣也乃虛氣作浮耳若作水濕治之必死矣吾今不治水濕單去健脾反有生意方用助氣分水湯白朮二兩人參三兩茯苓五錢薏仁一兩陳皮五分蘿蔔子三分水煎服此方參苓薏術皆健脾之聖藥陳皮蘿蔔子些微以消其脹脾氣健而水濕自行水濕行而脹自去脹去而浮亦漸消矣但此方須多食見效不可一劑而即責其近功也産婦痢疾而加之嘔逆者必死之症也蓋痢疾亡陰平人尚非所宜何況産婦氣血之大虛乎今又加嘔逆則胃中有火遏抑拂亂而氣血更虛勢必至胃氣之絶不死何待乎然而胃氣有一線未絶即可救援吾有一方不必服藥止須將田螺一個搗碎入麝香一釐吳茱萸一分為細末掩在臍上即不嘔吐便慶再生蓋田螺最利水去火痢疾本是熱症而又加濕也産婦痢疾因氣血之虛不可竟用去熱散火之藥以虛其虛今用田螺外治法至巧也嘔逆一回速以當歸一兩白芍三錢甘草一錢枳殼三分檳榔三分水煎服二劑而痢自除後用獨參湯調理可也産婦一身發黃者濕熱壅滯而不散欲治黃而氣血更消欲補虛而濕黃更甚此方法之窮而醫人束手亦聽其死亡而已矣雖然濕熱之成原本於虛補虛以治黃病未有不可但宜兼治之得法耳吾有一方治因虛而發黃者神效不獨治産婦也方名補虛散黃湯白朮一兩薏仁二兩車前子五錢茯苓五錢荊芥一錢茵陳五分水煎服常人非産婦者茵陳用三錢此方之妙健脾以利水而不耗氣既補虛又去濕濕去而黃不退者未之有也産婦濕氣感中胞絡下陰腫脹小水點滴不出死症也蓋水入腹中必趨膀胱而出之小便今不由膀胱而盡入於胎胞之絡是相反不相順也如何不死乎然則豫將何法以救之亦仍利膀胱而已夫膀胱之能化水者得腎氣以化之也産婦氣血大虛則腎氣亦虛腎氣虛則膀胱之氣亦虛膀胱氣虛故不化水而水乃入於胎胞而不散故初急而後腫腫極而水點滴不出也吾今不獨治膀胱而先治腎腎氣足而膀胱之氣自行水道自順也方用通水散白朮一兩熟地一兩茯苓三錢山茱萸五錢薏仁一兩肉桂五分車前子三錢人參一兩水煎服此方補腎而兼補心蓋胎胞上連心下連腎吾補其心腎則胎胞之氣通自不受水而轉輸於膀胱矣況膀胱又因腎氣之通自能化水而分消於大小腸下趨於便門而出此實有妙用非泛然以立方也産婦水氣凌肺作喘不已者亦是死症然治之得法正不死也産婦因虛以受水氣原不可全治夫水也雖作喘不已似為水氣所犯然徒治其水則喘且益甚而治之之法將若何亦助其脾氣之旺使之無畏乎水則水自不能凌脾脾不受凌喘將何生乎方用補土寧喘丹人參一兩白朮一兩麥冬一兩茯苓三錢蘇子一錢水煎服此方人參補氣以健脾白朮利腰以健脾麥冬養肺以健脾茯苓蘇子不過借其佐使以行水止喘而已然而治喘實有神功也脾健則土旺土旺則水不敢泛濫何至有脹喘之生哉熱症門雷公真君曰熱病發狂如見鬼狀者死症也與熱病不知人正復相同然而熱症同而死症異也發狂如見鬼狀者實熱也熱病不知人者虛熱也實熱宜瀉火虛熱宜清火熱極而至發狂大約陽明之火居多火熱燔燒自己之心亦焚心中自焚則心之神外越而見鬼矣非如見鬼也而實實見鬼耳人至見鬼與死為鄰矣將用何藥以救之乎方用火齊湯石膏一兩元參三兩人參二兩知母一錢黃連三錢茯神一兩白芥子三錢水煎服此方石膏以降胃火元參以降浮遊之火知母以降腎火黃連以降心火茯神以清心引諸火從小便而泄出白芥子以消痰則神清而心定然非多加人參則胃氣消亡又安能使諸藥之降火哉此方之所以妙而神也一劑而狂止再劑而不見鬼矣三劑而火全退也熱病不知人者雖亦陽明之火然非盡陽明之火也乃肝氣鬱悶木中之火不得泄於是木克胃而胃火亦旺熱氣熏蒸心中煩亂故不知人然神尚守於心中而不至於外越也方用開知湯白芍一兩當歸一兩甘草三錢石膏一兩柴胡一錢炒梔子五錢白芥子三錢菖蒲三錢麥冬一兩水煎服此方用歸芍以滋肝用柴胡以開鬱用石膏梔子平胃肝之火用白芥子麥冬消痰清肺用菖蒲啓心中之迷自然熱去而心安又何至悶亂不知人哉故一劑頓解二劑全愈也人有火盛之極舌如芒刺唇口開裂大渴呼飲雖非傷寒之症所得而人患此病即不身熱亦去死不久也白虎湯亦可救但過於太涼恐傷胃氣往往有熱退而生變仍歸於亡故白虎湯不可輕投也我有一方名曰清涼散元參二兩麥冬一兩甘菊花五錢青蒿五錢白芥子三錢生地三錢車前子三錢水煎服此方妙在元參為君以解上焦之焰麥冬為臣以解肺中之熱甘菊青蒿為佐以消胃中之火尤妙車前子白芥生地為使或化痰或涼血盡從膀胱以下瀉其大熱之氣是上下之間無非清涼而火熱自散又不損胃故能扶危而不至生變也産婦産半月忽然大汗如雨口渴舌乾發熱而躁有似傷寒症者死症也若作傷寒治之無不死矣此乃內水乾枯無血以養心陽氣無陰不化乃發汗亡陽而身熱耳故口雖渴而不欲飲水舌雖干而苔又滑甚心躁而不至發狂此所以異於傷寒之外症也此時急用人參二兩當歸二兩黃耆二兩桑葉三十片北五味一錢麥冬五錢水煎服方名收汗丹參歸黃耆大補其氣血麥冬五味清中有澀佐桑葉止汗實有神功蓋此等虛汗非補不止而非澀亦不收也故一劑而汗止二劑而汗收起死回生非此方之謂乎燥症門雷公真君曰血燥肺干又生癰疽者多不可救恐無血以濟之也此等病多得之膏粱之人縱情房幃精血大耗又忍精而戰精不化而變為膿血乃陰毒非陽毒也如以治陽毒法治之則死矣我今特留奇方名化癰湯金銀花五兩荊芥三錢白芥子三錢肉桂三分當歸三兩元參三兩水煎服一劑而陰變陽矣二劑而未潰者全消已潰者生肉三劑即愈四劑收功神效之極倘瘡口大潰大爛已成壞症者肯服吾方亦斷無性命之憂堅守長服斷必收功蓋此方消毒而不散氣尚補而不尚攻治陰毒之癰疽實有鬼神莫測之妙血崩之後口舌燥裂不能飲食者死蓋亡血自然無血以生精精涸則津亦涸必然之勢也欲使口舌之乾者重潤必須使精血之竭者重生補精之方六味丸最妙然而六味丸單補腎中之精而不能上補口舌之津也雖補腎於下亦能通津於上然終覺緩不濟急吾今定一奇方上下兼補名上下相資湯熟地一兩山茱萸五錢葳蕤五錢人參三錢元參三錢沙參五錢當歸五錢麥冬一兩北五味二錢牛膝五錢車前子一錢水煎服此方補腎為君而佐之補肺之藥子母相資上下兼潤精生而液亦生血生而津亦生矣安在已死之症不可慶再生耶燥症舌乾腫大溺血大便又便血不止亦是死症蓋夏感暑熱之毒至秋而燥極肺金清肅之令不行大小便熱極而齊便血也論理見血宜治血矣然而治血血偏不止反至燥添而不可救吾不治血專治燥方用兼潤丸熟地一兩元參二兩麥冬二兩沙參二兩車前子五錢地榆三錢生地五錢當歸一兩白芍一兩水煎服一劑輕二劑血止便有生機也此方純是補血妙品惟用地榆以清火車前子以利水火清水利不必治血血自止也乾燥火熾大腸陰盡遂至糞如羊屎名為腸結不治之症也然而陰盡即宜死今不死而腸結是陰猶未盡也真陰一日不盡則一日不死一線不絶則一線可生吾有奇方專補其陰使陰生而火息陰旺而腸寬也方用生陰開結湯熟地二兩元參一兩當歸一兩生地五錢牛膝五錢麥冬五錢山茱萸五錢山藥三錢肉蓯蓉五錢酒洗淡水煎服一連數劑腸結可開糞即不如羊屎矣可望再生然必須日日一劑三月終改用六味地黃湯或不用湯而用丸調理歲余永無腸結之苦也燥症幹甚小腸細小不能出便脹甚欲死者亦不治之症也而我欲治之者何蓋小腸之開合小腸不得而司令腎操其權也倘徒治小腸則小腸益虛失其傳導之官而脹且益甚我今不治小腸而專治腎則腎氣開小腸亦開也方名治本消水湯熟地二兩山茱萸一兩車前子五錢麥冬一兩北五味二錢茯苓五錢牛膝三錢劉寄奴三錢水煎服一劑少通再劑腸寬小便如注矣方用熟地山茱萸以補腎麥冬五味補肺氣以使清肅之氣下行於膀胱茯苓車前分消水勢牛膝寄奴借其迅速之氣導其下行而不使上壅此腎氣通水亦順也肺燥復耗之必有吐血之苦久則成肺痿矣如何可治然我乘其未痿之前而先治之何盡至於死乎方用救痿丹麥冬三兩元參三兩金銀花三兩白芥子三錢桔梗三錢生甘草三錢水煎服此方專資肺氣雖用金銀花之解毒仍是補陰之妙藥故肺痿可解而吐血之症又不相犯倘專治肺痿則肺痿未必愈而血症重犯不可救藥矣故必用吾方而肺痿可愈也燥極生風手足牽掣者死症也蓋脾胃乾枯不能分蔭於手足故四肢牽掣而動風生於火肝木又加燥極復來剋土則脾胃更虛愈難滋潤於手足而牽掣正無已時也方用潤肢湯人參一兩元參一兩當歸一兩白芍一兩炒梔子三錢麥冬一兩山藥五錢水煎服一劑少安再劑漸定三劑而風止矣此方用人參山藥生胃以健脾歸芍平肝以生血麥冬以生肺氣元參炒梔子清火去風兼且解燥內熱既除外症牽掣自愈死症可望生也燥熱之極已生膹郁之症不可起床者不治之症也膹郁者兩脅脹滿不可左右臥而又不能起床此肝經少血而胃氣乾枯久之腎氣亦竭骨中無髓漸成痿廢如何可治不知此症起於夏令之熱爍盡肺金之津不能下生腎水遂至腎水不能生肝木木不能生心火火不能生脾土而成膹郁也然則只救肺腎而脾胃不治自舒矣方用金水兩資湯熟地一兩山茱萸五錢麥冬一兩北五味二錢人參一兩白芍一兩水煎服此方雖曰金水兩資實腎肝肺三經同治蓋補肺腎則金水有源燥症自潤若不平肝木則胃氣難生未易生精生液欲骨堅能步脅安能臥不易得矣所以補腎補肺之中不可無治肝之聖藥白芍最能平肝且能生血用之於補腎補肺之中更善調劑而奏功更神也久服自有生機但不可責其近效耳燥極口吐白血者不治之症也夫血未有不紅者也如何吐白不知久病之人吐痰皆白沫者乃白血也吐白沫何以名白血以其狀如蟹涎絶無有敗痰存乎其中實血而非痰也世人不信取所吐白沫露於星光之下一夜必變紅矣此沫出於腎而腎火挾之沸騰於咽喉不得不吐者也雖是白沫而實腎中之精豈特血而已哉苟不速治則白沫變成緑痰無可如何矣方用六味地黃湯熟地一兩山茱萸五錢山藥五錢丹皮二錢澤瀉二錢茯苓五錢麥冬一兩北五味一錢水煎服日日服之自然白沫止而化為精也沫化為精則生矣燥極一身無肉嗌乾面塵體無膏澤足心反熱者亦不治之症也此血乾而不能外養精涸而不能內潤耳吾有奇方實可救之名曰安潤湯當歸五錢白芍五錢熟地一兩川芎二錢麥冬五錢牛膝三錢人參三錢桑葉三十片水煎服此四物湯而加味者也妙在加人參桑葉則四物更加大補一身之氣血無不潤又何至乾燥之苦哉燥症善驚腰不能俯仰丈夫㿗疝婦人小腹痛目盲眥突者不治之症也然豫謂可治者以諸症皆腎病也腎虛可補補腎則心中有血可以止驚補腎則腰中有精可以俯仰補腎則任督有水男子去疝而女子可去痛又何患目盲眥突之小症乎豫今特傳一方名資本潤燥湯熟地二兩桑葉三十片山茱萸五錢沙參一兩白朮一兩甘菊花三錢水煎服此方純是補腎而少佐之健脾者何也善燥甚必口渴口渴必多飲水水多則腰必有水氣而不得散白朮最利腰臍又得熟地補腎之藥則白朮不燥轉得相助以成功此立方之妙也倘遇此等病即以吾方投之未有不生者燥症咳嗽已傷肺矣復加吐血吐膿烏得不死而必欲生之迂矣不知燥症以致咳嗽原是外感非比內傷雖吐膿血亦因咳嗽之傷而來救咳嗽而肺金有養嗽止而膿血亦消也方用養肺救燥丹麥冬三兩金銀花三兩元參三兩甘草三錢天門冬三錢桔梗三錢水煎服此方單入肺經以潤津液兼消浮火而止膿血內氣既潤外感又除何愁死症之難制哉産後血燥而暈不省人事此呼吸危亡時也蓋因亡血過多舊血既出新血不能驟生陰陽不能接續以致如此方用救暈至聖丹人參一兩當歸二兩川芎一兩白朮一兩熟地一兩炒黑乾薑一錢水煎服人參以救脫歸芎以逐瘀生新熟地白朮利腰臍而補脾腎黑薑引血歸經以止暈一劑便可獲效奪死為生真返魂之妙方也産婦産後大便燥閉欲解不能不解不可燥躁身熱者往往不救蓋此症因亡血過多腸中無腎水以相資所以艱澀而不得出一用大黃下之鮮不死矣必須用地黃湯大補之亦有生者但不論服之效與不效日日與服一劑或四五日或十餘日自然大便出而愈切勿見其一二服不效即用降火之劑以殺之也吾今酌定地黃湯熟地二兩山茱萸一兩山藥五錢丹皮五錢澤瀉三錢茯苓三錢麥冬一兩北五味一錢水煎服照吾分兩治大便燥結俱妙不獨産婦産後之閉結也産婦産後失血衄血症俱不治蓋血少而又耗之也然肯服六味地黃丸亦能不死而豫更有奇方名止失湯人參一兩當歸五錢麥冬三錢山茱萸五錢三七根末三錢水煎調服一劑而血止再劑而有生氣矣此方補氣血以顧産滋肺脈以救燥止血以防脫用之咸宜所以奏功獨神勝於六味湯也産後血燥成瘵症者乃産怯也亦緣産時失於調理故成癆瘵如何可治亦於未成之先而急治之乎或於一月之外見怯弱而不能起床者急用救癆丹救之熟地一兩當歸一兩黃耆一兩人參一兩鱉甲五錢山茱萸五錢麥冬一兩白芍五錢白芥子一錢水煎服此方氣血雙補不寒不熱初起癆瘵最宜而産後尤能奏效乘其初起投以此方無不生者萬勿因循至於日久而不可救也産後血崩不止口舌燥裂不治之症也然以大補藥救之往往有生者豫有奇方名定崩救産湯人參一兩當歸一兩黃耆一兩白朮一兩三七根末三錢水煎服此方亦補氣血不純去止崩而血自止所以為妙止三七根末乃止崩之味然又是補藥同群共濟收功獨神血崩止而口舌燥裂亦愈也倘惟圖止崩不去補虛則血崩不止而死矣內傷門雷公真君曰凡人忽然猝倒不知人口中痰聲作響人以為中風也誰知是氣虛若作風治未有不死者蓋因平日不慎女色精虧以致氣衰又加起居不慎故一時猝中有似乎風之吹倒也方用培氣湯人參一兩白芥子三錢黃耆一兩白朮一兩茯神五錢菖蒲二錢附子一錢半夏二錢水煎服此方補氣而不治風消痰而不耗氣反有生理一劑神定二劑痰清三劑全愈凡人有一時昏眩跌倒痰聲如鋸奄乎不知人此似中風而非中風不可作真中風治也雖然不可作中風治但其中有陰虛陽虛之不同陰虛者腎中之水虛不能上交於心也陽虛者心中之火虛不能下交於腎也二症各不能使心氣之清往往猝倒更有肝氣過燥不能生心中之火而猝倒者亦陰虛也更有胃氣過熱不能安心中之火而猝倒者亦陽虛也辨明四症而治之毋難起死回生陰虛雖有二症而治陰虛之法止有一方名再蘇丹熟地二兩山茱萸一兩元參一兩白芥子三錢柴胡一錢菖蒲一錢麥冬一兩北五味一錢茯神五錢水煎服一劑而蘇醒再劑而聲出十劑而全愈矣此方之妙全不去治中風竟大補其腎中之水使真水速生自能上通心中之氣尤妙滋肺中之氣不特去生腎水更能制伏肝木不來下克脾土則脾土運用而化精尤易至於茯神菖蒲安心而通心竅柴胡舒肝以生心氣使白芥子易於消痰使元參易於解火實有妙用耳陽虛須用二方一方治心中火虛不能下交於腎也方名交腎全生湯人參一兩生半夏三錢附子三錢菖蒲一錢茯神五錢生棗仁一兩白朮一兩甘草一錢水煎服下喉即痰淨而聲出矣連報數劑安然如故此方妙在人參白朮附子半復同用直補心脾之氣而祛痰則氣旺而神易歸陽生而痰易化矣尤妙在用生棗仁一兩則心清不亂況又有菖蒲茯神之通竅而安心甘草之和中而調氣乎主見死症之變為生矣一方名抑火安心丹治胃熱而不能安火之症也人參一兩石膏五錢天花粉五錢茯神一兩菖蒲一錢麥冬三錢元參一兩水煎服一劑而心定再劑而火消三劑病全愈矣此方妙在用石膏於人參茯苓之中補心而瀉胃火則火易消氣又不損況天花粉之消痰菖蒲之開竅又佐之各得其宜有不定亂而為安乎以上四症虛實寒熱不同苟細悉之於胸中斷不至臨症之錯誤也更有中風之症口渴引飲眼紅氣喘心脈洪大舌不能言又不可作氣虛治之倘作氣虛用參耆之藥去生亦遠此乃腎虛之極不能上滋於心心火亢極自焚悶亂遂至身倒有如中風也法當大補腎水而佐之清心祛火之藥自然水足以濟火方用水火兩治湯熟地一兩山茱萸五錢麥冬一兩五味子二錢當歸一兩生地一兩元參一兩茯神三錢黃連二錢白芥子三錢水煎服此方補腎兼補肝肝腎足而心血生又得祛火之劑以相佐火息而痰消喘平而舌利何至有性命之憂哉心痛之症有二一則寒氣侵心而痛一則火氣焚心而痛寒氣侵心者手足反溫火氣焚心者手足反冷以此辨之最得寒痛與火痛不同而能死人則一吾傳二方一治寒一治熱無不效應如響治寒痛者名散寒止痛湯良薑三錢肉桂一錢白朮三錢甘草一錢草烏一錢蒼朮三錢貫仲三錢水煎服此方妙在用管仲之祛邪二術之祛濕邪濕去而又加之散寒之品自然直中病根去病如掃也治熱痛者名瀉火止痛湯炒梔子三錢甘草一錢白芍二兩半夏一錢柴胡一錢水煎服此方妙在用白芍之多瀉水中之火又如梔子直折其熱而柴胡散邪半夏遂痰甘草和中用之得當故奏功如神也二方皆一劑奏效可以起死為生脅痛之症乃肝病也肝宜順而不宜逆逆則痛痛而不止則死矣故治脅痛必須平肝平肝必須補腎腎水足而後肝氣有養不必治脅痛脅痛自平也方用肝腎兼資湯熟地一兩白芍二兩當歸一兩白芥子三錢炒梔子一錢山茱萸五錢甘草三錢水煎服此方補肝為君補腎為佐少加清火消痰之味自然易於奏功一劑而痛定矣腹痛之最急者絞腸痧也世人懼用官料藥殊不知藥能去病何畏官料哉吾有一方最妙不用官料之味而功力十倍勝之方用馬糞一兩炒黑入黃土一撮微炒用黃酒乘熱服五錢一劑即痛去如失蓋馬糞最善止痛而治腹痛尤神用黃上者因馬糞過行之迅速得土而少遲且黃土與脾土同性相親引之入於病處使馬糞易於奏功也況又用黃酒佐之則無微不達非吐則瀉氣一通而痛輒定矣陰陽脫症乃男女貪歡盡情縱送以致興酣暢美一時精脫而不能禁也少治之緩則精盡氣散而死矣夫症本脫精自當益精以救脫然精不能速生也此時精已盡泄惟有氣存然精盡而氣亦甚微不急補其氣何以生元陽而長真水哉方用生氣救脫湯人參三兩附子一錢黃耆三兩熟地一兩麥冬一兩北五味一錢水煎服此方大用參耆補元陽於無何有之鄉加熟地麥冬以生精加五味以止脫加附子溫經以走經絡庶幾氣旺而神全精生而身旺也倘不補氣而惟補精則去生遠矣人有小解之時忽然昏眩而倒者亦陰陽之氣脫也此症多得之入內過於縱欲夫縱欲宜即亡於男女之身茲何以離男女而暴亡蓋亡於男女之身乃泄精甚酣樂極情濃使然也離男女而亡者乃泄精未暢平日腎氣銷亡腎火衰弱既泄其精更加虛極故氣隨小便而俱絶二症雖異而實同救法亦不必大異惟死於男女之身桂附可不必重加而脫於小便之頃桂附斷須多用至人參則二症皆當用至二三兩豫有一方名逢生丹人參二兩附子二錢白朮一兩菖蒲一錢半夏一錢生棗仁一兩水煎服此方妙在人參急救其氣以生於無何有之鄉加附子以追其散亡之氣菖蒲啓心竅而還迷半夏消痰飲而辟邪尤妙用白朮以利腰臍而固腎氣之脫用棗仁以安魂魄而清心君之神自然絶處逢生也此方陰陽脫俱可兼治而收功怔忡之症擾擾不寧心神恍惚驚悸不已此肝腎之虛而心氣之弱也若作痰治往往殺人蓋腎虛以致心氣不交心虛以致肝氣益耗不治虛而反攻痰安得不速死乎吾有一方名寧靜湯人參一兩白朮五錢白芍一兩熟地一兩元參一兩生棗仁五錢白芥子三錢麥冬五錢水煎服此方一派補心肝腎之藥三經同治則陰陽之氣自交上下相資怔忡自定而驚悸恍惚之症亦盡除矣怔忡治之不得法多致危亡此症乃因泄精之時又得氣惱更不慎色而成者也似乎宜治腎為主不知愈補腎而心氣愈加怔忡者何故因肝得氣惱肝氣大旺補腎則肝氣更旺反去增心之火故愈加怔忡也然則心不可補乎心不補則火不能息補心而又加去火之藥則得生矣方用化忡丹人參二錢麥冬五錢生棗仁二錢白芍五錢元參五錢茯神五錢黃連一錢白芥子一錢甘草五分水煎服此方妙在不去定心反去瀉火尤妙在不去瀉肝反去補肝尤妙在不去補腎反去補肺蓋瀉心火即所以定心氣也補肝氣則肝平肝平則心亦平補肺氣則肺旺能制肝經之旺矣制服相宜自然心氣得養而怔忡有不全愈者乎癆病最難治者癆蟲尸氣也此症感之日久遂至生蟲而蝕人臟腑每至不救滅門滅戶傳染不已若不傳方救之則禍且中於後世我有奇方久服自然消除名救癆殺蟲丸鱉甲一斤醋炙茯苓五兩山藥一斤熟地一斤白薇五兩沙參一斤地骨皮一斤人參二兩山茱萸一斤白芥子五兩饅魚一斤煮熟先將饅魚搗爛各藥研末米飯為丸每日五更時服一兩半料即蟲化為水矣此方大補真陰全非殺蟲傷氣之藥然補中用攻而蟲又潛消於烏有真治癆神方也離魂之症乃魂出於外自覺吾身之外更有一吾此欲死未死之症然而魂雖離去身未遠尚有可復之機蓋陰陽未至於決絶也急用定魂全體丹救之人參一兩茯神五錢柏子仁三錢生棗仁一兩遠志一錢白芥子三錢丹砂一錢當歸一兩白朮一兩甘草一錢麥冬五錢龍齒末五分水煎服此方救心氣之虛心虛而後魂離心氣足而魂自定況方中又用引魂合一之味於補虛之中乎所以一劑即見功也反胃有食入而即出者此腎水虛不能潤喉故喉燥而即出也有食久而反出者此腎火虛不能溫脾故脾寒而反出也治反胃者俱當治腎但當辨其有火無火之異則死症可變為生也治反胃之症莫妙用仲景地黃湯但無火者加附子肉桂則效驗如響然而世人亦有用仲景方而不驗者何也以所用之不得其法而非方之不神也我今酌定二方一治無火而反胃者熟地二兩山茱萸一兩附子三錢茯苓三錢澤瀉三錢丹皮三錢肉桂三錢山藥六錢水煎服一治有火而反胃者熟地二兩山茱萸五錢山藥一兩澤瀉三錢丹皮三錢茯苓五錢麥冬五錢北五味二錢水煎服二方出入加減自然治反胃有神功也反胃之症雖一時不能遽死然治之不得其宜亦必死而後已反胃多是腎虛無火故今日食之至明日盡吐即內經所謂食入即出是也夫食入於胃中而吐出似乎病在胃也誰知胃為腎之關門腎病而胃始病飲食之入於胃必得腎水以相濟而咽喉有水道之通始上可輸挽下易運化然而腎中無火則釜底無薪又何以蒸腐水穀乎此腎寒而脾亦寒脾寒不能化必上湧於胃而胃不肯受則湧而上吐矣方用定胃湯熟地三兩山茱萸二兩肉桂三錢茯苓三錢水煎服一劑而吐止十劑而病全愈此治朝入暮吐暮服朝吐者也倘食下即吐又不可用肉桂加麥冬一兩北五味子一錢亦未嘗不效應如響蓋二方全是大補腎中之水火而不去治胃勝於治胃也失血之症有從口鼻出者有從九竅出者有從手足皮毛之孔而出者症似各異吾有一方可統治之名收血湯熟地二兩生地一兩荊芥一錢三七根末三錢當歸一兩黃耆一兩水煎服此方補血而不專補血妙在兼補氣也止血而不專止血妙在能引經也血既歸經氣又生血自然火不沸騰相安無事何至有上中下之亂行哉故無論各症用之而皆效也癲癇之症多因氣虛有痰一時如暴風疾雨猝然而倒口吐白沫作牛羊馬聲種種不同治之不得法往往有死者吾今留一方名祛痰定癲湯人參三錢白朮五錢白芍五錢茯神三錢甘草一錢附子一片半夏三錢陳皮一錢菖蒲一錢水煎服此方參術茯芍皆健脾平肝之聖藥陳皮半夏甘草不過消痰和中妙在用附子菖蒲以起心之迷引各藥直入心竅之中心清則痰自散而癲癇自除矣既不耗氣又能開竅安有死法哉中邪遇鬼亦陽氣之衰也陽氣不衰則陰氣不能中人況鬼祟乎惟陽氣衰微而後陰鬼來犯治之又何可不補其正氣哉倘或止治痰以逐邪而不加意於元陽之峻補則氣益虛而邪且不肯輕退反致死亡之速矣我今傳一方名扶正辟邪丹人參一兩當歸一兩茯苓五錢白朮二兩菖蒲一錢半夏三錢白芥子三錢丹參五錢皂角刺五分山羊血五分附子一錢水煎服此方山羊血皂角刺開關之聖藥也半夏白芥子消痰之神劑也然不多用人參各補藥以回陽補氣必不能起死回生大約用此方一劑便覺鬼去二劑而痰消人健矣中惡之症乃中毒氣也犯之亦不能救如犯蛇毒之氣與各蟲之毒氣也其症肚脹腹大氣滿口喘身如燥裂而不可忍之狀大便閉結小便黃赤甚則陰頭脹大疼痛欲死此等症必須消毒不可驟用補劑犯則殺人吾今酌定奇方治之最效而且最神名解惡神丹金銀花三兩生甘草三錢白礬五錢白芷三錢水煎服此方解惡而不傷氣化毒於無形實有妙用火約中惡之症服吾方不須二劑便可慶生全也暈眩似乎小症然而大病皆起於暈眩眼目一時昏花卒致猝倒而不可救者比比也故世人一犯暈眩之症治之不可不早吾今傳一奇方名防眩湯人參三錢白朮一兩當歸一兩熟地一兩川芎五錢白芍一兩山茱萸五錢半夏三錢天麻二錢陳皮五分水煎服此方單治氣血之虛不治頭目之暈蓋氣血足則陰陽和陰陽和則邪火散又何慮暈眩之殺人哉多服數劑受益無窮不可見一二劑不能收功便棄之而不用也嘔吐之症一時而來亦小症也然而傾胃而出必傷胃氣胃氣一傷多致不救其症有火有寒火吐宜清火而不可降火寒吐宜祛寒而不可降寒蓋降火則火引入脾而流入於大腸必變為便血之症降寒則寒引入腎而流入於膀胱必變為遺溺之症矣我今酌定二方一治火吐名清火止吐湯茯苓一兩人參二錢砂仁三粒黃連三錢水煎服此方解火退熱則嘔吐自止妙在茯苓分消火勢引火緩行於下而非峻祛於下也尤妙人參以扶胃氣則胃土自能剋水不必止吐吐自定也況又有砂仁之止嘔乎所以一劑而吐止耳一治寒吐名散寒止嘔湯白朮二兩人參五錢附子一錢乾薑一錢丁香三分水煎服此方散寒而仍用補脾健土之藥則寒不能上越而亦不敢下行勢不得不從臍中而外遁也一劑亦即奏功如響瀉症乃水瀉也寒瀉宜治火瀉難醫往往有一日一夜瀉至數百遍者傾腸而出完穀不化糞門腫痛瀉下如火之熱此亦百千人一病也然無方救之必致立亡我今酌定二方名截瀉湯薏仁二兩車前子一兩人參三錢白芍二兩黃連三錢茯苓五錢甘草二錢山藥一兩肉桂三分水煎服一劑而瀉減半再劑而瀉止神方也愈後用六君子湯調治此等症因火盛之極挾水穀之味一直下行不及傳導所以完穀而出也若認作脾氣之虛以止塞之則火益旺而勢益急我乘其勢而利導之則水氣分消火勢自散所以奏功能神喘症與短氣不同喘乃外感短氣乃內傷也短氣之症狀似乎喘而非喘也喘必抬肩喉中作水雞之聲短氣則不然喘不抬肩喉中微微有息耳若短氣之症乃火虛也作實喘治之立死矣蓋短氣乃腎氣虛耗氣衝於上焦壅塞於肺經症似有餘而實不盡方用歸氣定喘湯人參二兩牛膝三錢麥冬一兩熟地二兩山茱萸五錢北五味一錢枸杞子二錢胡桃一個破故紙一錢水煎服一劑而氣少平二劑而喘可定三劑而氣自平矣此方妙在用人參之多下達氣原以挽回於無何有之鄉其餘純是補腎補肺之妙品子母相生水氣自旺水旺則火自安於故宅而不上衝於咽門此治短氣之法實有異於治外感之喘症也喘症不同有虛喘有實喘實喘看其症若重而實輕用黃芩二錢麥冬三錢甘草五分柴胡一錢蘇葉一錢山豆根一錢半夏一錢烏藥一錢水煎服一劑喘止不必再服也然實症之喘氣大急喉必作聲肩必抬起非若虛喘氣少急而喉無聲肩不抬也虛喘乃腎氣大虛脾氣又復將絶故奔沖而上欲絶尚未絶也方用救絶止喘湯人參一兩山茱萸三錢熟地一兩牛膝一錢麥冬五錢五味子一錢白芥子三錢水煎服一劑輕二劑喘止十劑全愈此病實死症也幸幾微之氣流連於上下之間若用涼藥以平火是速其亡也然用桂附以補火亦速其亡蓋氣將絶之時宜緩續而不宜驟續譬如爐中火絶止存星星之火宜用薪炭引之若遽投之以硫黃之類反滅其火矣更以寒溫之物動之鮮有生氣矣方中妙在一派補腎補肺之藥與人參同用則直入於至陰之中而生其氣腎氣生而脾氣亦生自能接續於無何有之鄉況人參又上生肺以助腎之母子母相生更能救絶也消渴之症雖分上中下而腎虛以致渴則無不同也故治消渴之法以治腎為主不必問其上中下之消也吾有一方最奇名合治湯熟地三兩山茱萸二兩麥冬二兩車前子五錢元參一兩水煎服日日飲之三消自愈此方補腎而加清火之味似乎有腎火者宜之不知消症非火不成也我補水而少去火以分消水濕之氣則火從膀胱而出而真氣仍存所以消症易平也又何必加桂附之多事哉惟久消之後下身寒冷之甚者本方加肉桂二錢亦響應異常倘不遵吾分兩妄意增減亦速之死而已安望其有生哉消渴之症雖有上中下之分其實皆腎水之不足也倘用瀉火止渴之藥愈消其陰必至更助其火有渴甚而死者矣治法必須補腎中之水水足而火自消然而此火非實火也實火可以寒消虛火必須火引又須補腎中之火火溫於命門下熱而上熱頓除矣方用引火升陰湯元參二兩肉桂二錢山茱萸四錢熟地一兩麥冬一兩北五味子二錢巴戟天五錢水煎服此方火補腎中之水兼溫命門之火引火歸原而水氣自消正不必止渴而渴自除不必治消而消自愈也夢遺之症久則玉關不閉精盡而亡矣世人往往用澀精之藥所以不救倘於未曾太甚之時大用補精補氣之藥何至於此我有奇方傳世芡實一兩山藥一兩蓮子五錢茯神二錢炒棗仁三錢人參一錢水煎服此方名保精湯先將湯飲之後加白糖五錢拌勻連渣同服每日如此不須十日即止夢不遺矣方中藥味平平淡而不厭收功獨神者蓋芡實山藥固精添髓蓮子清心止夢茯神棗仁安魂利水得人參以運用於無為不必止夢而夢自無不必止精而精自斷也又何至於玉關不閉至於夭亡哉痿症不起床席已成廢人者內火熾盛以熬干腎水也苟不補腎惟圖降火亦無生機雖治痿獨取陽明是胃火不可不降而腎水尤不可不補也我今傳一奇方補水於火中降火於水內合胃與腎而兩治之自然骨髓增添燔熱盡散不治痿而痿自愈方名降補丹熟地一兩元參一兩麥冬一兩甘菊花五錢生地五錢人參三錢沙參五錢地骨皮五錢車前子二錢水煎服此方補中有降降中有補所以為妙胃火不生自不耗腎中之陰腎水既足自能制胃中之熱兩相濟而兩相成起痿之方孰有過於此者乎凡人有兩足無力不能起立而口又健飯如少忍飢餓即頭面皆熱有咳嗽不已者此亦痿症乃陽明胃火上衝於肺金而肺金為火所逼不能傳清肅之氣於下焦而腎水爍干骨中髓少故不能起立而胃火又焚燒故能食善飢久則水盡髓干而死矣可不急瀉其胃中之火哉然而瀉火不補水則胃火無所制未易息也方用起痿至神湯熟地一兩山藥一兩元參一兩甘菊花一兩人參五錢白芥子三錢當歸五錢白芍五錢神麯二錢水煎服一劑火減二劑火退十劑而痿有起色三十劑可全愈也此方奇在甘菊花為君瀉陽明之火而又不損胃氣其餘不過補腎水生肝血健脾氣消痰涎而已蓋治痿以陽明為主瀉陽明然後佐之諸藥自易成功耳痹症雖因風寒濕三者之來亦因身中元氣之虛邪始得乘虛而入倘惟攻三者之邪而不補正氣則痹病難痊必有死亡之禍矣我今傳一方於補正之中佐之祛風祛濕祛寒之品則痹症易愈也方名散痹湯人參三錢白朮五錢茯苓一兩柴胡一錢附子一錢半夏一錢陳皮五分水煎服此方健脾利濕溫經散風正氣不虧而邪氣自散二劑而痹症如失陰蛾之症乃腎水虧乏火不能藏於下乃飛越於上而喉中關狹火不得直泄乃結成蛾似蛾而非蛾也早晨痛輕下午痛重至黃昏而痛更甚得熱則快得涼則加其症之重者滴水不能下喉若作外感陽症治之用山豆根芩連梔子之類則痛益甚而關不開有不盡命而死者矣我今傳一方單補陰虛用引火歸源之法而痛頓失也方名化蛾丹熟地一兩山茱萸一兩附子一錢車前子三錢麥冬一兩北五味二錢水煎服此方大補腎之水不治蛾之痛壯水則火息引火則痛消故一劑即可收功奇絶之法也水臌滿身皆水按之如泥者是若不急治水留於四肢而不得從膀胱出則變為死症而不可治矣方用決流湯牽牛二錢甘遂二錢肉桂三分車前子一兩水煎服一劑而水流鬥余二劑即全愈斷不可與三劑也與三劑反殺之矣蓋牽牛甘遂最善利水又加之車前肉桂引水以入膀胱但利水而不走氣不使牽牛甘遂之過猛利水並走氣也但此二味畢竟性猛多服傷人元氣故二劑逐水之後斷宜屏絶須改用五苓散調理二劑又用六君子湯以補脾可也更須忌食鹽犯則不救氣臌乃氣虛作腫似水臌而非水臌也其症一如水臌之狀但按之皮肉不如泥耳必先從腳面腫起後漸漸腫至上身於是頭面皆腫者有之此等氣臌必須健脾行氣加利水之藥則可救也倘亦以水臌法治之是速之死也我今傳一奇方名消氣散白朮一兩薏仁一兩茯苓一兩人參一錢甘草一分枳殼五分山藥五錢肉桂一分車前子一錢蘿蔔子一錢神麯一錢水煎服日日一劑初服覺有微礙久則日覺有效十劑便覺氣漸舒二十劑而全消三十劑而全愈此方健脾而仍是利水之品故不傷氣奏功雖緩而起死實妙也然亦必禁食鹽三月後可漸漸少用矣即秋石亦木可用必須三月後用之蟲臌惟小腹作痛而四肢浮脹不十分之甚而色紅而帶點如蟲蝕之象眼下無臥蠶微腫之形此是蟲臌也必須殺蟲可救然過於峻逐未免轉傷元氣轉利轉虛亦非生之之道方用消蟲神奇丹雷丸三錢當歸一兩鱉甲一兩醋炙地栗粉一兩鮮者取汁一茶甌神麯三錢茯苓三錢車前子五錢白礬三錢水煎服一劑即下蟲無數二劑蟲盡出無留矣蟲去而臌脹有消不必用三劑也蓋雷丸最善逐蟲去穢而鱉甲地栗更善化蟲於烏有然蟲之生必有毒結於腸胃之間故又用白礬以消之誠慮過於峻逐又佐之當歸以生血新血生而舊瘀去更佐之茯苓車前分利其水氣則蟲從大便而出而毒從小便而行自然病去如掃矣但此藥服二劑後必須服四君六君湯去甘草而善為之調理也血臌之症其由來漸矣或跌閃而血瘀不散或憂鬱而結血不行或風邪而血蓄不發遂至因循時日留在腹中致成血臌飲食入胃不變精血反去助邪久則脹脹則成臌矣倘以治水法逐之而症犯非水徒傷元氣倘以治與法始之而症犯非氣徒增飽滿是愈治愈脹矣我有奇方妙於逐瘀名消瘀蕩穢湯水蛭三錢必須炒黑可用大約一兩炒黑取末用三錢當歸二兩雷丸三錢紅花三錢枳實三錢白芍三錢牛膝三錢桃仁四十粒去皮尖搗碎水煎服一服即下血鬥余再服即血盡而愈蓋血臌之症惟腹脹如鼓而四肢手足並無脹意故血去而病即安也服此方一劑之後切勿再與二劑當改用四物湯調理於補血內加白朮茯苓人參補氣而利水自然全愈否則血臌雖痊恐成乾枯之症血症雷公真君曰凡人有一時忽吐狂血者人以為火也多用寒涼藥瀉火乃火愈退而血愈多或用止血藥治之而仍不效此乃血不歸經之故若再以寒涼瀉火之藥而重瀉之未有不死者矣當用補氣之藥而佐之歸經之味不必止而自止矣方用引血湯人參五錢當歸一兩炒黑荊芥三錢丹皮二錢水煎服一劑而血無不止此方妙在不專去補血反去補氣以補血尤妙在不單去止血反去行血以止血蓋血逢寒則凝滯而不行逢散則歸經而不逆救死於呼吸之際此方實有神功也人有大怒而吐血者或傾盆而出或沖口而來一時昏暈亦生死頃刻也倘以止血藥治之則氣悶而不能安倘以補血藥治之則胸痛而不可受往往有變症蜂起而斃者不可不治之得法也方用解血平氣湯白芍二兩當歸二兩荊芥炒黑三錢柴胡八分紅花二錢炒梔子三錢甘草一錢水煎服一劑而氣舒二劑而血止三劑而病全愈蓋怒氣傷肝不能平其氣故致一時吐血不失去舒氣而遽去止血愈激動肝木之氣氣愈旺而血愈吐矣方中芍藥多用之妙竟去平肝又能舒氣荊芥柴胡皆引血歸經之味又適是開鬱寬脅之劑所以奏功甚速而止血實神全非用當歸補血之故當歸不過佐芍藥以成功耳凡人有血崩不止者婦人之病居多亦一時昏暈或有不知人而死者此病多起於貪欲若治之不得法日用止澀之藥未有不輕變重而重變死者方用安崩湯治之人參一兩黃耆一兩白朮一兩三七根末三錢水煎調三七根末服之一劑即止崩可返危為安也蓋崩血之後惟氣獨存不補氣而單補血緩不濟事今亟固其欲絶之氣佐之三七以澀其血氣固而血自不脫也腹痛雷公真君曰凡人有腹痛不能忍按之愈痛口渴飲冷水則痛止少頃依然大痛此火結在大小腸若不急治亦一時氣絶方用定痛至神湯炒梔子三錢甘草一錢茯苓一兩白芍五錢蒼朮三錢大黃一錢厚朴一錢水煎服此方妙在舒肝經之氣用白芍甘草和其痛尤妙多用茯苓為君以利膀胱之水更妙在梔子以瀉鬱熱之氣又恐行之欠速更佐之大黃走而不守則瀉火逐瘀尤為至神也喉痛雷公真君曰凡人有咽喉忽腫作痛生雙蛾者飲食不能下五日不食即死矣但此症實火易治而虛火難醫實火世人已有妙方如用山豆根芩連半夏柴胡甘草桔梗天花粉治之立消惟虛火乃腎火不藏於命門浮遊於咽喉之間其症亦如實火惟夜重於日清晨反覺少輕若實火清晨反重夜間反輕實火口燥舌乾而開裂虛火口不甚渴舌滑而不裂也以此辨症斷不差錯此種虛痛若亦以治實火之法治之是人已下井而又益之石也故不特不可用寒涼並不可用發散蓋虛火必須補也然徒補腎水雖水能制火可以少差而火勢太盛未易制伏又宜於水中補火則引火歸源而火勢頓除有消亡於頃刻矣方用引火湯熟地一兩元參一兩白芥子三錢山茱萸四錢北五味二錢山藥四錢茯苓五錢肉桂二錢水煎服一劑而痰聲靜痛頓除腫亦盡消二劑全愈蓋熟地山茱萸五味之類純是補腎水聖藥茯苓山藥又益精而利水助肉桂之下行元參以消在上之浮火白芥子以消壅塞之痰上焦既寬而下焦又得肉桂之熱則龍雷之火有不歸根於命門者乎一劑便生真有鬼神莫測之機又勝於八味地黃湯也倘喉腫閉塞勺水不能下雖有此神方將安施乎我更有法用附子一個破故紙五錢各研末調如糊作膏布攤如膏藥大如茶鍾貼腳心中央以火烘之一時辰喉即寬而開一線路可以服藥矣又不可不知此妙法也氣鬱雷公真君曰凡人有鬱鬱不樂忽然氣塞而不能言苟治之不得法則死矣夫鬱症未有不傷肝者也傷肝又可伐肝乎伐肝是愈助其鬱郁且不能解又何以救死於頃刻哉方用救肝開鬱湯白芍二兩柴胡一錢甘草一錢白芥子三錢白朮五錢當歸五錢陳皮二錢茯苓五錢水煎服一劑而聲出再劑而神安三劑而鬱氣盡解此方妙在用白芍之多至二兩則直入肝經以益其匱乏之氣自然血生而火熄又用白朮當歸健土以生血柴胡以解鬱甘草以和中白芥子以消膜隔之痰又妙在多用茯苓使鬱氣與痰涎盡入於膀胱之中而消弭於無形也倘人有鬱氣不解奄奄黃瘦亦急以吾方治之何至變生不測哉癲症雷公真君曰癲病之生也多生於脾胃之虛寒脾胃虛寒所養水穀不變精而變痰痰凝胸膈之間不得化流於心而癲症生矣苟徒治痰而不補氣未有不速之死者方用祛癲湯人參五錢白朮一兩肉桂一錢乾薑一錢白芥子五錢甘草五分菖蒲五分半夏三錢陳皮一錢水煎服此方用人參白朮專補脾胃用桂薑以祛寒邪用白芥子半夏以消頑痰用甘草菖蒲以引入心而開竅自然正氣回而邪痰散一劑神定再劑神旺又何癲病之不能愈哉惟是花癲之症乃女子思想其人而心邪然亦因脾胃之寒而邪入也本方加入白芍一兩柴胡二錢炒梔子三錢去肉桂治之亦最神一劑而癲止矣蓋柴胡白芍炒梔子皆入肝以平木祛火而散郁故成此奇功也狂症雷公真君曰狂病有傷寒得之者此一時之狂也照仲景張公傷寒門治之用白虎湯以瀉火矣更有終年狂病而不愈者或欲拿刀以殺人或欲見官而大罵親戚之不認兒女之不知見水則大喜見食則大怒此乃心氣之虛而熱邪乘之痰氣侵之遂成為狂矣此等症欲瀉火而火在心之中不可瀉也欲消痰而痰在心之中不易消也惟有補脾胃之氣則心自得養不必祛痰痰自化不必瀉火火自無矣方為化狂丹人參一兩白朮一兩甘草一錢茯神一兩附子一分半夏三錢菖蒲一錢菟絲子三錢水煎服一劑狂定再劑病痊此方妙在補心脾胃之三經而化其痰不去瀉火蓋瀉火則心氣愈傷而痰涎愈盛狂將何止乎尤妙用附子一分引補心消痰之劑直入心中則氣尤易補而痰尤易消又何用瀉火之多事乎此所以奏功如神也禾病雷公真君曰呆病如癡而默默不言也如飢而悠悠如失也意欲癲而不能心欲狂而不敢有時睡數日不醒有時坐數日不眠有時將己身衣服密密縫完有時將他人物件深深藏掩與人言則無語而神遊背人言則低聲而泣訴與之食則厭薄而不吞不與食則吞炭而若快此等症雖有祟憑之實亦胸腹之中無非痰氣故治呆無奇法治痰即治呆也然而痰勢最盛呆氣最深若以尋常二陳湯治之安得獲效方用逐呆仙丹人參一兩白朮二兩茯神三兩半夏五錢白芥子一兩附子五分白薇三錢菟絲子一兩丹砂三錢研末先將各藥煎湯調丹砂末與半碗彼不肯服以炭紿之欣然服矣又紿之又服半碗然後聽其自便彼必倦怠欲臥矣乘其睡熟將其衣服被褥盡行火化單留身上所服之衣另用新被蓋之切不可驚醒此一睡有睡至數日者醒來必覓衣而衣無覓被而被非故物彼必大哭然後又以前藥與一劑必不肯服即紿之炭亦斷不肯矣不妨以鞭責之動其怒氣用有力之人將前藥執而灌之彼必大怒已而又睡去矣此時斷須預備新鮮衣服被褥等項俟其半日即醒彼見滿房皆是親人心中恍然如悟必又大哭不已諸人當以好言勸之彼必説出鬼神之事親人説幸某人治療已將鬼神盡行祛遣不必再慮彼聽之欣然而病亦全愈矣此方之妙妙在大補心脾以茯神為君使痰在心者盡祛之而出其餘消痰之藥又得附子引之無經不入將遍身上下之痰盡行祛入膀胱之中而消化矣白薇菟絲子皆是安神妙藥而丹砂鎮魂定魄實多奇功所以用之而奏效也厥症雷公真君曰人有忽然發厥口不能言眼閉手撒喉中作酣聲痰氣甚盛有一日即死者有二三日而死者此厥多犯神明然亦因素有痰氣而發也治法自宜攻痰為要然徒攻痰而不開心竅亦是徒然方用啓迷丹生半夏五錢人參五錢菖蒲二錢菟絲子一兩甘草三分茯神三錢皂角莢一錢生薑一錢水煎服此方人參半夏各用五錢使攻補兼施則痰宜消而氣宜復尤妙用菟絲子為君則正氣升而邪氣散更妙用皂莢菖蒲茯神開心竅以清心自然氣回而厥定倘疑厥症是熱而輕用寒涼之藥則去生遠矣半夏用生不用制者取其生氣以救死且制之過熟反掣時效遲而不能奏功也其餘厥症岐天師新定於內經可考傷寒厥症張仲景載於傷寒門中可稽故不再傳斑疹雷公真君曰人有一附身熱即便身冷而滿體生斑如疹者乃火從外泄而不得盡泄於皮膚故鬱而生斑人盡以為熱也用寒涼瀉火之藥不效有斑不得消而死者亦可傷也亦用消斑神效湯治之元參一兩麥冬一兩升麻三錢白芷一錢白芥子三錢沙參三錢丹皮五錢水煎服一劑斑勢減再劑斑紋散三劑斑影盡消矣此方妙在用元參麥冬以消斑尤妙在升麻多用引元參麥冬以入於皮膚使群藥易於奏功而斑無不消也亡陽雷公真君曰凡人毋論有病無病一旦汗如雨出不肯止者名曰亡陽汗盡止有氣未絶最危之症也若因汗出而用止汗之藥則汗不能止若因汗盡而用補血之藥則血難驟生所當急補其氣尚可挽回然而補氣之藥舍人參實無他藥可代方用收汗生陽湯人參一兩麥冬一兩北五味三錢黃耆一兩當歸五錢熟地一兩炒棗仁五錢甘草一錢水煎服一劑而汗收再劑而氣復三劑而氣旺四劑而身健矣此方之妙妙在氣血均補而尤補於氣使氣足以生陽陽旺而陰亦生矣夫亡陽之症雖是陽亡其實陰虛不能攝陽以致陽氣之亡也倘陰足以攝陽則汗雖出何至亡陽然治亡陽之症烏可徒教陽乎我所以救陽兼救陰也痢疾雷公真君曰凡人夏秋感熱之氣患痢便血一日間至百十次不止者至危急也苟用涼藥以止血利藥以攻邪俱非善法我有神方可以救急援危又不損傷氣血痢止身亦健也方用援絶神丹白芍二兩當歸二兩枳殼二錢檳榔二錢甘草二錢滑石末三錢廣木香一錢蘿蔔子一錢水煎服一劑輕二劑止三劑全愈此方妙在用白芍當歸至二兩之多則肝血有餘不去制克脾土則脾氣有生髮之機自然大腸有傳導之化加之枳殼檳榔蘿蔔子俱逐穢祛積之神藥尤能於補中用攻而滑石甘草木香調和於遲速之間更能不疾不徐使瘀滯之盡下而無內留之患也其餘些小痢疾不必用如此之多減半治之亦無不奏功不必分紅白痛與不痛皆神效五絶五絶乃縊死跌死魘死淹死壓死是也世人禍成倉猝往往不救然此等之死五臟未絶因外來之禍而枉死者也其魂魄守於尸旁相去未遠苟以神術招之魂魄即附體而可生也我傳神符一道先書黃紙上焚化在熱黃酒內掘開牙關灌入喉中後再用藥丸化開亦用黃酒調勻以人口含藥水用蔥管送於死人喉內少頃即活招魂符式無咒但書符時一心對雷真君天醫使者書之自然靈應無比藥丸名救絶仙丹山羊血二錢菖蒲二錢人參三錢紅花一錢皂角刺一錢半夏三錢制蘇葉二錢麝香一錢各為末蜜為丸如龍眼核大酒化開用修此丸時端午日妙如臨時木必如許之多十分之一可也此方神奇之極又勝於秦真人間時備藥修合一料大可救人若到臨期緩不濟事此方不特救五絶凡有邪祟昏迷一時猝倒者皆可灌之以起死回生也砒毒雷公真君曰世人有服砒霜之毒五臟欲裂者腹必大痛舌必伸出眼必流血而死最可憐也方用瀉毒神丹大黃二兩生甘草五錢白礬一兩當歸三兩水煎湯數碗飲之立時火瀉即生否則死矣此砒毒已入於臟非可用羊血生甘草上吐而愈我所以又變下法救之飲之而不瀉此腸已斷矣又何救乎倘用之早未有不生者不可執吐法而無變通若初飲砒毒莫妙用生甘草三兩急煎湯加羊血半碗和勻飲之立吐而愈若飲之不吐速用大黃之方則無不可救也虎傷雷公真君曰世人被虎咬傷血必大出其傷口立時潰爛其疼不可當急用豬肉貼之隨貼隨化隨化隨易速用地榆一斤為細末加入三七根末三兩苦參末四兩和勻摻之隨濕隨摻血即止而痛即定蓋地榆涼血苦參止痛三七根末止血合三者之長故奏功實神湯火傷火燒湯池雷公真君曰凡人有無意之中忽為湯火所傷遍身潰爛與死為鄰我有內治妙法可以變死而生方名逐火丹用大黃五錢當歸四兩荊芥三錢炒黑生甘草五錢黃芩三錢防風三錢黃耆三兩茯苓三兩水煎服一劑痛減半二劑痛全減三劑瘡口全愈真至神至聖之方也此方妙在重用大黃於當歸黃耆之內既補氣血又逐火邪尤妙用荊芥防風引黃耆當歸之補氣血生新以逐瘀更妙用茯苓三兩使火氣盡從膀胱下瀉而皮膚之痛自除至於甘草黃芩不過調和而清涼之已耳癰疽並無名瘡毒雷公真君曰凡人癰疽發於背或生於頭頂或生於胸腹或生於手足臂腿腰臍之間前陰糞門之際無論陽毒陰毒一服吾方無不立消已潰者即斂真神方也金銀花四兩蒲公英一兩當歸二兩元參一兩水五碗煎八分飢服一劑盡化為無有矣切勿嫌其藥料之重減去分兩則功亦減半矣此方既善攻散諸毒又不耗損真氣可多服久服俱無礙即內治肺癰大小腸癰亦無不神效也我已傳完汝另抄一本存之醫述之中以成全書他年刊布天下傳之萬年以見吾道之大亦快事也雷公真君傳於燕市時康熙戊辰七月晦日也我無他言但願汝修道以答上帝之心也完
