body:
  text: 卷二樂集上治法論頭疼目痛耳聾口舌生瘡鼻腫眉落烏須瘰串目生星天師曰上治者治上焦之症也如頭疼目痛耳聾口舌生瘡鼻腫之類頭疼而風入太陽經也用川芎一錢細辛一錢白芷一錢柴胡一錢芍藥三錢半夏一錢甘草一錢治之蓋風雖犯太陽治法不可全治太陽當上清其邪故用白芷川芎細辛三味以散之又用赤芍甘草柴胡以清肝膽之火膽經與肝經入於頭絡故用此數味以散邪去火又加半夏去痰甘草和中相濟而有成也張公曰頭痛余傳一方用川芎一兩蔓荊子二錢水煎服立愈批芎荊散蓋川芎補血蔓荊子去風也天師曰目痛者肝經之病宜治肝矣而余偏不治肝方用黃連一錢花椒七粒明礬三分荊芥五分生薑一片水煎半碗乘熱洗之一日洗七次明日即愈批洗目神散此治火眼之如此若虛火之眼又不如是用人乳半鍾生地二錢葳蕤仁五分去殼取一分研碎明礬半分水半鍾同人乳煎藥取汁少許洗七次明日即愈虛火之眼紅而不痛不澀無淚無眵是也有火者紅腫如含桃淚出不止痠痛羞明多眵是也雷公曰余亦有治眼痛方用柴胡防風各二分黃連三分花椒二粒明礬一分水半鍾飯鍋蒸洗眼如神一日洗三次二日即止痛張公曰目痛余亦有一方最妙以人乳一合黃連三分大棗一個明礬三分人參三分水半鍾同煎二沸即取起洗眼無論虛眼實眼奇妙每日洗七次三日即全愈天師曰耳聾者腎經病也論理該用六味地黃丸內加柴胡五錢甘菊二兩當歸三兩枸杞三兩麥冬三兩北五味三錢白芍二兩今不用此鼠膽一枚龍齒一分冰片一分麝香一分硃砂一分乳香半分潮腦半分各研為絕細末以人乳為丸如桐子大外用絲綿裹之不可太大批通耳神丹塞入耳之深處至不可受而止塞三日取出即耳聰永不再聾不必三丸但鼠膽最難得覓一大鼠先以竹籠養之後以紙為匣子引其藏身內用果品令其自食久之忽然用棒槌擊死立時取膽則膽在肝中也否則再不可得乾者可用只消用水調化俱入藥末中則一樣也實耳聾者亦用此方神妙鼻腫者乃肺經火盛也宜用甘桔湯則效今不用方用皂角末吹入打清嚏數十即愈蓋鼻因氣壅今打嚏則壅塞之氣盡開散故不必清肺而鼻腫自消也口舌生瘡者乃心經熱也宜用黃連黃芩之類涼散之自愈今不用用黃柏一錢姜蠶一錢枳殼燒灰五分炙甘草末五分薄荷末五分冰片三釐山豆根五分各為末絕細滲上一日滲三次第一日即少快明日全愈神方也以上皆上治之法也天師曰眉落方用桑葉七片每日洗之一月重生如舊須落亦然須自當留一方以救天下白鬚老子須白乃腎水枯任督血乾也二者得一皆能白鬚地黃湯最妙余不用用桑椹半斤取汁一碗以骨碎補一兩為末浸之曬乾無日則用火焙乾再浸以汁干為度再用何首烏生者為末二兩用赤不用白熟地焙乾為末二兩青鹽一兩沒石子雌雄各四對長者雄園者雌當歸一兩各為細末每日擦牙者七七擦左右各如數一月之間即黑如漆批骨碎補即破故紙蓋桑椹專能補陰黑鬚而又佐之熟地首烏豈有不黑之理但苦不能引入鬚根耳今妙在用骨碎骨沒石直透齒肉之內既入齒肉有不引鬚根者乎此方之所以巧而奇也倘更用烏須補腎以通任督則上下相資吾見長生不老未必非此老人況僅僅髭髯有不重臻於年少之時乎今並傳之桑椹一斤蒸熟曬乾不蒸則此物最不肯幹但不可經鐵器飯鍋蒸則無害大約熟地一經飯鍋雖鐵器無礙生赤何首烏一斤切片飯鍋蒸熟曬乾九次為妙南燭葉一斤亦飯鍋蒸熟曬乾若不蒸自干則無用熟地一斤麥冬半斤花椒去殼皮二兩以四兩取米二兩白果一兩白朮一斤批烏須至補丹又方名黑鬢仙丹熟地一斤萬年青三片小用五片桑椹一斤黑芝麻八兩山藥二斤南燭皮四兩花椒一兩白果一兩巨勝子三兩連殼用蜜為丸早晚酒送下各五錢忌蘿蔔而已絕妙神方也張公傳熟地一斤薏仁山茱桑葉各八兩白朮生赤何首烏各三兩巨勝子白果各三兩黑芝麻四兩北五味二兩山藥一斤花椒一兩烏頭皮四兩胡桃肉三兩加參片三兩無亦可蜜為丸服五錢一方岐公傳旱蓮可加三兩此方不刊即名為陳氏烏須丸久服長生不老春夏服地黃丸秋冬服此丸保汝升躋有路斑白無蹤無桑椹時可以桑葉代之須用一斤雖椹勝於葉而葉之功亦不亞椹也張公曰烏須方此方最妙其餘秦真人萬年青方亦當附入唇口生瘡可將口瘡方同治華君曰傳余無白鬚重烏方然余傳方中尚有喉間瘰串之方今傳之方用白芍一兩柴胡五錢香附一兩白朮五錢金銀花三兩瓦草一錢瓦蔥亦可青苔一錢乾者止可用三分人參五錢白芥子二錢各為末人有病瘰串者用米醋調摻痰核之上如已破者不可用醋調用麻油調之內服方用柴胡五分白芍五錢當歸五錢半夏一錢白芥子三錢甘草一錢桔梗三錢水煎服用前藥外治以此湯內治尤易見功批消串神丹天師曰前方尚須加白礬三錢麝香三分不服此方亦未嘗不愈但遲日月耳天師曰眼目星久不能去止可去暫時者方用白蒺藜三錢水煎洗之三日即無星尤妙瘰串乃鼠食之物人不知食之多生此病然亦有鬱氣者乃易成而不愈也方用白芍三兩白芥子三兩紫背天葵三兩香附三兩茯苓三兩當歸三兩人參五錢蒲公英一兩柴胡五錢白朮五兩砂仁二錢各為末米飯為丸如細米一半大每日白滾水送下三錢日三服一月即消二月全愈批化串湯化瘰仙丹跌損唇皮之類以桑白皮作線縫之以生肌散滲之自合雷公曰予有烏須二方一丸方用熟地二斤白朮一斤麥冬一斤山茱萸半斤黑芝麻半斤山藥二斤桑葉一斤巴戟四兩白果四兩為末蜜為丸每日早晚各服五錢萬年青六片加入尤妙一煎方熟地一兩生何首烏赤者一兩桑葉一兩白果二錢黑芝麻五錢炒研碎山藥一兩萬年青半片人參三錢花椒一錢水煎加酒一茶鍾再加桔梗五分早服頭煎晚服二煎夜服三煎四劑即黑如漆二方同用永不再白批方名還童丹倘氣血虛者用服十劑必效孫真君曰耳聾用珍珠一粒外用龍骨末一分以蜜調之丸在珠上外又用丹砂為衣綿裹塞耳中即愈神方也一月後取出再用六味地黃丸一料不再聾又曰烏須方莫妙用干桑椹一斤飯鍋蒸熟曬乾生何首烏一斤為丸二味朝夕吞服自然烏黑矣蓋二味原是烏須之聖藥能日日服之延年返老豈特鬚髮之黑哉或少加白果尤妙不必加熟地藥愈多其功轉不大效用生何首烏者以滋味不外泄也連皮用之正取其皮引入人之皮毛耳每日服五錢或一兩俱可無椹用桑葉二斤首烏一斤可也妙極中治法論統治諸瘡天師曰中治者或胸前生瘡乳上生瘡兩脅兩背兩手生瘡是也然而瘡瘍別有專門此不必再贅既已立門存一治法統治中焦部位之瘡無不神效方用金銀花一兩元參一兩生甘草五錢白礬二錢有病則病受之也當歸一兩白芍一兩炒梔子三錢荊芥三錢連翹二錢白芥子二錢水煎服批散邪敗毒至神丹一服知二劑全消破潰者四劑愈如陰瘡方中去梔子加肉桂一錢此方統治中焦諸瘡俱效妙在用散邪敗毒之品於補藥之內轉足以消毒而去火也此中治之法張公曰岐真人統治瘡瘍之方妙甚然余更有奇方用生甘草一兩當歸一兩蒲公英一兩黃芩一錢金銀花二兩乳香一錢為末先將前藥用水五碗煎一碗將乳香末調飲之神效亦足附前方之功也批散毒仙丹一身上下俱可治之乃統治之法華君曰余同傳無可語孫真君曰予亦有一方統治諸瘡方用天花粉三錢生甘草一兩金銀花一兩蒲公英五錢水煎服一劑輕二劑全愈此方消毒實有奇功下治諸癰可統治之也下治法論腿癰多骨癰囊癰騎馬癰鶴膝風腳脛爛瘡天師曰下治者乃生腿癰多骨癰囊癰騎馬癰鶴膝風兩腳爛瘡腳疽等項是也囊癰騎馬癰最難治此皆少年人不保重或串花街柳巷或貪倚翠偎紅忍精而戰耐飢而守或將泄而提其氣或已走而再返其陽或人方泄精而我又入其戶皆足以生此惡毒也方用金銀花四兩蒲公英二兩人參一兩當歸一兩生甘草一兩大黃五錢天花粉二錢水煎服一劑即消二劑全愈潰者三劑愈蓋此毒乃乘虛而入必大補其血而佐以逐邪之品則病去如失否則婉轉流連禍不旋踵與其毒勢瀰漫到後來發散何不乘其初起正氣未哀一劑而大加祛逐之為快哉方中妙在金銀花而以當歸補血為君人參為佐大黃為使重輕多寡之得宜也鶴膝風治法則又不然此又因濕而戰立而行房水氣襲之故成此疾方用黃耆八兩肉桂三錢薏仁四兩茯苓二兩白朮二兩防風五錢水十餘碗煎二碗分作二服上午一服臨睡一服服後以厚被蓋之必出大汗不可輕去其被令其汗自干則愈一服可也不必再服此方妙在用黃耆以補氣蓋兩足之所以能動而舉步者氣以行之也今鶴膝之病則人之氣虛不能周到行步自然艱難今用黃耆半斤則氣旺極矣又佐之肉桂以通其氣又佐之防風以散其邪始相惡而相濟又佐之白朮薏仁以去其寒濕之氣邪氣去則正氣自固此功之所以速成也若以為人不能受畏而不用則反害之矣多骨疽乃生於大腿之中多生一骨者是乃濕熱而生者也治之得法則易易耳否則變生可畏方用當歸一兩金銀花一兩白芍一兩柴胡一錢茵陳三錢龍膽草二錢白朮三錢生甘草三錢水煎服即愈批化骨至神丹苟或失治即長一骨橫插於皮間作痛必須取出此骨始愈以鐵鋏鉗出之外用前生肌方藥膏貼之兩個即愈此方妙在用白芍蓋白芍能平肝木又能活筋多骨疽者非骨也筋變為骨似骨而非骨也白芍不特平肝木之火兼能散肝木之邪邪去則筋舒筋舒則似骨非骨者盡化又加金銀花原能去毒此二味之所以相濟也足疽亦濕熱也方用金銀花一兩蒲公英一兩生甘草三錢當歸一兩薏仁二兩水煎服一劑即愈批祛濕消邪散蓋此方妙在用薏仁為君蓋濕氣必下受而水流必下行薏仁去濕而利關節之氣金銀花去火毒之邪助之以生甘草則邪易散而濕易退矣然而血虛則水氣易侵濕邪易入今用當歸以補其血血足水無所侵而濕難以入故用之合宜而病可速效也腳脛之生爛瘡亦濕熱也往往兩腿腐爛臭氣難聞若止以湯藥治之未易奏效先以蔥湯溫洗後以白蠟一兩黃丹二兩韭菜地上蚯蚓糞二兩炒乾一兩五錢冰片五分潮腦三錢麝香五分血竭五錢鉛粉一兩炒鬆香三錢乳香去油三錢沒藥三錢銅綠三分輕粉一錢兒茶三錢各為絕細末乘蔥湯洗濕之時滲在瘡口之上必然癢不可當但不可用手抓其癢少頃必流黃水如金汁者數碗再用蔥湯洗之又滲又流又滲如是者三次則水漸少而痛漸止矣批分濕消毒至神丹明日用前膏藥以厚皮攤膏仍入此末藥加入二錢貼之任其水出倘癢之極外以鶴翎掃之即不癢貼二膏即止水而愈腿癰即照多骨治法不再立方腳脛爛瘡內服湯藥金銀花一兩薏仁二兩茯苓一兩生甘草五錢牛膝五錢萆薢五錢半夏五錢肉桂五分水煎服批分濕內化丹自貼膏藥連用此方二劑即愈此方妙在薏仁為君金銀花萆薢為臣茯苓為佐使蓋薏仁去兩足之濕茯苓能分消脾胃中之濕氣生甘草金銀花能解鬱熱之毒而萆薢又善走足且能祛濕健脛又加之牛膝以助其筋力則爛濕之瘡有不去之如失者乎此下治之最妙者也張公曰下治法盡於此矣余欲尚贊高深多骨之生也雖生於濕熱而成之不由濕熱也必有人喜飲涼水好食果品而成之初生多骨疽之時即用大黃一兩芙蓉葉曬乾為末一兩麝香三分冰片三分五倍子一兩藤黃三錢生礬三錢各為末米醋調成如厚糊一樣塗於多骨疽之左右四周以藥圍其皮肉中留一頭如豆大以醋用鵝翎不時掃之若不掃任其干圍則無益也一日夜即內消批消毒散疽生於環跳之間不用此圍藥多成多骨疽故疽一生無論其有骨無骨即以此藥敷之神效其餘癰疽癤毒亦以此藥敷之無不神效華君曰予無可論雷公曰我亦有治多骨之方用內消之法最奇效大凡毒至於環跳之穴者即多骨疽也用人參三錢大黃五錢蒲公英一兩金銀花二兩天花粉三錢薏仁三兩先用水六碗煎薏仁取湯三碗煎前藥三碗分作二次服二日服兩劑即消神方也若已潰用天師方法治之批天師云方神奇之甚勝吾方也鶴膝風古多用大防風湯內氣血藥並用以病在下焦陰分故也此除去血藥想用宜於初起之時如病久古方恐不可廢李子永識先治法論外感初起論內傷初起論傷寒初起天師曰先治者宜先而先之也人病發熱必須散其邪氣俟邪氣速去而後再扶其正氣則正氣不為邪所傷方用柴胡一錢荊芥一錢半夏一錢黃芩一錢甘草一錢水煎服則邪散而身涼蓋四時不正之氣來犯人身必然由皮毛而入營衛今用柴胡荊芥先散其皮毛之邪邪既先散安得入里方中又有半夏以祛痰使邪不得挾痰以作崇又有黃芩使不得挾火以作殃況又有甘草調和藥味以和中邪氣先散而正氣又不相傷此先治之妙也一症一方亦可類推張公曰先治法最妙無奈世人不肯先服藥何所以邪由皮毛而入營衛由營衛而入臟腑也倘先用此方又何至傳經深入哉先治法甚多不能盡再傳二方觸類旁通無非先治之法一方用柴胡一錢當歸一錢白芍二錢甘草陳皮各一錢天花粉二錢梔子一錢水煎服批內傷散邪湯神妙此方凡肝脈郁者用一劑即快不必專是外感也治內傷初起者神效又一方用柴胡一錢白芍一錢茯苓一錢甘草一錢當歸二錢麻黃一錢桂枝一錢陳皮五分水煎服批外感祛邪湯此方專治傷寒初起者神效乘其尚未傳經可從補正之中兼用祛邪之品而熱散之也蓋初起之邪尚不敢與正氣相敵故一補正氣而邪氣自消及一傳經則正氣遁入於臟腑不敢與邪相爭愈補而愈不敢出也故一傳經則萬萬不可用補藥今乘其初起之時亟用補劑而加之祛邪之品用桂枝以熱散用麻黃以祛寒寒熱相攻邪難內入而又有正氣之健助所以一劑而盡愈也先治之法二方最妙幸留意而善用之華君曰予未聞師傳也雷公曰天下最難治者莫過於傷寒然得其法治之又甚易張仲景論之詳矣今又增一法以治傷寒初起之病攻補兼施實有卓見惜世人未知其論耳其方可試無不神效然而人見白朮當歸之多用疑於太補不知傷寒初起何畏於補鄙意尚可加入人參一錢乘其邪未深入補正以逐邪則邪易走也又何疑於朮歸之用哉批天師曰此予方也但三日內可加參三日外者不可輕用也治外感初起用小柴胡湯人參薑棗加荊芥按小柴胡原治傷寒少陽經主藥此經半表半裡寒邪漸逼而稍稍成熱故用之亦非外感初起須知內有濕熱之人而兼外感者用之則宜其脈左右兩寸關俱弦洪者為準李子永識後治法論補正攻邪天師曰後治法者宜後而後之也人有正氣虛寒以中邪氣風寒不可先攻其邪蓋邪之所湊其氣必虛邪之敢入於正氣之中者是人之正氣先虛也不急補其正氣則邪何所畏而肯速去哉譬如賊人入室主懦而僕從又怯賊必將安坐門庭逍遙酒食矣苟能用一二果敢之士出死力而爭敵則盜寇且急走而不遑也故必先補其正而後可以散邪方用人參三錢黃耆三錢柴胡二錢半夏一錢甘草一錢當歸三錢陳皮一錢白朮三錢神麯五分黃芩五分山楂五粒水煎服批補正散此方妙在用參歸耆術以扶正氣加柴胡半夏以祛邪加陳皮山楂以消食加甘草以和中不治邪而邪自退此後治之妙法也張公曰後治法甚多再傳二法一方用人參一錢白朮三錢甘草一錢半夏一錢柴胡三錢茯苓三錢水煎服批扶正散邪湯此方專治正氣虛而邪入之者如頭疼發熱凡脈右寸口大於左寸口者急用此方無不全愈蓋雖有外邪不可純作邪治當以補正為先治邪為後又一方用當歸三錢白芍三錢枳殼一錢檳榔一錢甘草一錢水煎服批補血蕩邪湯此方治痢疾之病最妙以補正為先蕩邪為後其餘後治之法可意會而默通之也華君曰予未傳雷公曰後治法有瘧疾方用人參五錢白朮一兩青皮一錢柴胡一錢半夏三錢水煎服瘧病雖有痰邪不可先治邪此方一味補正略為祛邪以消痰然正足而邪自退矣更有陰虛而發熱如瘧者亦以前方加熟地一兩生何首烏一兩去半夏換白芥子三錢治之亦效急治法論風邪作喘直中陰寒中心卒痛中痰中邪中氣論氣喘非外感論腹痛非內傷天師曰急治者不可須臾緩也乃外感之喘脹氣不能息之類如直中陰寒手足厥冷小腹冷痛而欲死者是也如心中卒痛手不可按氣悶欲死者是也凡人忽感風邪寒入乎肺經以致一時抬肩大喘氣逆痰吐不出人不能臥是也方用柴胡一錢茯苓二錢當歸一錢黃芩一錢麥冬二錢射干一錢桔梗二錢甘草半夏各一錢水煎服批滅邪湯此方妙在用柴胡射干桔梗以舒發肺金之氣用半夏以祛痰用黃芩以去火蓋外感寒邪則內必變為熱症今用黃芩以清解之然徒用黃芩雖曰清火轉足以抑遏其火氣妙在用桔梗射干柴胡一派辛散之品轉足以消火滅邪此急治之一法也直中陰寒之症乃寒邪直入於腎經不由皮毛而入營衛不由營衛而入臟腑也乃陰寒之邪直中於兩腎之中而命門之火無可藏之地乃奔越星散而寒邪乘其真火逃亡趁勢趕逐於是入腹則腹痛入肝則肝絕入心則人亡此至急之時不可用藥之須臾緩也方用人參五錢白朮一兩附子一錢肉桂一錢乾薑五分水煎服批逐寒回陽湯此方妙用人參白朮蓋寒邪直入宜止用附桂以逐之何必用參術而且多加之也不知寒邪直犯腎宮元陽遁出於脾胃之間止此一線之微氣在焉若不用人參以救之何能喚回於無何有之處不多加白朮何能利其腰臍而回其元氣故又加附子肉桂以祛散其寒邪也中心卒痛手不可按者乃火邪犯心也若不急救息其火則臟腑內焚必致身殉方用梔子三錢白芍五錢甘草一錢良薑三分天花粉二錢蒼朮一錢貫眾一錢水煎服批瀉火定痛湯此方妙在用梔子以清火或疑心經之熱宜用黃連以涼之何以不用黃連而反用梔子耶蓋心中火發用黃連固宜然黃連性燥心火正在燥烈之時以燥投燥正其所惡不特不能去火而轉助其焰矣不若桅子瀉其肝木之邪母衰則子亦衰不瀉心火正所以瀉心火也且梔子能瀉六經之鬱火原不專入肝經亦能入心經也一味而兩用之此用藥之奇妙況又與白芍共用以瀉肝又加良薑數分以引入於心中復增天花粉以逐其火熱之痰則痰去自然火散而鬱氣益舒此急治肝而正急治心也又是急治之一法余可類思張公曰急治之法妙矣而余更有法如人中痰中邪中氣三法亦不可不講中痰方用人參三錢白朮三錢茯苓三錢附子一錢天南星一錢半夏二錢水煎服下喉即愈蓋痰之生也由於氣之虛而氣之虛也由於臟腑之冷故方中用參術以補正氣用半夏南星茯苓以祛痰用附子以溫中所以一下喉而痰聲靜痰氣清也中邪方用人參三錢白朮三錢半夏三錢皂角末一錢陳皮一錢水煎服批開竅消痰飲此方之妙在皂角能開人之孔竅引人參白朮半夏之類直入心經而痰之迷滯無不盡開痰去邪將何留中氣方用人參一兩白朮五錢茯苓五錢甘草一錢陳皮一錢附子一錢半夏三錢南星三錢水煎服批助氣回生飲此方與中痰方相彷彿而此方勝於前者以分兩之多而又多甘草陳皮以消中和內也三法有利於醫者不淺華君曰予聞之天師矣尚有二症一則氣喘之不能臥而非外感也一則腹痛之不可忍而非內傷也凡人有氣喘不得臥吐痰如湧泉者舌不燥而喘不甚一臥則喘加此非外感之風邪乃腎中之寒氣也蓋腎中無火則水無所養乃上泛而為痰將胃中之水盡助其洶湧之勢而不可止遏矣法當用六味丸湯加附子肉桂大劑飲之則腎宮火熱而水有所歸水既歸宮喘逆之氣亦下安而可臥凡人之臥必得腎氣與肺氣相交而後河車之路平安無奔逆也方中補其腎火何以安然能臥不知腎為肺之子子安則母亦寧肺金之氣可歸於腎宮以養其耗散之氣矣此所以補腎火正所以養肺金也況六味丸全是補腎水之神劑乎水火同補而肺金更安肺腎相安有不臥之而甚適者乎凡人腹中疼痛欲死手按之轉甚者此乃火挾痰與食而作祟也若作直中治之立死矣方用甘草一錢茯苓三錢白芍五錢枳實一錢梔子三錢山楂二十粒水煎服加柴胡一錢批紛解散此方有解紛之妙乃天師未傳者想於別門見之也岐天師曰實未傳孫真君有治心痛方管仲三錢乳香末二錢白芍三錢炒梔子三錢甘草五分水煎服一劑即止痛此方專治火痛也治呼號口渴者神效緩治法論陽明之火大渴論大吐論大瀉天師曰緩治者不可急而姑緩之也如人病火盛之症大渴引飲呼水自救朝食即飢或夜食不止或久虛之人氣息奄奄不能飲食者是前症陽明火盛故能食善消宜竹葉石膏以治之矣然而不可急也蓋火盛必然水哀火之有餘水之不足石膏辛散之味雖然去火而勢過猛烈實能鑠盡真陰大熱之際不得已而用之所以救存腎中之水也若日日用之則水不能救而反耗真陰之氣真陰之氣既耗則火仍復沸騰不若緩治之為得也方用元參一兩麥冬五錢白芥子二錢竹葉三十片甘菊花二錢生地三錢陳皮五分丹皮二錢治之批清肅至涼湯此方之妙全在元參能去浮游之火使陽明之餘火漸漸消滅麥冬消肺中之熱斷胃之來路用生地清腎中之火斷胃之去路加丹皮截胃之旁路竹葉與白芥子清痰行心又截胃之中路四面八方俱是分散其勢則餘火安能重聚此緩治法勝於急遽之功也至於久虛之人氣息奄奄無不曰宜急治矣不知氣血大虛驟加大補之劑力量難任必至胃口轉加臌脹反不若緩緩清補之也方用茯苓一錢白朮五分山藥一錢陳皮三分甘草三分人參三分當歸一錢白芍二錢棗仁五分山楂三粒麥芽三分炮姜三分水煎服此方妙在用白芍為君引參苓入肝為佐小小使令徐徐奏功潛移默奪使脾氣漸實胃口漸開不急於張皇而徐能奏功此又緩治之一法張公曰緩治之法不止陽明之火宜然天師借而說法余又廣之可也凡人久病俱不可急遽用藥須緩治為妙譬如人大渴之後不可純用止渴之藥是矣然而大吐之人豈亦可純用止嘔之味耶不可也法當用人參五錢茯苓三錢白朮三錢甘草三分陳皮一錢豆蔻仁三粒水煎服此方純用健胃補脾之劑而人不知其中奧妙也大吐之後津液已干如何又用健脾補胃以重燥之得毋傷子太甚耶不知脾胃之氣健而後津液能生苟以潤藥補之則脾胃惡濕反足傷其真氣所以不用潤劑而反用燥藥也他臟腑惡燥惟脾胃臟腑反惡濕而喜燥以人參白朮投之正投其所好又安有燥烈之虞哉大瀉之後自多亡陰宜以補陰藥治之矣然而以補陰之藥急治反足增其水勢法當以溫藥補之用熟地五兩山藥四兩山茱萸四兩白朮五兩肉桂一兩肉果一兩北五味一兩吳茱萸一兩人參五兩薏仁五兩各為末蜜為丸如梧子大批生陰止瀉丹每日晚飯前吞五錢旬日即健矣此方之妙不用茯苓澤瀉豬苓之類去分消水氣而水氣自然分消蓋補腎正所以補脾而緩治勝於急治也華君曰未傳本治法論心驚不安夜臥不睡論精滑夢遺見色倒戈天師曰本治者治心腎之法也人非心不能寧靜致遠非腎不能作強生育故補心即當補腎補腎即當補心也是二經一身之主宰臟腑之根本也故人病心驚不安或夜臥不睡者人以為心之病也誰知非心病也腎病也如人見色而思戰入門而倒戈者或夢遺精滑者人以為腎之病也誰知非腎病也心病也然則欲安心者當治腎欲治腎者當治心治心方用人參三兩茯苓三兩茯神三兩遠志二兩生棗仁一兩熟地三兩山茱萸三兩當歸三兩菖蒲三錢黃連五錢肉桂五錢白芥子一兩麥冬三兩砂仁五錢各為末蜜為丸每日送下五錢或酒或湯俱可此方乃治心之驚與不寐耳宜用參苓當歸麥冬足矣即或為火起不寐加黃連亦足矣何以反用熟地山茱萸補腎之藥又加肉桂以助火不知人之驚恐者乃腎氣不入於心也不寐者乃心氣不歸於腎也今用熟地山茱萸以補腎則腎氣有根自然上通於心矣肉桂以補命門之火則腎氣既溫相火有權則心氣下行君火相得自然上下同心君臣合德矣治腎方者精滑夢遺與見色倒戈則關門不守腎無開合之權矣誰知皆心君之虛而相火奪權以致如此方用熟地半斤山藥四兩山茱萸四兩茯苓三兩肉桂一兩附子一個人參三兩白朮四兩北五味一兩麥冬三兩遠志一兩炒棗仁一兩鹿茸一副巴戟天三兩肉蓯蓉三兩柏子仁一兩砂仁五錢紫河車一副杜仲一兩破故紙一兩各為末蜜為丸此方用熟地山萸杜仲山藥之類補腎也巴戟天蓯蓉附子鹿茸補腎中之火也可以已矣而必加入參苓柏子仁麥冬遠志棗仁之類者何也蓋腎中之火虛由於心中之火先虛也故欲補腎火者先補心火使心火不補腎火終不能益而轉增其上焦之枯竭故必須兼補其心心氣下舒於腎中腎氣上交於心則水火相濟君臣和悅人民奠安肺氣清寧脾胃得養通調三焦不妨整戈矛再利即野御亦可收功也張公曰予有一言願贊高深本治責之心腎又何疑焉然而心不可徒補之腎而腎不可徒補之心也譬如人有心驚不寐雖是腎氣不上通於心而亦有肝氣之不上生於心故補腎之中自宜添入補肝之品方中有當歸肉桂亦是補肝之品然終非直入肝經之藥也余意前方中加入白芍三兩補腎而兼補肝相因而生心火心有不泰然者乎腎虛而用補心之藥固是然補心而不補肝肝木鬱塞心難下生愚意補腎方中亦宜添入白芍三兩則肝氣自舒自生心包之火火足自生命門之火矣可質之岐天師再定去留批雷公曰天師方固妙而張公論亦佳華君曰予曾聞之夫子矣有方亦妙並傳於此凡人臥不安枕方用人參五兩遠志二兩棗仁炒二兩熟地八兩山茱萸四兩茯神三兩柏子仁一兩麥冬三兩陳皮五錢各為末蜜為丸每日白滾水送下二兩五日即安服一料全愈名為寧神安臥丸人有夢遺者用熟地一斤山藥一斤芡實一斤生棗仁五兩巴戟天二兩麥冬三兩北五味三兩蓮子半斤同心用各為末蜜為丸每日白滾湯送下一兩名為益心止遺丸前方補心中而兼補腎後方補腎中而兼補心與天師傳方同意二方亦天師傳也不知何故各各不同然而四方俱奇妙通元甚矣夫子之不可測也巴戟天不特強陽而且止精腎水非火不能生亦非火不能止若用肉桂附子大熱之味果然助其虛火巴戟性非大熱不能溫中用之純陰之中何害反得其既濟之功也孫真君傳治心驚不安方心驚非心病也乃肝血虛而不能養心也方用白芍五錢當歸五錢熟地五錢生棗仁一兩遠志一錢茯神三錢麥冬五錢北五味一錢人參二錢水煎服批天師云此方之妙在用生棗仁至一兩此方之妙全不盡去治心治肝正所以治心治肺亦所以益心也又傳治見色倒戈方用人參三兩熟地八兩黃耆五兩白朮八兩肉桂二兩山茱萸三兩巴戟天五兩肉蓯蓉三兩麥冬五兩北五味一兩覆盆子五兩各為末蜜為丸批又云此方不可輕傳存之可也每日半飢酒送下一兩一月後房事即改觀但不可傳與匪人耳末治法論大便不痛小便不痛瘧症不已產婦感中風邪天師曰末治者乃六腑之治也人如病大小便不通或瘧症不已產後風寒皆作末治也凡久病之後或大便一月不通不必性急止補其真陰使精足以生血血足以潤腸大便自出不可視為根本之病而速求其愈亦有人小便點滴不出亦不必十分大急乃腎氣不能行於膀胱也補其腎氣則小便自出不必視為根本之病而急欲出之也大便不通方用熟地一兩元參一兩當歸一兩川芎五錢火麻仁一錢蜜半甌大黃一錢桃仁十個紅花三分水煎服此方妙在用熟地元參當歸以生陰血少加麻仁大黃以潤腸下行此正末治其閉結而不亟亟以通之也小便不通方用肉桂一錢熟地一兩山茱萸四錢茯苓二錢車前子一錢澤瀉一錢丹皮一錢山藥一錢水煎服此方即七味地黃湯妙在不去通小便而專治腎水腎火蓋腎中有火而膀胱之氣化自行不通小便而小便自通矣此末治之一法也瘧症不已終歲連朝經年累月或已止而又發或未止而難痊人皆謂有邪未散也急宜逐邪不可末視之殊不知邪之久踞乃正虛之甚也自當重補其正而末治其邪方用熟地五錢何首烏五錢鱉甲五錢白朮五錢當歸五錢人參二錢甘草一錢柴胡一錢半夏一錢肉桂五分山茱萸四錢水煎服此方妙在熟地山茱萸當歸之品以補陰血加人參白朮以健脾加鱉甲以入陰分加何首烏以補陰氣加半夏柴胡少少去其痰與邪則正氣有餘邪自退舍此又末治之一法也產婦感中風邪皆作末治者產婦舊血盡去新血未生大虛軀殼原易中邪風寒襲之一散邪必有厥逆寒症之變死亡頃刻矣方用當歸一兩川芎五錢人參一兩荊芥一錢肉桂一錢益母草一錢治之此方妙在用參歸各一兩參以固氣歸以生血氣血既生而風邪易去大虛之人略帶去邪之藥則邪原易出乃腠理實疏關門不鎖故耳方中荊芥一品最妙不特易於祛邪而且引舊血以歸經佐新血以復正故兩用之而成功也益母草更是產科最利之品安有他虞哉此又固氣血為先散邪為末又一法也張公曰俱講得入神出化予又何佐高深哉尚有一言相商產婦臨月之前一月如有風邪感冒等症皆作風寒感冒治之其臨月之期如有感中風邪不可作風邪治之方用人參一兩當歸一兩川芎五錢柴胡二錢甘草一錢白芥子三錢水煎服毋論其頭疼身痛咳嗽太陽痛六經傳經傷寒俱宜以此方治之切不可輕用桂枝麻黃蓋孕婦實與平常人治法大不相同耳孫真君曰大便不通亦多實症天師傳者治虛症之方耳我傳此方治實症者實有奇效方用大黃五錢當歸尾一兩升麻五分蜜半甌水煎服批天師云此方尚加熟地一兩大黃泄利用當歸潤之仍以為君雖泄而不十分過猛不至有亡陰之弊況有升麻以提之則泄中有留又何必過慮哉不內外治法論跌撲斷傷天師曰內者胸腹之中外者風邪之犯今既無胸腹之病又無風寒之侵忽然跌僕為災斷傷受困此不內外之因又一門也方用當歸五錢大黃二錢生地三錢赤芍藥三錢桃仁一錢紅花一錢丹皮一錢敗龜板一錢水一碗酒一碗煎服批逐瘀至神丹方中最妙當歸芍藥和其血大黃桃仁逐其瘀生地紅花動其滯一劑即可病去也倘以大黃為可畏或不用改為別味則雖有前藥亦用之而不當蓋有病則病受之用大黃之藥始能消去其瘀血而終不能大下其脾中之物又何必過忌哉倘跌傷打傷手足斷折急以杉板夾住手足不可顧病人之痛急為之扶正湊合安當倘苟不正此生必為廢人故必細心湊合端正而後以杉板夾之再用補骨之藥令其吞服則完好如初矣方用羊躑躅三錢炒黃大黃三錢當歸三錢芍藥三錢丹皮二錢生地五錢土狗十個捶碎土蝨三十個搗爛紅花三錢自然銅末先將前藥酒煎然後入自然銅末調服一錢連湯吞之一夜生合神奇之甚不同世上折傷方也不必再服止服二劑可也批接骨至神丹蓋羊躑躅最能入心而去其敗血人受傷至折傷手足未有不惡血奔心者引諸活血之藥同群共入則惡血必從下行而新生之血必群入於折傷之處況大黃不特去瘀血亦能逐而生新瘀去而各活血之品必能補缺以遮其門路況土狗土蝨俱是接骨之聖藥即有缺而不全又得自然銅競走空缺而補之此所以奏功之速耳骨斷之處自服藥後瑟瑟有聲蓋兩相連貫彼此合縫若有神輸鬼運之巧恐世人不信耳吾傳至此不畏上泄天機者正副遠公好善之心共為救濟之事庶天眷可邀愆尤可免耳跌損唇皮之類以桑白皮作線縫之後以生肌散糝之自合張公曰方至此神矣聖矣化矣亦何能贊一言哉惟有前方煎藥之內少為商酌者第一方中再加生地三錢枳殼五錢蓋生地乃折傷之聖藥多多益善少則力不全耳折傷之病未免瘀血奔心有枳殼之利於中則瘀血不能犯也華君曰無可言陰治法論腎虛感寒水虧夜熱天師曰陰治者病症乃陰氣不足而陰邪又犯之也如腎水虛寒又感寒者或腎水虧竭夜熱晝寒是也此等病若認作陽症治之則口渴而熱益熾必致消盡陰水吐痰如絮咳嗽不已聲啞聲嘶變成癆瘵法當峻補其陰則陰水足而火焰自消骨髓清泰上熱餘火俱歸烏有矣方用熟地一兩山茱萸五錢麥冬五錢北五味五錢元參三錢地骨皮三錢丹皮一錢沙參五錢白芥子一錢芡實五錢車前子一錢桑葉七片水煎服批安火至聖湯此方妙在全用純陰之品一直竟進腎宮滋其匱乏則焦急之形不上焰於口舌皮毛之際又加元參地骨皮沙參丹皮之品少清其骨髓中之內熱自然陰長陽消不治陽而自安也又何必更加柴胡以散之而邪始去哉此方乃治陰火自動者神效若陰寒無火者又不宜用此方當用肉桂一錢附子一錢熟地一兩山茱萸四錢白朮三錢人參三錢柴胡五分水煎服批祛寒至聖丹此方之妙用附桂祛寒之藥加之於參熟補陰之內使陽得陰而有制不致奔越沸騰少加柴胡數分則陰邪自散又何必純用麻黃桂枝之類鑠盡真陰哉況腎中之火必得水而後生以水非邪水乃真水也邪水可以犯心而立死真水可以救心而長延蓋陽根於陰而真陰腎水實為真陽君相之火之母也此方中加熟地山萸正是此意批妙極恐人未知故又表而出之倘止用附桂以祛寒未嘗不效然而邪去而陰消必然枯竭苟或治之不得法必有亡陽之症矣願人加意於水中補火更於水中去邪也張公曰妙絕之論發千古所未發何以再贊高深然尚有一方以參之前症乃陰虛火動也用六味湯似亦相宜後症乃陰寒無火也八味湯似亦可用然而終不及天師二方蓋治陰之內即留以治陽而治陽之中即藏於補陰也有貧不能用人參者用予後方可也華君曰同傳予法無異陽治法論傷寒發斑中暑火熾傷暑吐血陽症火瀉天師曰陽治者治陽症之病也陽症甚多不能概舉姑舉一二症大者言之傷寒內發斑身熱心如火口渴呼水氣喘舌燥揚手出身者是或中暑熱之氣大渴飲水數桶不止汗如雨下大喊狂呼日重夜輕是也此皆陽火燒焚於胃口煙騰勢急威猛不可止遏皆陽症也此時杯水實不足以勝之非大劑寒涼安能撲滅即以用寒涼撲滅之矣而余煙斷火微焰猶存必得大雨滂沱屋棟溝渠無非膏澤則火氣消亡門庭可整此陽症之治難於陰症也方用元參三兩升麻二錢黃芩一兩麥冬三兩防風三錢天花粉三錢蘇葉一錢青黛三錢生甘草三錢生地一兩桑白皮五錢一劑即消大半二劑全愈批滂沱湯此方妙在元參為君不特去其浮游之火兼能清其胃中之熱且性又滋潤發斑雖是火熱不能外越然亦因胸中水少不足潤故鬱而不出也今用元參潤之則火得潤而難居況又有黃芩以大涼其胸膈又加升麻防風引散其火邪更佐之麥冬生地涼血以清肺氣自然清肅下行而中焦之火盡化為烏有也至於中暑之病亦陽火邪熾也法用青蒿五錢石膏五錢麥冬五錢半夏一錢黃連一錢人參三錢甘草一錢茯苓五錢竹葉五十片水煎服批消暑至神湯此方妙在用青蒿去暑再加二錢香薷則暑氣自化用石膏以平瀉其胃中之邪火邪火一去胃氣始轉水能下行不蓄停於膀胱之內而散逸於四肢況又有茯苓導其下行者乎又慮火氣傷心復加黃連以救心人參以救肺各臟即安胃邪必遁此治陽症之妙法也張公曰妙論出奇不窮陽症固多二症最急故天師特舉之以為法予再廣之有二症在焉一則傷暑中之吐血也凡人感傷暑氣忽然吐血傾盆人皆謂是陰虛不知陰虛吐血與陽虛吐血不同陰虛吐血者人必安靜不似陽虛之躁動不寧也陽症必大熱作渴欲飲涼水舌必有刺不似陰症之口不渴而舌胎滑也法當清胃火不必止其血方用石膏三錢青蒿五錢香薷三錢荊芥一錢當歸三錢人參三錢水煎服批祛暑止血湯此方乃正陽症吐血之神劑也方中雖有解暑之味然而補正多於解暑去香薷一味實可通治諸陽症之血也但此方止可用一二劑即宜改用六味地黃湯以滋其陰水水足則陽火自消耳一則陽症之火瀉也完穀不化飲食下喉即出一日或瀉十餘次或瀉數十次或晝夜瀉數百次人以為熱也然而熱之生也何故生於腎中之水衰不能制火使胃土關門不守於上下所以直進而直出也論其勢之急迫奔崩似乎宜治其標然治其標不能使火之驟降必須急補腎中之水使火有可居之地而後不至於上騰方用熟地三兩山茱萸一兩車前子一兩甘草一兩茯苓一兩白芍三兩肉桂三分水煎服此方乃補腎之湯非止瀉之藥也然而止瀉之妙捷如桴鼓蓋腎水一生腎火即降頃刻應驗非好為奇談而不據實理也若止作胃虛有火治之未嘗無功終不若此之捷脾約丸亦佳安能及此方之神哉華君曰與余同不必講雷公曰無一論不奇妙假治法論假熱假寒天師曰假治者病是假熱而治以假熱之方症是假寒而治以假寒之藥也如人喉痛口乾舌燥身熱人以為熱而非熱也內真寒而外現假熱耳如人手足冰冷或發厥逆或身戰畏寒人以為寒而非寒也內真熱而外現假寒耳此時看症未確死生反掌吾以假熱之藥治假寒之症以假寒之品治假熱之病是以假對假也假寒方附子錢肉桂一錢人參三錢白朮五錢豬膽汁半個苦菜汁三匙先將藥二碗水煎好以冰水泡涼入豬膽汁苦菜汁調勻一氣服之即愈方中全是熱藥倘服之不宜必然虛火上衝盡行嘔出吾以熱藥涼服已足順其性而下行況又有苦菜汁膽汁之苦以騙其假道之防也蓋上熱之症下必寒極熱藥入之至於下焦投其所喜無奈關門皆為強賊所守非以間牒紿之必然拒絕而不可入內無糧草外無救援奈之何哉吾今用膽汁菜汁以與守關之士買其歡心不特不為拒絕轉能導我入疆假道滅虢不信然哉至於假熱之方則又不然心胸之內全是一團邪火盤踞於中焦若不直搗中堅巨魁不擒餘黨安能星散然而用師無法則彼且力拒死鬥而不可救方用黃連三錢柴胡二錢白芍三錢當歸三錢炒梔子二錢半夏三錢枳殼一錢茯苓三錢菖蒲三分水煎服此方妙在用黃連一味直入心經佐以梔子副將單刀直入無邪不散又柴胡白芍瀉其運糧之道又半夏枳殼斬殺餘黨中原既定四隅不戰而歸正矣然而火熱居中非用之得宜則賊勢彌空安能直入又加菖蒲之辛熱乘熱飲之則熱喜同熱不致相反而轉能相濟此又假治之妙法也張公曰講得透徹痛快予又何說之詞然而假熱假寒不止此二症也吾再廣言之如人氣喘不安痰涎如鋸而不止者人以為熱而非熱也乃下元寒極逼其火而上喘也此最急最危之症苟不急補其命門之火與腎水則一線微陽必然斷絕方用熟地四兩山茱萸三兩麥冬三兩北五味一兩牛膝一兩附子一錢肉桂一錢冰水泡冷服之一劑即愈附子肉桂斬關奪門之藥其性最熱倘不用之於熟地山茱萸北五味之中則孤陽乘大熱之勢沸騰而上矣方中妙在用熟地山茱萸之類使足以濟火又麥冬以滋肺金之化原使金去生水而水益足以生火而火不敢於飛越況又有牛膝之下走而不上行乎然必冰水泡之騙其上焦之熱直至腎宮腎宮下熱則上焦清涼火自歸舍又何患喘與痰作祟哉更有眼目紅腫經年不愈者人以為熱而不知非熱也亦腎火上升而不下降耳法用六味地黃湯加麥冬甘菊花白芍當歸各三兩柴胡五錢各為末蜜為丸每日吞服五錢一料必全愈此雖病輕而世人多患之迷而不悟予所以特表出也雖非假治之法而症實假熱之症可觸類而旁通之耳假寒之法莫妙岐天師之方可以統治矣故不再傳華君曰亦同真治法論真熱真寒天師曰真病原難分晰然有假即有真也即以前症言之如人喉痛口乾舌燥身熱與假熱無異然而此曰真熱者何以辨之假熱之症口雖渴而不甚舌雖干而不燥即燥而無芒刺無裂紋喉雖痛而日間輕身雖熱而有汗不若真熱之症口乾極而呼水舌燥極而開裂生刺喉日夜痛而不已身大熱烙手而無汗也方用麻黃三錢黃連三錢黃芩三錢石膏三錢知母三錢半夏二錢枳殼二錢甘草一錢當歸五錢水煎服一劑輕二劑愈此方純用寒涼之藥以祛逐其火火一去而上焦寬快矣更有人手足冰冷或數厥逆身戰畏寒與假寒無異然而謂之真寒者何以辨之假寒之症手足冰冷或有時溫和厥逆身戰亦不太甚有時而安然有時而發搐不若真寒之症手足寒久不回色變青紫身戰不已口噤出聲而不可禁也方用附子三錢肉桂一錢乾薑一錢白朮五錢人參一兩急救之此乃直中寒邪腎火避出軀殼之外而陰寒之氣直犯心宮心君不守肝氣無依乃發戰發噤手足盡現青色也然則止宜用附桂乾薑祛逐其寒邪足矣何以又用白朮人參且少用亦足濟用何以多加如許也蓋元陽飛越止一線之氣未絕若不急用人參返氣於若存若亡之際而徒用桂附乾薑一派辛辣火熱之藥邪雖外逐而正氣亦就垂絕故不若多加於危急之際則敗軍殘卒見有孤軍未亡而又驍勇之將號召散失有不再整旗槍共奔毒下者乎此真治之妙也張公曰奇論天開真治即直治真治其本病而不必以假藥騙之對症用藥可也余不再論華君曰亦同男治法論狐疝論強陽不倒論痿陽不振天師曰男子與女子之治原無分別然而亦有殊處男子與婦人殊者疝病陽強不倒痿而不舉疝病不同然而與婦人異者止狐疝不同耳余俱相同狐疝者日間縮在囊之上夜間垂在囊之下也此乃寒濕又感陰陽不正之氣乘於交感之際或在神道之旁或在風濕之際感而成之也方用杜若五錢搗汁以涼水浣之取汁一碗加沙參一兩肉桂一錢桂枝一錢小茴香一錢橘核一錢水煎服批扶正祛疝湯一服即伸出二服即消三服全愈神方也強陽不倒此虛火炎上而肺金之氣不能下行故爾若用黃柏知母二味煎湯飲之立時消散然而自倒之後終歲經年不能重振亦是苦也方用元參三兩肉桂三分麥冬三兩水煎服即倒批養陽湯此方妙在用元參以瀉腎中浮游之火尤妙肉桂三分引其入宅而招散其沸越之火同氣相求火自回合況麥冬又助肺金之氣清肅下行以生腎水水足火自息矣此不求倒而自倒他日亦可重整戈矛再圖歡合耳至於痿而不振者乃過於琢削日泄其腎中之水而腎中之火亦日消亡蓋水去則火亦去必然之理如一家人口廚下無水又何以煮爨而生煙必汲其泉源而後取其薪炭可以鑽燧取火以煮飲食否則空鐺安爨也方用熟地一兩山茱萸四錢遠志一錢巴戟天一錢肉蓯蓉一錢肉桂二錢人參三錢枸杞子三錢茯神二錢杜仲一錢白朮五錢水煎服批起陽至神丹一劑起二劑強三劑妙老人倍加此方用熱藥於補水之中則火起而不愁炎燒之禍自然煮湯可飲煮米可餐斷不致焦釜沸干或虞爆碎也此皆男治之法也張公曰男治法妙然余亦有數方可並傳之狐疝方用白朮五錢沙參一兩柴胡三錢白芍三錢王不留行三錢水煎服批逐狐丹一劑即出而不縮陽倒不舉方用熟地一斤肉桂三兩覆盆子三兩黃耆二斤巴戟天六兩柏子仁三兩去油麥冬三兩當歸六兩白朮八兩各為末蜜為丸每日白滾湯送下一兩自然陽旺不倒矣批強陽神丹孫真君傳治疝方用沙參一兩橘核一錢肉桂一錢柴胡一錢白芍五錢陳皮五分吳茱萸五分水煎服一劑即定痛二劑即全愈疝氣一症大約皆肝木之病予所以治其肝自隨手而奏功也妙女治法論風邪入血室論治羞隱陰內生蟲陰門生瘡天師曰女症各經俱與男人同治惟是經症宜知至於羞隱之處更宜留心是也經期前後寒熱溫涼有邪無邪俱當細辨世有專門不須枚舉我今止據一症而言之如婦人經期適來為寒風所中則經水必然驟止經不外泄必變為寒熱時而身戰時而身涼目見鬼神心中驚悸論治法本當刺其期門之穴一刺出血立已無奈世人不肯刺於乳下羞恚不肯為醫人所見於是必變而益發狂呫語所由來也今立一方治之方用柴胡三錢當歸二錢白芍五錢枳殼二錢炒梔子三錢甘草一錢陳皮五分生地二錢水煎服此方妙在用柴胡於白芍之中蓋前症經血不能外出則血藏於血室之中藏而不出則血化為熱氣鬱結不伸必在半表半裡之間以興妖作怪柴胡真半表半裡之藥用白芍直入血室和平而分解之如人羞恚隱藏於血宅之內必得一相信之人走入其中為之開導而後眾人排闥而入庶幾一笑回春仍然歡好身出而禍亦消此方之妙理實相同故取而顯譬之非好為論說也至於羞隱之症亦不可枚舉查其專門而細詢病情隨症加減治之可也張公曰論奇闢予更有說熱入血室非熱也乃風邪壅之而熱也所以用柴胡一散而愈婦人羞隱之處不便明言然大約非寒則熱耳今有一試方先用當歸三錢白芍三錢川芎一錢熟地五錢甘草一錢柴胡一錢白芥子一錢黃芩三分炮姜三分水煎服倘有羞隱之處不肯明言者以此方投之必奏奇功問其服藥後較前平善則是虛症也竟用四物湯治之可也未好則是熱病作祟方中大加梔子三錢治之必奏功也此亦妙法行醫者宜亟知之華君曰女子治法尚有二條未傳待予補之婦人陰內生蟲乃濕熱也用雞肝入藥末引之亦妙終不若夫子之方更神也方用蚯蚓三四條炙乾為末用蔥數條火上炙乾為末用蜜一碗煮成膏將藥搗於其中納入陰戶蟲盡死矣自然隨溺而下神方也世人未知幸為留意又婦人陰門邊生瘡作癢作痛不止者以此方煎水洗之立效方用蛇床子一兩花椒三錢白礬三錢水十碗煎五碗乘熱熏之溫則洗之一次即止癢二次即止痛三次即全愈分作五日洗之每日止消洗一次神效之極幸珍之虛治法論氣虛血虛天師曰虛症亦多我舉一二以概其餘虛治者非氣虛即血虛也氣虛如人不能飲食食之而不能化者是血虛者面色黃瘦或出汗盜汗或夜眠常醒不能潤色以養筋者是也蓋飲食入胃必須胃氣充足始能化糟粕而生津液氣既自餒何能化飲食也方用人參二錢黃耆三錢白朮三錢陳皮五分甘草一錢麥芽五分神麯五分山楂五粒炮姜一錢茯苓三錢水煎服此方參苓耆術純是健脾開胃之品又恐飲食難消復加山楂神麯麥芽之類以消之則胃氣既旺又何愁飲食之不化津液之不生耶血虛自當補血舍四物湯又何求耶余今不用四物湯用麥冬三錢熟地一兩桑葉一片枸杞子三錢茜草一錢當歸五錢水煎服此方妙在用桑葉以補陰而生血又妙加入茜草則血得活而益生又況濟之熟地麥冬當歸大劑以共生之則血足色潤而筋舒也外症既見改觀則內自安而寐適心氣得養又寧有盜汗之生哉此虛治之法也張公曰虛治亦不止補氣補血蓋此二方實可統治之甚矣天師立方之妙也別有加減之法氣虛方中倘傷米食加麥芽五分傷肉食加山楂十粒傷麵食加蘿蔔子五分有痰加半夏一錢白芥子一錢咳嗽加蘇子一錢桔梗二錢傷風柴胡二錢夜臥不安加炒棗仁二錢胸中若微疼加枳殼五分血虛方中亦同前加減法治之華君曰尚有一方並傳子有氣血兩虛之人飲食不進形容枯槁補其氣而血益燥補其血而氣益餒助胃氣而盜汗難止補血脈而胸膈阻滯法當氣血同治方用人參一錢白朮一錢甘草八分陳皮五分茯苓二錢當歸二錢白芍三錢熟地三錢川芎一錢神麯五分麥冬五錢穀芽一錢水煎服此方氣血雙補與八珍湯同功而此更妙於八珍者也妙在補中有調和之法耳實治法論治實邪天師曰實病亦不同亦甚多今亦舉其一二如人終歲終年不畏勞役不辭辛苦寒涼之品可以多餐辛熱之味不能上口者是也至於邪氣之入不可同觀吾言實病之多皆邪氣之多也人實者少而虛者多邪氣之入別有治法不可混入於此門倘人有強壯之容顏過於熱甚欲求方者與之方用陳皮一錢神麯一錢麥芽一錢黃芩一錢厚朴一錢天花粉一錢甘草五分芍藥二錢山楂十粒枳殼五分當歸二錢茯苓一錢水煎服此等方止可備用以治有餘之人不可據之以概治天下之人也蓋實者一百中一二人而虛者遍天下天地之氣何能過厚況培植者少而琢削者多乎今定此方亦定一門之治法非教醫者執此以消導之耳張公曰仁心仁術於此方並見實病甚少天師言多者乃言邪氣之實非言正氣之實也邪氣之實傷寒門最多天師言有專門者說有傷寒之書也倘人病邪氣之實幸於傷寒門查而治之無差毫髮傷寒書卷繁多茲不能備載耳華君曰予未傳寒治法論吐血衄血目腫口舌生瘡天師曰寒治者乃火盛而正折之也如人病目痛口舌生瘡鼻中出血口中吐血是也此等之症乃火氣鬱勃於上焦不能分散故重則上衝而為吐血衄血輕者目痛而口舌生瘡也法當用寒涼之品以清其火熱燎原之勢並瀉其炎上巔頂之威方用生地一兩當歸一兩川芎五錢元參五錢黃芩三錢三七根末三錢甘草一錢荊芥炒一錢水煎服此方妙在不純用寒涼以逐火而反用微寒之藥以滋陰蓋陰氣生則陽氣自然下降尤妙用荊芥引血歸經用三七末以上截其新來之路又加黃芩以少清其奔騰之勢誠恐過於寒涼恐冷熱相戰又加甘草以和之此治熱之最巧最妙法也若竟用寒涼折之非不取快一時然火降而水不足則火無所歸仍然焰生風起必較前更勝而始以清補之藥救之則胃氣已虛何能勝任予所以乘其初起即用之為妙也目腫而痛亦是火症然必看其眵多淚多紅腫而痛如有物針觸二般用柴胡三錢甘草一錢炒梔子三錢半夏一錢白蒺藜三錢水煎服此方之妙全在直散肝膽之鬱火火散則熱自退不攻之攻勝於攻不下之下勝於下也一劑即可奏功正不必再服口舌生瘡又不可如是治之乃心火鬱熱而舌乃心苗故先見症法用黃連二錢菖蒲一錢水煎服一劑而愈神方也此方不奇在黃連而奇在菖蒲菖蒲引心經之藥黃連雖亦入心經然未免肝脾亦入未若菖蒲之單入心也況不雜之以各經之品孤軍深入又何疑哉此所以奏功如響也倘不知用藥神機輕混之以肝脾之藥雖亦奏功終不能捷如桴鼓此治熱之又一法也張公曰寒治之法世人最多予皆不取今天師之法不容予不首折也用寒而又遠寒用散而又遠散真奇與巧並行而攻與補兼用也予又何必多言哉無已則更有一方在治火初起之時尚未現於頭目口舌之際亦可化有為無方用柴胡二錢白芍三錢甘草一錢炒梔子三錢半夏一錢羌活五分茯苓三錢水煎服一劑可以散火方名先解湯乘外症之不見而先解之亦爭上流法醫者宜留意焉華君曰亦無有傳我孫真人曰予有吐血方傳子生地汁一碗無鮮生地處用乾者一兩煎湯半碗調三七根末三錢炮姜灰末五分服一劑即止吐血神效衄血亦可治妙熱治法論腎寒吐瀉論心寒胃弱天師曰熱治寒也寒症不同舉一二症言之如嘔吐不已食久而出是也或下利不已五更時分痛瀉四五次是也此等之症人皆以為脾胃之寒治其胃則嘔吐可止治其脾則下利可遏然而終歲經年服胃脾藥而不愈者何也不得其故耳蓋胃為腎之關而脾為腎之海胃氣不補命門之火則心包寒甚何以生胃土而消其穀食脾氣不補命門之火則下焦虛冷何以化其糟粕而生精微故補胃必宜補腎而補脾亦宜補腎也方用熟地三兩山茱萸二兩茯苓三兩人參三兩肉桂一兩附子一兩北五味一兩吳茱萸五錢山藥四兩各為末蜜為丸飢服一兩此方之妙全在用腎藥居多而脾胃藥居少尤妙用熱溫之藥於補腎補土之中則火足而土健誰知水足而火生也此種議論舉世未聞然豈徒託空言以示奇乎實有至理存焉試之無不效奏頃刻願世人加意之此熱治之妙法一方可兼治之凡如此等之病無不可統而兼治也張公曰真妙絕之論快心之語天師言補腎之法而余更有論乃言補心方也胃與脾雖同是屬土而補胃補脾宜辨凡人能食而食之不化者乃胃不病而脾病也當以補脾而補脾尤宜補腎中之火蓋腎火能生脾土也有人不能食食之而反安然者乃胃病而非脾病不可補腎中之火當補心中之火蓋心火能生胃土也世人一見人不能飲食動曰脾胃之病而不知分胃之寒虛責之心分脾之虛寒而責之腎也天師之法心腎兼補予可不必更立奇方然而治脾胃兩虛者用之神效若單是胃虛胃寒者自宜獨治心之為妙余所以更定一方以佐天師之未及方用人參一兩白朮三兩茯神三兩菖蒲五錢良薑五錢蓮肉三兩山藥四兩半夏三錢白芥子三錢附子三錢遠志二兩炒棗仁五錢白芍三兩各為末蜜為丸每日白滾水送下三錢飯後服此方專補心火並疏肝氣專生心火內加附子良薑以助火熱之氣心火足自然生胃土胃土足而飲食自然能進而無害矣此方實可濟大師之未及也華君曰治法與余相同無可言通治法論痢下通治論火瀉通治論下血通治天師曰通治者因其通而通之也如人病下痢者是痢疾之症多起於暑天之鬱熱而又感以水濕雨露之氣以成之紅白相見如血如膿甚者如屋漏水如魚凍水裡急後重崩迫痛疼欲下而不能不下而不快一日數十行或一夜數百行或日夜數千行氣息奄奄坐而待死此通之病也若驟止其邪則死生頃刻不止其邪則危絕如絲欲補其氣則邪氣轉加欲清其火則下行更甚此時惟有因勢利導之法可行於困頓之間或疑人已氣虛血敗更加利導必致歸陰不知邪氣一刻不去則正氣一刻不安古人之痢疾無止法信不誣也方用白芍三兩當歸三兩蘿蔔子一兩枳殼三錢檳榔三錢甘草三錢車前子三錢水煎服一劑即止二劑全安可用飲食矣批此方前已有了止分兩不同耳多車前子一味此方之奇而妙者全在用白芍當歸蓋水瀉最忌當歸之滑而痢疾最喜其滑也芍藥味酸入肝以平木使木不敢再侵脾土又有枳殼檳榔消逐其濕熱之邪又加車前分利其水濕而又不耗真陰之水所以功勝於茯苓也尤奇者在用蘿蔔子一味世多不解蓋蘿蔔子味辣而能逐邪去濕而又能上下通達消食利氣使氣行於血分之中助歸芍以生新血而祛蕩其敗瘀也少加甘草以和中則無過烈之患此奏功之神奇實有妙理耳張公曰固然奇妙通權通因通用痢疾立論最為妥當然而通因之法不止痢疾也水瀉亦是下血亦是也水瀉者人見其如潮而來如瀑而下皆曰急宜止之以免亡陰之症用粟殼鶯粟烏梅之類止之其論則是其治則非也水瀉雖不比痢疾之斷不可止然而水瀉之中亦有不可遽止之病如疼痛於腹中後重於門口皆是有火而瀉不比虛寒之直瀉俱當用通因之法治之方用人參三錢車前一兩白芍三錢檳榔一錢甘草一錢治之此方之妙妙在車前以滑之而又佐以檳榔之去積自然有滯皆行況車前性雖滑而能分消水穀則水氣自然分開第大瀉之後自然亡陰又用人參以補氣則氣足而陰自生又慮久瀉自然虧中又加甘草以和之雖是通因之法實乃扶正之方下血之症其人之血虛不言可知似乎宜補其血矣然而血之下也必非無故非濕熱之相侵即酒毒之深結若不逐去其濕熱酒毒而徒尚止澀之味吾未見其下血之能止也方用熟地一兩地榆三錢白芍三錢當歸三錢黃連三錢甘草一錢葛根一錢柞樹枝五錢水煎服批解酒散火湯一劑必下血更多二劑略少三劑全愈蓋此病不用通因之法永不奏功必如此而能愈也方中妙在用熟地當歸芍藥以生新血新血生則舊血必去又妙在地榆以涼大腸用柞木以去酒毒所以相濟而成功也此二方亦通因之妙用人亦亟宜知之華君曰同雷公曰通因通用張公補論之尤為酣暢我無以贊一言雖然尚有一說在大瀉之後雖是火瀉畢竟宜溫補之以生其陰瀉一止即宜用四物湯加人參炮姜以溫補而不可謂水瀉忌滑而禁用歸熟也痢症按昔賢謂如屋漏水者為不治症魚凍水者為虛寒症後方恐宜酌用李子永識塞治法論氣虛中滿論飽食填塞天師曰塞者因其塞而塞之也如人氣虛中滿是也凡人氣虛多不能食食則倒飽人以為多食之故以香砂枳實等丸消導之其初未嘗不少快久則腹飽又消之久久不已必變成中滿之症矣腹高而大氣喘而粗人又以為臌脹也用牽牛甘遂等藥以利導其水水未必去而臌脹益甚又以為藥之不勝也又用大黃巴豆之藥下之又不應以為風邪襲之又以辛散之品如龍膽草茵陳之類雜然紛進不至死不止猶然開鬼門泄淨府紛紛議論皆操刀下石之徒也誰知初起之時即以補胃健脾之藥先為速治何至此哉初用之方用人參一錢白朮二錢茯苓三錢陳皮三分甘草一分蘿蔔子一錢薏仁五錢芡實五錢山藥三錢水煎服批消脹至神湯此方絕不去消導而專以補為事世醫未有不笑其迂以為此等藥服之必增脹滿下喉之時實覺微飽世醫乃誇示曰吾言之驗如此而病人與病家並諸親友俱嘆世醫而咎此方之迂而害事也詎知下喉之時雖覺微脹入腹之後漸覺開爽連服數劑不特開爽而並無脹滿之疾矣蓋中滿之疾原是氣虛而成不補其虛脹何從解補藥之中加以蘿蔔子分消其脹氣使人參不敢助邪而反助正況又有茯苓薏仁芡實之類純是去濕之藥則水道自行而上壅可免尤妙用甘草一分以引群藥之入於滿處蓋中滿最忌甘草而余偏用之成功於忌之中也張公曰妙論疊出不窮大哉聖人之語中滿固是塞症飽食填塞於胸膛亦是塞症也人皆用香砂厚朴消之而余獨不然方用人參三錢白朮三錢陳皮一錢甘草一分肉桂一錢神麯三錢水煎服此方妙在全不去消食反助其飽悶之氣誰知飽食而不消者由於胃氣之不足也我補其胃氣則胃強自能運化而入於脾中又何必用厚朴枳殼之消導哉此亦塞治之法也可與天師方並垂天壤華君曰法同於余而論備之雷公曰我亦有方中滿病固是胃氣之虛然徒補胃氣亦難療當補心火以生胃土方用人參三錢白朮五錢炒棗仁五錢遠志八分山藥三錢茯苓三錢米仁五錢陳皮三分神麯三分麥芽五分水煎服方中全不治滿而滿自除正以治心火也解治法論結胸論內傷肝鬱天師曰解者邪聚於一處而分解之也如人病結胸等症者是傷寒初愈五臟六腑久不見飲食矣一旦飽食則各經群起而盻無如胃經火熾一甌之物不足以供其自餐又安能分散於諸人乎勢必群起而爭而胃經自家困乏茹而不吐則五臟六腑喧譁擾攘而胃經堅不肯出矣然則治之法奈何惟有堅壁以待枵腹以守則敵人自散蓋原因無食所以起爭使終無糧草勢亦難於久待自然仰關而攻不戰自退乘其散亡之時少佐師旅聲言追逐實仍和解彼此同歸於好方用元參一兩麥冬一兩水二碗煎服此方之妙全不去顧胃中之火亦不去消胃中之食止分清肺中之氣散其心腎浮游之焰心腎肺經既已退舍則肝經一旅之師又何能為難哉脾與胃唇齒相倚從前不過同群共逐大家聲揚原未嘗有戰攻之舉今心肝肺腎之火既已收師則脾臟一經亦自相安於無事矣倘一逢結胸即以此方投之則不特無功轉且有害故一遇結胸之病必須令其空腹數日而後以此方投之萬舉萬當此解治之一法也張公曰真妙絕奇文結胸之症不意發如許奇語非天師又烏能哉我欲再發一言不可得矣非學貫天人不可言醫非識通今古不可談醫非窮盡方書不可注醫此得人所以最難自古及今代不數人元以前無論明朝三百年止得數人而已李瀕湖之博繆仲醇之辨薛立齋之智近則李士材之達喻嘉言之明通吾子亡弘肆我所言者數人皆上關星宿鐘山川之靈而生者也今日既許子在著書中人願吾子勿以菲薄自待也著書當弘而肆醫道盡矣至矣化矣神矣解法更有人病內傷而頭疼目疼心脅痛遍身痛手足又痛此皆肝氣鬱蒸之故或頭痛救頭腳痛救腳治何日始能盡期當據其要而先治之余者不治自愈方用白芍五錢當歸三錢柴胡三錢天花粉三錢丹皮三錢梔子三錢甘草三錢川芎一錢香附一錢桂枝一錢水煎服此方妙在白芍為君柴胡為臣祛風祛痰之藥為佐使一劑而脅痛失再劑而諸痛平三劑而一身泰真扼要爭奇解法之至妙者施之內傷之症尤多奇功願世人勤而用之收功無量也華君曰未傳於予斂治法論亡陽論下血論吐血論頭汗論手汗天師曰斂治者乃氣將散而收斂之也譬如人汗出不已此亡陽而氣欲散也又如下血與吐血不已此血欲散而不能住者是也氣散僅存一線之陽倘再令其奔越則陽脫而死所不免也然而治脫之法惟在斂其肺氣使皮毛腠理固密則陽從何散第徒斂肺氣而不大補元陽則元氣仍然欲脫即不脫出於皮毛腠理必然脫出於口鼻耳目故必以補為斂之為得也方用人參一兩黃耆一兩當歸一兩五味子一錢山萊萸四錢桑葉五片酸棗仁一錢麥冬三錢水煎服此方之妙全在用參歸以補氣用山萸五味以斂氣則補足以濟斂之功而斂足以滋補之益況又有桑葉收汗之妙品調停於斂之中不偏於斂亦不偏於補也下血之症多因好酒成病用解酒之品可以成功而殊不盡然也世醫所用解酒之品無過乾葛桑白皮而已然而乾葛不可多服而桑白皮又氣味輕清不可專任此二味所以解酒而酒病終難去也況中酒之病其來已素非一朝一夕之有豈是輕清不可久服之藥可能治之乎余故皆棄而不取方用人參二錢當歸一兩地榆三錢生地五錢三七根末三錢水煎服批生新湯三六亦能生血不止止血也此方之妙全在不去治酒病亦不去治血病全以生地當歸活其血血活則新血生而舊血止況又佐以地榆之寒以去大腸之火又佐以三七之末以杜塞大腸之竅自然血止而病愈也此斂之一法也更有吐血之症或傾盆或盈碗若不急以收斂則吐將安底然而一味酸收寒遏則血勢更狂愈足以恣其崩騰之勢不若從其性而少加以收斂之品則火寢息而血歸經方用人參一兩當歸一兩酸棗仁三錢三七根末三錢水煎調服此方之妙不去止血而惟固其氣蓋血脫益氣實有奇功血乃有形之物既已傾盆盈碗盡情吐出則一身之中無血以養可知自當急用生血補血之品尤以為遲奈何反用補氣之味得無迂而寡效乎誰知血乃有形之物氣為無形之化有形不能速生而無形實能先得況有形之物必從無形中生之氣無形始能生血有形之物補氣正所以補血生氣正所以生血也況血既盡情吐出止存幾希一線之氣若不急為補之一旦氣絕又何以生血而補血哉經云有形之血不能速生無形之氣所當急固真治血之妙法此又斂之之一法也張公曰真有不可思擬之妙余無以贊一詞矣止語汝頭汗出而斂之法凡人頭頂出汗乃腎火有餘而腎水不足若不知其故而徒用止汗之藥必致目昏而耳痛法當滋其腎而清肺金之化源自易奏功如響方用桑葉一斤熟地二斤北五味三兩麥冬六兩各為末蜜為丸批遏汗湯每日白滾水送下五錢或一兩一月後永不出汗矣更有人每飯之時頭汗如雨落者此又胃火勝而非腎火余也法當用元參一斤麥冬一斤天冬一斤生地一斤北五味四兩酸棗仁半斤各為末蜜為丸批斂汗湯每日白滾水送下一兩二月必愈似乎胃火勝宜用竹葉石膏湯而余偏不用者何也蓋胃火之勝者微勝耳非若熾盛而火炎奔騰而熱發不過因飲食之味入於胃中逐覺津津汗出飲食完而汗隨止然則以元參一味解之有餘矣況又用天麥二冬以清肺火生地以涼血酸棗仁以平心火五味子以收汗而滋液則胃經有火之盛亦已消磨況原未十分之盛乎此斂法之一也手中之汗細小病也不必入於此中以藥水洗之即愈俟後可入處予當言之華君曰亦未傳升治法論陽虛下陷陰虛下陷天師曰升治者乃氣虛下陷不能升而升之者也凡人因飢飽勞役內傷正氣以致氣乃下行脾胃不能克化飲食不能運動往往變成癆瘵若疑飲食不進為是脾胃之火或疑肉黍所傷謂是水穀之積輕則砂仁枳殼山楂麥芽之類重則大黃芒硝牽牛巴豆之品紛然雜進必致臌悶不已倘先以升提之藥治之何成此等病症哉方用人參一錢黃耆三錢柴胡一錢升麻三分當歸三錢陳皮一錢甘草一錢白朮三錢治之此方即補中益湯余為之增定其輕重以為萬世不刪之定則東垣一生學問全在此方凡人右手寸脈大於左手寸口之脈無論其左右關脈與左右腎脈之大與小沉與浮即以此方投之無不神效蓋右寸之脈大於左寸口即內傷之症也此方實為對病妙在用柴胡升麻二味雜於參耆歸術之中以升提其至陽之氣不使其下陷於陰分之間尤妙加甘草陳皮於補中解紛則補者不至呆補而升者不至偏墮所以下口安然奏功如響耳或疑參耆太多不妨略減則可倘以為補藥不可驟竟去參耆則柴麻無力譬如繩索細小欲升千斤重物於百丈之上難矣或用參而不用耆或用耆而不用參則功必減半然猶勝於盡去之也倘以升柴提氣或疑清氣不升反又濁陰之騰上者此必左手寸口之脈大於右手寸口始可借言苟或不然殺人無算必是此人創說也余最惡此等似是而非為吾道之鄉愿吾子盡闢之也張公曰講補中益氣湯從無有如此痛快者東垣何幸得如此之褒揚哉余何言乎惟是陽虛而下陷者宜如是升提陰虛而下陷者又當何法以升提之乎天師不言予當增入譬如人陰虛脾泄歲久不止或食而不能化或化而溏泄是也方用熟地五錢山茱萸五錢北五味一錢白朮一兩山藥三錢車前子一錢肉桂一錢茯苓三錢升麻三分水煎服批升陰湯此方之妙不意張公見及雷公曰張公之方妙甚真補天手也此方之妙純是補陰之藥惟加升麻三分以提陰中之氣陰氣升而瀉自止乃又有溫熱之味以暖命門而健脾土又何至再行溏泄哉天師乃升陽氣之論而余乃補升陰氣之湯也有此二方可與乾坤不老華君曰亦未傳墮治法論腹痛三症天師曰墮治者不能下降用藥以墮之也如腹中痛手按痛甚或胸中傷食手不可按者皆宜墮之也方用白朮二錢枳殼三錢白芍三錢甘草一錢山楂二十粒麥芽三錢厚朴一錢水煎服批速腐湯論理胸中既然傷食但用麥芽厚朴山楂枳殼消之足矣何以又加白朮與白芍蓋傷食而食不能化所以結在心胸以致作痛若徒消食而不健脾胃之氣則土虧而物難速腐故必用白朮以健其胃口之氣以生其脾內之陰則土氣有餘何難消食然而心胸飽悶則肝經乘我之困來侵脾胃之土又加白芍以平肝木則木弱而脾胃之土自安自可順還以化糟粕矣此墮治之妙法也至於邪氣挾食存於大腸大腸之內火氣炎蒸夾食作祟故痛而不可手按是食已離脾胃可攻之直下方用大黃三錢芒硝一錢厚朴一錢柴胡一錢黃芩一錢甘草一錢治之此即大承氣湯也此方之妙全在用大黃芒硝二味蓋大黃性涼而散又善走而不守芒硝性更緊於大黃但其味實熱佐之黃芩則相濟有功尤妙仍用柴胡以舒其肝經之邪氣又佐以厚朴之祛蕩若邪甚者或再加枳實尤易成功此墮之又一法也張公曰不可思議之論予何言耶必欲予言又有一症相商有人成痞塊之症一時發作而腹痛亦不可手按者亦可用下墮之法蓋乘其邪動而墮之也方用枳實一兩白朮二兩馬糞炒焦五錢酒煎服蓋馬糞最能安痛又不傷氣且又能逐邪而化物藥箱中最宜先備而不用也蓋倉猝間不可即得此物愈久愈妙不必多用至五錢即一二錢用之無不奇妙今況用之五錢乎況又與枳實同用則積塊自消然而徒消其積未免恐傷脾陰又佐以白朮二兩大健其脾氣則馬糞與枳實可以施其祛蕩之功此又墮治之妙法也華君曰亦未傳雷公曰我尚有墮治之方如人腹痛手不可按方用枳實一錢大黃二錢生甘草一錢白芍五錢乳香末一錢水煎服此方之妙用攻於和解之中不十分攻邪而邪自退舍此墮治之最善者也批天師云此方妙極可師之開治法論關隔論屍厥天師曰開治者氣閉不開而開之也如關隔之症是也或如屍厥氣閉是也關隔者乃上焦有關一層關住而飲食不能下下焦有關一層關住而下不能出此乃氣之鬱塞一時偶得上吐下瀉不能盡命而死矣此等症五臟六腑原未嘗有損偶然觸怒肝氣衝於胃口之間腎氣不得上行肺氣不得下達以成此症若言胃病而胃實未病若言脾病而脾實無病也法當以開鬱為主方用柴胡一錢鬱金一錢白芍三錢茯苓一錢白芥子一錢天花粉一錢蘇子一錢荊芥一錢甘草五分水煎服批和解至聖丹此方妙在平常而有至理蓋肝氣之郁必用柴芍以舒之然過多則必阻而不納方中以此二味為君而佐以鬱金之寒散芥子之祛痰天花粉之散結甘草之和中茯苓之去濕氣味平和委婉易入不爭不戰相愛相親自能到門而款關不致扣關而堅壁也至於屍厥閉氣此中邪氣閉必須用藥以開之開之奈何不用瓜蒂以探吐即用皂角以取噴也方用瓜蒂七個水二碗煎湯一碗加鹽少許灌之即大吐濃痰數碗而愈或用皂角刺研為細末取鵝翎管盛藥末吹入疾人鼻中得打噴嚏口吐濃痰如黃物者即愈蓋厥症多系熱邪然熱邪必然叫號今黯然無語宛似死人明系陰虛之人忽中陰邪不可以治陽厥之法治之多至不救不若先以瓜蒂皂角取吐以去其痰涎人自出聲而後以人參五錢白薇一錢茯苓三錢白朮五錢半夏二錢治之自安批開閉至聖丹此開治之一法也張公曰論奇而方妙中風之症亦可用瓜蒂散皂角湯以開之然必須用人參一兩半夏三錢南星三錢附子一錢以繼之也否則徒用瓜蒂皂角徒取一時之開關而終不能留中氣之堅固雖開關何益哉華君曰尚有二法未傳一陰陽湯也法用滾水涼水各一碗均之加炒鹽一撮打百餘下起泡飲之凡有上焦欲吐而不能吐者飲之立吐而愈一噴嚏之法未授也用生半夏三錢為末水丸如黃豆大入鼻孔中則必噴嚏不已用水飲之立止通治中風不語屍厥等症中惡中鬼俱妙皆開治之法也關格症上不得入下不得出病在上下二焦而根實本於中焦喻嘉言以黃連湯進退法兼朝服八味丸治之甚善附記於末以俟臨症者之自擇方法詳醫門法律關格條茲不贅李子永識閉治法論交感脫精論夢遺脫精天師曰閉治者乃虛極下脫關門不閉而閉之也如人交感樂極男女脫精而死者或夢遺精滑不守者是也男女走精而亡亦因氣虛不能自禁一時男貪女愛盡情縱欲以致虛火沸騰下元盡失先泄者陰精後泄者純血血盡繼之以氣而已當此之時切不可離爐仍然抱住男脫則女以口哺送其熱氣女脫則男以口哺送其熱氣一連數口呵之則必悠悠忽忽陽氣重回陰精不盡全流出倘一出王爐則彼此不相交接必立時身死然苟能以獨參湯數兩急煎之內可加附子一錢乘熱灌之亦有已死重生者蓋脫症乃一時暴亡陽氣未絕止陰精脫絕耳故急補其真陽則陽能生陰可以回絕續於無何有之鄉方中人參純是補氣之劑附子乃追亡逐失之妙藥相濟易於成功倘無參而徒用附子則陽旺而陰愈消故必用人參以為君既用參矣而珍惜不肯多加終亦無效蓋陰精盡泄一身之中已為空殼若不多加人參何以生津以長其再造之陰哉故必多加參而後收功耳問用陰藥以引陽可否天師曰似是而非此喻嘉言之臆說耳蓋陰精盡出用補陰之味內無根源何從補入故必補陽以生陰而不可補陰以引陽也論理陰精脫盡宜用澀精之藥以閉之殊不知內已無陰何從閉澀獨用人參補氣氣足而陰自生陰生而關自閉此不閉之閉正妙於閉也至於夢遺脫精又不可執此法以治之夢遺之病多成於讀書飄蕩之子或見色而思或已泄而戰或用心作文以取快於一時或夜臥不安而漁色遂至風情大勝心氣不寧操守全無玉關不閉往往少年坐困老大徒傷為可嘆也今立一方熟地八兩山茱萸四兩山藥八兩北五味三兩麥冬三兩炒棗仁四兩遠志一兩車前子三兩茯苓三兩芡實半斤白朮八兩各為末蜜為丸每日白滾水送下一兩一料全愈不再發比方妙在用芡實山藥為君而以熟地山茱之類為佐直補其心腎之陰而又以白朮利其腰臍而元精自不外泄況夢遺原無止法愈止而愈泄不若補其陰氣縱或走泄亦不狼狽何必補澀而後不走失乎然則不閉之閉正深於閉又何必牡蠣金櫻子之為得哉車前利小便而不走氣利其水則必存其精又不可不知其功也張公曰前後俱妙男女脫精以口送氣固佳然而不知其法以冷氣送之亦是徒然必須閉口先提關元之氣盡力哺其口中而後送下喉可救於垂絕之頃否則適所以害之也但不可遽然離爐即欲離爐亦須緩緩取出不可見其死去驚走下床也離爐抱住其身尚不至死此等症富貴人多而貧賤人少富貴人自宜獨參三兩或四兩或半斤或一斤愈妙煎湯灌之可以重蘇若貧窮之士荊布之婦亦得此病急用黃耆四兩當歸二兩附子二錢水五碗煎一碗急灌之亦有生者又不可不知即死在床褥之內亦可以藥灌之而生大約夜死者日救之則活日死者夜救之則亡夢遺之症余尚有一方至妙可佐天師之不言有人夢遺日日而遺者有不須夢而遺者俱效方用芡實八兩山藥十兩生棗仁十兩蓮子心五錢將蓮子劈開肉不用單用其綠芽焙乾為末前藥俱為末米湯打粉為丸如桐子大每日早晚用白滾水送下各五錢此方平淡之中有至理存焉蓋心一動而精即遺此乃心虛之故而玉門不閉也方中山藥補腎而生精芡實生心而去濕生棗仁清心而益心包之火蓮肉心尤能清心而氣下通於腎使心腎相交關玉門之聖藥誰知蓮肉之妙全在心總由世醫之不讀書耳果然此段文乃載在大乘蓮花經內醫道所以須通竺典生棗仁正安其不睡始能不泄妙在與山藥同用又能睡而不泄華君曰同雷公曰我亦有夢遺方最妙方用白朮八兩山藥八兩人參二兩生棗仁四兩遠志一兩麥冬四兩芡實四兩炒北五味一兩車前一兩各為末蜜為丸每日白滾水送下五錢自愈此亦補心腎之法孫真君曰遇交感脫精急以人參三兩煎湯灌之固是奇妙方法然貧家何以救之我有法用人抱起坐之以人之口氣哺其口又恐不能入喉以筆管通其兩頭入病人喉內使女子呵之不必皆妻妾也凡婦人皆可盡力呵之雖死去者亦能生妙法也吾今日泄天地之奇批孫君泄盡天地之秘矣吐治法論痰塊壅塞天師曰吐治者病在胃口之間不能下則必上越而吐之如人上焦壅滯痰塊不上不下塞在胸間氣喘欲嘔不能欲吐不肯者是也法當用陰陽水探吐之或用瓜蒂藜蘆煎汁飲之即吐然必痰氣與火結在胸間作痛者始可用此法吐之否則斷斷不可蓋人之元氣不可一傷吐一次則五臟反覆必損壽元故必問其人胸痛否氣塞否喉間有所礙否痰吐出黃否有此數種始可用前藥以吐之苟或不盡然即病人自家欲吐亦須慎之況行醫者乎此吐治之一法在人裁度而用之耳張公曰吐不可輕用不知禁忌而妄吐之必致五臟反覆不寧天師之叮嚀告誡真仁人之言也汝當敬聽我更有一法教人宜吐之症必須看其痰吐在壁上有光亮者放心吐之余則皆忌光亮者如蝸牛之涎一樣光亮也但看見光亮者無論其痰在上中下此光亮之色必須俟其痰跡干而分辨之不可據其濕痰時而即以為光亮也華君曰同泄治法天師曰泄治者汗之也邪居於腠理之間不肯自出必用汗藥以疏泄之方用荊芥一錢桔梗一錢防風一錢甘草一錢蘇葉一錢白朮五錢茯苓三錢陳皮五分水煎服此方妙在用白朮為君而以表汗為佐使蓋人之脾氣健而皮毛腠理始得開合自如今用白朮以健土去濕而利腰臍邪已難於久住況有防風荊芥蘇葉之品盡散外邪何敢再居營衛又有甘草從中調治則邪不必攻而自散矣此泄治之佳者張公曰予方泄治最多無如此方之妙我方一味主散天師方妙在健脾而散邪也此方倘治冬月之泄汗或加入桂枝五分乎或加入麻黃五分乎亦在人斟酌之耳華君曰同泄治方用白朮與蘇合丸用白朮同意其法甚妙李子永識
