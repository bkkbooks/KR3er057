body:
  text: 卷四御集富治法論治膏粱宜補正氣天師曰富治者治膏粱富貴之人也身披重裘口食肥甘其腠理必疏脾胃必弱一旦感中邪氣自當補正為先不可以祛邪為急若惟知推蕩外邪而不識急補正氣必至變生不測每至喪亡不可不慎也方用人參三錢白朮三錢甘草一錢陳皮五分茯苓三錢半夏五分為君主之藥倘有風邪加入桂枝一錢或柴胡一錢傷暑加入香薷一錢傷濕加入豬苓二錢傷熱加入黃連一錢傷燥加入蘇子一錢麥冬五錢傷氣加入白芍五錢傷寒加入肉桂一錢水煎服此方之妙妙在健脾順氣正補而邪自退況又逐經各有加減妙法使膏粱之子永無屈死矣此富貴之善治也張公曰富貴治法已備極細微不必再行加減貧治法論貧賤不可與富貴同治天師曰貧治者藜藿之民單寒之子不可與富貴同為治法故更立一門蓋貧賤之人其筋骨過勞腠理必密所食者粗糲無燔熬烹炙之味入於腸胃則胃氣健剛可知若亦以富貴治法治之未必相宜也方用白朮二錢茯苓三錢白芍三錢甘草一錢半夏一錢陳皮五分厚朴五分共七味為主有風者加桂枝一錢或柴胡一錢有火者加黃連一錢或梔子一錢有濕者加豬苓二錢有燥者加麥冬五錢蘇葉一錢有寒者加肉桂一錢有暑者加香薷一錢有熱者加石膏一錢傷米食者加麥芽二錢傷肉食者加山楂二十粒傷麵食者加蘿蔔子一錢以此方加減無不神效此貧賤治法實有圓機賴世醫審之張公曰貧賤治亦同實無可傳非好隱也産前治法論子懸論漏胎論治動論橫生倒養附胎産金丹回生丹天師曰産前之症俱照各門治之惟有子懸之症最難治其次漏胎又其次是胎動更難可畏者是橫生倒養不可不急講也子懸之症乃胎熱而子不安身欲起立於胞中故若懸起之象其實非子能懸掛也若作氣盛下之立死矣方用人參二錢白朮五錢茯苓二錢白勺五錢黃芩三錢杜仲一錢熟地一兩生地三錢歸身二錢水煎服此方純是利腰臍之聖藥少加黃芩清之則胎得寒子自定沉方中滋補有餘而寒涼不足定變扶危中藏深意蓋胎繫於腰腎之間而胞又結於任沖之際今藥皆直入於內經之中則深根固蒂子即欲動而不能況又用清子之藥有不泰然於下者乎其次漏胎乃氣血不足之故急宜以峻補之則胎不漏方用人參二錢白朮五錢杜仲一錢枸杞子一錢山藥二錢當歸身一錢茯苓二錢熟地五錢麥冬二錢北五味五分山茱萸二錢甘草一錢水煎服此方不寒不熱安胎之聖藥也凡有胎不安者此方安之神效胎之動也由於男女之顛狂今補其氣血自然鎮定又何至漏胎哉胎動即漏胎之兆亦以此方治之無不神效難産如橫生倒養此死亡頃刻也若無急救之法何以成醫之聖然而胎之不順由於血氣之虧血氣既虧子亦無力往往不能轉頭遂至先以手出或先腳下矣倘手足先出急以針刺兒手足則必驚而縮入急用人參一兩當歸三兩川芎二兩紅花三錢速灌之批轉頭丹少頃則兒頭直而至門矣倘久之不順再將前藥服之不可止也若兒頭既已到門久而不下此交骨不開之故速用柞木枝一兩當歸二兩川芎一兩人參一兩煎湯服之批奪門丹少頃必然一聲響亮兒即生矣真至神至奇之方也倘兒頭不下萬萬不可用柞木枝蓋此味專開交骨兒未回頭而兒門先開亦死之道故必須兒頭到門而後可用此方也此産前之法必當熟悉於胸中而後臨産不致倉皇張公曰産前無白帶也有則難産之兆即幸而順生産後亦有血暈之事方用黑豆三合煎湯三碗先用一碗入白果十個紅棗二十個熟地一兩山茱萸四錢茯苓三錢澤瀉二錢丹皮二錢山藥四錢薏仁四錢加水二碗煎服批束帶湯一劑止二劑永不白帶亦通治婦人之諸帶無不神效小産之症非産前也然非正産之症亦可作産前治如人不正産而先産者名曰小産雖無大産之虛而氣血亦大傷矣宜急補之則日後坐胎不至再有崩漏用人參五錢白朮五錢茯苓三錢熟地一兩當歸五錢杜仲二錢炮姜五分水煎服批全帶湯此方乃補氣補血之聖方胞動而下必損帶脈補其氣血則帶脈損處可以重生他日受孕不致有再損之虞也華君曰治法與余同然尚有二方未傳一漏胎也一胎動也胎動方白朮一兩熟地一兩水煎服此方妙在用白朮以利腰臍用熟地以固根本藥品少而功用專所以取效神也此方可以救貧乏之人天師留以待豫傳世立功甚矣天師之恩德大也方名黑白安胎散漏胎方亦奇絶用白朮五錢熟地一兩三七根末三錢水煎服此方妙在三七根末乃止血神品故用之奏效如響此方更勝安胎之藥方名止漏絶神丹雷公真君曰難産婦人之常生子而反致死母仁人所痛心也但難産非兒之橫逆實母之氣衰以致兒身不能回轉於是手先出而足先墮矣一見此等生法絶勿驚惶我有至神之法口中念無上至聖化生佛百遍兒之手足即便縮入急用人參一兩附子一錢當歸一兩川芎五錢黃耆一兩煎湯飲之兒身即順立刻産下蓋參耆補氣歸芎補血氣血既足兒易舒展何必服催生之丸哉倘不補氣血而用催生墮胎之藥必致轉利轉虛不殺母必殺子矣胎動是熱不動是寒熱用黃芩寒用砂仁寒熱相兼並用砂仁黃芩世不察寒熱專以黃芩砂仁為安胎聖藥亦謬矣橫生倒産獨參湯最妙世醫不知也至有胎衣不下者令常服參湯或加入砂仁數分服二三日其衣自下李子永識附胎産金丹此丹專治婦人胎前産後調經種子保孕安胎及一切虛損等症應驗如神方用當歸二兩酒洗白茯苓二兩人孔制人參二兩白朮二兩土炒生地四兩酒洗煮白薇二兩洗淨人乳拌桂心一兩二錢延胡索二兩酒拌煮乾透蘄艾二兩醋煮川藁本二兩水洗淨粉甘草一兩二錢酒炒赤石脂二兩煅水飛川芎二兩丹皮二兩水洗曬乾沉香六錢沒藥一兩二錢去油鱉甲四兩醋炙北五味子一兩益母草二兩取上半截童便煮香附子四兩童便醋人乳鹽水米泔水制如內熱加青蒿二兩以上諸藥共合一處惟人參沉香二樣另研生地酒煮灑干其汁拌諸藥同再用紫河車一具盛竹籃內放於長流水浸半日洗淨用黃柏四兩入鉛球內將黃柏與河車下用白酒二斤外加清水一碗灌滿鉛球仍以鉛球封口訖外以砂鍋盛水將鉛球懸於鍋中下以煤火煮兩日兩夜為度取出河車黃柏共汁俱搗入群藥內拌勻曬乾磨面煉蜜為丸每丸重三錢五分外以飛過硃砂為衣再以蠟丸收貯如臨産米湯化服一丸血崩好酒童便化服一丸血暈當歸川芎湯化服一丸胞衣不下乾薑炒黑煎湯化服一丸即下或小産無論已下未下白滾湯化服一丸即下以上諸症照方調服無不神效回生丹亦專治婦人胎前産後功效如前方用錦紋大黃一斤為末蘇木三兩打碎河水五碗煎汁三碗聽用大黑豆三升水浸取殼用絹袋盛殼同豆煮熟去豆不用將殼曬乾其汁留用紅花三兩炒黃色入好酒四碗煎三五滾去渣存汁聽用米醋九斤陳者佳將大黃末一斤入淨鍋下米醋三斤文火熬之以長木箸不住手攪之成膏再加醋三斤熬之又成又加醋三斤次第加畢然後下黑豆汁三碗再熬次下蘇木汁次下紅花汁熬成大黃膏取入瓦盆盛之大黃鍋粑亦剷下入後藥同磨人參二兩當歸一兩酒洗川芎一兩酒洗香附一兩醋炒延胡索一兩醋炒蒼朮一兩米泔浸炒蒲黃一兩隔紙炒茯苓一兩乳制桃仁一兩去皮尖油川牛膝五錢酒洗甘草五錢炙地榆五錢酒洗川羌活五錢廣橘紅五錢白芍藥五錢酒洗木瓜三錢青皮三錢去瓤炒白朮三錢米泔浸炒烏藥二兩半去皮良薑四錢木香四錢乳香二錢沒藥二錢益母草二兩馬鞭草五錢秋葵子二錢懷熟地一兩酒蒸如法制就三稜五錢醋浸透紙裹煨五靈脂五錢醋煮化焙乾研細山茱萸肉五錢酒浸蒸搗爛入藥曬以上三十味並前黑豆殼共曬乾為末入石臼內下大黃膏拌勻再下煉熟蜜一斤共搗千杵取起為丸每丸重二錢七八分靜空陰乾須二十餘日不可日曬不可火烘干後止重工錢有零熔蠟護之用時去蠟殼調服如臨産用參湯調服一丸則分娩全不費力如無參用淡淡炒鹽湯服或橫生逆生兒枕同治亦有因氣血虛損難産者宜多用人參或子死腹中因産母染熱病所致用車前子一錢煎湯調服一丸或二丸至三丸無不下者若因血下太早子死用人參車前子各一錢煎湯服如無參用陳酒少許煎車前湯服或胎衣不下用炒鹽少許泡湯調服一丸或二三丸即下或産畢血暈用薄荷湯調服一丸即醒以上乃臨産緊要關頭一時即有名醫措手不及起死回生此丹必須預備胎前常服此丹壯氣養胎滋陰順産調和臟腑平理陰陽更為神妙室女經閉月水不調衆疾並效以上二方非敢以後人鄙意妄與先聖同傳第以屢試屢驗弗忍自私特公諸天下苟敬謹珍重必獲奇效倘修合之粗疏或用引之訛謬以致藥症不合疑悔交生而曰藥之咎也藥不受也願臨事者慎之産後治法論産後宜補附胎産金丹回生丹天師曰産後之病不可枚舉終以補氣補血為主余未嘗不可定方而概治之也産後往往血暈頭痛身熱腹疼或手足逆而轉筋或心脅滿而吐嘔風邪入而變為陰寒或涼氣浸而直為厥逆皆死亡定於旦夕而危急亂於須臾也此時若作外症治之藥下喉即死可不慎歟方用人參五錢白朮五錢熟地一兩當歸二兩川芎一兩荊芥末炒黑二錢此方為主有風感之加柴胡六分有寒入之加附子一錢肉桂一錢其餘諸症俱不可亂加以此方服之無不神效但可或減分兩而不可去取藥味蓋産婦一身之血盡行崩下皮毛腠理如紙之薄邪原易入然亦易出也故以大劑補正之中略加祛邪之藥少黏氣味邪則走出於軀殼之外烏可照平常無病之人慮其邪之難散而重用逐邪之方也方中妙在純是補氣補血之品全不顧邪盡於輔正正氣既多邪氣自遁況方中原有荊芥之妙劑不特引氣血各歸經絡亦能引邪氣各出皮毛此方之所以奇而妙妙而神也惟有兒枕作痛手按之少痛者加入山植十粒桃仁五個可也一劑即去之余藥萬不可輕用增入也問熟地三日內可服否一曰何嘗不可服也張公曰産後方最定得妙無可再傳方也華君曰與豫異並傳子如産後諸症以補氣血為主方用人參三錢當歸一兩川芎五錢荊芥炒黑一錢益母草一錢水煎服批氣血兼補湯有風加柴胡五分有寒加肉桂一錢血不淨加山楂十粒血暈加炒黑薑片五分鼻中衄血加麥冬二錢夜熱加地骨皮五分有食加山楂五粒穀芽一錢有痰少加白芥子五分余斷斷不可輕入此方純補氣血而不治表所以為妙豫親治産後無不神效不知天師何故不傳此方而另傳方與遠公想因氣數之薄而此方尚缺力量也然亦可並傳千古云附胎産金丹治産後諸症凡産後好酒童便化服一丸諸病不生産後經風防風湯化服一丸兒枕疼者山楂沙糖湯化服一丸虛怯者川芎當歸湯每日服一丸十日痊愈無子者行經後川芎當歸湯服一丸即能受孕以上諸症照方調服能保命護身回生起死其功不能盡述回生丹治産後諸症凡産後三日血氣未定還走五臟奔充於肝血暈起止不得眼見黑花以滾水調服即愈或産後七日血氣未定因食物與血結聚胸中口乾心悶煩渴滾湯下或産後虛羸血入於心肺熱入於脾胃寒熱似瘧實非瘧也滾湯下或産後敗血走注五臟轉滿四肢停留化為浮腫渴而四肢覺寒乃血腫非水腫也服此即愈或産後敗血熱極中心煩躁言語顛狂非風邪也滾水下或産後敗血流入心孔閉塞失音用甘菊花三分桔梗二分煎湯調服或産未滿月誤食酸寒堅硬之物與血相搏流入大腸不得克化泄痢膿血用山楂煎湯調服或生産時百節開張血入經絡停留日久虛脹痠疼非濕症也用蘇梗三分煎湯調服或産後月中飲食不得應時兼致怒氣余血流入小腸閉卻水道小便澀結溺血似雞肝用木通四分煎湯調服又或流入大腸閉卻肛門大便澀難有瘀而成塊如雞肝者用廣皮三分煎湯調服或産後惡露未淨飲食寒熱不得調和以致崩漏形如肝色潮濕煩悶背膊拘急用白朮三分廣皮二分煎湯調服或産後血停於脾胃脹滿嘔吐非翻胃也用陳皮煎湯服或産後敗血入五臟六腑並走肌膚四肢面黃口乾鼻中流血遍身斑點危症也陳酒化服或産後小便澀大便閉乍寒乍熱如醉如癡滾水調服以上諸症皆産後敗血為害也故此丹最有奇功至産後一切異症醫所不識人所未經但服此丹無不立安一丸未應二丸三丸必效無疑慎之重之老治法論老人宜補腎天師曰老人之氣血既衰不可仍照年少人治法故食多則飽悶食少則困餒食寒則腹痛食熱則腸燥此老人最難調治而醫之用藥不可不知其方也丸方莫妙用六味丸加麥冬三兩北五味子一兩與之常服則腸無燥結之苦胃有能食之歡此方之妙竟可由六十服至百年終歲不斷常服蓋老人氣血之虛盡由於腎水之涸六味丸妙在極補腎水又能健脾胃之氣去腎中之邪火而生腎中之真陽所以老人最宜也然而老人最不肯節飲食又將何以治之余今新定一方可以統治傷食多痰之症方用人參五分茯苓一錢白芥子一錢麥冬三錢薏仁五錢山藥二錢陳皮三分麥芽五分山楂三粒神麯三分蘿蔔子三分甘草五分水煎服有火者加元參二錢有寒者加肉桂五分有痰者加半夏五分有食者加山楂麥芽有濕者加澤瀉一錢有暑者加香薷五分有燥者加麥冬五錢蘇葉五分不眠者加棗仁一錢脅痛者加白芍三錢心痛者加梔子一錢咳嗽者加枯梗一錢腰痠者加熟地五錢杜仲五錢足無力者加牛膝一錢余可不必再加老人之方如此可悟也張公曰老治之法最平穩而妥當不必再立方也華君曰無更有一方治老人不寐最妙用六味地黃丸一料加麥冬四兩炒棗仁五兩黃連三錢肉桂五錢當歸三兩白芍五兩甘菊花三兩要家園自種者白芥子二兩為末蜜為丸每日白滾水送下五錢服後用飯此方老人可服至百歲少治法論少年人宜治脾胃天師曰少年人血氣方剛不可動用補血必看其強弱如何而後因病下藥自然無差方用厚朴一錢茯苓三錢陳皮一錢甘草一錢半夏一錢砂仁三粒車前子一錢此方為主而逐症加減自易奏功畏寒者傷寒也加桂枝一錢畏風者傷風也加柴胡一錢畏食者傷食也加麥芽三錢山楂三十粒傷酒者加乾葛一錢畏濕者傷濕也加茯苓澤瀉各一錢惡熱者傷熱也加石膏一錢畏暑者傷暑也加香薷一錢痰多者加半夏一錢天花粉一錢余可照症加之此治少年之方法亦非無意蓋管其脾胃則諸藥雖加而不傷胃氣故易奏功人不可易視之也張公曰少治法亦妥妙不必再為加減東南治法論補中益氣湯天師曰東南治者東方之人與南方之人同治也東南俱系嚮明之地腠理疏泄氣虛者多且天分甚薄不比西北之人剛徑若照西北人治法治之立見危殆矣人用人參一錢白朮二錢當歸一錢五分黃耆三錢紫胡一錢升麻五分陳皮五分甘草一錢此補中益氣湯也以此方出入加減無有不妙加減法照老少貧富治法用之張公曰東南治法以補中益氣湯加減俱得其妙不必再言西北治法天師曰西北人賦質既堅體亦甚壯冷水冷飯不時常用始覺快然一用熱劑便覺口鼻雙目火出故治法與東南人迥別方用黃連五分黃芩一錢梔子一錢陳皮一錢枳殼一錢厚朴一錢甘草一錢麥芽二錢水煎服有食加山楂三十粒傷食加大黃一錢有痰加天花粉三錢傷風加柴胡二錢傷暑加香薷三錢傷熱加石膏五錢怒氣傷肝加白芍五錢余俱照病加減可也此治西北人又如此因其強而多用消導之品也張公曰西北治法尚可斟酌倘健者可加大黃一錢華君曰無皮毛治法論疥瘡論黃水瘡論痱瘡論紫白癜風天師曰皮毛治法者感輕之症病未深入營衛故從皮毛上治之也如病疥瘡黃水瘡痱瘡是也此等症不必用湯藥疥瘡用輕粉一錢油胡桃末三錢不可去油豬板油三錢白薇末二錢防風末一錢蘇葉末一錢搗成丸如彈子大擦瘡處一日即愈黃水瘡凡毒水流入何處即生大水泡瘡即為黃水瘡手少動之即破此熱毒鬱於皮毛也當以湯洗之即愈方用雄黃五錢防風五錢二味用水十碗煎數沸去渣取汁洗瘡上即愈痱瘡以暑氣傷熱而生也有雪水洗之更佳隨洗隨滅如不能得有一方最妙用黃瓜切成片擦之即愈此皆從皮毛治之也張公曰凡人生白癜風與紫癜風者乃暑熱之時人不知而用日曬之手巾擦其身中之汗便成此病最無害而最難愈方用蒼耳子一兩防風三錢黃耆三兩備為末水打成丸米湯每日早晨送下三錢一料服完必愈神方也紫白癜俱效肌膚治法論膿窠瘡粉刺論頑癬論凍瘡論坐板瘡天師曰肌膚者雖同是皮毛而各有治法肌膚之病從腠理而出較皮毛略深如人生膿窠瘡粉刺頑癬之類是也然皆氣血不和故蟲得而生焉活其氣血則病自愈膿窠瘡用當歸三錢生地三錢熟地三錢白芍三錢麥冬三錢天門冬三錢川芎一錢茯苓三錢甘草一錢柴胡一錢人參一錢白朮三錢黃耆五錢荊芥一錢薏仁五錢水煎服此方妙在補氣補血之藥而略用柴胡荊芥以發之先服四劑必然瘡口盡加臌脹作膿四劑後去柴胡加五味子五粒又服四劑則滿身之瘡如掃而愈矣粉刺之症乃肺熱而風吹之多成此刺雖無關人病然書生嬌女各生此病亦缺豐致我留一方為之添容未為不可方用輕粉一錢黃芩一錢白芷一錢白附子一錢防風一錢各為細末蜜調為丸於每日洗面之時多擦數遍臨睡之時又重洗面而擦之不須三日自然消痕滅瘢矣惟有頑癬之方最難治理然一經我治亦易收功方用楝樹皮一兩白薇一兩輕粉三錢冰片一錢生甘草一錢蝸牛三錢火焙乾有殼亦可用杜大黃根一兩各為細末先以荔枝殼扒碎其癬皮而後以此藥末用麻油調搽之三日即結靨而愈此皆治肌膚之法可以為式張公曰凍瘡乃人不能耐寒而肌膚凍死忽遇火氣乃成凍瘡耳耳上凍瘡必人用手去溫之反成瘡也方用黃犬屎露天久者變成白色用炭火煅過為末再用石灰敷陳年者炒各等分以麻油調之敷上雖成瘡而爛敷上即止痛生肌神方也若耳上面上雖凍而不成瘡者不必用此藥止消荊芥煎湯洗之三日愈坐板瘡亦是肌膚之病止消輕粉一錢蘿蔔子種三錢冰片半分杏仁去皮尖十四粒研為末以手擦之瘡口上一日即愈神效奇絶無以過也筋脈治法論筋病論脈病天師曰筋脈者一身之筋通體之脈不可有病病則筋縮而身痛脈澀而體重矣然筋之舒在於血和而脈之平在於氣足故治筋必須治血而治脈必須補氣人若筋急蜷縮傴僂而不能立俯仰而不能直者皆筋病也方用當歸一兩白芍五錢薏仁五錢生地五錢元參五錢柴胡一錢水煎服此方之奇在用柴胡一味入於補血藥之中蓋血虧則筋病用補血藥以治筋宜矣何以又用柴胡以舒散之不知筋乃肝之餘肝氣不順筋乃縮急甚而傴僂今用柴胡舒其肝脈之郁鬱氣既除而又濟之以大劑補血之品則筋得其養而寬筋寬則諸症悉愈矣血脈不足之症任督陰陽各蹻經絡不足或毛髮之乾枯髮鬢之凋落或色澤之不潤或相貌之憔悴是也此等之症人以為氣之衰也誰知血之竭乎法當補其血而血不可驟補也須緩緩補之當歸一錢白芍三錢川芎一錢熟地四錢白果五個何首烏三錢桑葉七片水煎服此湯即四物湯妙在用白果以引至唇齒用桑皮以引至皮毛用何首烏以引至髮鬢則色澤自然生華而相貌自然發彩矣此治脈之法人亦宜知張公曰筋脈之治豫尚有二奇方傳世用當歸三錢芍藥一兩熟地二兩柴胡一錢白朮五錢肉桂一錢白芥子一錢水煎服批滋筋舒肝湯此方乃腎肝同治之法筋雖屬肝而滋肝必責之腎今大補其腎又加之舒肝之藥而筋有不快然以養者耶脈治法當歸一兩白芍三錢生地三錢麥冬三錢熟地一兩萬年青三分枸杞子二錢旱蓮草一錢花椒三分天冬三錢水煎服此方藥味俱是補血之品而又上走於面久服自然兩鬢變黑容顏潤澤矣可與天師法並傳也華君曰無方烏須我有絶奇之方世間方甚多皆不能取效於旦夕我之奇方不須十天保汝重為烏黑熟地三兩何首烏三兩用生不用熟用紅不用白用圓不用長黑芝麻一兩炒萬年青二片桑葉二兩山藥三兩白果三十個桔梗三錢各為細末不可經鐵器為丸每日早飯後服一兩十日包須烏黑乃余自立之方治人親驗者也岐天師加花椒一錢此方奇絶華君不畏泄天機耶溫治法論虛勞天師曰溫治者不可用寒涼又不可用辛熱不得已乃用溫補之藥以中治之也如人病虛勞四肢無力飲食少思怔忡驚悸失血之後大汗之後是也此等各症俱不可用偏寒偏熱之藥必須溫乎之品少少與之漸移默奪庶幾奏效倘以偏師出奇必有後患方用熟地五錢白朮五錢茯苓五錢白芥子五分山藥二錢枸杞子一錢當歸一錢棗仁五分麥冬一錢神麯三分芡實三錢水煎服此方去濕之藥居多使健脾利氣生血養精既無偏熱之虞又鮮偏寒之慮中和純正久之可服濕去則脾氣自行血足則精神自長此溫治之所以妙也張公曰溫治法妙豫亦有一方可存熟地五錢山藥一錢茯苓一錢甘草一錢女貞子一錢麥冬三錢白芍三錢當歸二錢菟絲子一錢棗仁一錢遠志八分山藥一錢陳皮三分砂仁一粒覆盆子一錢水煎服此方不涼不熱補腎肝肺脾心之五臟而無偏重之憂可以溫治者幸留意於此方華君曰未傳清治法論脈燥天師曰清治者不可用涼藥又不可用溫補乃改用清平之劑故曰清治此等病必是肺氣之燥肺金之氣一燥即有意外之虞若不急治必變成肺痿肺癰等症蓋燥極成火自宜用涼藥矣此不可涼藥者何肺居上流用涼藥以寒肺或藥不能遽入於肺中勢必趨於脾胃肺之熱未除而胃口反成虛寒之症必致下瀉瀉久而胃口無生氣矣胃既無生氣又何能生肺金而養肺氣哉故不若用清平之味平補胃口而上清肺金之氣之為得也方用元參三錢麥冬五錢桔梗一錢天門冬一錢甘草一錢紫菀一錢款冬花一錢貝母一錢蘇子一錢水煎服批清肺益氣湯此方皆一派清平之品而專入肺金之妙劑也久服胃既不寒而肺金得養又何肺痿肺癰之生哉故人久咳不已即當敬服此方萬勿惑於時師而用偏寒之藥也張公曰清治法方最妙豫不能贊一詞不留方收治法論久嗽久瀉久汗天師曰收治者氣散而收之也如人病久嗽不已久瀉不已久汗不已是也久嗽省人無不為邪之聚也日日用發散之劑而不效者何氣散故耳氣散矣而仍用散藥無怪乎經月而不效也法當用收斂之藥一二劑便見成功方用人參一錢白芍三錢酸棗仁二錢北五味子一錢麥冬五錢蘇子一錢益智仁五分白芥子一錢水煎服批止嗽神丹一劑輕二劑全愈後服六味地黃丸加麥冬三兩北五味子一兩服之不再發否則不能保其不發也蓋久服散藥耗盡真陰雖暫用收斂之藥一時奏功而真陰既虧腠理不密一經風邪最易感入此必須之勢也服地黃丸水足而肺金有養腠理自密又何患重感風邪哉大瀉之後必多亡陰亡陰既多則元陽亦脫若不急為收止則陰絶陽亡可立而待法當用止塞之品或疑邪未盡去如何止住其水萬一邪居中州則腹心之患不可不慮其言則是其理則非吾言大瀉者乃純是下清水非言下利也利無止法豈瀉水亦無止法乎敵人患水瀉者急宜止遏方用白朮五錢茯苓三錢車前子一錢北五味一錢吳茱萸五分酸棗仁一錢水煎服批分水神丹此方止藥少於補藥健脾去濕水性分消不收而自收也若純以粟殼以澀止之而不分消其滔天之勢則阻滯一時勢必潰決反生大害矣大汗之病陽氣盡隨汗而外越若不急為止抑則陽氣立散即時身死法當以大補之劑煎飲一線之氣可留而大汗可止方用人參一兩或黃耆二兩代之當歸一兩北五味一錢桑葉七片急為煎服此方即補血湯之變妙在補氣藥多於補血使氣旺則血自生血生汗可止況方中加五味子以收汗加桑葉以止汗有不相得益彰者乎倘以大汗之人氣必大喘不可以參耆重增其氣純用補血之品未為無見然而血不可驟生氣當急固不顧氣徒補血未見功成此似是而非又不可不急辨之也此收法宜知醫可不細加體認乎張公曰俱論得暢而妙吐瀉無可再言惟久嗽之法吾意即宜以六味地黃湯加麥冬五味治之似宜不必先用人參以救肺氣之害也然而天師用之必有深意他日再敬詢之大汗症多系陽脫有用大劑參附湯者李子永識散治法論散郁天師曰散治者有邪而鬱結胸中以表散之藥散之也如人頭疼身熱傷風咳嗽或心事不爽而鬱氣蘊於中懷或怒氣不舒而怨憤留於脅下倘以補藥溫之則愈甚矣方用柴胡一錢白芍三錢薄荷一錢丹皮一錢當歸二錢半夏一錢白朮一錢枳殼三分甘草一錢水煎服批郁神丹此方純治前症投之一不效應如響即逍遙散變之也開鬱行氣去濕利痰無不兼治散之中有補之法得補益之利受解散之功真藥壺之妙藥刀圭之神劑也散之方無出其右毋輕視之張公曰固然散之法無出其右豫再言其加入之味如頭疼加川芎一錢目痛加疾藜一錢甘菊花一錢鼻塞加蘇葉一錢喉痛加桔梗二錢肩背痛加枳殼二錢兩手痛加桂枝一錢兩脅痛倍加柴胡白芍胸痛加枳殼一錢腹痛手不可按者加大黃二錢腹痛手按之不痛者加肉桂一錢此加減之得宜人亦不可不知之也軟治法論消痞塊天師曰軟治者病有堅徑而不肯輕易散者當用軟治如人生塊於胸中積痞於腹內是也法用藥以軟之心中生塊此氣血堅凝之故法當用補血補氣之中少加軟堅之味則氣血活而堅塊自消倘徒攻其塊而不知溫補之藥則堅終不得消方用人參一錢當歸一錢白芍三錢青鹽一錢熟地五錢山茱萸二錢麥冬三錢北五味一錢柴胡一錢半夏一錢附子一片水煎服批軟堅湯此方妙在純用補藥止加青鹽一味以軟堅若無意于堅者久之而堅自軟柔能制剛之妙法也痞塊之堅又不可以此法治之蓋堅在於腹中若徒攻其堅必致腹中不和而損傷胃氣法當用和解之中軟以治之則堅之性可緩而堅之形可化堅之氣可潰堅之血可消否則有形之物盤踞於中無形之氣必耗於外日除堅而堅終不得去也方用白朮五兩茯苓三兩神麯二兩地粟粉八兩鱉甲一斤醋炙人參五錢甘草一兩白芍三兩半夏一兩白芥子一兩蘿蔔子五錢厚朴五錢肉桂三錢附子一錢各為末蜜為丸每日臨睡送下五錢即以美物壓之批消積化痞至神丹一料未有不全愈者此方有神功妙在用鱉甲為君則無堅不入尤妙用地粟粉佐鱉甲以攻邪又不耗散真氣其餘各品俱是健脾理正之藥則脾健而物自化尤妙用肉桂附子衝鋒突圍而進則鱉甲大軍相繼而入勇不可當又是仁者之師賊雖強橫自不敢抵敵望風披靡散走又有諸軍在後斬殺無遺剿撫並用有不三月告捷者哉此更軟治之妙倘不補正氣惟大黃巴豆兩頭尖阿魏之類直前攻堅雖亦有得勝之時然中州掃蕩田野蕭然終必倉空箱罄人民匱乏之形有數年不能培植者也人烏可徒言攻堅哉張公曰奇論不磨如人身生塊而不消者乃氣虛而痰滯也法當補氣而不可全然消痰痰愈消而氣愈虛矣方用人參一錢白朮五錢薏仁五錢茯苓三錢黃耆五錢防風五分白礬一錢白芍三錢陳皮五分白芥子三錢水煎服批消補兼施湯此方妙在補氣多而祛痰之藥少氣足而痰自難留況又有白芥子無痰不消白礬無堅不入況又有白芍以和肝木不來克脾胃之土而土益能轉其生化之機又得薏仁茯苓以分消其水濕之氣何身塊之不消乎瘰串之塊必須軟治方用柴胡一錢白芍五錢茯苓五錢陳皮五分半夏一錢甘草一錢連翹一錢香附一錢皮硝五分屋上瓦蔥乾者三分生者用一錢水煎服一劑動二劑輕三劑少愈四劑全愈神方也人參弱人加之一錢不可多加堅治法論注夏天師曰堅治者怠惰不振用堅藥以堅其氣或堅其骨也堅氣者如人夏月無陰到三伏之時全無氣力悠悠忽忽惟思睡眠一睡不足再睡再睡不足則懶於語言或夢遺不已或夜熱不休者是也此皆腎水泄於冬天夏月陽勝陰無以敵所以如此必須峻補其腎水水足而骨髓充滿則骨始有力而氣不下陷矣方用熟地一兩山茱萸四錢北五味一錢麥門冬三錢白芍三錢當歸二錢白朮三錢茯苓一錢陳皮一錢生棗仁二錢芡實三錢水煎服方名軟堅湯得此方妙在純是補陰而全無堅治之法然堅之意已寓於中矣蓋骨空則軟補其骨中之髓則骨不堅而堅也此方之妙可以治以上之氣軟骨軟無不全愈終不必再立堅骨之法也此亦有凡小兒十歲以上十歲以下天癸水未至亦有患前症者豈皆冬不藏精之故耶而非然也蓋小兒最不忌口一見瓜果涼熱之物盡意飽啖久則胃氣弱矣再則脾氣壞矣又腎氣寒矣遂至腎水耗去亦如冬不藏精之症方又不可全用前方當以補胃補脾補腎三經為主不可純用補腎一經之味也方用白朮一錢茯苓一錢熟地三錢北五味五分麥冬一錢當歸一錢白芍二錢陳皮三分山楂三粒枳殼二分人參五分水煎服批健脾生水湯一劑立愈不必再服也此方脾肺腎俱為統治而又平肝木肝既得養則心亦泰然此五臟皆用補劑而小兒純陽尤易奏功不若大人之必須多服也夏天小兒最宜服一二劑再無注夏之病此又堅治之一法留心兒科者幸察之張公曰堅治法妙華君曰君多小兒症治抑治法論肺火心火胃火肝火腎水天師曰抑治者抑之使不旺也或瀉其肺中之火或遏其心中之焰或止其胃中之氣或平其肝木之盛是也此四經最多火而最難治肺經之火散之則火愈甚抑之反勝於散之矣蓋肺經之氣實則成頑金頑金非火不煉然而肺乃嬌臟終不可以煉法治之故用抑之之法方用山豆根一錢百部一錢青黛一錢黃芩一錢天花粉二錢桑白皮一錢水煎服批養肺湯此方專抑肺金之氣而又不傷氣則肺金有養自然安寧倘全以寒涼之藥降之則又不可蓋肺乃嬌臟可輕治而不可重施以輕清下降之味少抑其火則胃氣不升心火少斂肺經煅煉必成完器又何必用大散之藥哉心中之焰非黃連不可遏徒用黃連而不如瀉木之品則火雖暫瀉而又旺方用黃連一錢柴胡一錢白芍三錢菖蒲一錢半夏一錢治之此方用瀉肝之藥多於瀉心母衰則子自弱必然之理設不用瀉木之藥而純用瀉心之黃連則黃連性燥轉動心火此所以心肝必須同治也胃中之氣有餘必且久變為熱人以為我能食冷乃氣之有餘也我能消食乃脾之健旺也我能不畏天寒此腎之有餘也誰知胃氣之有餘本之腎水之不足一遇風寒襲之夏暑犯之非變為消渴之症必成為痿廢之人必須平日用大劑六味地黃丸吞服自然氣餒而火息胃平而熱除也無知世人不信自號曰強不肯多服又託言我不能吞丸藥下咽則吐不聽仁人之語因循不服及至火病則日快與我用竹葉石膏湯晚矣吾今立一方為湯藥省其不可吞服丸藥方用元參三錢熟地五錢麥冬三錢北五味一錢山茱萸三錢山藥三錢丹皮一錢天花粉八分水煎服此方乃平胃火之聖藥妙在補腎補肺補肝全不純去平胃中州安泰豈有阻滯抑鬱之理自然挽輸有路搬運無虞上不凌鑠肺金下不侵克脾土旁不關害肝木一方之中衆美備臻又何患胃火之上騰哉至於胃火既旺或丸藥原有艱難之道世人不知豫併發明之蓋人之胃口雖是胃土主事其實必得腎水上滋則水道有路糧食搬運而無阻隔之虞今胃火既盛水僅可自救於腎宮又安能上升於咽喉口舌之間況丸藥又是硬物原非易得下喉此所以不肯服非天性不能服也如反胃之病食入反出非明驗歟無腎水之人無食以下喉猶然吐出蓋胃中無腎水以潤故耳彼無腎水衝上尚不能入於胃中況又有胃火之盛無腎水之潤者無怪乎到口難咽也肝木之盛抑之之法必須和解然和解之中而不用抑之之法則火愈盛木愈旺矣方用白芍五錢甘草一錢炒梔子三錢當歸二錢白芥子一錢柴胡一錢荊芥一錢澤瀉一錢水煎服批散風湯此方用柴荊以散肝木之氣更妙用白芍梔子以清肝木之火火去而木衰此善於抑之也張公曰抑治法說得如此透闢不刊之書益信然也腎中之水有火則安無火則泛倘人過於入房則水去而火亦去久之水虛而火亦虛水無可藏之地則必上泛而為痰矣治之法欲抑水之下降必先使火之下溫法當仍以補水之中而用火熱之藥使水足以制火而火足以生水則水火有相得之美也方用熟地三兩山茱萸一兩肉桂三錢茯苓一兩北五味一錢牛膝三錢水煎服一劑而痰即下行二劑而痰消無跡矣蓋肉桂乃補腎中火之聖藥倘止用之以溫命門水亦可以下降然而不補其腎宮之水則腎宮匱乏水歸而房舍空虛難以存活仍然上泛故必用補水以補火也方用熟地山茱純是補水之藥而牛膝又是引下之絶品水有火之溫又有水之養又有引導之使自安然而無泛上之理也揚治法論氣沉血滯天師曰揚治者乃氣沉而不能上血滯而不能行是也氣得揚而展舒血得揚而活動倘沉抑不揚則必有厄逆躄廢之症必用藥以揚之則氣舒展而血活動也方用當歸三錢白芍三錢黃耆三錢白朮三錢柴胡五分熟地五錢升麻五分人參一錢茯苓一錢川芎一錢水煎服此八珍湯也妙是血氣平補若用甘草而不用黃耆則不是八珍湯矣氣血平補既無偏曲而後以升麻柴胡揚之使血氣流動自無氣並血而成躄廢之症亦無血並氣而成厄逆之症矣此揚治之不可廢也故又立一門耳設止補陽而不補陰則陽旺而陰愈消設止補其陰而不補其陽則陰旺而陽愈息故必兼補之而揚法始為有益不可與發散之一類而並觀之也張公曰闡發細微無可道痰治法論治初起之痰已病之痰久病之痰論老痰頑痰天師曰痰治者痰塞於咽喉之間雖是小病而大病實成於此古人所以另立門以治之然而所立之方皆是治痰之標不足治痰之本也故立二陳湯以治上中下新暫久之病通治之而無實效也今另立三方一治初起之痰一治已病之痰一治久病之痰痰病雖多要不能越吾之範圍也初起者傷風咳嗽吐痰是也用半夏一錢陳皮一錢天花粉一錢茯苓一錢甘草一錢蘇子一錢水煎服二劑可以消痰矣此方去上焦之痰也上焦之痰原止在胃中而不在肺去其胃中之痰而肺金氣肅何致火之上升哉已病之痰痰在中焦也必觀其色之白與黃而辨之最宜分明黃者乃火已將退也白者火正熾也火熾者宜用寒涼之品火將退者宜加祛逐之品吾今立一方俱可治之白朮三錢茯苓五錢陳皮一錢甘草一錢白芥子三錢梔子一錢火痰加之枳殼五分水煎服此方系健脾之劑非祛痰之劑也然而痰之多者多由於脾氣之濕今健其脾氣則水濕之氣下行水濕既不留於脾中又何從而上出況又加之消痰之聖藥而痰有不安靜速亡者乎至於久病之痰切不可以作脾濕生痰論之蓋久病不愈未有不腎水虧損者非腎水泛上為痰即腎火沸騰為痰此久病之痰當補腎以祛逐之方用熟地五錢茯苓三錢山藥三錢薏仁五錢芡實五錢山茱萸三錢北五味一錢麥冬三錢車前子一錢益智仁三分水煎服此治水泛為痰之聖藥若火沸為痰者內加肉桂一錢此方之妙純是補腎之味而又兼祛濕之品化痰之味水入腎宮自變化為真精又安有升騰為痰者乎此治下焦有痰之法也有此三方再看何症出入加減治痰無餘事矣張公曰三方極妙可為治痰之聖方也然豫尚有方在初起之痰用天師方可也已病之痰豫方亦佳並附於後用白朮三錢茯苓三錢陳皮一錢天花粉二錢益智仁三分人參三分薏仁三分有火者加黃芩一錢無火者加乾薑一錢水煎服此方亦健脾而去濕且不耗氣不助火之沸騰二劑而痰症自消久病之痰用豫六味丸湯加麥冬五味實有奇功可與天師方並傳萬古也無火者加附子肉桂可耳華君曰豫尚有二方治痰之久而成老痰者方用白芍三錢柴胡一錢白芥子五錢茯苓三錢陳皮三分甘草一錢丹皮二錢天花粉八分薏仁五錢水煎服此方妙在用白芥子為君薏仁白芍為臣柴胡花粉為佐使老痰無處可藏自然漸漸消化此方可用八劑老痰無不消者方名消渴散又方治頑痰成塊而塞在咽喉者為頑痰留在胸膈而不化者為老痰也方用貝母三錢甘草一錢桔梗三錢紫菀二錢半夏三錢茯苓三錢白朮三錢神麯三錢白礬一錢水煎服此方妙在貝母與半夏同用一燥一濕使痰無處藏避而又有白礬以消塊桔梗紫菀以去邪甘草調停中央有不奏功如響者乎二方亦不可廢也火沸為痰反加肉桂此火不及水折也李子永識火治法論陽明胃火論治各經之火天師曰火治者治火之有餘也火症甚多惟陽明一經最難治前論雖悉尚有未盡之議也知治陽明之法則五臟之火各腑之火無難專治矣陽明本胃土也如何有火此火乃生於心包心包之火乃相火也君火失權則心包欺之以自逞其炎赫之勢是必以辛涼大寒之品大劑投之恣其快飲斯火得寒而少息熱得涼而略停然必添入健胃之藥始可奏功蓋胃火之沸騰終由於腎氣之不足去胃火必須補胃土然而徒補胃土而不去水濕之痰亦不得也方用石膏一兩或二兩或三兩看火勢之盛衰用石膏之多寡知母三錢麥冬五錢甘草一錢糯米一合竹葉百片人參三錢水煎服方則人參竹葉石膏湯也胃火之盛非此湯不能平還問其人必大渴飲水見其有汗如雨者始可放膽用之否則不可輕用蓋無汗而渴亦有似此症者不可不辨也此方純是降胃火之藥所以急救先天之腎水也此症一日不治即熬干腎水而不救故不得已用此霸道之藥也倘無汗而渴明是腎火有餘而腎水不足又烏可復用石膏湯以重傷其腎水乎然則又當何方以治之用熟地三兩山茱萸二兩北五味三錢麥冬二兩元參一兩此方乃治似白虎症而非胃火之熱者人更宜知之也其餘心火用黃連肝火用梔子肺火用黃芩前言悉之矣茲不再贅張公曰不意吾方得真人闡發至此大快也然豫更有說陽明之火雖起於心包實成於肝木之克之也肝木旺則木中有火不特木來剋土而轉來助焰肝木之火半是雷火一發則震地轟天陽明得心包之火而沸騰又借肝木龍雷之火以震動如何可以止遏故輕則大渴重則發狂也豫治此症往往白芍加至數兩未曾傳世世所以不能發明之也先用石膏湯以去火隨加白芍以平木木平而火無以助焰自然胃火孤立無援又加麥冬以平肺金之氣則金有水潤不必取給於胃土而胃土可以自救況又有石膏知母之降火哉此狂之所以定而熱之所以除也方用石膏一兩知母三錢麥冬一兩半夏三錢甘草一錢竹葉一百片糯米一合先煎四碗又加白芍二兩同煎批法制白虎湯此方之妙不在石膏知母之降胃火妙在白芍之平肝木使木氣有養不來剋土並不使木鬱生火以助胃火也又妙在麥冬以清肺金使金中有水胃火難炎且去制肝無令剋土也華君曰豫方又不同傳遠公乃專論陽明傳豫乃論各經之火也有方並傳子梔子三錢白芍五錢甘草一錢丹皮三錢元參三錢水煎服批瀉火聖神湯心火加黃連一錢肺火加黃芩一錢胃火加石膏三錢腎火加知母一錢黃柏一錢大腸火加地榆一錢小腸火加麥冬三錢天冬三錢膀胱火加澤瀉三錢治火何以獨治肝經也蓋肝屬木木易生火故治火者首治肝肝火一散而諸經之火俱散所以加一味去火之藥即可以去各經之火也靜治法論解火鬱天師曰靜治者靜以待之而不可躁也如人病拂逆之症躁急之狀不可一刻停留此火鬱而不得舒故爾如此倘用寒涼之品急以止之則火鬱於中而反不得出靜以待之使其燥氣稍息而後以湯藥投之任其性而無違其意則功易奏而病易去矣方用白芍當歸各三錢茯苓五錢柴胡五分甘草一錢白芥子一錢丹皮二錢棗仁一錢水煎服方名靜待湯此方之妙全無驚張之氣一味和解火鬱於肝木之中不覺漸漸自散此靜治之妙法也張公曰妙從無醫人講至此更欲立方而不可得氣躁乃氣中有火也亦宜以靜法待之豫酌一方用白朮三錢茯苓三錢白芍三錢陳皮五分甘草五分麥冬三錢元參三錢天花粉一錢蘇子一錢水煎服名為靜氣湯此方和平安靜無驚張之氣可治心煩氣動肺燥胃干之症血燥乃血熱之故往往鼻衄血心煩不寐不能安枕怔忡等症亦宜以靜待之方用當歸三兩芍藥三錢熟地五錢生地三錢丹皮一錢地骨皮五錢沙參三錢白芥子一錢甘草三錢炒棗仁一錢水煎服批寧血湯此方亦無驚張之氣又加荊芥五分血動者最宜服之動治法論治手足麻木天師曰動治者因其不動而故動之也如雙腳麻木不能履地兩手不能執物者是也法當用竹筒一大個去其中間之節以圓木一根穿入之以圓木兩頭縛在桌腳下病人腳心先踏竹筒而圓轉之如踏車者一日不計其數而踏之然後以湯藥與之方用人參一錢黃耆三錢當歸一錢白芍三錢茯苓三錢薏仁五錢白朮五錢半夏一錢陳皮五分肉桂三分水煎服批發機湯此方俱是補藥之中妙有行濕之味蓋此等病必濕氣侵之始成偏廢久則不仁之症成也成則雙足自然麻木乘其尚有可動之機因而活動之從來足必動而治血始活因濕侵之遂不能伸縮如意所以必使之動而後可以藥愈也否則徒飲前湯耳兩手之動又不如是必使兩人反轉病人之手在背後以木槌轉棰之棰至兩臂痠麻而後以湯藥與之可愈方用人參一錢茯苓三錢黃耆五錢防風一錢半夏一錢羌活一錢水煎服批發動湯此方又妙在防風黃耆同用而以黃耆為君人參為臣祛痰祛濕為使又乘其動氣之時與服則易成功否則亦正不能奏效耳張公曰動治法最妙豫則更有法於二症尤當使人抱起坐了以一人有力者將其手延拳回者不已後服天師之藥更妙可並志之春夏治法論春宜理氣夏宜健脾天師曰春夏治者隨春夏發生之氣而治之得法也春宜疏泄夏宜清涼亦不易之法也然而舒發之中宜用理氣之藥清涼之內宜兼健脾之劑未可盡為舒發與清涼也春用方春則用人參一錢黃耆一錢柴胡一錢當歸二錢白芍三錢陳皮五分甘草一錢神麯五分水煎服批迎春湯此方有參耆以理氣又有柴芍當歸以養肝而舒木氣則肝不克脾土自然得養矣夏則用麥冬三錢元參三錢五味子一錢白朮五錢甘草一錢香薷八分神麯三分茯苓三錢陳皮五分水煎服批養夏湯此方妙在健脾之中而有潤肺之藥脾健而肺潤又益之去暑之品又何患暑極之侵入哉此春夏之法所宜知者張公曰春夏治法最妙以老幼加減法門法通用之妙甚秋冬治法論秋宜潤肺冬宜補腎天師曰秋冬治者以順秋氣之肅冬氣之寒也然秋天而聽其氣肅冬令而順其氣寒則過於肅殺矣法當用和平之藥以調之使肅者不過於肅而寒者不過於寒也秋則用麥冬五錢北五味一錢人參一錢甘草一錢百合五錢款冬花一錢天花粉一錢蘇子一錢水煎服批潤秋湯此方妙在不寒不斂不熱不散則肺金既無乾燥之患而有滋潤之益又何慮金風之涼也冬則用白朮五錢茯苓三錢山茱萸二錢熟地五錢肉桂三分生棗仁一錢枸杞子一錢菟絲子一錢薏仁三錢水煎服批溫冬飲此方補腎之水多補腎之火少使水不寒而火不沸又何虞冬令之寒哉秋冬治法之佳妙者張公曰妙亦以老少門法加減之奇治法論治奇症四十七天師曰奇治者不以常法治之也如人生怪病於腹中或生異症於身上或生奇形於口上是也奇病豈是常藥可治余當以奇藥治之倘人腹中忽有應聲蟲此將何法以治之乎用殺蟲藥治之不應用祛痰藥治之不應用寒藥涼之又不應用熱藥消之又不應然則終何以治之哉古人有將本草讀之而蟲不應聲者用之即愈此奇治之一法也余別有一神奇法治之省閲本草之勞神用生甘草一味加入白礬各等分不須二錢飲下即愈蓋應聲出非蟲也乃臟中毒氣有祟以憑之也用甘草以消毒用白礬以消痰況二物一仁一勇余又以智用之智仁勇三者俱全祟不覺低首而卻走矣張公曰妙絶矣不可思議天師曰倘人身上忽生人面瘡者有口鼻雙眼之全與之肉且能食豈非怪病乎而治之法奈何世人有以貝母末敷之而人面瘡愁眉而愈人以為此冤家債主也而余以為不然蓋亦有祟憑焉我有一方奇甚效更捷於貝母方用雷丸三錢一味研為細末加入輕粉一錢白茯苓末一錢調勻敷上即消批輕雷丸蓋雷丸此藥最能去毒而逐邪加入輕粉深入骨髓邪將何隱用茯苓不過去其水濕之氣耳此中奇妙最難言傳余不過道其理之奧妙而不能言其治之神奇也倘人口中忽生瘡於舌上吐出在外寸余上結成黃靨難以食物人以為病在心也心熱故生此瘡此亦近理之談而不知非也亦有祟以憑之也方用冰片一分入在蚌口內立化為水乃以鵝翎敷掃其上立刻收入其舌便可飲食矣蚌乃至陰之物以至陰攻至陰之邪則邪自退走況又加以冰片之辛溫逐邪不遺餘力自然手到功成也倘鼻中生紅線一條長尺許少動之則痛欲死人以為飲酒之病也而余以為不然亦祟也方用硼砂一分冰片一分研為末以人乳調之輕輕點在紅線中間批冰砂丹忽然覺有人如將病人打一拳一般頃刻即消奇絶之方也蓋硼砂亦是殺祟之物也耳中聞螞蟻戰鬥之聲者此則非祟乃腎水耗盡又加怒氣傷肝所致方用白芍三兩柴胡三錢梔子三錢熟地三兩山茱萸三兩麥冬一兩白芥子三錢水煎服批止喧丹方中純是補腎平肝之聖藥飲之數日其戰鬥之聲漸遠服一月即愈此乃奇病而以伯道之方治之也耳中作癢以木刺之尚不足以安其癢必以鐵刀刺其底錚錚有聲始覺快然否則癢極欲死此腎肝之火結成鐵底於耳中非湯藥可救余立一方用龍骨一錢皂角刺一條燒灰存性冰片三分雄鼠膽一枚先將前藥為末後以鼠膽水調勻而後以人乳再調如厚糊一般批收癢丹將此藥盡抹入耳孔內必然癢不可當必須人執其兩手癢定而自愈矣愈後服六味丸三十斤可也如人無故見鬼如三頭六臂者或如金甲神或如斷手無頭死鬼或黑或白或青或紅之狀皆奇病也然此皆心虛而祟憑之方用白朮三兩蒼朮三兩附子一錢半夏一兩天南星三錢大戟一兩山茨菰一兩各為細末加入麝香一錢為末做成餅子如玉樞丹一樣批石室祕丹此方更妙於紫金錠凡遇前病用一餅薑湯化開飲之必吐頑痰碗許而愈更有山魈木客狐貍蟲蛇作祟憑身者方用生桐油搽其下身不便處最妙然余更有奇法以本人褲子包頭則妖自大笑而去永不再犯蓋妖原欲盜人之精氣也然最喜清潔見人汙物包頭則其人之不潔可知故棄之而去亦因其好潔而亂之也不成器之物而睡夢中來壓人者亦以此法治之如人背脊裂開一縫出蝨千餘此乃腎中有風得陽氣吹之不覺破裂而蝨現方用熟地三兩山茱萸三兩杜仲一兩白朮五錢防己一錢豨簽草三錢批活水止蝨丹二劑裂縫生蝨盡死張公曰方皆妙絶奇絶脊縫生蝨方用萆麻三粒研成如膏用紅棗三枚搗成為丸如彈子大火燒之薰衣上則蝨死而縫合亦絶奇方也真不可思議矣萆麻子能殺蝨而去風蝨去風出則縫自合矣天師曰如人糞從小便出小便從大便出者此夏天暑熱之症人以五苓散治之亦妙而豫更有奇方止用車前子三兩煎湯三碗一氣服完即愈人有腹中生蛇者乃毒氣化成也或感山嵐水溢之氣或感四時不正之氣或感尸氣病氣而成也方用雄黃一兩白芷五錢生甘草二兩各為細末端午日修合為丸粽子米和而丸之如大桐子大飯前食之食後必作痛用力忍之切不可飲水一飲水不則效矣切記張公曰生蛇腹中以身上辨之身必乾涸如柴似有鱗甲者蛇毒也最易辨吾尚有一方治之最驗白芷一味為丸每日米飲湯送下五錢即全愈天師曰生鱉者乃飲食飢飽之時過於多食不能一時消化乃生鱉甲之蟲似鱉而非鱉也亦以前方再用馬尿一碗加人尿半合童便尤妙飲之立消雄黃乃殺蛇之藥白芷乃爛蛇之品甘草乃去毒之劑而馬尿化鱉之聖藥也故用之隨手而效耳此則奇病而用奇藥也人有生鳥鵲於頭上臂上外有皮一層包之或如瘤狀或不如瘤而皮膚高起一塊者內作鳥鵲之聲逢天明則啼逢陰雨則叫逢飢寒則痛疼百藥不效必須用刀割破其皮則鳥鵲難以藏形乃破孔而出宛似鳥鵲但無羽毛耳鳥鵲出孔之後以前生肌散敷之外加神膏三日後依然生合乃人不敬神道而戲弄之耳此病豫見之數次矣扁鵲之治華他之醫皆我教之也如人遍身生疙疽或內如核塊或外似蘑菰香菌木耳之狀者乃濕熱而生也數年之後必然破孔出血而死當先用外藥洗之後用湯藥消之則愈外浴洗方蒼耳子草一斤荊芥三兩苦參三兩白芷三兩水一大鍋煎湯傾在浴盆內外用席圍而遮之熱則熏溫則洗洗至水冷而止批消濕湯三日後乃用煎方白朮五錢薏仁一兩芡實五錢人參一兩茵陳三錢白芥子三錢半夏三錢澤瀉三錢附子一錢黃芩三錢水煎服批紅黃霹靂散一連十劑自然全消無蹤矣外邊亦無不消也如人有腹中高大宛似坐胎者形容憔悻面目瘦黑骨幹毛枯此乃鬼胎也方用紅花半斤大黃五錢雷丸三錢水煎服傾盆瀉出血塊如雞肝者數百片而愈後乃用六君子湯調治之自然復元此等之病乃婦人淫心忽起有物以憑之才生此症無論室女出嫁之人生此病者邪之所湊其氣必虛況又起淫心有不邪以親邪者乎方中妙在用紅花為君又用至半斤則血行難止有躍躍自動之貌又加以大黃走而不守之味則雷丸蕩邪之物自然功成之速也如人有頭角生瘡當日即頭重如山第二日即變青紫第三日青至身上即死此乃毒氣攻心而死也此病多得之好吃春藥蓋春藥之類不過一丸食之即強陽善戰非用大熱之藥何能致此世間大熱之藥無過附子與陽起石之類是也二味俱有大毒且陽起石必須火煅而後入藥是燥干之極自然克我津液況窮工極巧於婦女博歡則筋骸氣血俱動久戰之後必大泄盡情水去而火益熾矣久之貪歡必然結成大毒火氣炎上所以多發在頭角太陽之部位也初起之時若頭重如山便是此惡症急不待時速以金銀花一斤煎湯飲之數十碗可少解其毒可保性命之不亡而終不能免其瘡口之潰爛也再用金銀花三兩當歸二兩生甘草一兩元參三兩煎湯日用一劑七日仍服瘡口始能收斂而愈此種病世間最多而人最不肯忌服春藥也痛哉腳大指生疽亦多不救亦可以此法治之張公曰有人腳板下忽生二指痛不可忍者乃濕熱之氣結成觸犯神祇之故方用硼砂一分瓦蔥一兩冰片三分人參一錢為末批消指散以刀輕刺出血刺在生出指上即時出水敷星星在血流之處隨出隨糝以血盡為度流三日不流水矣而痛亦少止再用人參三錢白朮五錢生甘草三錢牛膝二錢萆薢三錢薏仁一兩半夏一錢白芥子三錢水煎服批化水湯四劑可全愈而指盡化為水矣外用一天師膏藥加生肌散敷之即愈矣如人有背上忽然疼痛裂開一縫竄出蛇一條長二尺者頗善跳躍豫親手治之而驗其症必先背脊疼甚而又無腫塊久則腫矣長有一尺許一條直似立在脊上豫乃用刀輕輕破其皮而蛇忽跳出其人驚絶豫乃用人參一兩半夏三錢南星三錢附子一錢治之忽蘇生肌散敷其患處而愈豫問其何故而背忽痛耶彼人云我至一廟見塑一女娘甚覺美麗非常偶興雲雨之思頓起脊背之痛今三月以來痛不可忍若有蛇鑽毒刺光景余心疑似生怪物見其人又健壯故用刀刺開皮肉不意蛇出而人竟死也豫隨甩三生飲救之而愈可立醫案以見病之奇而神道之不可玩也又有七孔流血者亦腎虛熱也用六味地黃湯加麥冬三錢五味子一錢骨碎補一錢治之天師曰如人有足上忽毛孔標血如一線者流而不止即死急以米醋三升煮滾熱以兩足浸之即止血批杜隙湯後用人參一兩當歸三兩穿山甲一片火炒為末煎參歸湯以穿山甲末調之而飲即不再發此症乃酒色不禁恣意縱欲所致世上人多有之方書不載今因陳子之問而立一奇方也凡有皮毛中出血者俱以此方救之無不神效臍中出血亦是奇症然法不同用六味湯加骨碎補錢飲之即愈如齒上出血亦以此方投治蓋臍齒亦俱是腎經之位而出血皆是腎火之外越也六味湯滋其水則火自息焰矣骨碎補專能止竅補骨中之漏者也故加入相宜耳如人有覺腸胃中癢而無處扒搔者只覺置身無地此乃火鬱結而不散之故法當用表散之藥方用柴胡三錢白芍一兩甘草二錢炒梔子三錢天花粉三錢水煎服即愈批化癢湯如有人先遍身發癢以錐刺之少已再癢以刀割之快甚少頃又癢甚以刀割之覺疼必流血不已以石灰上之則血止而癢作又以刀割之又流血又以石灰止之止之又癢勢必割至體無完膚而後止此乃冤鬼索命之報也無法可救我憫世人不知作惡誤犯者亦有之余今酌定一方救之方用人參一兩當歸三兩荊芥三錢水煎服批救割全生湯貧者無力買參則用黃耆二兩代之服此藥三劑必救而癢止痛亦平但須對天盟誓萬勿作犯法之事有冤仇者為之懺經禮佛庶幾不再發否則發不能再救如人有皮膚手足之間如蚯蚓唱歌者此乃水濕生蟲也方用蚯蚓糞敷於患處即止鳴以水調塗之厚一寸可也鳴止再用煎湯方用白朮五錢薏仁一兩芡實一兩生甘草三錢黃芩二錢附子三分防風五分水煎服即愈此治濕則蟲無以養況又有生甘草以解毒化蟲防風去風而逐瘀附子斬關而搗邪所以奏功如神也如有人臂上忽生頭一個眼耳口鼻俱全且能呼人姓名此乃債主索負之鬼結成此奇病也方用人參半斤貝母三兩白芥子三兩茯苓三兩白朮五兩生甘草三兩白礬二兩半夏二兩青鹽三兩各為末米飯為丸每日早晚白滾水送下各五錢自然漸漸縮小而愈病奇而方神也此症初起之時必然臂痛發癢以手搔之漸漸長大久則漸漸露形大如茶鍾但無頭髮鬚眉而已如用刀割之立刻死亡不救服吾藥後亦以懺經念佛為妙如人舌吐出不肯收進乃陽火盛強之故以冰片少許點之即收批收舌散後用黃連三錢人參三錢菖蒲一錢柴胡一錢白芍三錢水煎服二劑可也如人舌縮入喉嚨不能語言者乃寒氣結於胸腹之故急用附子一錢人參三錢白朮五錢肉桂一錢乾薑一錢治之則舌自舒矣如人舌出血如泉者乃心火旺極血不藏經也當用六味地黃湯加槐花三錢飲之立愈有人唇上生瘡久則瘡口出齒牙於唇上者乃七情憂鬱火動生齒奇症也方用柴胡三錢白芍三錢黃連一錢當歸三錢川芎一錢生地三錢黃芩一錢天花粉二錢白果十個水煎服外用冰片一分殭蠶末一錢黃柏炒為末三錢糝之自消齒矣人掌中忽高起一寸不痛不癢此乃陽明經之火不散而鬱於手也論理該痛癢而今不痛癢不特火鬱於腠理而且水壅於皮毛也法當用外藥消之蓋陽明之火盛必然作渴引飲不休今又不渴是胃中之火盡散而流毒手掌中必其人是陽明之火盛手按於床席之上作意行房過於用力使掌上之氣血不行久而突突而高也不痛不癢乃成死肉矣方用附子一個煎湯以手漬之至涼而止如是者十日必然作痛再漬必然作癢又漬而高者平矣蓋附子大熱之物無經不入雖用外漬無不內入也倘以附子作湯飲之則周身俱熱又引動胃火掌肉不消而內症蜂起豫所以外治而愈也或附子湯中再加輕粉一分引入骨髓更為奇效耳有人鼻大如拳疼痛欲死此乃肺經之火熱壅於鼻而不得泄法當清其肺中之邪去其鼻間之火可也方用黃芩三錢甘草三錢桔梗五錢紫菀二錢百部一錢天門冬五錢麥冬三錢蘇葉一錢天花粉三錢水煎服批解壅湯四劑自消此方全在群入肺經以去其火邪又何壅腫之不消耶此奇病而以常法治之者也男子乳房忽然壅腫如婦人之狀捫之痛欲死經歲經年不效者乃陽明之毒氣結於乳房之間也然此毒非瘡毒乃痰毒也若瘡毒不能經久必然外潰今經歲經年壅腫如故非痰毒而何法當消其痰通其瘀自然奏功如響矣方用金銀花一兩蒲公英一兩天花粉五錢白芥子五錢附子一錢柴胡二錢白芍三錢通草三錢木通一錢炒梔子三錢茯苓三錢水煎服批化聖通滯湯此方妙在金銀花與蒲公英直入陽明之經又得清痰通滯之藥為佐附子引經單刀直入無堅不破又何患痰結之不消或疑附子大熱諸痛皆屬於火似不可用殊不知非附子不能入於至堅之內況又有梔子芍藥之酸寒雖附子大熱亦解其性之烈矣又何疑於過熱哉人腳板中色紅如火不可落地又非痰毒終歲經年不愈此病亦因人用熱藥立而行房火聚於腳心而不散故經歲經年不愈也法當用內藥消之若作外治必然爛去腳板方用熟地三兩山茱萸五錢北五味三錢麥冬一兩元參一兩沙參一兩丹皮三錢甘菊花五錢牛膝三錢金叉石斛一兩茯苓五錢澤瀉三錢車前子三錢萆薢二錢水煎服批祛火丹十劑消二十劑全愈然須忌房事三月否則必發發則死矣慎之哉人有手足脫下而人仍不死之症此乃傷寒之時口渴過飲涼水以救一時之渴孰知水停腹內不能一時分消遂至四肢受病氣血不行久而手足先爛手指與腳指墮落或腳指墮落之後又爛腳板久之連腳板一齊墮落矣若有傷寒口渴過飲涼水者愈後倘手足指出水者急用吾方可救指節腳板之墮落也方用薏仁三兩茯苓二兩肉桂一錢白朮一兩車前子五錢水煎服一連十劑小便大利而手腳不出水矣永無後患不必多服更有人手指甲盡行脫下不痛不癢此乃腎經火虛又於行房之後以涼水洗手遂成此病方用六味湯加柴胡白芍骨碎補治之而愈有人指縫流血不止有蟲如蜉蝣之小鑽出少頃即能飛去此症乃濕熱生蟲也然何故生蟲而能飛耶蓋不止濕熱而又帶風邪也凡蟲感風者俱有羽翼能飛安在人身得風之氣轉不能飛也方用茯苓三錢黃耆五錢當歸三錢白芍三錢生甘草三錢人參一錢柴胡一錢荊芥一錢熟地五錢川芎一錢白朮三錢薏仁五錢水煎服此方之妙全不去殺蟲而但補其氣血而佐之去濕去風人身氣血和自不生蟲補氣血之和則蟲自無藏身之窟況又逐水消風蟲更從何處生活耶此方之所以平而奇也服四劑則血不流而蟲不出再服四劑手指完好如初矣人有喉患大腫又非癭瘤忽痛忽不痛外現五色之紋中按之半空半實此乃痰病結成似瘤非瘤似癭非癭也方用海藻三錢半夏三錢白芥子三錢貝母三錢南星三錢人參三錢茯苓五錢昆布一錢附子一分桔梗三錢甘草一錢水煎服此方乃消上焦之痰聖藥也又有海藻昆布以去其癭瘤之外象消其五色之奇紋妙在消痰而仍不損氣則胃氣健而痰易化也一劑知二劑消大半三劑則全消四劑永不再發此方兼可治癭症神效人有臍口忽長出二寸似蛇尾伏而又非蛇不痛不癢此乃祟也然亦因任帶之脈痰氣壅滯遂結成此異病也人世之間忽生此病必有難喻之災蓋人身而現蛇龜之象其家必然敗落而時運亦未必興隆也法當以硼砂一分白芷一錢雄黃一錢冰片一分麝香一分兒茶二錢各為末將其尾刺出血必然昏暈欲死急以藥點之立刻化為黑水急用白芷三錢煎湯服之而愈倘不愈則聽之不可再治蓋妖旺非藥能去之非前世之冤家即今生之妖孽也人有糞門內拖出一條似蛇非蛇或進或出便糞之時又安然無礙此乃大腸濕熱之極生此怪物長於直腸之間非蛇也乃肉也但伸縮如意又似乎蛇法當內用湯藥外用點藥自然消化矣內用當歸一兩白芍一兩枳殼一錢檳榔一錢蘿蔔子三錢地榆五錢大黃一錢水煎飯前服之批逐邪殺蛇丹二劑後外用冰片點之失用木耳一兩煎湯洗之洗後將冰片一分研末而掃掃盡即縮進而愈神驗亦有人糞門生蟲奇癢萬狀似人之勢進出而後快者此乃幼時為人戲耍乘風而入之以見此怪症也以蜜煎成為勢一條用蛇床子三錢生甘草一錢楝樹根三錢各為細末同煉在蜜內導入糞門聽其自化一條即止癢而愈神方也人有小便中溺五色之石未溺之前痛甚已溺之後少覺寬快此即石淋也交感之後入水或入水之後交感皆有此症方用熟地三兩茯苓五兩薏仁五兩車前子五兩山茱萸三兩青鹽一兩骨碎補二兩澤瀉三兩麥冬五兩芡實八兩肉桂三錢各為末蜜為丸早晚白滾水吞下各一兩批消石神丹十日必無溺石之苦矣此症成之最苦欲溺而不溺不溺而又欲溺尿管中痛如刀割用盡氣力止溺一塊其聲錚然見水不化及膀胱之火熬煎而成此異病也其色或紅或白或黃或青或黑不一總皆水鬱而火煎之也此方之妙全不去治石淋而轉去補腎水之不足水足而火自消火消而水自化其中有奧妙之旨也倘治膀胱則氣不能出又何以化水哉人有腳肚之上忽長一大肉塊如瘤非瘤如肉非肉按之痛欲死此乃脾經濕氣結成此塊而中又帶火不消故手不可按按而痛欲死也法宜峻補脾氣而分消其濕為是然而外長怪狀若在內一時消之恐不易得當用內外夾攻之法自然手到病除內服方用白朮一兩茯苓三錢薏仁一兩芡實一兩澤瀉五錢肉桂五分車前子三錢人參三錢牛膝二錢萆薢三錢白礬三錢陳皮二錢白芥子三錢半復二錢水煎服批消濕化怪湯二劑後用蚯蚓糞一兩炒水銀一錢冰片五分硼砂一分黃柏五錢炒兒茶三錢麝香五分各為細末研至不見水銀為度將此藥末用醋調成膏敷在患處批消塊神丹一日即全消矣神效之極也此膏可治凡有塊者以此內外治之無不效應如響人腰間忽長一條肉痕如帶圍至臍間不痛不癢久之飲食少進氣血枯槁此乃腎經與帶脈不和又過於行房盡情縱送乃得此疾久之帶脈氣衰血亦漸耗顏色黯然雖無大病而病實篤也法當峻補腎水而兼外帶脈自然身壯而形消熟地一斤山萸肉一斤杜仲半斤山藥半斤白朮一斤破故紙三兩白果肉三兩炒當歸三兩白芍六兩車前子三兩各為末蜜為丸每日早晚各服一兩批滅痕丹十日後覺腰輕再服十日其肉淺淡再服全消不須二料也然必須忌房事者三月否則無效此方乃純補腎經而少兼任帶脈也任帶之病而用任帶之藥何愁不建功哉有人眼內長肉二條長一寸如線香之粗觸出於眼外此乃崇也雖是肝膽之火無崇則不能長此異肉法當藥點之冰片一分黃連一分硼砂半分甘草一分各為細末無聲為度用人乳調少許點肉尖上批去刺全目丹覺眼珠火炮出一時收入而愈更須服煎藥用白芍五錢柴胡一錢炒桅子三錢甘草一錢白芥子三錢茯苓三錢陳皮一錢白朮三錢水煎服批舒郁全睛丹此方妙在舒肝膽之氣而又瀉其火與痰則本源已探其驪珠又何愁怪肉之重長耶人身忽長鱗於腹間脅上此乃婦人居多而男子亦間生焉蓋孽龍多化人與婦人交即成此症而男子與龍合亦間生鱗甲也此病速治為妙少遲則人必變為龍矣今先傳一方用雷丸三錢大黃三錢白礬三錢鐵衣三錢雄黃三錢研末各為末棗肉為丸批黃雷丸凡得此病酒送下三錢立時便下如人精者一碗胸中便覺開爽再服三錢則鱗甲盡落矣遠公吾傳術至此非無意也汝將來救人不少此方之妙妙在雷丸無毒不散而龍又最惡雄黃故相濟而成功又何疑哉況各藥又皆去毒去水之品乎此方之最神最奇者也此書無一症不全無一論不備真天地之奇寶軒岐之精髓也善用之成醫之聖豈但良醫而已哉願遠公晨夕研窮以造於出神入化耳呂道人又書華君曰奇病尚有數症未全我今盡傳無隱人手上皮上現蛇形一條痛不可忍此蛇乘人之睡而作交感於人身乃生此怪病服湯藥不效以刀刺之出血如墨汁外用白芷為末糝之少愈明日又刺血如前又以白芷末糝之二次化去其形先刺頭後刺尾不可亂也尚有一症更奇喉中似有物行動吐痰則痛更甚身上皮膚開裂有水流出目紅腫而又不痛足如斗腫而又可行真絶世不見之症此乃人食生菜有娛蚣在葉上不知而食之乃生蜈蚣於胃口之上入胃則胃痛上喉則喉痛飢則痛更甚也方用雞一隻煮熟五香調治芬馥之氣逼人乘人睡熟將雞列在病人口邊則蜈蚣自然外走倘有蜈蚣走出立時拿住不許其仍進口中或一條或數條不等出盡自愈大約喉間無物走動則無娛蚣矣然後以生甘草三錢薏仁一兩茯苓三兩白芍五錢當歸一兩黃耆一兩防風五分荊芥一錢陳皮一錢水煎批全膚湯服十劑則皮膚之裂自愈而雙足如斗亦消矣蓋蜈蚣在上焦非藥食能殺因藥下喉即至胃中而娛蚣卻在胃口之上故不能殺之也所以引其外出然後以藥調治其氣血自愈皮膚開裂者乃蜈蚣毒氣盆踞肺邊肺主皮毛故皮膚開裂兩足如斗足乃腎之部位肺居上為腎之母母病則豫亦病然腎水終是不乏而毒氣留於腎部故足之皮大而浮非骨之病也所以能走耳眼屬肝肝受肺氣之毒熏蒸而紅腫矣更有奇症人有胃脘不時作痛遇飢更甚尤畏大寒日日作楚豫以大蒜三兩搗汁灌之忽吐蛇一條長三尺而愈蓋蛇最畏蒜氣此豫親手治人者更有人忽頭面腫如斗大看人小如三寸飲食不思呻吟如睡此痰也批天師曰此亦邪氣憑之迫用瓜蒂散吐之而頭目之腫消又吐之而見人如故矣後用人參白朮各三錢茯苓三錢甘草一錢陳皮五分半夏三錢水煎服三劑愈更治陳登之病中心悶甚面赤不能飲食豫謂有蟲在胸中必得之食腥也以半夏三錢瓜蒂七個甘草三錢黃連一錢陳皮一錢人參三錢吐之批加味瓜蒂散吐蟲三升皆赤頭而尾如魚豫謂能斷酒色可長愈否則三年後必病飽滿而死登不聽吾言三年果死相傳華真人治一人被犬咬其足指隨長一塊痛癢不可當謂疼者有針十個癢者有黑白棋子二枚以刀割開取之果然否真人云並無此事後人附會之也更治一人耳內忽長肉一條手不可近色紅帶紫豫曰此腎火騰燒於耳也用硼砂一分冰片一分點之立化為水後用六味地黃丸大料飲之服二料全愈張公曰人大腿腫痛堅硬如石痛苦異常欲以繩系足高懸梁上其疼乃止放下疼即如砍腿中大響一聲前腫即移大臀之上腫如巴斗不可著席將布兜之懸掛其疼乃可此亦崇憑之也方用生甘草一兩白芍三兩水煎服蓋生甘草專瀉毒氣白芍平肝木以止痛也痛止則腫可消毒出則崇可杜也人有心窩外忽然生瘡如碗大變成數口能作人聲叫喊此乃憂鬱不舒而崇憑之也用生甘草三兩人參五錢白礬三錢茯神三錢金銀花三兩水煎服即安不鳴矣再用二劑即愈蓋甘草消毒人參茯神以安其心白礬以止其鳴金銀花以解其火熱故易於奏功也平治法論氣虛血虛腎虛胃虛脾虛諸用藥方天師曰平治者平常之病用平常之法也氣虛者用六君子四君子湯血虛者用四物湯腎虛無火者用八味湯腎虛有火者用六味地黃湯肺虛者用生脈散心虛者用歸脾湯或天王補心丹肝虛者用建中湯胃虛者用四君子湯脾虛者用補中益氣湯鬱症用逍遙散傷風用小柴胡湯或參蘇飲有熱者用二黃湯胃熱甚者用竹葉石膏湯諸如此類俱可以平常法治之何必出奇眩異哉此平治之宜知也奇治法論單味治病天師曰奇治者可以一味而成功不必更借重二味也故曰奇治非奇異之奇也如吐病用瓜蒂散止用瓜蒂一味足矣不必再添別藥反牽制其手也如瀉病止用車前子一兩飲之即止水瀉是也不必更加別藥以分消之也又如氣脫吐血等症止要一味獨參湯治之是也又如腰痛不能俯仰用白朮四兩酒二碗水二碗煎湯飲之即止疼痛不必更加他藥也批利腰散蓋瓜蒂專能上湧若雜之他藥反不能透矣譬如人善跳躍一人牽扯其身轉不自如車前子性滑而能分水穀倘兼附之他藥又如人善入水者一人牽其足則反下沉人參善能補氣接續於無何有之鄉加之別藥則因循宛轉所以可以專用而不可以雙用也此奇治之宜知者偶治法論雙味治病天師曰偶治者方中不能一味奏功乃用二味兼而治之也如吐血用當歸黃耆之類中寒用附子人參之類中熱用元參麥冬之類是也夫吐血則必血虛用當歸一味以補血足矣何以又佐之黃耆也蓋血乃有形之物不能速生必得氣旺以生血故必用黃耆以補其氣也夫中寒之症陰寒逼人陽氣外越祛寒用附子足矣必加之人參者何也蓋元陽既不歸合則一線之氣在若存若亡之間不急補其氣則元陽出走而不返矣故必兼用人參以挽回於絶續之頃也夫中熱之症上焦火氣瀰漫不用降火之品何能救焚似乎用元參以退其浮游之火足矣何以加入麥冬蓋胃火沸騰則肺金自燥胃口自救不暇又何以取給以分潤肺金之氣故必用麥冬以潤之則肺足以自養不藉胃土之奉膳則胃土足以自資而火自然可息此皆偶治之妙法誰能知奧耶舉三方可通其餘至於三之四之至於十之外均可於偶方之法廣悟也形治法論目痛頭痛手痛腳痛天師曰形治者四肢頭面有形可據而治之也如見其目痛則治目見其頭痛則治頭見其手痛則治手見其腳痛則治腳也其病見之形象何必求之於無形此形治之宜審也審何經之病用何經之藥自然效應如手之麻木乃氣虛而風濕中之必須用手經之藥引入手中而去風去濕之藥始能有效否則亦甚無益倘舍外形之可據而求內象之無端無怪其不相入也方用白朮五錢防風五分黃耆五錢人參二錢陳皮五分甘草一錢桂枝五分水煎服批逐風湯方中黃耆人參白朮俱補氣去濕之藥防風乃去風之品然必得桂枝始能入於手經也經絡既清自然奏功舉一而可類推願人審諸張公曰天師太略豫補一二可也腳痛之症最多而最難治蓋腳乃人身之下流水濕之氣一犯則停蓄不肯去須提其氣而水濕之氣始可散也今人動以五苓散治濕亦是正經然終不能上升而盡去其濕也豫今立一方可以通治濕氣之侵腳者方用人參白朮各三錢黃耆一兩防風一錢肉桂一錢薏仁五錢芡實五錢陳皮五分柴胡一錢白芍五錢半夏二錢水煎服批升氣去濕湯此方乃去濕之神劑防風用於黃耆之中已足提氣而去濕又助之柴胡以舒氣則氣更升騰氣升則水亦隨之而入於脾矣方中又有白朮芡實薏仁俱是去水去濕之聖藥有不奏功如響者乎凡有濕病幸以此方治之目之紅腫也乃風火入於肝膽之中濕氣不散合而成之也初起之時即用舒肝舒膽之藥而加之去濕散火之品自然手到功成無如人止知散邪而不知合治之法所以壅結而不能速效少不慎疾或解鬱於房闈或留情於聲色或冒觸於風寒遂變成爛眼流淚之症甚則胬肉扳睛有之吾今定一方即於初起之三五日內連服二劑即便立愈方用柴胡三錢白芍三錢白蒺藜三錢甘菊花二錢半夏三錢白朮五錢荊芥一錢甘草一錢草決明一錢水煎服批清目散一劑輕二劑愈有熱者加梔子三錢無熱者不必加入此方之妙在火風濕同治而又佐之治目之品所以藥入口而目即愈也其餘有形之治可以類推氣治法論氣逆痰滯論氣虛痰多氣虛痰寒氣虛痰熱天師曰氣治者氣病實多吾亦舉其大者言之如氣逆痰滯是也夫痰之滯非痰之故乃氣之滯也苟不利氣而惟治痰吾未見痰去而病消也方用人參一錢白朮二錢茯苓三錢陳皮一錢天花粉一錢白芥子一錢神麯一錢蘇子一錢豆蔻三粒水煎服批順氣活痰湯此方之妙在治痰之中而先理氣氣順則痰活氣順則濕流通而痰且不生矣此氣治之宜知可即一方而悟滯氣之法張公曰氣治法甚多天師方甚略吾再傳二方可以悟治法矣氣虛痰多之症痰多本是濕也而治痰之法又不可徒去其濕必須補氣為先而佐以消痰之品方用人參三錢茯苓三錢薏仁五錢半夏三錢神麯一錢陳皮一錢甘草一錢水煎服批助氣消痰湯此方雖有半夏陳皮消痰然而不多用人參則痰從何消有人參以助氣有薏仁茯苓之類自能健脾以去濕濕去而痰自除矣此氣治之一法也更有氣虛痰寒者即用前方加肉桂三錢乾薑五分足矣有氣虛痰熱者不可用此方當用麥冬三錢天花粉一錢甘草一錢陳皮一錢白芥子一錢茯苓二錢神麯三分白芍三錢當歸三錢水煎服批清火消痰湯此方之妙在不燥而又是補氣之劑潤以化痰痰去而氣自足也得此二方則治氣無難矣暗治法論兒門暗疾論産門生蟲産門生瘡天師曰暗治者乃人生暗疾而不可視之症最難治而最易治也大約暗疾婦人居其九或生於兒門之外或生於兒門之中或生於乳上或生於臍間或生於糞門之旁或生於金蓮之上止可陳說然猶有羞愧而不肯盡言者止可意會而默思之也患在身體之外者必系瘡瘍以瘡瘍前法治之不再論也惟是兒門之內不可不立一方以傳行醫之暗治大約兒門內之病非癢則痛吾言一方俱可兼治取效甚神方用當歸一兩梔子三錢白芍五錢柴胡一錢茯苓五錢楝樹根五分水煎服此方之妙皆是平肝去濕之品無論有火無火有風有濕俱奏奇功正不必問其若何癢若何痛若何腫若何爛此暗治之必宜知者也有痰加白芥子一錢有火加黃芩一錢有寒加肉桂一錢余不必加張公曰何奇至此吾不能測之矣華君曰有二法未傳我傳與遠公産門內生蟲方用雞肝一副以針刺無數孔納入産門內則蟲俱入雞肝之內矣三副全愈不必添入藥味也止要刺孔甚多則蟲有入路三副後用白芍五錢當歸五錢生甘草三錢炒桅子三錢陳皮五分澤瀉三錢茯苓三錢白朮五錢水煎服批去濕化蟲湯四劑不再發又方治産門外生瘡久不愈神效黃柏三錢炒為末輕粉五分兒茶三錢冰片五分麝香三分白薇三錢炒為末蚯蚓糞三錢炒鉛粉三錢炒乳香三錢出油潮腦三錢各為末調勻以藥末糝口上二日即全愈神效之極兼可治各色之瘡無不神效明治法論治瘡毒論頭面上瘡論身上手足瘡天師曰明示人之病症而不必暗治之也如生毒在手面或結毒在皮膚或生於面上或生於頰間是也有瘡俱照前傳瘡毒之法消之但不可如發背肺癰重症而治之也我今再傳以治小瘡毒如神方用金銀花一兩當歸一兩蒲公英一兩生甘草三錢荊芥一錢連翹一錢水煎服批消癰湯一劑輕二劑消三劑愈此明治之妙法人亦宜知之不可忽也頭上最不可用升藥切記切記下病宜升而上病不宜升也頭上病最宜用降火之藥張公曰吾不能加一言華君曰豫尚有二方一方頭面上瘡用金銀花二兩當歸一兩川芎五錢蒲公英三錢生甘草五錢桔梗三錢黃芩一錢水煎服批上消癰瘡散一劑輕二劑全消不必三劑一方治身上手足之瘡疽神效金銀花三兩當歸一兩生甘草三錢蒲公英三錢牛蒡子二錢芙容葉七個無葉時用梗三錢天花粉五錢水煎服批消癰萬全湯一劑即消二劑全愈神方也與遠公方各異不知何故天師曰二方俱神效並傳可也
