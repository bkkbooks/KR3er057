body:
  text: 跋余與陳子遠公同里而神交偶得是編讀之嘆為神奇故亟梓以濟世遠公淹貫經史才思泉湧論議數千言娓娓不窮蓋是編原期救人而非即乎採藻竊恐以詞害志故略有所刪改要使雅俗一覽瞭然至定方用藥之間總不敢增減一字知我當不罪我也以謀謹識
