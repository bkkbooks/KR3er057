body:
  text: 卷一禮集天有奇文地有奇事人有奇病不可拘也欲治其病不可以常藥治之有正醫有反醫有順醫有逆醫有內治有外治有完治有碎治有大治有小治有生治有死治有上治有下治有中治之分有先治有後治有急治有緩治有本治有未治之異有一百二十八法正醫法論肺經生癰論久嗽服氣法論水瀉論血痢論水腫論兩脅脹滿吞酸吐酸論腰痛論怔忡不寐岐天師曰凡人有病氣喘嘔咳者乃肺病也肺乃金臟又嬌臟也居於心之上瓣如蓮花色紅蒂紫咽管之下即是肺經司氣之出入不容食物咽之上有會厭在即小舌頭也會厭遮住咽門飲食之類始能直入食管而下通於胃倘人飲食之時多言會厭不及遮咽門設或米食之類入於氣管則必咳不已可見氣管不容一物可知藥亦不熊直入也治肺之法正治甚難當轉治以脾脾氣有養則土自生金咳嗽自己故五臟之中除肺一經之外俱可正治獨肺經不可正治然則肺經生癰瘍何以治之耶用元參一兩生甘草一兩金銀花八兩當歸二兩水煎服批清金消毒湯加麥冬一兩數品中惟麥冬乃清肺火之品余俱入脾入肝入心之藥而用之者何也蓋入肝則平木而不必肺金用力以制之則肺金得養矣入脾則脾土能生肺金而肺金又得養矣入心經則心火不凌肺金而肺經又得養矣雖前藥乃治心治脾治肝之藥似乎隔一隔二隔三治法其實乃正治肺金也雷公曰我意方中加白芍三錢更妙平肝火使心火弱不來克肺也長沙守仲景張公曰肺經固是嬌臟不可容物然未嘗不可客氣人有久嗽不已服諸補肺之藥不效者遵岐天師之法治之無有不愈但止服湯藥而不以氣入咽門則肺經終難速愈法當用女子十三歲者呵其氣而咽之每日五更時令女子以口哺口盡力將臍下之氣盡送病人口中病人咽下一口即將女子推開不可摟抱在懷恐動相火也每日止可呵一口自然服藥有功但呵氣之時切戒不可少動欲心一動不特無益而有害矣止可一口二口恐女子有病也天師曰脾經之病如水瀉乃脾氣不溫血痢乃過於燥熱而成此症也水瀉用白朮一兩車前五錢二味煎湯服之立效批分水神丹血痢不同有腹痛不痛之分痛者乃火熱也用歸尾一兩黃連三錢枳殼二錢白芍一兩廣木香二錢甘草一錢蘿蔔子二錢水煎服批神丹不痛者乃寒也白芍三錢當歸三錢蘿蔔子一錢枳殼一錢檳榔一錢甘草一錢水煎服批神丹水瀉者乃一時水氣侵脾故傾腹而出用白朮以利腰臍之氣血用車前以分消其水勢此正治之法也張公曰白朮車前利腰臍而消水氣是矣然而白朮亦能健脾脾健水濕自分原不必借重車前車前能通竅而安臟氣亦不止分消已也臟安則水濕之氣自消各有專能又能分助所以奏效如神耳天師曰血痢者乃肝經來克脾土也雖因脾土之濕又加暑熱暗侵瓜果內傷所致然終因肝木太旺無制凌脾土而然也故方用白芍當歸滋肝而平木肝木得養不來下克脾土則土亦得養而血痢自痊矣張公曰血痢雖有痛不痛之分其實皆火邪而挾濕氣也論理二方俱可通治而天師分別痛不痛之分乃慎之也二方出入加減各為神效正不必畏首畏尾一用之於痛一用之於不痛也蓋火邪帶濕氣居於腸脾之際不得奔下未有不急而後重者妙在用當歸白芍滑而利之則火邪利於直下不止平肝木而救脾土也天師曰水腫之病亦土不能剋水也方用牽牛三錢甘遂三錢水煎一服即大瀉水斗余臌脹盡消此則直奪其水勢而土得其平成矣批消水神方雷公曰此方固神奇俱各用三錢似太多減去各一錢則不過猛矣病去而不傷本病未盡去可以再進亦不失中和之道但二味藥性峻烈過於猛矣人疑非正治之法然水勢滔天必開決其水口則水旋消此二味之中病源妙在於猛也第服此二味之後切不可食鹽一食鹽則前病重犯不可救矣此乃不知禁忌自犯死症非藥之故也今人一見牽牛甘遂視為必死之品過矣水腫之病必須以手按足面如泥者始可用此二味正治否則按之不如泥隨按而皮隨起者非水也當作氣虛腎虛治之不可以此二味輕投以殺之也批何言之當也張公曰水腫治法甚多獨此二味奇妙通神其次用雞屎醴然雞屎醴終不若此二味之神蓋雞屎醴有毒而此無毒也牽牛性雖猛得甘遂而遲矣甘遂性雖緩得牽牛而快矣兩相合而兩相成實有妙用此方蓋余方也天師取之以救天下余何可自立而自譽之止言其相成有如此心經之病怔忡不寐等症乃心血少也方用人參三錢丹參二錢麥冬三錢甘草一錢茯神三錢生棗仁五錢熟棗仁五錢菖蒲一錢當歸三錢五味子一錢水煎服批安寐丹妙此方之妙妙在生熟棗仁各五錢而以諸補心之藥為佐使蓋棗仁乃安心上不寐之聖藥生用使其日間不臥熟用使其夜間不醒也日夜既安則怔忡自定又何必用虎睛琥珀丹砂之多事哉肝經之病兩脅脹滿吞酸吐酸等症乃肝木之郁也正治之法方用白芍五錢柴胡二錢炒梔子一錢蒼朮一錢茯苓一錢神麯五分半夏一錢甘草一錢丹皮三錢水煎服批氣爽丹雷公曰此方尚可加當歸三錢以生肝血此方之妙妙在用白芍丹皮柴胡也蓋三味乃肝木專經之藥而芍藥尤善平肝不去遠凌脾土土得養而木益舒木舒而氣爽痛自除吐漸止也腎經之病如腰痛之症用杜仲一兩破故紙五錢各鹽水炒熟地三兩白朮三兩胡桃二兩各為末蜜為丸每日飢而服之白滾湯送下一兩服完自愈此方之奇奇在白朮乃脾經藥也何以為正治腎經不知白朮最利腰臍腰臍利則水濕之氣不留於腎宮又用熟地杜仲純是補水之藥而胡桃與破故紙同用又有相濟之功補腎火以生腎水謂非正治得乎岐天師不講者未必非留以待我補余所以又補心肝腎三法願人細思而用藥也華君曰是傳余文也無方孫真君曰治肺有隔一隔二隔三之治其實原正治肺經此種議論大開聾瞶凡肺病皆宜如此治之勿謂天師專治肺癰立論而不通於凡治肺病也按血痢症張公概指為火邪挾濕此特就壯實人之血痢言之也然內傷勞倦與中氣虛寒人脾不攝血往往脾濕下乘而成血痢每以理中湯加木香肉桂補中益氣湯加熟地炒黑乾薑治之而愈但火邪之血色必鮮紅脈必洪緩口必消渴而喜飲冷小便必熱澀而赤濁內傷之血色必鮮而紫暗或微紅淡白脈必微細而遲或浮澀而空口不渴即渴而喜飲熱湯小便不澀不亦即赤而不熱不濁可辨李子永識昔賢論腫症與此不符大概以隨按而起者為水腫按肉如泥者為氣虛附之以俟臨症者之自考李子永識反醫法論發狂見鬼論發狂不見鬼論中風墮地論卒倒不知人天師曰凡人有病發狂如見鬼狀或跌倒不知人或中風不語或自臥而跌在床下者此皆正氣虛而邪氣犯之也似宜正治邪為是然而邪之所湊其氣必虛不治其虛安問其餘此所以急宜固其正氣而少佐以祛痰祛邪之藥為妙如發狂見鬼者乃虛也方用人參一兩白朮一兩半夏三錢天南星三錢附子一錢大劑灌之狂自定矣批祛狂至神丹方妙或倒不知人乃氣虛也亦用前方主之或中風不語者以人參一兩天南星三錢生半夏三錢生附子一個名為三生飲急灌之又自臥跌床下者即中風類他又名尸厥亦以三生飲救之發狂不知人而不見鬼者乃熱也不可與前湯此見鬼為虛而非實熱方用人參同入於祛痰祛邪之藥內乃因其反而反治之也跌倒不知人雖因氣虛然未有無痰而能跌倒者既跌倒亦未有不知人者故必須祛痰而佐以助正之藥此前方之所以可兼治之也中風與墮地之症純是氣虛氣虛之人未有不生痰者痰重卒中卒倒有由來也然則徒治其痰而不補其氣即所以殺之也三生飲妙在用生人參一兩同生附半夏南星祛邪蕩滌之藥駕馭而攻之譬如大將登壇用虎賁之士以掃蕩群妖必能活生人於殺人之中若徒正治其邪而不反治其本則十人九死冤鬼夜號誰之咎歟批純張公曰發狂見鬼明是虛而痰中之用半夏南星附子以祛痰不用人參白朮之多何以驅駕之而成功哉此方之妙不特治發狂見鬼如神而治中風不語卒倒不知人亦神妙之極蓋氣虛而後痰中也岐天師分析甚精又引三生飲以治中風等症其實前方除發狂不見鬼不可用此方其餘無不可治正不必又用三生飲也然三生飲亦是奇方亦可採用之總之斟酌於二方之間無不可起生人於死人之中也發狂不見鬼明是內熱之症岐天師不立方者待余補之也方用人參三錢白芍三錢白芥子三錢半夏三錢天南星二錢黃連二錢陳皮一錢甘草一錢水煎服此方妙在用黃連蓋厥深則熱亦深去其熱則厥自定黃連入心引諸補心之味同群相濟或補或瀉譬如人家相爭嚷於一室親朋各為勸解自然怒氣平而悔心發黃連之用於補劑之中正此意也華君曰是傳余之文無有他方我尚有數語請載於後中風等症非大加人參以祛駕其邪則痰不能開而邪不能散方中妙在用人參至一兩始有力量否則少用反為痰邪所使又安能助製附子以直蕩群妖哉雷公曰妙極各闡發無遺無可再談真聖人之言李子永識順醫法論氣虛胃虛天師曰凡人有病氣虛者乃身子羸弱飲食不進或大便溏泄小便艱澀方用人參一兩茯苓三錢白朮五錢陳皮一錢甘草一錢澤瀉一錢車前一錢水煎服此乃病欲下行而隨其性而下補之也方中用人參為君者開其胃氣胃為腎之關關門不開則上之飲食不能入下之糟粕不能出妙在用人參以生胃土而茯苓車前能分消水穀也且胃之性最喜溫和不喜過濕濕則必上壅嘔下積而瀉矣今順土之性而溫補之則飲食自進而大小便各安其位矣張公曰此方生胃土以消水穀誰曰不然然而不止生胃土也且能健脾脾健則胃氣益開而胃氣益壯方中最妙用白朮也白朮上利胃而下健脾且能祛濕以生腎有此大功則大小便得脾腎之氣而能開能合下既通達又何患飲食之不進乎吾見其飽食而無礙也服前方而不愈者兼服八味丸以補土母蓋八味丸最能實大腸利膀胱也李子永識逆醫法論氣喘上逆論雙蛾論腎虛大吐天師曰凡逆症甚多不止厥症一門也如氣喘而上者逆也人以為氣之有餘也殊不知氣盛當作氣虛有餘認作不足若錯認作肺氣之盛而錯用蘇葉桔梗百部山豆根之類去生便遠方用人參一兩牛膝三錢熟地五錢山茱萸四錢枸杞子一錢麥冬五錢北五味一錢胡桃三個生薑五片水煎服批安喘至聖丹雷公曰妙極然天師止言肺經之虛腎水大耗之氣喘也而未嘗論其腎火之逆挾肝氣而上衝之氣喘也雖其症輕於腎水大耗之病而氣逆作喘則一也病甚則有吐粉紅之痰者此腎火炎燒肺經內熱不能克肝則木寡於畏龍雷之火愈為升騰法當清其內熱方用地骨皮一兩沙參一兩麥冬五錢白芥子二錢白芍五錢甘草三分桔梗五分丹皮二錢水煎服方名清熱止喘丹此方之妙妙在地骨以清骨髓中之內熱沙參丹皮以養陰白芍以平肝木中之火麥冬以清肺中之火加甘草桔梗引入肺經則痰嗽自除而氣喘亦定孫真人曰何論之奇闢乃爾我有一奇方以附後此方絶不去治肺經而正所以治肺也蓋人生肺氣夜臥必歸氣於腎中此母居子舍之義也今因色欲過度腎水大耗肺金日去生之久之則不特腎水虛而肺金亦虛譬如家有浪子日費千金母有積蓄日日與之傾囊倒篋盡數交付其子後將安繼是子貧而母亦貧矣一遇外侮之侵將何物解紛而外侮又復恐嚇之逃之子舍以避其鋒而子家貧乏無以奉母又必仍復還家以受外侮之凌逼勢不至不死不已今腎水既虧而肺金又耗外受心火之傷中受肝木之橫脾土又下不來生水則轉輾難藏於是仍返而上喘幸有一線元陽未絶所以不死苟不大劑急救其腎使貧子來偷竊又何以肺金有養哉況貧子暴富不特母家亦富而外侮亦不敢欺凌矣此不治肺而正所以治肺也或疑人參乃肺脾之藥既宜補腎不宜多用人參不知腎水大虛一時不能驟生非急補其氣則元陽一線必且斷絶況人參少用則泛上多用則下行妙在用人參至兩許使能下達病源補氣以生腎水藥中熟地山茱萸之類同氣相求直入命門又何患太多之病哉若病重之人尤宜多加一兩尚欠也但喘有不同有虛有實初起之喘多邪實久病之喘多氣虛邪實者喘必抬肩氣虛而喘者微微氣急耳余所論乃久病之喘若初起之喘若四磨四七湯得一劑即止此病逆而藥亦逆之也張公曰肺金補子之義已講透徹無遺余再出一論以廣之肺氣既弱自然不能剋木肝木無制必然氣旺氣旺必來凌脾胃之土脾胃即受制於肝木則何能來生肺金耶方中十劑之中或間加柴胡五分白芍五錢熟地倍加一兩同前方煎飲未必無小補也蓋欲平肝自必旺其土土旺則金有不生者乎此亦反治之義耳天師曰更有人病雙蛾者人以為熱也喉門腫痛痰如鋸不絶茶水一滴不能下咽豈非熱症然而痛雖甚至早少輕喉雖腫舌必不燥痰雖多必不黃而成塊此乃假熱之症也若以寒涼之藥急救之下喉非不暫快少頃而熱轉甚人以為涼藥之少也再加寒涼之品服之更甚急須刺其少商之穴出血少許喉門必有一線之路開矣急以附子一錢熟地一兩山茱萸四錢麥冬三錢北五味三錢牛膝三錢茯苓五錢煎服批消火神丹下喉一聲響亮其火勢熱症立時消散蓋少陰之火直如奔馬凡人腎水大耗者腎中元陽不能下藏蓋無水以養火而火必上越也日日衝上而咽喉口小不能任其出入乃結成腫痛狀似雙蛾實非雙蛾也方中妙在用附子辛熱之藥引尤雷之火下藏於窟宅夫龍雷之火乃相火也喜水而不喜火故藥中熟地山茱之類純是補陰之味使火有所歸而不再沸此因其逆勢而逆導之也喜水而不喜火喜水者喜真陰之水也而非寒涼之水不喜火者不喜邪氣之火也而非辛熱之火日重夜輕治之最易用山豆根三錢半夏一錢桔梗三錢甘草一錢治之一劑立愈而非逆症可比耳張公曰陰虛雙蛾之症余更有治法用附子一錢鹽水炒成片用一片含在口中立時有路可以用湯藥矣後以八味丸一兩白滾水送下亦立時而愈可與岐天師方並傳天師曰更有大吐之症舌如芒刺雙目紅腫人以為熱也不知此乃腎水乾稿火不能藏水不能潤食入即出耳法當用六味地黃湯一料煎服恣其吞飲則餘火下息而飲食可入蓋胃為腎之關胃中之火必得腎中之水以潤之腎水耗不能上潤脾胃則胃火沸騰湧而上出以致雙目紅痛舌如芒刺也但此症時躁時靜一時而欲飲水及至水到又不欲飲即強飲之又不十分寬快此乃上假熱而下真寒也理宜六味湯內加附子肉桂煎湯與飲始合病源而今止用六味地黃湯者何蓋腎雖寒而胃正熱溫腎之藥必經過胃經熱性發作腎不及救而胃反助其邪火之焰則病勢轉添不若竟用六味地黃湯使其直趨腎宮雖經過胃中不致相犯假道滅虢不平胃而胃自平矣此亦逆治之法也批孫公曰真絶奇之論張公曰余立地黃丸原所治武帝之消渴也不意可以治此等之症實有奇功今又得岐天師暢為發明將方之功效盡情表出余之幸也不獨余之幸也願世人留意此方治上假熱而下真寒者無不神妙奏功如響非惟大吐之症宜之耳華君曰是傳豫之文而子之文更多可喜也然豫更有數語雙蛾陰症最難治而最易治也不知其竅而最難知其法而最易豫常為人治此病用附子一枚以鹽一合水煮透令其口含一片而火勢立止然後以六味湯大劑飲之不再發神方也大吐之症先以手擦其腳心使滾熱然後以附子一枚煎湯用鵝翎掃之隨干隨掃少頃即不吐矣後以六味丸湯大劑飲之即安然也氣喘之症莫妙用天師方大劑飲之必生無他方法也孫真君曰天師論喘症奇闢然豫亦有方用人參一兩北五味一錢麥冬二兩牛膝三錢胡桃三個生薑汁三匙水煎服批天師曰妙絶此方之妙妙在麥冬用至二兩蓋喘病雖是腎虛畢竟肺虛不能生腎水也腎水不能速生必須補氣以生之然徒用參以補氣未免水虧而火愈旺今反用麥冬以滋腎水之母則人參亦從之以生肺而不去助火矣肺有養而水自生又何患火之不能制哉往往有氣喘而脈微澀者用熟地一二兩當歸六七錢甘草一錢治之而愈此名貞元飲婦人最多此症李子永識內治法論肺癰論肝癰論腸癰天師曰內治者言人有病在臟腑而治之也人有肺癰腸癰肝癰者必須從內消之也然而治法不同肺癰方用元參三兩麥冬三兩生甘草五錢金銀花十兩先用水十碗煎湯四碗取二碗浸前藥加水二碗又煎之煎一碗服之二劑即愈其餘湯二碗再煎二煎批救肺敗毒至聖丹妙肝癰方用白芍三兩當歸三兩炒梔子三錢生甘草三錢金銀花十兩水十碗煎取四碗分二碗泡前藥再加水二碗同煎渣又加水二碗同金銀花汁兩碗煎一碗服二劑愈批救肝敗毒至聖丹妙腸癰方用金銀花八兩煎水二碗當歸三兩地榆一兩薏仁五錢水十五碗煎二碗分作二服上午一服臨睡一服二劑愈批救腸敗毒至聖丹妙蓋癰生胸腹之內無不生於火與邪若外用末藥調敷則相隔甚遙必須內消為得然癰勢甚急甚大一懷水何能救車薪之火故必大劑煎飲而火邪自散而癰瘍自消倘日以敷藥調治於皮膚之外或以小劑而求散於湯餌之中吾見其必死而已矣張公曰瘡瘍之疾發於火邪之盛其由來非一日矣欲消其火邪豈是尋常細小之藥所能去乎故必多用重藥以劫治之然而散邪之藥俱耗真陰多用重用皆能取敗惟金銀花敗毒而又不傷氣去火而又能補陰故必須此品為君但此品性純而正乃正人君子也譬如正人君子必同群攻擊於群小之中始不至僨事而召禍所以必多加至十兩或一斤始可取勝於眉睫然徒籍此一味又覺勢單力薄或用麥冬以滋肺或用芍藥當歸以潤肝或用地榆以涼大腸或用甘草以瀉火或用梔子以清熱或加薏仁以去濕相助成功各有妙理非泛然而用之者也華君曰是傳余文然余更有説肺癰初起可用此方倘已成形必須外治用刀刺其肺出膿血而後以神膏敷其口則愈否則有性命之憂也想天師後必傳方茲不贅耳後無傳豫當傳子肝癰不可用刺法須用內消內散腸癰之症此方最妙但亦治初起之病也久則內必出毒更當另用奇方以助其潰膿方用生甘草三錢金銀花二兩地榆一兩當歸二兩牛膝一兩乳香三錢沒藥三錢水先煎甘草五味取一碗調乳香沒藥末三錢飲之渣水再煎一碗又調乳香沒藥末三錢飲之大約早服頭煎晚服二煎二劑必全好矣批清腸消毒丹此天師傳豫而未傳子也意者留以待豫耶不然何各以盡言獨此方尚未傳完耶岐天師曰是留之以待華君傳子也外治法論陽症癰疽論陰症癰疽天師曰人有背生癰疽或生於胸腹之間或生於頭面之上或生於手足之際皆是五日之內猶當內散五日之外必須動刀內散方金銀花四兩蒲公英二兩生甘草二兩當歸二兩天花粉五錢水煎服一劑即消二劑全愈不必三劑金銀花專能內消瘡毒然非多用則力輕難以成功生甘草一味已足夠毒況又用之於金銀花內蓋足以散邪而衛正蒲公英陽明經藥也且能散結逐邪天花粉消痰聖藥當歸活血是其專功血不活所以生癰今血活而癰自愈此方之所以奇而肆也批消毒神聖丹倘若不曾服過敗毒之散以致成膿奔潰外口必小而內宅自大譬如賊居深山關隘必窄而其中巢穴自必修廣若不直搗其堅則延蔓無已勢必民化為盜故須用金刃去其口邊之腐肉使內毒之氣不藏刀用三寸長闊止三分兩邊俱利其鋒厚半分少尖一邊手執定眼看定心注定一刀橫畫一刀直畫人必少厥不必驚惶少頃自定後以末藥敷於膏藥之上貼之大約一個膏藥敷末藥二錢貼上即止痛敗膿盡出一連三日即消盡矣內用煎方當歸一兩黃耆五錢人參一錢荊芥一錢金銀花二兩生甘草三錢水煎服二劑可已不須多服批敗毒聖神丹此治陽症瘡瘍之法也陽症瘡癰必然突起寸余其色紅腫發光疼痛呼號者是若陰症癰疽內消之法與陽症同治至於破潰之治法絶不相同大約陰症癰疽其色必黑暗痛亦不甚但覺沉沉身重其瘡口必不突起或現無數小瘡口以欺世人急用附子三錢人參三兩生黃耆三兩當歸一兩金銀花三兩白芥子二錢治之麥冬可加三錢元參不可用也批散寒救陰至聖丹總陰症宜用溫熱散之不可用寒涼解之也外用膏藥加生肌末藥五錢貼之一日兩換始可蓋陰症癰疽多生於富貴膏粱之客功名失志之人心腎不交陰陽俱耗又加憂愁抑鬱拂怒呼號其氣不散乃結成大毒無論在背在頭在腹在脅在手在足俱是危症若服吾藥又用吾膏藥無不生全蓋陽症可以涼解而陰症必須溫散也膏藥方開後金銀花一斤生地八兩當歸三兩川芎二兩牛膝一兩丹皮一兩麥冬三兩生甘草一兩荊芥一兩防風五錢黃耆三兩茜草根五錢人參五錢元參五兩用麻油五斤煎數沸將藥渣濾出再熬將成珠入後藥廣木香一兩黃丹二斤炒飛過去砂沒藥一兩乳香一兩血竭一兩象皮為末五錢麝香一錢各為細末入油中少煎好藏瓷罐內用之每一個用一兩大約發背瘡必須用一兩其餘瘡口量大小用之批陰陽至聖丹雷公曰何論之妙而方之奇也末藥方人參一兩冰片一錢乳香去油三錢透明血竭五錢三七末一兩兒茶一兩水飛過去砂川倍子一兩藤黃三錢貝母二錢輕粉一錢各為絶細末以無聲為度此膏藥與末藥神奇無比發背外其餘瘡口不消二個陰症不消三個祕之批陰陽至聖丹孫公曰真奇方也張公曰瘡瘍吾方已傳之矣可附於末癰疽最難治外尚未現真形內已先潰大穴古人云外大如豆內大如拳外大如拳內大如盤信不爽也凡人一見背有瘡口外現者不可小視之急用蒜切片一分厚貼在瘡口上用艾火燒之痛者燒之不痛不痛者燒之知痛而止切不可不痛即止而痛者亦止也此法最妙世人不識而我特表而出之以治發背之初起者蓋一經灸之則毒隨火化以火攻火又何疑焉願世醫留意華君曰傳子法尤奇傳豫之方不然也癰疽方用金銀花三兩生甘草三錢蒲公英三錢當歸一兩天花粉五錢水煎服豫之方少異天師傳子之方然天師見今日氣體更薄於三國之時所以藥味改輕為重止天花粉一味分兩相同想因痰不可大攻故也然豫方亦奇甚不可輕視或見瘡勢少輕酌用吾方治之何如亦無不響應他膏藥與末藥方相同岐天師曰華君言是批天師曰妙雷公曰我亦有方治癰疽方用生甘草五錢金銀花三兩當歸一兩元參五錢天花粉三錢白礬一錢附子一片水煎服初起者一劑即消腫起者二劑即消神方也批更妙之甚孫真君曰我亦有奇方傳子凡癰初起用白礬一兩金銀花三兩水煎服一劑即消發背亦然完治法論頭痛論腦痛論兩臂肩膀痛論兩足痛腰下痛天師曰完者如病頭痛腦痛手足兩臂疼痛兩肩背疼痛腰以下痛不必支解刀破囫圇而治之也如頭痛者用黃酒一升入細辛一兩川芎三兩白芷一兩煮酒一醉而愈張公曰此等治法世人不知亦不敢用我為開導之頭痛至終年纍月其邪深入於腦可知一二錢之散藥安能上至巔頂而深入於腦中必多用細辛川芎白芷以大散之也或疑散藥太多必損真氣恐頭痛未除而真氣先行散盡誰知風邪在頭非多用風藥必難成功有病則病受之何畏哉一醉而愈此方信而不必疑者也惟是既愈之後必須用熟地五錢芍藥五錢當歸五錢川芎一錢山茱萸三錢麥冬三錢水煎服四劑為妙批補血生水湯妙天師曰腦痛用黃酒一升柴胡五錢白芍三兩辛夷三錢郁李仁五錢麥冬五錢桔梗三錢甘草一錢水三碗煎湯入前酒飲之一醉而愈量好者再飲之以酒必以醉為度批清腦平灑丹張公曰腦痛之病乃風入膽經也膽應於腦故腦痛人以用柴胡太多過於辛散不知有白芍以和之則不散氣而轉能散邪辛夷郁仁皆入膽之妙品桔梗甘草又入肺之妙藥膽病何以又兼治肺不知鼻上通於腦腦熱則必下流清水久則必成鼻淵矣兼治其肺則肺氣清肅自去平膽木之旺而清涕不致下行此立方之神妙有如此天師曰兩臂痛與兩肩膊痛亦用黃酒二升當歸三兩白芍三兩柴胡五錢羌活三錢半夏三錢陳皮五錢白芥子三錢秦艽三錢附子一錢水六碗煎二沸取汁入黃酒內一醉為度張公曰臂與肩膊乃手經之病肝氣之郁也妙在用白芍為君以平舒肝木之氣不來侵克脾胃之氣而柴胡羌活又善去風且直走手經之上而秦艽亦是風藥兼附而攻邪自退出半夏陳皮白芥子皆祛痰聖劑風邪去而痰不留更得附子無經不逐又何有餘邪之尚存哉自然一醉而愈也天師曰兩足痛腰以下痛用黃酒二升黃耆半斤防風五錢薏仁五兩杜仲一兩茯苓五錢車前子三錢肉桂一錢水十碗煎二沸取汁二碗入酒內一醉而愈以上皆風入四肢頭項背間腰以下也借黃酒一味無經不達引其藥味而直入病中也此所謂完全治法也張公曰腰足痛明是腎虛而氣衰不能運動更加之濕自必作楚妙在不補腎而單益氣氣足則血生血生則邪退又助之薏仁茯苓車前之去濕濕去則血更活矣況更助之杜仲之健腎肉桂之溫腎防風之蕩風乎相畏而相使相佐而相成必然之理也華君曰此一門未嘗傳豫無可論雷公曰頭痛豫有神方傳子方用川芎一兩沙參一兩蔓荊子二錢細辛五錢水二碗煎八分加黃酒半碗調勻早晨服之一劑永不再痛此方妙在用沙參蓋沙參補陰原不入腦今用於川芎之中而蔓荊細辛直走於巔則沙參不能下行不得不同群共入於腦中夫腦痛者因腦陰之虛風得留之而不去今補其腦則風不能存而腦痛自愈而頭痛亦除矣此方不特治頭痛兼治腦疼無不神效更有一方治腰痛如神方用白朮三兩芡實二兩薏仁三兩水煎服一劑即愈此方妙在用白朮以去腰間之濕氣而芡實薏仁又是去濕之物濕去而腰臍自利汝老年恐有腰痛之疾可服吾方自無痛楚亦只消一劑多則陽旺反非學道人所宜妙極之方也此方治夢遺亦神效亦只消一劑天師之言也凡頭痛因風寒者藥宜酒煎因火邪者藥宜茶清李子永識碎治法論瘤論癭論治頑癬論接舌生舌論生齒固齒碎治法最奇人有病腹中癥結或成蟲形鳥形蛇形各藥不愈或頭內生鵲手內生鳩之類必內無異症而外顯奇形如癭如瘤之類必須割去瘤癭去其鳥鵲始能病愈然此猶是節外生枝雖動刀圭無傷內臟用生肌之藥一敷上即如無病之人獨是腦內生蟲必須劈開頭腦將蟲取出則頭風自去至於腹中龜蛇鳥蟲之類亦必割破小腹將前物取出始可再活第術過於神奇不便留方存此説以見醫道之奇有如此論其治法先用忘形酒使其人飲醉忽忽不知人事任人劈破絶不知痛癢取出蟲物然後以神膏異藥縫其破處後以膏藥貼敷一晝夜即全好如初徐以解生湯藥飲之如夢初覺而前症頓失矣自青囊傳後華君獲罪之後失傳者數千載矣今再傳術遠公終不敢以此等術輕授使遠公再犯也前車可鑑勿再重求子既以癭瘤之類再請吾不敢祕再傳子以全活人可也癭瘤不同癭者連肉而生根大而身亦大瘤者根小而身大也即瘤之中又各不同有粉瘤有肉瘤有筋瘤有物瘤筋瘤不可治亦不必治終身十載不過大如核桃粉瘤則三年之後彼自然而破出粉如線香末出盡自愈亦不必治也肉瘤最易治用水銀一錢兒茶三錢冰片三分硼砂一錢麝香三分黃柏五錢血竭三錢各為細末將此藥擦於瘤之根處隨擦隨落根小者無不落也物瘤則根大最難治不特而動無故而鳴或如蟲鳴或如鳥啼必須用刀破其中孔則物自難居必然突圍而出後用生肌神藥敷之則瘤化為水平復如故矣此乃不敬神鬼觸犯歲君而得病不可測非理可談故吾內經不言然世未嘗無此病也生肌散開後人參一錢三七根末三錢輕粉五分麒麟血竭三錢象皮一錢乳香去油一錢沒藥一錢千年石灰三錢廣木香末一錢冰片三分兒茶二錢各為絶細末研無聲為度修合時須用端午日不可使一人見之癭不同形亦各異然皆濕熱之病也由小而大由大而破由破而死矣初起之時即宜用小刀割破略出白水以生肌散敷之立愈倘若失治漸漸大來用藥一點點其陷處半日作痛必然出水其色白者易愈黃者紅者皆難愈然服吾藥無不愈也點藥用水銀一錢硼砂一錢輕粉一錢鵲糞一錢鶯糞一錢冰片五分潮腦五分緑礬一錢皂礬一錢麝香三分為絶細末用針刺一小孔然後乘其出血之時將藥點上則黏連矣約用一分以人乳調之點上大如雞豆子一日點三次第二日必然流水流水之時不可再點點則過痛轉難收口矣三日後必然水流盡而皮寬如袋後用煎方必然平復如故煎方開後人參三錢茯苓五錢薏仁一兩澤瀉二錢豬苓一錢黃耆一兩白芍五錢生甘草一錢陳皮一錢山藥三錢水煎服十劑全消如故但忌房事一月余無所忌若犯房事必破不能收口終身成漏矣張公曰碎治之法尚多吾當廣之人有病手臂生瘡變成大塊如拳頭大者必須用刀割去人必暈絶不可學也吾有奇方止用小刀略破其皮一分後以末藥敷之即化為水神方也方用人參三錢甘草一錢硼砂一分冰片一分輕粉半分各為末摻之即化為水矣此方乃化毒奇方不可輕視更人有肚上生瘡結成頑塊終年不去者亦可照上法治之立效凡人有生蟲鳥之病於身上臂上頭上者岐真人已傳妙方何必再傳未有奇於岐真人者故耳有足上生瘤如斗大者我有一法不必破碎治之止用針輕輕刺一小針眼以前藥敷之必流水不止急用煎方治之方用人參三兩黃耆三兩生甘草薏仁各五兩白芥子三錢水煎服二劑即消盡其水而人絶無憊色內外雙治之法然終以針刺其孔不可為非碎治也此方之妙乃補其本源之氣又利水而不走其氣刺其孔而出水未免大損元氣今補其氣又何懼水之盡出哉此方之所以奇也妙也天師曰碎治有七法未傳一法洗其筋一法破其腦一法破其腹一法洗其腸一法換其舌一法換其皮一法接其骨也子不信乎非皮也乃言皮內有病而去其皮別生皮也舌有人咬斷而接之也破其皮血即癭瘤法也本不宜傳吾子善問再傳二法皮上生頑癬終歲經年服藥無效擦治無功用刀削去其頑癬一塊之皮用前生肌藥敷五錢摻之必癢不可當削亦不十分痛當用麻藥與飲使人不知然後用刀摻藥麻藥方開後羊躑躅三錢茉莉花根一錢當歸一兩菖蒲三分水煎服一碗即人如睡寢任人刀割不痛不癢換皮後三日以人參五錢生甘草三錢陳皮五分半夏一錢白薇一錢菖蒲五分茯苓五錢煎服即醒蓋羊躑躅專能迷心茉莉根亦能使人不知用菖蒲引入心竅以迷亂之耳不服人參可十日不醒後用人參解之者正氣盛則邪藥自解各味皆助正之品亦用菖蒲引入心經也身溫而臥安如酣睡人也凡人有被人咬落舌尖或連根咬斷者或一日或二日或半月俱可接之速用狗舌一條觀其人舌之大小切正如人舌光景將病人舌根伸出病人座在椅上仰面頭放在椅背上以自己手拿住喉嚨則舌自伸出急將狗舌蘸藥末接在人舌上一交接永不落矣未藥方開後龍齒用透明者三錢冰片三分人參亦用透明者三錢象皮一錢生地三錢土狗三個去頭翅地蝨二十個先將人參各項俱研末後用地蝨土狗搗爛入前藥末內搗之佩身上三日干為末盛在瓶內遇有此等病為之醫治可也批接舌神丹此藥末接骨最奇服下神效骨斷者服一錢即愈神方也聞人説咬落舌頭者以醋漱之可以重長師曰亂道肉逢酸則縮豈有反伸出之理要重生必是仙丹汝既禱天我當傳子人參一兩煎湯含漱者半日以一兩參湯漱完然後已再用龍齒末三分人參末一錢麥冬末一錢血竭三分冰片二分土狗一個地蝨十個各火焙為末放在土地上一刻出火氣將此末乘人參漱口完時即以此末自己用舌蘸之使令遍不可將舌即縮入口中放在外者半刻至不能忍然後縮入可也三次則舌伸長矣仙丹也奇絶神妙不可思度也批生舌仙丹長齒法方用雄鼠脊骨全副余骨不用尾亦不用頭亦不用骨碎補三錢炒為末麝香一分熟地身懷之令乾為末三錢但熟地必須自制切不可經鐵器一犯則前藥俱不效矣生地亦須看一做過經鐵針穿孔者即不效細辛三分榆樹皮三分總之群藥俱不可經鐵器當歸一錢青鹽二錢杜仲一錢足矣各為絶細末鼠骨去肉不用新瓦上焙乾為末不可燒焦乘其生氣也用一瓷瓶盛之每日五更時不可出聲將此藥輕擦在無牙之處三十六擦藥任其自然咽下不可用水漱口一月如是日間午間擦之更佳亦如前數固齒方用雄鼠脊骨一副當歸一錢熟地三錢細辛一錢榆樹皮三錢骨碎補三錢青鹽一錢杜仲二錢各為末裹在綿紙成條咬在牙床上以味盡為度一條永不齒落矣然亦不可經鐵器經則不效然汝亦幸虧此藥所以五十外不動搖也汝後不必愁昨服吾符故也傳汝救人可耳此藥可救數百人大約一人須用三條張公曰洗筋之法最難傳亦最難效止可言治症可也筋之縮也由於血之不養然血久不能養筋則筋縮急而不能再生必須割開皮肉用藥洗之倘不得其法藥不得真者必不能成功反致殺人何若不傳之為妙歟破腦尤不可輕傳曹公非明鑑乎以生人而輕破其腦則人已死矣又誰信再活乎喧譁擾攘之中何能靜思方法而望其重蘇乎破腹之法腸胃皆見人必如死謂能再生人斷不信洗腸亦然此岐天師所以隱而不言而今亦不必輕傳徒取人物議若換舌換皮岐天師各留異術今亦安能再助高深哉接舌已奇生舌尤奇非仙傳世人安得此方法乎願人尊之千萬年而勿失耳生齒固齒小術也不足為異姑存之以備考而終非破治之法如此當刪去另附於後可存之處可也華君曰此傳豫之法而無自長舌之方大治法論痿症論腎虛如白虎湯症論汗出如雨不止論直中陰經論治陽明之火天師曰大治法周身有病統上下左右盡治之也如氣血全虧一身多病或頭痛未已而身骨痛或腹痛未已而四肢盡痛是也雖此等病乃痿症居多自宜專治陽明胃火然而胃火既盛一身上下四肢盡行消瘦又不可專治胃經一門也方用人參三錢茯苓三錢薏苡仁五錢當歸三錢黃耆三錢甘菊花一錢元參五錢麥冬一兩陳皮五分神麯五分白芥子三錢白芍三錢熟地一兩水三大碗煎一碗服之批雙補至神丹蓋陽明火盛理宜用竹葉石膏湯矣而此偏不用反用參苓耆熟為君補其氣血者何也胃火過盛已鑠氣血再用白虎湯雖一時解其火勢之燎原然而焦頭爛額必致重亡其津液不若用補氣血之藥大劑煎飲使水足而火自息方中宜用元參麥冬甘菊之品純是退陽明之味而陽明即有火勢之燎原亦能撲滅況又重加之當歸生血之類以滋化源乎但諸藥若小其劑則不特無益而反助火勢之飛揚此大治之所以妙也大約大治之法施之於虛症最宜乘其初起胃火有餘即以大劑與之可以轉敗為勝若因循時日畏首畏尾初時不敢用大劑乃至胃氣已衰而後悔悟始用大劑遲矣其病宜用大劑者則發背癰疽切忌小治尤當以大劑與之另有專門茲不再贅張公曰大治實陽明胃火之患不止癰疽發背更有症如腎虛而火沸騰如白虎湯症者亦宜用大劑六味地黃湯治之更有腎水泛上吐痰傾盆者亦宜用六味湯加附子肉桂煎湯數碗大碗飲之而愈皆不可小治之也凡腎水腎火之虛上焦雖現熱症而其舌終滑而不燥非若陽症之干極而起刺也更有大汗之症汗如雨出不可止抑氣息又復奄奄不是發狂熱症若不急用大補之藥則頃刻亡陽而死矣方用人參三兩白朮四兩當歸三兩桑葉十片麥冬三兩北五味三錢黃耆三兩水煎服批止汗定神丹此方純是補氣之藥氣足則汗止而陽返於命門之宮矣倘以小小之劑治之又何以補生元氣於無何有之鄉哉吾見其立亡而已矣更有直中陰經之症陰寒之氣斬關直入於腎宮命門之火逃亡而將越出於軀殼之外非用大劑補火之藥何以追散失之元陽而返其宅哉方用人參一兩白朮三兩附子二錢肉桂一錢乾薑二錢水三碗煎服一劑而愈批參朮附桂湯此方用人參白朮實有妙用驅寒之品而不用此二味寒去而氣隨之去矣故必用二味且必須多加而元陽始足可留於將絶之頃也此皆大治之法不可不知華君曰天師不曾傳豫有一論可參觀陽明之火勢最盛最急若不以大劑退火之藥與之立刻將腎水燒乾矣然過用寒涼必致轉傷胃氣胃氣既傷則胃火益勝雖石膏湯中有人參以救胃氣然終不勝攻之大烈也愚意石膏用一兩者人參必須亦用一兩或石膏用至二三兩則人參斷不可止用一兩必須多加為妙即不敢加至三兩亦必須加至一兩五錢與其火退之後再用人參何若乘其火盛之時而倍用之攻補兼施火勢衰而胃氣又不復損之為得也豫治陽明火盛往往奏功如響者人參同石膏兼用而無偏重之勢故耳此豫獨得之祕因遠公為天師所愛不惜盡傳無隱願遠公謹聽吾言必與參同用無分輕重也此段再請教天師與長沙公何如批雷公曰華君之言至當也天師曰妙論不刊諸病凡胃氣衰者用藥不可大劑不可不知更有暴病中寒脈微欲絶四肢冰冷者初服須急服生附乾薑各五錢救之參術又在所緩此説本之嘉言喻氏李子永識小治法論治氣不順論治上焦之痰論中風不語天師曰小治法者乃上焦之病也病既在上焦若大其劑則勢下行反為不美如胸膈不利或痰盛閉塞或一時中風不語皆當以小劑治之小劑方甚多舉三四之病可悟其餘譬如胸膈不利此氣不順也可用蘇葉一錢半夏一錢甘草一錢桔梗一錢百部五分治之批順氣湯一劑快然無礙矣如痰盛閉塞作痛者乃痰在上焦也用天花粉一錢甘草一錢柴胡一錢陳皮五分半夏一錢蘇子一錢治之批化痰飲或用瓜蒂七個或用皂角一個以水煎湯吐之皆小治之法也或中風不語者亦用瓜蒂散皂角湯探吐之然必看其真正中風始用二方吐之否則萬萬不可輕用真正中風平日自然壯盛能御風寒不畏寒熱之人既中之後雙目突出手足亂舞痰色黃結成塊大小便閉塞不通者是若安靜平日人衰弱臨症之時氣息如無大小便自遺手撒眼閉浮腫作水雞聲不十分響者乃氣虛也切不可與瓜蒂皂角二湯當與前三生飲加人參一兩治之張公曰人以為輕病也不十分留心誰知大病成於小病乎小病而斟酌盡善又何大病之生也岐天師忽用大劑以治大病忽用小劑以治小病如神龍變化不可測度真聖化神兼而立方也華君曰不必談亦無可談偏治法論治心痛論上熱下寒論兩脅脹滿論胃氣痛脾不化食論痿論厥論吐血論治頭痛腰背手足痛論夢遺喘嗽口眼歪斜目痛天師曰偏治者乃一偏之治法譬如人病心痛不治心而偏治肝譬如病在上而偏治下譬如病在右而偏治左譬如病在四肢手足而偏治其腹心也心痛人以為病在心也不知心乃神明之宰一毫邪氣不可干犯犯則立死人病心痛終年纍月而不愈者非心痛也乃包絡為心之膜以障心宮邪犯包絡則心必痛包絡名為膻中乃心之臣也相為賊所攻君有不振恐者乎臣辱則君憂此心之所以痛而不寧也然則宜治包絡何以必責之肝也肝屬木包絡屬火肝木生心火治其肝木之寒則心火有養而包絡之寒邪自散況肝木之氣既溫生心之餘必能來生包絡故不必救包絡而必先救肝肝木得寒則澀而不舒散肝中之邪即所以散包絡之邪也方用蒼朮二錢白芍五錢當歸一兩肉桂一錢良薑一錢水煎服批定痛至聖丹此寒邪犯包絡之方如此更有熱邪來犯包絡奈何寒邪之犯必惡寒見水則如仇讎手火燠之則快熱邪之犯見水喜悅手按之轉痛是也故熱痛之病必然呼號不能安於床席治法亦責之肝蓋包絡之熱由於肝經之熱也瀉其肝木之旺而去其鬱熱之火不必救包絡之焚而包絡之火自衰矣方用白芍一兩炒梔子三錢甘草一錢當歸三錢生地五錢陳皮八分水煎服批解熱至聖丹二劑即安然如故此偏治之一端也病在上者乃上焦火熱之盛吐痰如湧泉面赤喉痛上身不欲蓋衣而下身冰涼此上假熱而下真寒也方用附子一個熟地半斤山茱萸四兩北五味一兩麥冬一兩茯苓三兩澤瀉三兩丹皮三兩山藥四兩肉桂一兩水十餘碗煎四碗探涼與病人服之二刻內四碗服盡立刻安靜此病在上而下治之法也批增減地黃湯雷公曰上熱下寒豫更有方用熟地三兩山萸一兩車前子三錢肉桂三錢牛膝五錢麥冬五錢北五味三錢水煎冷服一劑即安可佐六味湯也天師曰此方奇妙蓋此病乃下焦腎中水火俱耗盡真陰而元陽無可居之地於是上騰而作亂倘以寒藥救之則愈熾以補氣藥救之則反危必須用八味地黃湯大劑與服加麥冬五味少救其肺金之氣下治而上自安子不見天地之道乎冬至之時地下大熱則天道自寒夏至之時地下大寒天上自熱人身亦如是也腎經熱則頭目咽喉心肺皆寒安享其清肅之氣腎經寒則頭目咽喉心肺反生其拂逆之躁矣此亦上病下治之一法也病在左者如兩脅脹滿不可左臥者此病在肝也法亦專治肝矣今偏不治肝而兼治肺蓋肝木之旺由於肺經之虛金不能制木則木愈盛木盛則脾土更無所養肺金益虛則肝木益旺而病無已時也方用人參一錢黃芩三錢麥冬三錢甘草一錢白芍三錢當歸三錢柴胡一錢茯苓一錢陳皮五分水煎服一劑知二劑愈四劑全瘥蓋參耆乃補氣之味與肝木不相干也雖用柴胡舒肝然而柴胡亦是肺經主藥一味而兩用之白芍當歸雖專入肝經然亦能入肺所以同群入肺以助氣而非逐隊以平肝此左病治右之一法也右病治左可以悟矣豫再傳一方人病胃氣痛或脾氣不好不能飲食或能飲食而不能化作痛作滿上吐下瀉者此乃肝經來剋土也平其肝木則脾胃之土得養而前症俱愈矣方用白芍三錢甘草一錢當歸二錢柴胡二錢茯苓三錢白芥子一錢有火者加炒梔子二錢無火者加肉桂一錢水煎服此方再加白朮三錢有食者加山楂二錢傷米食者加枳殼一錢麥芽一錢有痰者加半夏一錢此方雖白朮茯苓乃脾胃之品然其性亦能入肝白芍當歸柴胡則純是肝經之正藥有此三味直入肝經則各藥無不盡入肝以平木木平則脾胃之土安然況有食則化食有痰則祛痰有火則散火有寒則去寒有不功效立奏者乎此右病而左治之一法也治在腹心者乃人生瘍生癰或痿厥之類是也癰瘍不治癰瘍而內治其中氣少加以祛邪散火之品是也備有專門茲不再贅如痿症厥症甚多不能枚舉止舉一二之病可觸類而通人有痿症終年不能起床面色光鮮足弱無力不能舉步者人以為兩足之無力也不知乃陽明火盛不必去治兩足止平其胃火則火息而足自堅凝若不平胃火而徒用補陰之劑則飲食愈多而兩足益弱法當用元參三兩麥冬一兩甘菊花三錢人參一錢熟地一兩菟絲子一錢水數碗煎湯四碗恣其吞飲則胃火漸平而兩足自然生力此不治足而正所以治足也厥病一時手足厥逆痛不可忍人以為手足四肢之風症也不知乃心中熱蒸外不能泄故四肢手足則寒而胸腹皮熱如火方用柴胡三錢當歸二錢荊芥一錢黃連二錢炒梔子二錢半夏一錢枳殼一錢水煎服一劑即平二劑即全愈批雷公治厥方用白芍一兩炒梔子三錢陳皮一錢柴胡一錢天花粉二錢水煎服治熱厥最妙以其入肝而平木也妙蓋厥症多是火病厥之甚則熱之甚也故舒其內熱而四肢手足自溫矣方中妙在用柴胡為君用諸寒涼之藥直入心肝之內又不凝滯於胸膈之間蓋柴胡能散半表半裡之邪又善疏泄鬱悶之氣若止治其四肢手足之風而不直搗其中堅則賊首不擒餘黨安息故不治四肢手足而專治其心胸也以上三法亦偏治之一法也張公曰此一門余無可贊高深無已則再言厥症痿症痿症中有不是陽明之痿不可不辨其症亦不能起床亦能善飯亦骨無力不能起立人以為此痿症也而不知非痿症也此腎寒極而火沸騰似痿而非痿也初起之時未嘗不是陽明火熾而來用寒涼折服之則胃火息矣而腎水熬干夜必咳嗽吐痰而日間轉覺少輕呻吟床席飲食少遲更覺難堪方用元參一兩麥冬三兩熟地二兩水煎服若有肝火者加白芍五錢水煎服四劑可以起床後用六味湯大劑煎飲加麥冬一兩五味一錢熟地一兩山茱萸四錢山藥三錢丹皮三錢澤瀉二錢茯苓二錢水煎服此方妙在用元參麥冬滋肺金而去心間之遊火又妙在用熟地以補腎水則水足而胃火自堅矣肺金自然下生腎水則腎水藏於腎宮不上衝咽門不必止嗽而嗽自除矣厥症雖多是火然亦有非火而亦厥者乃直中陰經也陰寒直入於腎宮則必挾腎水上犯心君之火君弱臣強犯上自所不免若不用大熱之藥急救心君則危亡頃刻方用人參三錢白朮一兩附子一錢肉桂一錢吳茱萸一錢水煎服一劑即愈批急救寒厥湯然寒厥與熱厥大相懸絶不可不辨寒厥手足必青飲水必吐腹必痛喜火尉之若熱厥手足雖寒而不青紫飲水不吐尉火則腹必加痛是也能辨症清而用藥者下喉即定便是神醫何必用追魂之符録哉華君曰偏治法多有未全豫為補之人有病吐血者似乎胃經之病而不知非胃乃腎火之衝上也若止治胃則胃氣益傷胃傷則無以輸精於腎而腎水益虛腎火愈熾吐血無已時也法當峻補腎水水足而火不上沸矣方用六味地黃湯加麥冬五味大劑吞飲血症可痊否則用寒涼之品暫時止血而血之沖決安能止抑哉如人病頭痛者人以為風在頭不知非風也亦腎水不足而邪火衝入於腦終朝頭暈似頭痛而非頭痛也若止治風則痛更甚法當大補腎水而頭痛頭暈自除方用熟地一兩山茱萸四錢山藥三錢北五味二錢麥冬二錢元參三錢川芎三錢當歸三錢葳蕤一兩二劑即愈批定風去暈丹此方妙在治腎而不治風尤妙在治腎而兼治肝也肝木不平則肺金失化源之令而腎水愈衰今補肝又補腎子母相資自然上清頭目況又入麥冬五味以滋肺金之清肅乎所以下喉即安然也如人患腰痛者人以為腎之病也不知非腎乃脾濕之故重如系三千文法當去腰臍之濕則腰痛自除方用白朮四兩薏仁三兩水六碗煎湯一碗一氣飲之一劑即痛如失此方不治腎而正所以治腎世人未知也如人患背痛者人以為心病而非心也乃膀胱之氣化不行故上阻滯而作痛法當清其膀胱之火背痛自止蓋膀胱乃腎之府腎虛膀胱亦虛夾脊乃河車之路膀胱借腎道而行所以腎脊作楚耳方用熟地一兩茯苓五錢肉桂三分車前子三錢澤瀉三錢薏仁五錢芡實五錢水煎服二劑膀胱之水道大通而背脊之疼亦愈矣批護背丹蓋熟地乃補腎之聖劑腎足而膀胱之氣亦足況又有茯苓車前薏仁等類以瀉其水而肉桂又引入諸藥直達膀胱以通其氣自然化行而水泄水泄而火散上行之鬱結有何不除此痛之所以立效也如人手足痛者人以為脾經之熱不知非脾也乃肝木之鬱結也散其鬱氣則手足之痛自去方用逍遙散加梔子三錢半夏二錢白芥子二錢水煎服二劑即痛如失蓋肝木作祟則脾不敢當其鋒氣散於四肢結而不伸所以作楚今一旦平其肝氣而脾氣自舒脾舒而痛在手足有不盡除者乎如人病在兩足之弱不能步履人以為腎水之虧不知非腎也蓋氣虛不能運用耳方用補中益氣湯加牛膝三錢金叉石斛五錢黃耆一兩人參三錢治之二劑即足生力四劑可以步履矣蓋人參耆術皆補氣之聖藥而牛膝石斛亦健足之神劑所以兩用之而成功如人病夢遺者人以為心氣之虛不知非心也蓋腎水耗竭上不能通於心中不能潤於肝下不能生於脾土以致玉關不關無夢且遺徒責之夢中之冤業誰任其咎法當大劑補腎而少佐以益心益肝益脾之品自然漸漸成功不止而止也方用熟地一兩山茱萸四錢北五味一錢茯苓三錢生棗仁五錢當歸三錢白芍三錢薏仁五錢白朮五錢白芥子一錢茯神二錢肉桂三分黃連三分水煎服批斷夢止遺丹一劑即止夢遺十劑即全愈此方妙在心肝腎脾肺五臟兼補不止止其遺安其夢尤妙在黃連肉桂同用使心腎兩交自然魂魄寧而精竅閉若不補其五臟而惟是止澀之則精愈旺而夢益動久則不須夢而自遺矣此方之所以奇妙而入神也如人病喘嗽者人以為肺虛而有風痰不知非然也乃氣虛不能歸元於腎而肝木挾之作祟耳法當峻補其腎少助引火之品則氣自歸元而痰喘可息方用人參一兩熟地二兩山茱萸四錢麥冬五錢五味子一錢牛膝一錢枸杞子一錢菟絲子一錢茯苓三錢白芥子一錢水煎服此方妙在多用人參於補腎之中使其直走丹田氣海而生元陽之神而火自歸元不致上沸一連數劑必獲奇功倘以四磨四七等湯治其風痰一線元陽必致斷絶不救矣以上諸治皆偏治之最奇最效者不可不補入也如人病口眼歪斜人以為胃中之痰不知非也乃心中虛極不能運於口目之間輕則歪斜重則不語方用人參一錢白朮五錢茯苓三錢甘草一錢陳皮一錢肉桂一錢菖蒲五錢半夏一錢當歸五錢白芍五錢治之一劑少愈二劑全愈此方之妙全不去祛風法邪一味補正而歪斜自愈此方之所以為妙也如人病目痛而澀無淚紅赤人以為熱不知非熱也乃腎水虧而虛火衝上耳方用六味地黃湯加柴胡一錢白芍三錢當歸三錢甘菊花三錢治之一劑輕二劑全愈此亦上病治下之法可以參觀並傳之始發熱漸至壯熱而後厥者為熱厥始不發熱而厥者為寒厥李子永識全治法論治癆病論虛癆論治癆蟲天師曰全治者乃人病癆瘵之症也癆病用不得霸藥宜用通身清火之味治之批癆症與虛損症外症大相似而治實不同虛損者陰陽兩虛癆症陰虛陽亢故虛損可用溫補癆症用清補而忌用溫也辨證法不必憑脈只看人著復衣此著單衣者為癆人著單衣此著復衣者為虛損一骨蒸而熱一營衛虛而熱故也李子永識方用熟地五錢地骨皮五錢藥雖多而功用平和也丹皮二錢元參一錢人參三錢白朮三分桑葉五片麥冬二錢北五味五粒茯苓二錢芡實五錢山茱萸一錢白芥子三分棗仁五分沙參二錢水煎服批首方實平補神丹此方妙在地骨皮為君以入陰中平其虛火而又不損其脾胃之氣余又加芡實茯苓以利其濕氣則熟地專能生陰中之水少加人參以補微陽而不助火則肺金有養矣又益之麥冬五味補其肺金則金能生水水生自能制虛火而相火下伏不奪心主之權則一身安寧此全治之法也更有一法治人虛勞而未成癆瘵之症方用熟地一兩山藥一兩山茱萸三錢麥冬三錢棗仁一錢人參一錢茯苓二錢陳皮一錢甘草一錢沙參三錢白芥子一錢芡實五錢白芍三錢遠志八分丹皮一錢水煎服此方亦通身補其氣血之方也不寒不熱不多不少不偏不倚乃至中之方當以此為主治初起之癆役也蓋癆役之方當世推尊補中益氣其方原無不利但補中益氣湯治飲食內傷兼帶風邪者最妙不能治無有風邪而兼癆役內傷之症也吾今立方名為和平散以治內傷而無外感者神效亦全治之一法也癆病前方妙矣如前方服之不見起色者必有癆蟲尸氣當用一方用鬼箭三錢鱉甲一兩地栗粉半斤生何首烏半斤熟地半斤神麯二兩白薇三兩人參五錢柴胡五錢鹿角霜六兩地骨皮五兩沙參五兩各為細末蜜為丸每日服前湯後送下五錢一日二次批斷蟲神丹此方善能殺蟲又不傷耗真陰之氣真全治之巧者因遠公善心余不吝罄傳天下無癆蟲尸氣之憂矣大約此藥可服半料即止不必盡也此丸服半料後當改用六味地黃丸加麥冬三兩五味一兩足矣不必另立方矣骨蒸有汗者宜用丹皮無汗者宜用沙參若地骨皮則有汗無汗俱宜服之張公曰癆病最難治非偏於熱則偏於寒非多於清即多於補正以當世無可遵之方今岐天師酌定此三方煎丸並用平補無奇實有鬼神難測之機余又安敢以鄙淺而參間之然而至神之中不妨少益至微之語前方可服五劑即當服吾地黃丸湯一劑再服前湯五劑又服餘地黃湯一劑如此間服則水勝於火陽勝於陰不至有偏旺之虞雖岐天師方中補陰之品多於補陽然而陽常有餘陰常不足似乎多服補腎水之劑尤為無弊也方用熟地一兩山茱萸四錢澤瀉一錢五分丹皮一錢五分山藥三錢茯苓三錢麥冬三錢北五味五分水煎服此方即六味地黃湯加麥冬五味者也余特另酌分兩以示世之善用六味地黃湯者華君曰此未傳豫之法也無可談雷公曰我亦有方傳子癆病已成人最難治蓋有蟲生之以食人之氣血也若徒補其氣血而不知入殺蟲之品則飲食入胃止蔭蟲而不生氣血矣但止殺蟲而不補氣血則五臟盡傷又何有生理哉豫方於大補氣血之中加入殺蟲之藥則元氣既全真陰未散蟲死而身安矣方用人參三兩熟地八兩何首烏生用八兩地栗粉八兩鱉甲醋炙一斤神麯五兩麥冬五兩桑葉八兩白薇三兩山藥一斤為末打成糊前藥各為末為丸每日白滾水送下五錢半年而蟲俱從大便中出豫方與天師方各有妙理可並傳之孫真君曰未成癆病而將成癆病者用熟地一兩地骨皮五錢人參五分麥冬五錢北五味三分白朮一錢山藥三錢白芥子一錢水煎服此方妙在平補而無偏勝之弊雖熟地多用然有參術以行氣自易制其膩滯故轉能奏功倘謂參木助陽熟地過濕舉世皆不知其妙也更有一方治癆蟲神效棐子半斤鱉甲一斤地栗粉八兩獺肝一付白薇四兩生何首烏一斤各為細末蜜為丸每日臨睡空腹白滾水送下五錢服半料腹中似蟲非蟲盡行便出天師乃治癆蟲已成之聖方而豫乃治癆蟲將成之妙藥也妙生治法論發狂論呆病論花癲論羊癲天師曰生治者乃人未死而若死者用藥以生之也譬如發狂呆病是也發狂多是熱病登高而歌棄衣而走見水而入罵詈之聲叫喊殺人之語不絶於口舌如芒刺飲食不休痰色光亮面如火腫是也方用石膏半斤元參一斤白芥子三兩半夏三兩知母一兩甘草一兩麥冬五兩竹葉數百片人參一兩先用糯米半斤煎湯一鍋去其米粒用湯半鍋將前藥煎之取半碗批救胃自焚湯彼索水時與之飲隨索隨與飲盡必睡急再用元參一斤麥冬半斤煎湯候之批玄麥至神湯一醒呼水即以此湯與之彼必欣然自飲服完必又睡又將渣煎湯候之醒後再與彼即不若從前之肯服亦不必強聽其自然可也後用熟地三兩麥冬三兩元參六兩山茱萸一兩煎二碗與之批勝火神丹妙一劑必愈不必再與此生治之一法也呆病又不如是治法呆病鬱抑不舒憤怒而成者有之羞恚而成者有之方用人參一兩柴胡一兩當歸一兩白芍四兩半夏一兩甘草五錢生棗仁一兩天南星五錢附子一錢菖蒲一兩神麯五錢茯苓三兩鬱金五錢水十碗煎一碗灌之批救呆至神湯彼必不肯飲以雙手執其頭髮兩人拿其左右手以一人托住下頦一人將羊角去尖插入其口一人以手拿住其頭一人傾藥入羊角內灌之倘或吐出不妨益妙盡灌完為止彼必罵詈少頃人困欲睡聽其自醒切勿驚動使彼自醒來則全愈驚醒來則半愈矣此生治之又一法也狂病之方妙在用石膏之多以平其陽明之火然徒籍石膏未免過於峻烈又濟之以元參元參亦能平胃火之浮遊不特去心腎之二火又妙用麥冬以濟之則肺金不畏火之炎上而自能下生腎水腎水生則胃中之火不必治而自愈然而狂病至不知人則痰勢籍火奔騰可知方中又用白芥子半夏以祛逐其痰痰祛則心自清況又有竹葉以清心乎則火易息而人易復也一劑之後又佐以元參麥冬大劑煎飲則火益息而水益深後又用熟地之類滋其腎肺之藥相制而相成字不重奪其造化哉後呆病之方妙在用柴胡以舒泄其不得意之氣又有白芍佐之肝氣一舒心脈自散又妙用祛痰之劑集之於參苓之內則正氣足而邪氣自散尤妙用菖蒲開竅之神品同群共入見匙即開重關領禁之人一旦再享春風之樂是誰之功哉生治法如何可盡舉一而悟其餘耳張公曰遠公心解神怡又何可言尚有一説在狂病多是熱症然亦有不全是熱者不可不辨也狂之症同而寒熱各異熱症發狂如岐天師之方治之可也倘寒症發狂又將何以治之凡人發狂而止罵詈人不口渴索飲與之水不飲者乃寒症之狂也此得之氣鬱不舒怒氣不能發泄其人平日必懦弱不振今一旦而狂病發作耳治之法宜祛痰為主而佐以補氣之藥方用人參一兩茯神一兩白朮五錢半夏一錢南星一錢附子一錢菖蒲三分水煎服批速救寒狂丹此方之妙全在補氣而不十分祛痰蓋寒症發狂與癇症同治加入附子以消其寒氣菖蒲引入心經自然下喉熟睡病如失也方內再加柴胡一錢以舒其肝木之鬱氣尤易奏功遠公醫道通神何知柴胡之妙耶呆病無熱症不必重説華君曰舉二可以類推不必盡傳也豫當傳之豫師所傳之法尚有二方如人病花癲婦人忽然癲癇見男子則抱住不肯放此乃思慕男子不可得忽然病如暴風疾雨罔識羞恥見男子則以為情人也此肝木枯稿內火燔盛脈必弦出寸口法當用平肝散郁祛邪之味一方亦天師所傳用柴胡五錢白芍一兩當歸五錢炒梔子三錢甘草一錢茯神三錢菖蒲一錢麥冬五錢元參三錢白芥子五錢水煎服批散花去癲湯如不肯服用人灌之彼必罵詈不休久之人倦欲臥臥後醒來自家羞恥緊閉房門者三日少少與之飲食自愈一劑後不必更與之藥也此生治之一法更有羊癲之症忽然臥倒作羊馬之聲口中吐痰如湧者痰迷心竅因寒而成感寒則發也天師傳一方治之神效奏功實多方用人參三錢白朮一兩茯神五錢山藥三錢薏仁五錢肉桂一錢附子一錢半夏三錢水煎服此方助其正氣以生心血又加桂附以祛寒邪加半夏以消痰逐去其水自然氣回而癲止也一劑全愈永不再發幸珍視之毋忽羊癲症得之小兒之時居多內傷脾胃外感風寒結成在胸膈之中所以一遇風寒便發舊痰今純用補正之藥不盡祛痰轉能去其病根也若作風痰治之雖亦奏功終不能一止而不再發此天師之方所以奇而正也雷公曰我亦有方傳子治牛馬之癲雖與羊癲同治而症實各異方用人參三兩白朮五兩甘草一兩陳皮三錢生南星一兩半夏一兩附子一錢為末蜜為丸須病未發前服之永不再發批天師云妙甚蓋健其胃氣自不生痰況又佐之祛痰斬關之將乎若羊癲之人亦先以此方治之亦自愈人病來如作牛馬聲即牛馬癲也大約羊癲小兒居多牛馬癲大人居半也死治法論中邪尸厥論見鬼卒倒中毒中惡天師曰死治法者如人死厥不醒人事中風不語或感鬼神之祟或遇山魈之侵一時卒倒不醒人事是也此等病是邪氣中之痰迷心竅也怪病多起於痰不必驚惶治其痰而病自愈然而邪之所湊其氣必虛用祛痰之藥加入於補正之中則病去如掃死者重生方用人參三錢白朮五錢茯苓三錢半夏三錢天南星三錢白芥子一錢生附子五分生薑一大塊搗汁水半酒半共二碗煎八分服外用皂角刺為末人研皂角刺時批刺字疑衍文李子永識先用紙一張濕透封住同在之人鼻孔然後研為細末取一匙於鵝翎管吹入病人鼻孔內必取噴嚏以前藥灌之立醒必吐出痰水半盆或一盆如膠如湯之類或黃黑青紅之色人自然困倦欲睡不可驚他任他自睡醒來用人參一錢白薇一錢茯苓三錢白朮五錢半夏一錢白芥子三錢陳皮五分甘草五分水煎服一劑全愈批回正散此死治之一法也蓋人之中邪必由元氣之虛邪遂乘虛而入故用人參以助其正氣而以半夏白芥子以祛邪與痰天南星尤能入心而祛邪用附子猛烈之將單刀直入邪自驚退故一下口而邪即外越上湧出矣然邪出之後當純補胃氣故又不用祛痰之劑而竟用健脾補胃之品也更有死症治法如尸厥之症亦是氣虛當用人參一兩白朮五錢半夏五錢茯苓五錢菖蒲五錢陳皮五分治之批祛陰至聖丹雷公曰豫治尸厥更易只消一味蒼朮切片三兩水六碗煎三碗灌之盡必吐吐後即愈蓋蒼朮陽藥善能祛鬼故用之者有奇效矣此方凡見鬼者治之俱妙雖同是中邪然前症是陽邪此乃遇陰邪也陽邪者日間遇之陰邪者夜間遇之也後方雖亦用人參以補正而終不用南星之類直入其心中也如不能語言亦用皂角末吹之倘其前二症俱遺尿手撒則多不能救否則皆一劑回生也以上二症皆死治之法也觸類旁通頭頭是道大約治邪之法二方足以包括再看病之輕重用藥之多寡則得之矣張公曰死治之妙盡此二方更求其餘尚有一法是救窮人之法也如人卒然見鬼卒倒或在神廟之內或在棺槨之旁偶遇尸氣感中陰邪鬼魅不省人事者以瓜蒂散吐之必然吐痰如湧泉傾盆而出鬼若遠走則已吐後仍見鬼者痰未淨也又用前瓜蒂吐之以不見鬼為度後用白朮一兩茯苓五錢白薇一錢陳皮五分半夏一錢神麯一錢炮薑一錢水煎服批祛鬼散此法可治貧窮之人以慰遠公憐憫之心也紫金錠亦祛痰聖藥也華君曰天師傳豫尚有二方並傳於君死症有中陰邪陽邪是矣另有中惡中毒之分中惡者如天師所言之類是也中毒者尚未及之如中蛇蟲之毒亦一時猝倒中蛇毒則身必直攛舌必外出眼必細開一縫是也急用雄黃一兩研為細末入水中飛過取水用之而不用雄黃一碗加食鹽少許入滾水一碗同調勻灌之以鵝翎探吐之必吐出惡痰如蝸牛涎者碗許自愈後用人參五錢茯苓五錢生甘草三錢白滾水煎服再加白芷二錢另煎水傾入湯中同服二劑永無後患矣批雷公曰豫中毒亦有神方無論各毒治之俱神效方用白芷二錢生甘草三錢金銀花二兩白礬五錢水三碗煎一碗服之即解毒天師方更勝吾方也更有中金蠶之毒如兩粵間有金蠶人家收留在家用計遣之不去其初有嫁金蠶之法人家感受此蠶則子子孫孫永不脫離最可惡之物也蓋有神人作祟附在此家不肯去人家有不願者將平生所得財物並將金蠶包裹其內故意置在道旁倘人不知其故拾之而歸則金蠶附於身中而不可脫離矣再禱而再送之斷斷不能也天師曾傳豫方治一人神效滅蹤方用雷丸三錢為末同白礬少許調勻倘見金蠶出見之時輒以末少許滲在蟲身之上立時化為紅水如血神道必然震怒作祟倘空中有聲仰將此藥末聽其聲音響處望空灑去則神道必大罵負心而去永不再至矣此余在三國入蜀中親見者近來此風少息然南寧蠻洞中尚有其毒今傳此方以備不虞未為不可天師想因遠公不重至西粵故爾不傳然終隱天師方法吾所以罄傳無隱以表揚天師術之奇也余曾問之矣初起得物之時必然驟富物從空中來其人喜極將金蠶供之廚匱間晨夕拜禱久之人面如金色與金蠶相同服藥無效又久之腹大如臌脹矣當時蜀中盛多此風得金蠶者大約年歲不能出五年必死而金蠶不去也又傳於子子死傳孫往往至滅門之禍幸孔明先生入蜀用符水解之故蜀中今無此症矣
