body:
  text: 卷三射集王治法論飲食難消內傷諸症天師曰王治者不可以伯道治之而用王道治法為必全而尊尚之也如人病已將愈不過飲食難消胸膈不快或吐酸或溏泄或夜臥不寧或日間潮熱俱宜王道治之而不可以偏師取勝方用人參一錢茯苓二錢白朮二錢甘草五分陳皮五分半夏七分此六君子湯也最妙者有熱加黃芩三分夜不睡加黃連五分肉桂五分潮熱加柴胡一錢地骨皮三錢丹皮一錢有食覺胸中少痛加枳殼五分山楂十粒有痰加白芥子一錢咳嗽加桔梗一錢下泄水加車前一錢腹中痛加肉桂五分白芍一錢頭暈加蔓荊子一錢川芎一錢上吐酸水加白芍三錢倍加茯苓飽滿加枳殼五分所謂王道蕩蕩看之平常用之奇妙日計不足歲計有餘何必用參至兩計加桂附以出奇哉此王道之法也張公曰天師用藥多尚霸法此偏以王道出奇真不可測也言醫者細心觀之勿以天師皆用霸術而群以霸道鬥奇置王道於不用又非天師之心並失遠公之求矣華君曰未嘗傳豫霸治法論大渴大吐大瀉大滿發背癰腫天師曰霸治者不可用王道不得已而霸者也如人病至危安可仍用六君子輩迂緩從事以圖速功哉勢必如宋襄之速亡而已故一遇大渴大吐大瀉大滿發背癰腫之類死亡頃刻若不用大劑去毒去邪之藥單刀直進摧蕩逐除而欲尚補正則邪自散之論未有不一敗塗地而不可救者也故必須大劑與之為得大吐方此寒邪直入腎宮將脾胃之水挾之盡出手足厥逆少腹痛不可忍以火熱之物尉之少快否則寒冷欲死方用附子一個白朮四兩肉桂一錢乾薑三錢人參三兩救之下喉便覺吐定再進則安然如故批定吐至神丹雷公曰方中夫人參三兩大吐有火邪而吐者飲之水則厄逆不止與之茶則吐食亦不吐有吐至二三日不已者方用人參一兩炒梔子三錢黃連三錢各為末米糕水調服少少服之若吐再服少少即不吐矣此方名止吐泄火丹蓋吐則未有不胃氣傷者也以人參救胃氣則吐泄自止矣蓋腎水養人何能克心以殺人惟陰寒邪氣直入腎宮則腎火逃避而諸邪挾衆逆犯心君不寧矣所以必用附子肉桂乾薑一派辛辣大熱之物而又必多用人參以定變使諸藥遍列分布無非春溫之氣自然寒邪散而吐止此方之所以霸而奇也大瀉者乃火挾邪勢將膀胱脾中水穀盡驅而出必欲無留一絲而後快腹必大痛手不可按完穀不化飲食下喉即出捷如奔馬若稍稍遲延必死亡頃刻蓋其病得之夏秋之暑熱一遇涼風便起波濤乘風拍浪蕩日掀天直趨海口而下若不急用大劑治之而尚王道之遲遲鮮不敗乃事矣方當用大黃一兩人參二兩黃連五錢車前子五錢甘草一錢水煎服此方之奇全在用大黃既已火瀉何反助其威不知火瀉之症乃火留於腸胃之間若不因勢利導則火不去而水不流故必用大黃以利之也然徒用大黃而不多用人參有攻無補反致損傷真氣矣至方中又加甘草者恐大黃過於猛迅用此緩之也更用車前者分消其水勢也水不入於膀胱則大腸增勢而添流今得車前自然引水歸於故道又何至陸地為水鄉哉此又用霸之妙法也大滿之症此邪壅住上焦而不得散也方用枳殼三錢梔子三錢栝蔞一個天花粉三錢甘草一錢陳皮三錢厚朴一錢五分半夏一錢水煎服此方之妙全在栝蔞蓋栝蔞最能去胸膈之食而消上焦之痰況又佐之枳殼天花同是消中焦之勝藥又有厚朴半夏以逐其胃口之痰尤妙用甘草使群藥留中而不速下則邪氣不能久留自然分散而潛消矣此又用霸之妙法也大渴之症前已備載茲不再談發背前已定方立論俱可通觀亦不再悉張公曰奇談暢論霸道之說無不入神入妙又何能贊一說惟大瀉之症不可不辨大瀉有火瀉有寒瀉天師之言乃火瀉也未言寒瀉豫補之寒瀉之症以一日或數十行數百行腹亦有痛者以完穀不化下喉即出亦死亡頃刻亦多在夏秋之間然則將何以辨之豫辨之熱與痛耳火熱者口必渴舌必燥甚則生刺也苔必黃灰黑色腹必痛而手不可按也若寒瀉者口不渴即渴亦不十分喜飲水舌苔必白滑而不燥腹痛喜手按不按則苦是也然則治之法豈可相同哉法當急用補氣之藥以生其胃氣佐以分消之品方用人參一兩白朮三兩附子一錢茯苓一兩澤瀉三錢豬苓三錢肉桂二錢水煎服批止瀉定痛丹此方即五苓散加人參者也妙在加參至一兩有參始能挽回垂絶之地佐白朮茯苓以去水濕之氣而又有附子肉桂以補命門之火使火熱以生脾土而膀胱氣化水道可通於故轍況又有豬苓澤瀉以分消其水勢乎自然大便實而寒邪去也此霸治之不可不知者又一也其餘天師已言之盡矣不再贅華君曰與豫同傳大瀉方借治火痢甚妙李子永識倒治法論肝葉倒轉論狂言見鬼論墮水淹死天師曰倒治者乃不可順因而倒轉治之也如人病傷筋力將肝葉倒轉視各物倒置人又無病用諸藥罔效必須將人倒懸之一人手執木棍劈頭打去不必十分用力輕輕打之然不可先與之言必須動其怒氣使肝葉開張而後擊之彼必婉轉相避者數次則肝葉依然相順矣批雷公曰如人視正為斜視斜為正亦以此法治之愈更有法以黃酒一壺令病人飲之大醉以竹轎抬之故意跌翻亦必愈也更有痰結在胃中不能吐出狂言如見鬼狀時發時止氣塞胸膛以牛肉五斤水二斗煎湯飲之至不可食而止以鵝翎探吐必大吐必吐至如塊黃色頑痰而後止若不吐出再飲之必以吐盡而止前病頓失後以陳皮茯苓甘草白朮湯徐徐飲之平復如故此倒治之法也張公曰好倒治無可言華君曰同然豫尚有一法未傳如人墮水而死令一人將死人雙足反背在肩上行二里許必然口中倒出水來然後放在灰內半日任其不動然後以生半夏丸納鼻孔中倘冬天則不能救其夏秋之間無不活者必然打嚏而蘇急以人參三錢茯苓一兩白朮五錢薏仁五錢車前五錢肉桂一錢煎湯半盞灌之無不生全也縛治法論肺癰開刀論缺伸兩手不能下天師曰縛治者乃肺中生癰必須開刀有不可內消者必其人不守禁忌犯色而變者也毒結成於肺葉之下吐痰即痛欲死手按痛處亦痛欲死此等肺癰必須開刀將病人用綿絲繩縛在柱上必須牢緊妥當不可使病人知手執二寸之刀令一人以涼水急澆其頭面乘病人驚呼之際看定痛處以刀刺入一分必有膿射出如注乃解其縛任其流膿流血不可以藥敷之後以前膏藥貼之不可遽入生肌散三日後加之可也此縛治之法也問服煎藥否天師曰方用金銀花一兩元參五錢人參三錢甘草三錢足矣可用四劑不必再用肝癰不用刺張公曰縛治法妙極亦無可言華君曰同然豫尚有一症凡人有伸缺而兩手不能下者將人抱住縛在柱上又把木棒打去病人自然把手來遮隔而兩手自下矣下後用當歸一兩川芎五錢紅花五分生地五錢桃仁五個甘草一錢大黃一錢丹皮二錢水煎服二帖全愈比有婦人而得此症者亦縛在柱上令一人解其下衣而彼怕羞自然以兩手下來遮隔亦一時手下亦以前湯與之可愈也肥治法論氣虛多痰天師曰肥治者治肥人之病也肥人多痰乃氣虛也虛則氣不能運行故痰生之則治痰焉可僅治痰哉必須補其氣而後帶消其痰為得耳然而氣之補法又不可純補脾胃之土而當兼補其命門之火蓋火能生士而土自生氣氣足而痰自消不治痰正所以治痰也方用人參三兩白朮五兩茯苓二兩薏仁五兩芡實五兩熟地八兩山茱萸四兩北五味一兩杜仲三兩肉桂二兩砂仁五錢益智仁一兩白芥子三兩桔紅一兩各為末蜜為丸每日白滾水送下五錢批火土兩培丹此方之佳全在肉桂之妙妙在補命門心包之火心包之火足自能開胃以去痰命門之火足始能健脾以去濕況方中純是補心補腎之味肉桂於補藥之中行其地天之泰水自歸經痰從何積此肥人之治法有如此張公曰妙肥人治法不過如此無可再言此乃丸藥方也若有人不肯服丸藥當用煎方豫定一方用人參三錢白朮五錢茯苓三錢熟地一兩山茱萸四錢肉桂一錢砂仁一錢益智仁一錢半夏一錢陳皮五分神麯一錢水煎服批補氣消痰飲此方治氣虛而兼補腎水腎火者也腎中水火足而脾胃之氣自健痰亦漸消矣此方肥人可常用也華君曰同瘦治法論瘦人多火天師曰瘦人多火人盡知之然而火之有餘水之不足也不補水以鎮陽光又安能去火而消其烈焰哉方用熟地三兩元參八兩生地四兩麥冬三兩白芍五兩丹皮三兩沙參二兩地骨皮五兩天門冬三兩陳皮五錢各為末蜜為丸加桑葉六兩亦為末同搗為丸每日白滾水送下五錢批添陰湯妙在元參去浮游之火而又能調停五臟之陽各品之藥陰多於陽則陰氣勝於陽氣自然陰勝陽消又何必石膏知母之紛紛哉雖石膏知母原是去火神劑不可偏廢然而用之於火騰熱極之初可以救陰水之熬干不可用之於火微熱退之後減陽光之轉運此瘦人之治法又如此張公曰妙瘦人多火豫亦定一煎方方用元參一兩麥冬三錢天冬三錢生地三錢熟地三錢山茱一錢北五味五分白芍三錢丹皮二錢白芥子一錢甘草五分水煎服批去薪湯此方皆滋陰之藥而又不凝滯於胃中瘦人常服必無火症之侵矣華君曰同無可談摩治法論手足疼痛論臟腑癥結論頸項強直論口眼歪斜天師曰摩治者撫摩以治之也譬如手足疼痛臟腑癥結頸項強直口眼歪斜是也法當以人手為之按摩則氣血流通痰病易愈手足疼痛者以一人抱住身子以兩人兩腿夾住左右各足一條輕輕捶之千數覺兩足少快然後以手執其三里之間少為伸之者七次放足執其兩手捻之者千下而後已左右手各如是一日之間而手足之疼痛可已臟腑癥結之法以一人按其小腹揉之不可緩不可急不可重不可輕最難之事總以中和為主揉之數千下乃止覺腹中滾熱乃自家心中注定病口微微嗽津送下丹田氣海七次乃止如是七日癥結可消頸項強直乃風也以一人抱住下身以一人手拳而搖之至數千下放手深按其風門之穴久之則其中痠痛乃止病人乃自坐起口中微微咽津送下丹田者七次而後己一日即痊口眼歪斜之法令一人抱住身子又一人桅住不歪斜之耳輪又令一人摩其歪斜之處者至數百下面上火熱而後已少頃口眼如故矣此皆摩之之法也張公曰妙豫不能增一詞華君曰無浴治法論治疥論止手汗論治癩頭天師曰浴治者以水煮滾浴之也如人生瘡生疥者是不可在浴堂內去浴必須在自家屋內用苦參四兩生甘草一兩金銀花一兩蒼耳草半斤荊芥一兩防風一兩生黃耆三兩水煮湯一大鍋乘熱熏之外用席二條裹住身上用衣蓋之使氣不散俟稍涼浴之必至湯寒而後已一日再浴將渣再煎如前浴之三日瘡疥必全愈也熏不可為訓恐引毒入臟腑也熏者乃用藥裹在紙內或在火爐同人熏於被內者是切不可用之不若洗浴之為妙張公曰妙人有手汗出者以黃耆一兩葛根一兩荊芥三錢防風三錢水煎湯一盆熱熏而溫洗三次即無汗神方也即是此湯亦可然不若每日一換藥之為妙也更有癩頭洗方用蝸牛數十條以癩頭洗之二次必全愈亦神方也水三碗煎蝸牛三十條足矣華君曰無達治法論火丹砂疹天師曰達治者乃火鬱於胸中而不得散因而達之外也火氣熱甚蘊蓄日久則熱勢益盛往往變為火丹之症或發砂疹是也若不急為達之則火勢燎原立刻灰燼方用升麻三錢元參八兩乾葛三兩青蒿三兩黃耆三兩水煎服批達郁湯此方之奇奇在青蒿與元參同用蓋火丹砂疹之病乃胃火與肝結之火共騰而外越治肝則胃不得舒治胃則肝不得泄今妙在用青蒿青蒿平胃火兼能平肝火然未免性平而味不甚峻又佐之元參之重劑則火勢散漫無不撲滅矣然而青蒿雖平胃肝之火而胃肝二火相形畢竟胃火勝於肝火又佐以乾葛之平胃此方之斟酌咸善而人不可測度者也達治之法也張公曰達治法古今絶妙異方目中不曾多見此方實奇而當豫更增一方亦可少佐高深白芍三錢柴胡二錢丹皮二錢元參三錢麥冬三錢荊芥三錢生地三錢炒梔子三錢防風一錢天花粉二錢水煎服批固本散此方專散肝木中之火達其肝木之火而諸經之火盡散矣華君曰無孫真人傳治火丹神效絲瓜子一兩柴胡一錢元參一兩升麻一錢當歸五錢水煎服一劑即消批天師云絶奇絶妙之方發治法論疏通肝邪天師曰發治者邪入皮毛腠理將入營衛而急發散之謂也方用柴胡一錢白朮三錢荊芥一錢蘇葉一錢半夏一錢甘草一錢蒼朮一錢丹皮一錢水煎服此方平和之中有妙理蓋木氣之郁最宜平散今所用之藥俱是直入肝經之聖藥自然肝木疏通枝葉調達無風吹動柳葉自繁嫩緑芳草遍出新青宇宙之間無非春氣之舒暢矣此發治之法也張公曰不意天師早已言之矣我前方可廢也豫方即發之也可刪之遠公言是姑兩存之華君曰無奪治法論水腫腹脹跗腫天師曰奪治者乃土氣雍塞而不行不奪則愈加阻滯故必奪門而出而水乃大流也病如水腫之疾腹脹如鼓兩跗如浮按之如泥小便不利大便反結人以為水病誰知皆由於土氣之郁方用雞屎醴一升炒黃色為末以黃酒一斤先將雞屎末盛於新布上後將黃酒灑之不可太驟緩緩衝之則藥味盡下取汁一碗病人服之切不可令病人先知則不肯信心而服使生別病下喉之後腹即作雷鳴一飯之間傾腹而出兩足即減大半再飲一碗全消蓋雞屎善能逐水而又通土性無微不入將從前所蓄之水無不開其水口盡歸大腸而泄此奪法之奇也至於牽牛甘遂非不善於逐水終不勝雞屎神效但已用之後必須禁用飲食否則再發無救行醫者切宜知之有病者切宜記之張公曰雞屎醴果然神效若言甘遂牽牛不及雞屎則未然也二方俱可酌用華君曰同然豫尚有一法未傳水腫之法有用大麥芒二兩煎湯飲之亦消且無後病但須一連數月作湯飲之即泄水而愈藥味平常而奏功甚奇此類是也天師何故不傳豈以無奇而忽之耶然而奏功實神豫終不敢沒其奇天師曰此方止可治初起之水腫而不可治久病之水腫也深治法論病入膏肓骨髓腦中天師曰深治者病患深而深治之也如人病在膏肓或在骨髓或在腦中者是此等症成非一朝則治亦非一日必須多服湯藥於日間久服丸餌子夜半非數百劑非數十斤不能奏效大約勞瘵之症居多而虛勞次之方用熟地一兩山茱萸四錢山藥三錢丹皮二錢澤瀉二錢茯苓三錢北五味一錢麥冬三錢芡實五錢水煎服此朝服方也晚服丸方用紫河車一具鹿角膠二兩龜膠三兩元參三兩熟地八兩山茱萸四兩地骨皮五兩人參二兩白朮五兩白芍五兩炒棗仁三兩枸杞子三兩麥冬三兩人乳二碗浸熟地曬乾砂仁五錢各為末每日半夜白滾水送下五錢此方不熱不寒可以長服方名中正丸病傷根本扶之不易譬如花木大肆摧殘欲其枝葉之茂豈是一朝可成必須培植灌溉終歲經年自然春意漸回萌芽可達漸漸扶蘇而不可性急也方丸並用飲食更須得時深治之難從來眉蹙切勿心急以期奏功之速此深治之法也膏肓病十人止可逃一二論此治法非盡人能救之也但舍此又別無治法余憫世人故又立門如此倘肯聽吾言斷絶色欲口淡滋味心戒貪嗔自然服藥有功否則亦止可苟延歲月而已又不可不告誡也張公曰佛心神術勞瘵之症誠難速效天師之方平穩中實有妙理余更有一方亦極平穩可並傳以備世選用方用芡實八兩薏仁八兩山藥三斤糯米一斤人參三兩茯苓三兩蓮子半斤白糖半斤各為末每日白滾水調服一兩如不欲調服以水打成丸如元宵服亦可上下午服一丸最妙亦可為深治之佐華君曰無雷公曰我亦有一方傳子用芡實一斤山藥二斤黑芝麻八兩小黃米炒三斤薏仁一斤白糖一斤肉桂五錢各為末白滾水每日調服五錢或一兩自能開胃健脾補腎益精也或疑入肉桂恐動火不知人非命門之火不能生長於七斤有餘之藥加桂止五錢不過百分之一何熱之有正取其溫氣以生長脾胃耳方名全生至寶丹批天師曰妙極可常服張真人曰極妙淺治法論細小疾病天師曰淺者因病未深而淺治之不必深治之者也如人患細小疾病何必張皇而用人參驚懼而加桂附飲食不調用六君子可也頭痛用小柴胡湯可也咳嗽用逍遙散可也水瀉用五苓散可也腹痛用小建中湯可也兩肋飽悶亦用逍遙散可也蓋略一舒之自必奏功無容以深中臟腑之藥以治皮毛也此淺治之法又宜知之也張公曰淺治法妙華君曰無長治法論痿症論腰痛論背脊骨痛論兩腿痠痛論胬肉扳睛論痙病天師曰長治者永遠之症不可以歲月計也如病痿症痙症是也痿病必久臥床席不能輒起其故何也蓋諸痿之症盡屬陽明胃火胃火鑠盡腎水則骨中空虛無滋潤則不能起立矣然則止治陽明而骨中之髓何日充滿欲其雙足有力難矣方用元參一兩熟地二兩麥冬一兩牛膝二錢水煎服批消陰堅骨湯此方之妙全在不去治陽明而直治腎經以補其匱乏腎水一生則胃火自然息焰況又有麥冬以清肺氣牛膝以堅膝脛故以此方長治之則痿廢之狀可免若徒以石膏知母之類降其胃中之火火降矣腎水益干又將何物以充足其骨髓乎無怪經年纍月愈治而愈憊也此長治之法不可不知之張公曰妙長治法不止痿痙二項豫為廣之如腰痛背脊骨痛兩腿痠痛兩目生胬肉扳睛是也腰痛服藥服之不驗者乃濕氣入於兩腰子也最難治補腎水而益痛瀉腎水而覺空去風而無益去寒而轉增去火而益甚此所以知為水濕之症也外無水象內無水形令人揣摩不著然余實有辨而知之之法凡腰痛而不能下俯者是也方用柴胡一錢防己二錢澤瀉一錢豬苓一錢肉桂三分白朮五錢甘草五分山藥三錢白芥子一錢水煎服批解濕仙丹此方妙在入腎而去濕氣不是入腎而補水然須多服為妙大約此等腰痛初起之時三四劑即可奏功痛至經年纍月者非服二月不效也腰不能俯者水濕腰不能直者非水濕乃風寒也用逍遙散加防己一錢初起時一劑可愈久則非一劑可愈也當改用白朮二兩杜仲一兩酒煎服十劑可愈批利腰丹可為長治之法背脊骨痛者乃腎水衰耗不能上潤於腦則河車之路乾澀而難行故爾作痛此等症非一二劑可以見功非久服補氣之藥以生陰非大服補陰之藥以生水未易奏功也方用黃耆一兩熟地一兩山茱萸四錢麥冬四錢北五味一錢白朮五錢防風五分茯苓三錢附子一分水煎服批潤河湯此方補氣則有黃耆白朮補水則有熟地山茱去濕則有茯苓去風則有防風引經則有附子而又麥冬以生腎水之母自然金旺生水水足則河車之路不幹不幹則潤金滋骨可知又何痛之作楚既不痛矣又何背之不直哉然此方不能奏近功於旦夕必須多服久服乃效所以入之於長治之門也兩腿痠痛又不如是治法此濕氣入於骨中而皮外無濕也此病不止骨內而受濕氣或被褥中得之也方用薏仁二兩芡實一兩茯苓三錢肉桂一錢牛膝二錢萆薢一錢水煎服批壯骨去濕丹此方之妙妙在薏仁能入骨而去水加芡實健脾以去濕不使濕以增濕而牛膝萆薢又是最利雙足之品又加肉桂引經直入於骨中濕有不去痠疼有不止者乎但腳中之病乃人身之下流一有病不易去之況濕氣在骨如陸地低窪之處久已成潭如何能車水即干必多用人功而後可以告竭故此方必須多服久服正是此意胬肉扳睛乃眼病失治而生肉人不知避忌將眼皮翻轉以取涼快誰知風忽中之則眼毛倒生而扳睛矣此等病最忌動刀一動刀則不可內治矣法當用丸散以消之然非服至半年不能奏效方用甘菊花十兩須用家園自種者為妙否則斷不可用白芍一斤當歸半斤柴胡四兩丹皮三兩葳蕤一斤同州蒺藜一斤草決明四兩茯苓十兩麥冬十兩天門冬十兩枸杞子一斤名為末蜜為丸每日飢服一兩一料少愈二料全痊最忌房事能斷欲者一料全愈否則必須二料三料也此亦長治之一法可參用之故又廣之如此天師曰痙病乃寒濕之氣集之雙足之間骨中寒痛而不可止亦終歲經年不能身離床褥傴僂之狀可掬其故何也蓋諸痙盡皆水濕也水氣久不出則一身之關節無非水氣之彌空土無權矣又何以分消而利道哉然則止治其水而濕氣可以盡去乃治水亦終歲經年仍然不驗者為何徒治水而不治土也方用白朮五錢薏仁二兩芡實三錢茯苓一兩肉桂一錢牛膝一錢萆薢一兩杜仲三錢水煎服此方之妙利其水濕之氣又不耗其真陰日日吞服不必改方服之三月必然如舊再服三月必然步履如初矣此真長治之法人亦遵守而不可變更者也華君曰同雷公曰痙病方白朮四兩薏仁八兩山藥八兩車前子一兩牛膝三兩生黃耆十兩肉桂一兩杜仲四兩各為末蜜為丸每日飯前酒送下一兩一料必全愈用補於利之中也又方治痿用元參一兩甘菊花五錢麥冬一兩熟地二兩牛膝五錢天門冬三錢水煎服此方與天師同意妙短治法論陽明口渴用石膏湯論四逆湯論附子理中湯論大承氣湯天師曰短治者乃病不必長治而可以短兵取勝則用短治之法譬如陽明之症初起乘其口渴引水自救之時急用石膏知母煎服一劑而渴減再劑而渴止三劑而病如失即不可再與四劑矣蓋石膏初用有蕩邪之功久用有損正之失故可暫用而不可長用倘不信吾言以石膏為奪命之藥日日與之必致變為痿症而不能速起也故我頻頻戒用石膏者為此仲景創立此方所以救人傷寒傳入陽明之症不得已而用之截住其邪不使再傳也原非教人日日用之也奈何世醫不知此故妄自多加任情縱意忍於輕用以致殺人而不悟也悲夫此短治之法又不可不知之張公曰吾方得岐天師發明真大幸也我立此方原所以救一時之急非教人經年纍月而亦用之也世醫不悟亦可聞岐天師之語而悟矣短治法不止石膏湯如四逆湯不可久服也久則有火盛自焚之慮附子理中湯亦不可久用有太剛則折之虞大承氣湯止可一劑而不可至再重則有大下亡陰之禍諸如此俱可類推華君曰同白虎湯張路玉謂為治暍熱病主方極有理故在傷寒門亦不可輕用李子永識日治法論日間發寒熱天師曰日治者病重於日間而發寒發熱較夜尤重此等症必須從天未明而先截之方用柴胡三錢當歸三錢黃耆五錢人參一錢陳皮一錢半夏一錢青皮一錢枳殼一錢白朮五錢甘草一錢乾薑五分水煎服批補正逐邪湯此方妙在加柴胡於參耆歸術之中蓋邪之敢在日間作祟者欺正氣之衰也今用祛邪之品同補正之藥共相攻邪則正氣有餘邪自退舍譬如賊人白晝操戈入室明欺主人軟弱故肆無忌憚倘主人退縮潛形則賊勢更張必大恣摽掠席捲資囊而去正氣日消病安能愈也妙在全用補正為君則主人無懼指揮如意號召家人奮勇格鬥前後左右無不執耒而來負鋤而至爭先捍禦賊人自然膽落惟恐去之不速矣況方中有柴胡半夏之類各各消邪又譬如主人既勇奴僕無非勇士則賊不奔逃必被擒獲此方之用於日間實有妙用也張公曰妙絶日聞之病以此治之最妙余尚有一法治日間之症尤易奏功方用人參一錢白朮五錢甘草一錢陳皮一錢柴胡二錢熟地一兩白芥子一錢水煎服批陰陽兼治湯天師之方乃治陽虛之症余方乃治陽虛而兼陰虛之症二方彼此參用何愁日間之病棘手哉華君曰同雷公曰日間發熱乃邪在於陽分也補陽氣而邪自退方用人參三錢甘草一錢白朮五錢當歸三錢陳皮一錢柴胡二錢水煎服有痰加半夏一錢有食加山楂一錢方名助正湯助其正邪不祛而自祛也夜治法論夜發寒熱天師曰夜治者病重於夜間而發熱者也或寒少而熱多或熱少而寒多一到天明便覺清爽一到黃昏便覺沉困此陰氣甚虛故行陽分則病減行陰分則病重也方用熟地一兩山茱萸四錢當歸三錢白芍三錢鱉甲五錢柴胡三錢白芥子三錢陳皮一錢生何首烏三錢茯苓五錢北五味一錢麥冬三錢水煎服批補陰辟邪丹此方妙在鱉甲同柴胡並用又以諸補陰之藥合而攻之也蓋鱉甲乃至陰之物逢陰則入逢陽則轉即此二味原是治陰經之邪熱況又用於純陰同隊之中有不去陰邪而迅散哉生何首烏直入陰經亦能攻邪加以白芥子去臟膈之滯痰又不耗其真陰之氣有不奏功如響者乎譬如人家主婦一旦被賊人所執刀火相逼倘箱匱空虛則賊人失望勢必因羞變怒愈將主婦施刑今用熟地山茱當歸芍藥純是補正之品同群共投猶賊在房中盡將金玉散傾則賊喜出望外必且棄主婦而取資財飽則揚去又有鱉甲首烏芥子之類力能戰邪則堂外聲揚奪門攻擊邪自張皇更思早遁倘止用鱉甲首烏則又勢單力薄無物餌賊豈肯甘心反走必致相爭相戰彼此敗衄而後去更有妙論人多未知如此等症必須在黃昏之前以此藥先與之則陰氣固而邪不敢入又譬如人家門戶謹防鎖鑰嚴整司更值宿之僕俱各精健絶倫則賊必望風退卻又何爭越牆上壁而主婦知覺呼召家人捆縛而獻哉此皆日間不治而以夜間先治之法也張公曰真絶奇之論豫何從而贊助高深惟有陰經之邪盛而又帶陽經之邪天師尚未發明也餘一論之陰邪之盛必發夜間無疑矣然亦有陰邪而兼帶陽邪亦發於夜間其病亦發寒發熱無異純陰邪氣之症但少少煩躁耳不比陰症之常靜也法當於補陰之中少雜陽藥一二味使陰長陽消自然奏功如響方用熟地一兩山茱萸四錢當歸三錢鱉甲五錢柴胡三錢白芥子三錢陳皮一錢生何首烏三錢茯苓五錢北五味一錢麥冬三錢此天師方也豫再加人參二錢白朮三錢而已即可治陰邪而兼治陽邪之症氣治法天師曰氣治者氣實氣虛而不可不平之也氣實者非氣實乃正氣虛而邪氣實也若作正氣之實而用消氣之藥使正氣益虛而邪氣益實害且不可救藥方用補正之藥而佐以祛邪之品則正氣自旺邪氣日消矣方用人參一錢白朮一錢甘草一錢柴胡三錢白芍三錢麻黃一錢半夏一錢水煎服此方之妙亦是用散藥於補正之中使正氣旺於邪氣自然兩相擊鬥邪可逃亡否則適所取敗此氣病宜知氣治耳張公曰氣治法甚多天師止言一條似乎未備余更廣之氣陷補中益氣湯可用氣衰六君子湯可採氣寒人參白朮附子湯可施氣虛則用四君子氣鬱則用歸脾湯氣熱則用生脈散氣喘則用獨參湯氣動則用二陳湯加人參氣壅滯則用射干湯氣逆則用逍遙散余廣至此氣治之法庶幾全乎人可因症而施治也華君曰同豫更有論氣虛氣實原有分別氣虛則羸弱而難施氣實則壯盛而易察虛者用天師之方實者另有一方枳殼五分白朮一錢陳皮五分茯苓三錢甘草一錢山楂十粒柴胡一錢白芍三錢炒梔子一錢水煎服批消實湯亦可佐天師之未逮雷公曰華君補得妙血治法論治血宜順性天師曰血治者乃血病不肯歸經或上或下或四肢皮毛合處出血者是也血循經絡外行於皮毛中行於臟腑內行於筋骨上行於頭目兩手下行於二便兩足一臍是周身無非血路一不歸經自然各處妄行有孔則鑽有洞則泄甚則吐嘔標出於毛孔流出於齒縫滲出於腹臍而不止大小便之出也然則血宜順其性而不宜拂方用當歸三錢白芍三錢熟地五錢川芎一錢荊芥末一錢生地五錢麥冬三錢茜草根一錢甘草一錢水煎服此方即四物湯加減妙在用茜草根荊芥引血歸經不拂亂其性則血自歸經各不相犯矣倘用止血之劑未嘗無效然而如石壓草一時雖止而性思衝突必得空隙仍飛越沸騰何如此方順其性而引之譬如與強橫之人同行少拂其意便懷慍怒慍怒未已必致鬥毆皮碎血流是其常也若讚揚稱頌順其性而與之飲食則同群相得轉得其氣力以助我匱乏同舟無敵國之形一室無操戈之事久且為我綢繆徹我桑土不特血不妄行亦將潤筋生色永斷覆轍之患又何必絶之太甚以自取爭鬥哉此血治之法尤當留意張公曰講得近理近情治血以四物湯為主加荊芥茜草更妙順其性而引其歸經也然而用六味丸湯治血症亦妙蓋血病最忌寒涼之品寒則凝滯不行難以歸經六味丸湯妙在不寒不熱補腎水以滋肝木肝木得養則血有可藏之經自然不致外泄何至上吐方用熟地五錢山茱萸三錢山藥二錢丹皮二錢澤瀉二錢茯苓二錢此六味地黃湯方也又加麥冬三錢北五味一錢得此二味又去清補肺金使皮毛有養毛孔堅固則血難外越肺金不幹下且足以克肝而肝木畏金之克又何至上犯於肺耶故血症最宜用此方久服三年不吐始慶重生否則尚在生死之間也華君曰同而余又另有方用生地一兩荊芥一錢麥冬三錢元參三錢水煎服批止血歸經方一劑止血後用六味湯全愈雷公曰血症余亦有奇方用生地一兩三七根末三錢荊芥末一錢人參三錢水煎調末服一劑即止血後亦須用六味湯調理臟治法論脾肺同治論腎肝同治論心腎同治論肺經獨治天師曰臟治者五臟中有病而治之者也臟有五治法惟三脾肺同一治腎肝同一治心腎同一治也肺氣之傷必補脾氣脾氣既傷肺氣亦困故補肺必須補脾而補脾必須補肺如人或咳嗽不已吐瀉不已此肺脾之傷人以為咳嗽宜治肺吐瀉宜治脾殊不知咳嗽由於脾氣之衰而吐嘔瀉由於肺氣之衰蓋肺氣無清肅之下行始上嘔而下瀉脾氣斡旋之令不行則上為咳嗽矣方用人參一錢麥冬三錢茯苓三錢柴胡一錢神麯五分車前子一錢甘草一錢薏仁五錢水煎服批肺脾雙解飲此方乃治肺治脾之藥合而用之者也咳嗽喘病之盡除吐嘔瀉症之各去所謂一方兩用也腎肝同治者腎水不能滋肝則肝木抑鬱而不舒必有兩脅飽悶之症肝木不能生腎中之火則腎水日寒必有腰脊難於俯仰之症故補肝必須補腎中之水補腎中之水又不可不補肝木倘補肝而不補腎則脅痛何以頓除補腎而不補肝則腰脊何以立愈方用熟地一兩山茱萸五錢白芍五錢當歸五錢柴胡二錢肉桂一錢水煎服批腎肝同補湯此方熟地山茱補腎之藥而當歸白芍柴胡肉桂補肝之品既兩臟平補似乎藥不該輕重今補肝之藥反多於補腎者可見腎為肝之母肝又為命門之母也命門是一身主宰當生五臟之氣不宜為五臟所生然而五臟疊為生克肝既是木豈木獨不可以生命門之火乎此有至理存焉非吾仙人安能闡發願世人勿驚為創說奇聞而疑為不可執之以治病也再心腎治法二臟合而治之者其義又何居腎水臟也心火臟也是心腎二經為仇敵似乎不宜牽連而一治之不知心腎雖相剋其實相須無心之火則成死灰無腎之水則成冰炭心必得腎水以滋養腎必得心火而溫暖如人驚惕不安夢遺精泄豈非心腎不交乎人以為驚惕不安心之病我以為腎之病夢遺精泄人以為腎之病我以為心之病非顛倒之也實至當不易之理方用人參三兩白朮五兩遠志一兩炒棗仁三兩熟地五兩山茱萸三兩麥冬三兩北五味一兩芡實五兩山藥三兩菖蒲一兩柏子仁三兩去油茯神三兩砂仁三錢橘紅一兩各為末蜜為丸白滾水送下五錢批心腎同補丹此丸之妙乃治腎之藥少於治心蓋心君寧靜腎氣自安腎氣既安何至心動此治心正所以治腎而治腎正所以治心也此治臟之法幸人加之意哉張公曰臟治之法盡於三方無可再議不已其肺臟之獨治乎肺有忽感風寒而鼻塞出嚏咳嗽不已吐痰如敗絮乃肺經獨病也不必兼治於脾豫留一方用甘草一錢桔梗三錢半夏一錢射干一錢水煎服批散寒湯此方之妙妙在桔梗升提於鼻引去痰之藥上行於肺以散風寒之邪邪散則鼻塞頓除痰亦隨之而散又何必治脾之迂緩哉然止可治風寒之外感而不可治內傷之諸症內傷諸症有天師方在肺脾同治之可耳腎肝與心腎治法亦不必再言天師曰盡善也華君曰無此脾濕熏肺之症方用燥脾利濕為宜如肺熱移於大腸者又宜清肺潤燥法治之不可以泄瀉而戒用潤劑也李子永識腑治法論小便閉塞大便閉結論治膽怯論腎虛吐嘔天師曰腑治法甚多我舉其一二症取以為法余可推廣發人病小便不通大便甚結者是也小便不通乃膀胱之病膀胱之氣化不行小便即不能出小便閉塞治膀胱之經而已矣然而治法全不在治膀胱也方用人參三錢蓮子三錢白果二十個茯苓三錢甘草一錢車前子三錢肉桂三分王不留行三錢水煎服批通水至奇丹一劑即如注此方之奇妙全在用人參其次則用肉桂三分蓋膀胱必得氣化而始出氣化者何心包絡之氣也膀胱必得心包絡之氣下行而水路能出尤妙用白果二十個人多不識此意白果通任督之脈又走膀胱引參桂之氣直奔於膀胱之中而車前王不留行盡是泄走之物各隨之趨出於陰氣之口也此治腑之妙法人知之乎大便閉結者人以為大腸燥甚誰知是肺氣燥乎肺燥則清肅之氣不能下行於大腸而腎經之水僅足以自顧又何能旁流以潤溪澗矣方用熟地三兩元參三兩火麻子一錢升麻二錢牛乳一碗水二鍾煎六分將牛乳同調一碗服之批潤燥至神湯一劑不解二劑必大便矣此方之妙全在不潤大腸而補腎尤妙不止補腎而且補肺更妙不止補肺而且升肺蓋大腸居於下流最難獨治必須從腎經以潤之從肺經以清之氣既下行沉於海底非用升提之法則水注閉塞而不通啓其上孔則下孔自然流通此下病治上之法亦腑病治臟之法也其餘治腑之法可即此以悟張公曰天師太略余當增廣之凡人膽怯不敢見人者少陽膽經虛也而所以致少陽膽經之虛者肝木之衰也而肝木之衰又因腎水之不足法當補腎以生肝木方用熟地一兩山茱萸四錢芍藥五錢當歸五錢柴胡一錢茯神五錢白芥子一錢生棗仁一錢肉桂一錢水煎服批助勇丹此方之妙補腎之中用補肝之品尤妙再去補心使心不取給於肝膽之血則膽之汁有餘而怯形可去又妙在用肉桂以入肝如人得勇往之人自然頃刻膽壯矣此治腑實有妙理人知之乎吐嘔之症人以為胃虛誰知由於腎虛無論食入即出是腎之衰凡有吐症無非腎虛之故故治吐不治腎未窺見病之根也方用人參三錢白朮五錢薏仁五錢芡實五錢砂仁三粒吳茱萸五分水煎服批轉胃丹此方似乎治脾胃之藥不知皆治腎之法方中除人參救胃之外其餘藥品俱入腎經而不止留在脾也腎火生脾脾土始能生胃胃氣一轉嘔吐始平此治胃而用治腎之藥人知之乎華君曰亦無孫真君傳治小便閉塞方用車前子五錢肉桂三分水煎服即通常治法論頭疼論目痛天師曰常治者可以常法而常治之者也如人病頭疼則以頭疼常法治之目痛則以目痛常法治之是也何必頭疼而治之於兩足目痛而治之以兩手乎雖頭疼實有治之兩足而愈目痛實有治之兩手而痊者然彼必常治之而不愈不痊然後以變法治之非可以常治而先求之於變法也故一遇頭疼即以蔓荊子一錢川芎五錢白芷一錢甘草一錢半夏一錢細辛一錢治之病去如掃批止疼湯一遇目痛以柴胡一錢白芍三錢當歸一錢白蒺藜二錢甘菊花一錢荊芥防風各一錢半夏一錢甘草五分梔子二錢水煎服批全目飲二劑即愈皆無事舍常而思變也此常治之法可為師也張公曰常病用常法極是豫亦不再言變也華君曰無變治法論傷寒變結胸論瘧變下痢論中風變狂論中暑變亡陽論反胃變噎膈天師曰變法者不可以常法治不得已而思變之也變症不同用藥各異吾舉其大者言之如傷寒變為結胸瘧疾變為下痢中風變為發狂中暑變為亡陽反胃而變成噎膈若不以變法治之仍以平常藥餌相治吾見其坐斃而已矣然則結胸之症乃傷寒之變也可不以變法治之乎傷寒火邪正熾原不可急與飲食若不知禁忌與之胃中得食不啻如寶故茹而不出而他臟見胃中有食群起而爭其勢猖狂非杯水可解必當以變法治之急須以栝蔞一枚捶碎入甘草一錢同煎服之夫栝蔞乃陷胸之勝物平常人服之必至心如遺落今病人一旦服之不畏其虛乎誰知無病常人斷斷不可服此而傷寒結胸之症卻有相宜蓋食結在胸非大黃芒硝枳殼檳榔厚朴之類可能祛逐必得栝蔞始能陷之入於脾中尤恐其過於下也少加甘草留之且得甘草之和不致十分推蕩此變症而用變法真勝於用正也瘧疾本是常症只可以平常消導而發散之今忽為下利等症則變輕為重欲發汗則身已亡陰欲祛邪則下已便物顧上則慮下顧下則礙上倘仍以常法治之奏功實少今用人參一兩鱉甲一兩白朮三兩茯苓一兩當歸一兩白芍三兩柴胡一錢枳殼一錢檳榔一錢水煎服批補陽消瘧丹此方奇在用人參白朮蓋瘧病則亡陽若不急補其陽氣則下多亡陰勢必立亡惟急補其陽氣之不足陽生陰長始有生機尤妙白芍當歸之多以滋潤其腸中之陰蓋下利多則陰亡亦多今用補陰之劑則陰生陽降自然春意融和冰泮化水分消水道汙穢全無況方中又加枳殼檳榔仍然去積又妙少用柴胡微舒肝氣使木氣相安不來剋土自然土剋水之多水潤木之下內氣既生外邪亦散此治下利而瘧病同除此種治變之法何可不知中風系是危症況變發狂死在眉睫倘不以變法救之何以得免於垂絶耶方用人參三兩菖蒲三錢半夏三錢南星三錢生用附子一錢丹砂末三錢先將參苓附子等項煎湯調入丹砂末灌之批救絶至神丹十人中亦可救三四蓋天下無真中風之人不過中氣中痰中濕而已若不用人參附子大劑煎飲何能返已去之元陽回將絶之心氣哉況人將死之時未有不痰上湧者妙在用半夏南星以祛逐之尤妙用菖蒲以引入心經使附子半夏得施其蕩邪之功而丹砂又能鎮定心氣所以往往返危為安倘仍以尋常二陳之類以消痰痰未必消而心氣已絶此又症變而法變者也中暑原是熱症然而熱之中也亦由於氣之虛人若氣實形壯者多難中暑然則中暑之病宜補氣為先解暑為次無如人以為熱也治表為急治本為末先以香薷飲治之不效又改用白虎湯又不效乃用發散之劑雜然並進則火邪乘熱氣外走盡趨皮膚而出而不可止以變為亡陽之症者多矣法當以人參三兩元參三兩甘草一錢北五味一錢生地三兩救之此方之妙全在用人參以補元氣用元參以涼血蓋血得涼則氣自止而不走又有五味子之酸以收斂肺金之氣此不止汗而汗自止也倘惟以四君子湯平常治法則一杯之水何能止車薪之發焰哉此又變法之宜知也反胃症初起之時未嘗非胃病也當時以逍遙散加黃連一錢立止也無如世醫不知治法乃用香砂厚朴枳殼砂仁之類紛紛投之不應又改用大黃巴豆之類下之又不應乃改用黃連黃柏黃芩梔子知母大寒之品以涼之又不應乃改用桂枝白果肉桂附子乾薑吳茱萸之類以熱之又不應乃始用柴胡荊芥桔梗防風蘇子之類以散之遂成噎膈之症矣吾今憫之乃傳一方用熟地一兩山茱萸四兩麥冬三錢北五味一錢元參一錢當歸三錢白芥子一錢牛膝二錢水煎服批轉食至神丹此方之妙全在不治翻胃正所以治翻胃也蓋人之反胃乃是腎中陰水竭也腎水不足則大腸細小水不足以潤之故腸細而乾涸腸既細小則飲食入胃不能下行必反而上吐治之之法不可治上而宜治下方中用熟地山茱之類純是補腎中之水也腎水足而大腸有水相資則大腸仍復寬轉可以容物水路既寬則舟楫無礙大舸小舶可以順行又何懼區區小舟不可以轉運糧食哉此腎中虛而水不足以潤大腸者宜如是治法若腎中寒涼而虛者又不如是治也蓋翻胃之名雖同翻胃之實各異腎中無水而翻胃者食下喉即吐腎中無火而翻胃者食久而始吐也譬如今日食之明日始盡將今日之物吐出者是也方用熟地一兩附子一錢肉桂一錢山茱萸四錢麥冬五錢北五味一錢茯苓二錢山藥二錢丹皮一錢澤瀉一錢牛膝一錢水煎服此方八味丸湯也妙在用附子肉桂於補腎水之中使去水中補火補火者補命門之火也蓋脾胃之氣必得命門之火始生譬如釜下無火何以煮爨未免水冷金寒結成冰凍必得一陽初復之氣始解陽和人身脾胃亦然然而寒涼之病止該腹痛心疼今反無此症乃上越而吐者何也蓋脾胃有出路則寒邪之氣不留於中今日日上吐將胃口咽門已成大道熟徑往來無所阻滯則徑情趨奔其勢甚便又何必積蓄於中州盤踞於心腹顛寒作熱以苦楚此脾胃哉此翻胃下寒心腹之所以不痛也此又不治反胃而所以治反胃也此變法治病之端也張公曰說得我閉口無言汝知而不能言今可以言矣無可一言惟有三嘆頓首而已惟聖者知之豫亦不能言之也華君曰余雖有傳不及君之多而且暢雷公曰無一論不奇闢真聖人之言不可測也反胃而用逍遙加黃連趙養葵先生亦主此方但此必食入即吐之症如朝食暮吐者又為命門無火當是八味湯症矣李子永識初治法論傷風初治論傷寒初治論傷食初治論傷暑初治論傷濕初治論燥病初治論火病初治天師曰初治者首先宜以此治之也初病傷風即以傷風治之初病傷寒即以傷寒治之初病傷食即以傷食治之也凡人病初起之時用藥原易奏功無如人看不清用藥錯亂往往變症蜂起苟認得清用得當又何變症之生耶如傷風之症必然頭痛身疼咳嗽痰多切其脈必浮此傷風也即以防風一錢荊芥一錢柴胡一錢甘草一錢黃芩一錢半夏一錢水煎服批逐風散一劑即止不再劑也傷寒之初起也鼻塞目痛項強頭亦痛然切其脈必浮緊此傷寒也若以傷寒治之即愈方用桂枝一錢甘草一錢陳皮一錢乾葛一錢水煎服批蕩寒湯一劑即愈傷食之症心中飽悶見食則惡食之轉痛此傷食也即以消食藥服之立已方用白朮一錢茯苓一錢枳殼一錢山楂二十粒麥芽二錢穀芽二錢神麯三分半夏一錢甘草五分砂仁三粒水煎服批食食散一劑快二劑愈此初治之法人易知之不能知即知而不肯用行醫者無輕易此初治法也張公曰又不必言甚矣聖人之言入也三方而初症定之矣初病傷暑必然頭暈口渴惡熱甚則身熱痰多氣喘是也方用青蒿一兩香薷三錢白朮五錢陳皮一錢甘草一錢茯苓三錢有參加一錢無亦可批青香散一劑即愈傷濕初起之時必然惡濕身重足腫小便短赤方用白朮三錢澤瀉三錢豬苓三錢肉桂五分茯苓五錢柴胡一錢車前子一錢半夏一錢水煎服批引水散一劑立愈二劑脫然燥病初起咽乾口燥嗽不已痰不能吐面目紅色不畏風吹者是也方用麥冬五錢桔梗三錢甘草一錢天花粉一錢陳皮三分元參五錢百部八分水煎服批寧肺湯一劑燥立止二劑嗽止三劑全愈火症初起必大渴引飲身有斑點或身熱如焚或發狂亂語方急用石膏三錢元參一兩麥冬三兩甘草三錢升麻三錢知母三錢半夏三錢竹葉百片批平亂湯一劑少止二劑即安三劑全愈不可四劑也若初起之時大勢少衰減半與之乘其火勢初起胃氣未衰急用此湯以遏之則火自然驟滅而不為害矣方即竹葉石膏湯妙在加入元參麥冬數兩使石膏不為主帥而反為偏裨聽麥冬元參之差遣則止去火而不損腎中之陰又妙加入升麻引其外出而不能入止祛火而不損腎水所以更奏功如神也倘疑升麻太多而少減之則轉不奏功之捷豫所以又戒世人之不知用升麻者華君曰余未傳暑症未有不兼濕者故方中多用術苓李子永識終治法論傷寒調理論中暑調治論中風調治論中濕調治論火症調治論燥症善後天師曰終治者病已愈而為善後之計故曰終治如傷寒愈後作何調治中暑之後作何湯飲中風之後作何將息是也傷寒邪已盡退正氣自虛理宜補正但胃強脾弱多食補劑恐能食而不能受法當用補胃之藥少而補脾之藥多尤不宜補脾之藥多而補腎之藥少蓋腎能生土而土自能生金金旺則木有所畏不至來克脾土然則補腎正所以補脾也方用熟地一兩麥冬三錢五味子五分白芍三錢肉桂三分白朮三錢薏仁三錢白芥子一錢水煎服批脾腎至資湯此方專補腎脾二經不去通補各臟而各臟無不治之也中暑傷氣而調治之法不可以治氣為先當以補血為主蓋陽傷則陰血亦耗也方用當歸一兩白芍三錢川芎一錢熟地一兩五味子一錢麥冬三錢水煎服此方即四物湯也妙在全是陰經之藥又加之麥冬五味以養肺金金既旺可以制木之克脾則四物生肝而安於無事之福也中風之後亦氣之虛也此等病斷宜補氣不可補血蓋血滯而後中風不可再補血以增添氣滯也方用人參三錢茯苓三錢薏仁三錢半夏一錢神麯五分白朮五錢甘草一錢肉桂一錢陳皮五分水煎服批氣血兩補丹此方妙補胃氣以生肺金之氣補命門以生脾土之陰又何畏風木之旺哉此三方皆善後至妙者可以為終治之法張公曰妙極矣豫又何言豫當一一補之中濕之後水已瀉盡法當健脾然而不可徒健脾也當補命門之火以生脾土方用白朮五錢茯苓三錢肉桂三分白芍三錢薏仁五錢白芥子一錢水煎服此方專補腎經之火而又不十分大熱則脾氣得溫自然能去濕氣而生胃氣也火症既已散盡餘火勢必氣息奄奄不能坐立若一味瀉火則胃氣必傷而骨髓耗盡水何日重生方用熟地一兩元參五錢麥冬一兩牛膝一錢白芍三錢水煎服批濟水湯此方妙在潤肺金以生腎水兼去平肝三臟既安則胃氣自然得生又何必再瀉其餘火哉燥病既除善後之計惟大補腎水水足則肺金有養方用六味湯加麥冬五味子治之可也華君曰豫亦未傳無可談專治法論直中陰寒論中暑天師曰專治者專治一臟單刀直入之謂也如人病直中陰經寒症勢如奔馬不可止遏倘徵兵分調於各路勢必觀望低徊而不能急遽以救主不若止用一二大將斬關直進之為得也方用人參一兩附子二錢水煎服即愈方名參附湯用之卻有至理蓋寒邪直入腎臟邑主外亡市民逃竄賊人且驅傾城之民盡為盜賊上犯潢池其鋒不可當此時若號召鄰邑之兵則緩不濟事故不若即此具師推大將登壇以兵馬之權盡歸之令其奮勇當先突圍衝入斬殺剪除城安民樂前途倒戈返兵而逐賊矣方中用附子者如大將也用人參者乃兵馬也身如城郭藥可借觀生死相同足以顯譬願人深思自得之專治之法張公曰專治之法歸屬直中陰寒之症綽乎有理但直中一門不止一方盡之吾傳一門可暢觀之而治無遺法也華君曰余亦同傳然余尚有法如人病中暑之症發渴引飲其勢亦甚急若欲緩兵分治則暑邪不易分散當用一二味解暑之品以直逐其邪則心君庶可以安寧法當用人參一兩青蒿二兩香薷三錢白朮五錢水煎服批清暑神丹此方之妙妙在人參以固元氣而後青蒿得以散其邪雖青蒿一味亦能解暑似不必人參之助然解暑而不補氣暑雖解矣人必弱也惟與參同用則祛邪之中而有補正之道暑散而不耗散真氣自然奏功如響方中況有白朮以健脾香薷以追熱又用之咸宜乎分治法論便血與溺血分治論腰痛與頭痛分治論遺精與健忘分治論吞酸與泄瀉分治論中氣與中痰分治天師曰分治者症犯艱難不可作一症治之乃用分治之法如人便血矣又溺血腰痛矣又頭痛遺精矣又健忘吞酸矣又泄瀉症既紛出藥難一般不得不分之以相治也或治其上或治其下或治其有餘或治其不足止正可以混同一例然而得其道則分中可合不得其道則合處仍分如便血與溺血不可同論也然總之出血於下用生地一兩地榆三錢治之則二症自愈批兩地丹蓋大小便雖各有經絡而其源同因膀胱之熱而來也生地清膀胱之火地榆亦能清膀胱一方而兩用之分之中又有合也腰痛與頭痛上下相殊也然而腎氣上通於腦而腦氣下達於腎上下雖殊氣實相通法當用溫補之藥以大益其腎中之陰則上下之氣自通方用熟地一兩杜仲五錢麥冬五錢北五味二錢水煎服即愈批上下兼養丹蓋熟地杜仲腎中之藥也止腰中痛是其專功今並頭痛而亦愈者何也蓋熟地雖是補腎之劑然補腎則上蔭於腦背脊骨梁轆轤上升是其直路腎一足則氣即騰奔而不可止故一補腎氣腰不疼而腦即不痛也閣中有分而分中實合不信然乎遺精下病也健忘上病也何以分治之而咸當乎方用人參三兩蓮鬚二兩芡實二兩山藥四兩麥冬三兩五味子一兩生棗仁三兩遠志一兩菖蒲一兩當歸三兩柏子仁去油一兩熟地五兩山茱萸三兩各為末蜜為丸每日早晚各用白滾水送下五錢批遺忘雙治丹半料兩症俱全此方乃治健忘之方也何以遺精而亦效蓋遺精雖是腎水之虛而實本於君火之弱今補其心君則玉關不必閉而自閉矣此閣中之分實有殊功也吞酸火也泄瀉寒也似乎寒熱殊而治法宜變不知吞酸雖熱由於肝氣之鬱結泄瀉雖寒由於肝木之克脾然必一方以治木鬱又一方以培脾土則土必大崩而木必大凋矣不若於一方之中而兩治之方用柴胡一錢白芍五錢茯苓三錢陳皮五分甘草五分車前子一錢神麯五分水煎服批兩舒散二症皆愈此方之奇絶在白芍之妙蓋白芍乃肝經之藥最善舒木氣之郁木鬱一舒上不克胃而下不克脾方中又有茯苓車前以分消水濕之氣水盡從小便出何有餘水以吞酸剩汁以泄瀉況又有半夏神麯之消痰化粕哉此一治而有分治之功世人未盡知也張公曰何奇之多如此我是無可再言遠公請益我有一症增入可也中氣而又中痰雖若中之異而實皆中於氣之虛也氣虛自然多痰痰多必然耗氣雖分而實合耳方用人參一兩半夏三錢南星三錢附子一錢茯苓三錢甘草一錢水煎服批仁勇湯中氣中痰之症俱悉矣蓋人參原是氣分之神劑而亦消痰之妙藥半夏南星雖是逐痰之神品而亦扶氣之正神附子甘草一仁一勇相濟而成大敵用之於三味之中扶正必致祛邪蕩痰必然益氣分合而無分合之形奇絶而有神化之妙又不可不知華君曰與余同無可講同治法論四物逍遙六君歸脾小柴胡參蘇補中益氣四君子諸湯加減法天師曰同治者同是一方而同治數病也如四物可治吐血又可治下血逍遙散可治木鬱又可治數郁六君子湯可治飲食之傷又可治痰氣之積然而方雖同而用之輕重有別加減有殊未可執之以治一病又即以治彼病耳如吐血宜加麥冬甘草便血宜加地榆黃芩之類於四物湯中也如丹皮梔子宜加於木鬱之中黃連宜加火鬱之中黃芩蘇葉宜加於金鬱之中石膏知母宜加於土鬱之中澤瀉豬苓宜加於水鬱之中也傷肉食宜加山楂傷米食宜加麥芽枳殼傷麵食宜加蘿蔔子之類於六君子湯內也同治之法可不審乎張公曰同治法不止三方豫再廣之歸脾湯可治鬱怒傷肝之人又可治心虛不寐之症小柴胡湯可治傷風初起之病又可和傷寒已壞之病參蘇飲可治風邪之侵又可治氣鬱之悶補中益氣湯可升提陽氣又可補益脾陰兼且消食於初傷祛邪於變後瘧症藉之以散邪瀉症資之以固脫也四君子湯可以補氣之不足又可以瀉火之有餘諸如此類不可枚舉亦在人善悟之耳華君曰余未傳異治法論中濕論中暑論中寒天師曰異治者一病而異治之也如人病中濕也或用開鬼門之法或用泄淨府之法是也雖同是水症何以各施治法而皆效蓋開鬼門者開人毫毛之孔竅也泄淨府者泄大小之二便也治法雖殊而理歸一致其一致何也蓋水腫之症原是土氣之郁土鬱則水自壅滯而不流開鬼門者如開支河也泄淨府者如開海口也故異治之而皆效也方已備載前文茲不再談願人即此以悟其餘之異治耳張公曰異治甚多天師太略豫再廣之如人中暑也或用熱散或用寒解傷寒之法或用桂枝湯或用麻黃湯是也桂枝與麻黃寒熱各殊如何用之而皆效蓋二物總皆散藥風寒初入於營衛之間熱可散於初寒可散於後風寒初入於皮毛將入胃經則風邪尚寒所以可用桂枝以熱散風寒既由皮毛而入營衛則寒且變熱矣蓋正氣逃入於府而皮毛軀殼聽邪外據而成內熱之症所以可用麻黃而寒散之也治法雖有不同祛邪則一故用之而皆效耳中暑或用香薷以熱散之或用青蒿以涼散之似乎有異不知非異也蓋中暑之症感夏令之熱邪也邪入臟腑必須祛散香薷與青蒿同是祛暑熱之聖物性雖有寒熱之分而祛逐無彼此之異也此異治之宜知耳其餘異治之法不可因此以更通之哉華君曰余亦不傳勞治法論久坐論久臥天師曰勞治者使之身勞而後治之也如人久坐則血滯筋疏久臥則肉痿而骨縮必使之行走於途中攀援於嶺上而後以藥繼之也方用當歸一兩白芍三錢黃耆一兩甘草一錢陳皮五分防風五分半夏一錢水煎服此方原是補血湯而變之者也蓋久坐久臥之人其血甚滯若再補血則血有餘而氣不足未免血勝於氣矣似宜急以補氣之藥補之今仍補血者何也蓋氣之能生必本血之能養吾反驅之於奔走攀援之際而後以補血之藥繼之者使氣喘則氣更不足而血愈加有餘仍以補血之藥加之則血喜氣之怯轉憐其匱乏損己之有餘以益氣之不足則血氣和平而滯者不滯痿者不痿矣此勞治之所以妙也張公曰不必增華君曰余亦未傳逸治法論過勞論治氣勞論治血勞天師曰逸者因人之過勞而勸其安閒而後以湯丸之藥繼之者也凡人太勞則脈必浮大不倫按之無力若不勸其安閒作息必有吐血損症之侵故逸治不可不講也或遨遊于山水或習靜於房圍或養閒於書史琴玩或偷娛於笙簫歌板是隨地皆可言歡而生人無非樂境自足轉火宅而清涼變勞心為暇豫也後以滋補之方繼之自然開懷飲食易於消磨矣方用人參三兩白朮五兩茯苓三兩熟地五兩山茱四兩砂仁五錢當歸八兩白芍五兩黃耆五兩麥冬三兩北五味二兩陳皮五錢神麯一兩各為末蜜為丸每日早晚服各五錢此方乃補氣補血補精之妙品也有斡旋之力可以久服滋人不致有偏勝之禍也逸治之方惟此最佳幸為留意張公曰勞逸得宜方劑有法吾無間然吾方雖有不及天師汝言亦是有理豫再傳二方一治氣之勞一治血之勞勞氣方人參三兩黃耆三兩茯苓四兩白朮八兩白芍三兩陳皮一兩炙甘草八錢麥冬二兩北五味一兩遠志一兩白芥子一兩各為末蜜為丸早服五錢此方乃補氣藥也人有傷氣而右脈大者最宜服此方倘左手脈大於右手者乃傷血也另立一方用熟地八兩白芍八兩當歸四兩山茱萸四兩麥冬三兩五味子一兩遠志一兩生棗仁一兩茯神三兩砂仁五錢白芥子一兩橘紅三錢肉桂五錢各為末蜜為丸晚服一兩此方專治血之不足也如身夜熱者加地骨皮五兩去肉桂無血人服之實有奇功可並載之以供世人之採擇吸治法論胞上升論頭痛論腸下論瘡毒初起天師曰吸治者不可用湯藥而用吸治也如人生産子落地而胞不墮或頭痛而久不愈或腸下而久不收或瘡毒初起而未知陰陽之症皆可用藥以吸之也産婦子落地矣而胞忽上升者必有惡血奔心之症勢甚危急倘以下藥下之則虛其元氣恐致暴亡不若用萆麻子一錢搗爛塗於本婦之足心則少頃胞胎自下矣更有胞落子生而大腸墮下者更為可畏此虛極下陷法當用人參加升麻柴胡提之而産婦初生未便用升麻柴胡以發散其正氣恐氣散而腸愈難收不若仍用萆麻子一味搗爛塗於本婦之頂心少頃腸自收入急用溫湯將頂上萆麻洗淨不使少留些須倘若時辰太久則腸且上懸又成危症而不可救矣胞胎一落亦是同然俱宜洗淨為禱至於頭痛之症止消用萆麻子一粒搗碎同棗肉些須同搗勻丸如黃豆大外用絲綿裹之納於鼻孔少頃必有清涕流出即將丸藥取出不可久放其中頭痛即愈永不再發倘久留在中必致腦髓流出又成不可藥救之症切記切記瘡毒初起有一種解毒之石即吸住不下但毒輕者一吸即下重者必吸數日而始下不可急性而人自取下也此石最妙一石可用三年然止可用以治小瘡口可耳大毒癰疽仍須前湯藥治之為妙此吸治之宜知也張公曰吸法盡於此無可再談引治法論虛火沸騰論厥逆天師曰引治者病在下而上引之病在上而下引之也如人虛火沸騰於咽喉口齒間用寒涼之藥入口稍快少頃又甚又用寒涼腹瀉肚痛而上熱益熾欲用熱藥涼飲而病人不信不肯輕治乃用外治之法引之而愈方用附子一個為末米醋調成膏藥貼在湧泉穴上少頃火氣衰又少頃而熱止退變成冰涼世界然後六味地黃丸湯大劑與之則火不再沸騰矣蓋此火乃雷火也見水則愈酷烈子不見雷霆之震濃陰大雨之時愈加震動驚天轟地更作威勢一見太陽當空則雨歇聲消寂然不聞矣又不見冬令之天地耶嚴寒霜雪冰凍郊原雨雪霏霏陰風慘厲此天氣下行而地氣反上蓋下熱則上自寒也又不見夏日之天地乎酷日炎蒸蘊隆火熱爍木焚林燔湯沸水天氣上升地氣下降此上熱而下寒也人身虛火亦猶是也今既火騰於上則下身冰冷今以附子大熱之藥湧泉引之者蓋湧泉雖是水穴水之中實有火氣存焉火性炎上而穴中正寒忽然得火則水自沸溫水溫則火自降同氣相求必歸於窟宅之中矣火既歸於窟宅又何至沸騰於天上哉此咽喉口齒忽然消亡有不知其然而然之妙此引治之巧又當知之者張公曰引治尚有一法汝備志之如人病厥逆之症不敢用藥以治之者用吳茱萸一兩為末以面半兩用水調成厚糊一般以布如鍾大攤成膏紙厚半分貼在湧泉穴內則手足不逆矣況上熱下寒之症皆可用此法而引之亦引火歸元之法也華君曰亦未傳單治法論諸痛治肝論吐瀉各症治胃天師曰單治者各經有病而單治一病也如人病身痛又雙手痛又兩足痛腹痛心痛者是此等症如單治其一經是此病先愈而後一症一症治之也論此症滿身上下中央俱病矣當先治肝為主肝氣一舒則諸症自愈不可頭痛救頭腳痛救腳也方用柴胡一錢白芍五錢茯苓五錢甘草一錢陳皮一錢當歸二錢蒼朮二錢薏仁五錢梔子一錢水煎服批加減逍遙散此方逍遙散之變方也單治肝經之郁而又加去濕之品蓋諸痛皆屬於火而兩足之痛又兼有濕氣作祟方中用梔子以清火用薏仁以去濕故雖治肝經之一經而諸經無不奏效也此單治之神更妙於兼治人知之乎張公曰更有或瀉或吐或飽悶或頭暈眼花之症當先治其胃氣則諸症俱安方用人參三錢茯苓三錢甘草三分陳皮一錢白芍三錢神麯一錢砂仁三粒薏仁五錢水煎服此方乃治胃之方也胃氣一生則吐瀉各症自愈此亦單治之一法也附於天師之方後可耳華君曰未傳雙治法論心痛治肝論胃吐治脾論肺燥治腎天師曰雙治者一經有疾單治一經不足而雙治二經始能奏效故曰雙治如人病心痛不可止治心痛必須兼治肝如人胃吐不可單治胃而兼治脾如人肺嗽不可單治肺而兼治腎是也病心致痛理宜治心而今不治心者何也蓋心氣之傷由於肝氣之不足補其肝而心君安其位矣方用白芍五錢當歸五錢有火加梔子三錢無火加肉桂二錢水煎服批心肝雙解飲疼立止蓋芍藥平肝又能生肝之血與當歸同用更有奇功梔子肉桂皆是清肝助肝之神品肝氣既平則心氣亦定子母有關切之誼母安而子未有不安者此心肝兩治之妙法也胃吐由於脾虛脾氣不下行自必上反而吐補其脾氣則胃氣自安方用人參三錢茯苓三錢白朮五錢甘草一錢肉桂一錢神麯一錢半夏一錢砂仁三粒水煎服批脾胃雙治飲此方乃治脾之藥居多何以用之於胃吐之病反宜也蓋胃為脾之關關門之沸騰由於關中之潰亂然則欲關外安靜必先關內敉寧方中全用補脾之藥則脾氣得令又何患胃口之吐哉況方中又有砂仁半夏神麯等類全是止吐之品有不奏功如神者乎此又脾胃雙治之妙法也肺嗽之症本是肺虛肺虛必宜補肺明矣奈何兼治腎也蓋肺金之氣夜臥必歸諸腎之中譬如母子之間母雖外遊夜間必返於子家以安其身今肺金為心火所傷必求救於己子以御外侮倘其子貧寒何以號多人以報母仇哉今有一方治之用熟地一兩山茱萸四錢麥冬一兩元參五錢蘇子一錢甘草一錢牛膝一錢沙參三錢天門冬一錢紫菀五分水煎服此方之妙全在峻補腎水而少清肺金則子盛於母而母仇可報方中又有祛邪之品用之得宜全不耗散肺金譬如子率友朋盡是同心之助聲言攻擊全不費老母之資則子之仇雖在未復而外侮聞風退舍不敢重犯於母家此又肺腎相治之妙法也張公曰雙治之法甚多然有此三法無不可觸類而治之矣蓋諸病非心肝之病即脾胃與肺腎之病也今天師既各有雙治之法且藥味入神寧不可據之以為枕中祕乎余所以讚歎而不敢再為參贊也華君曰未傳立治法論厥症論腰疼天師曰立治者不可坐臥而立治之也如人厥病者是蓋厥症多兩手反張兩足轉逆必須立而飲藥則頃刻立定不可不知之也蓋厥症原是熱病熱深則厥亦深倘令其臥而服藥則藥到胃一遇火氣沸騰衝擊而不相入反致吐出者比比也我今立一法立而飲藥則斷斷無吐出之虞方用黃連三錢柴胡一錢茯苓三錢白芍三錢白芥子一錢木瓜一錢甘草一錢水煎服批順性湯此方純是平肝之品去火而又順火之性目宜入口不吐然而火熱炎上吐亦常有令人將病人抱而立之令一人將藥與飲俟其下口久之然後抱臥則藥性相順而無吐逆之苦矣此立治之法人可不知之耶尚有腰疼之症亦宜立而飲藥蓋腰屬腎腎虛而後腰痛久則腎宮益虛縱然有補腎之藥不肯直入腎宮如浪子久不在家反畏家如敵國縱有纏頭在手又將別遊他院必須人扶住身子與藥服之則藥始能直入腎經又譬如浪子不肯還家得人勸阻不得已而返其家室蓋腎宮坐臥水穀不能直達得行使之站立水穀滋味始能入之所以必得一人扶立而藥得達也方用熟地一兩山茱四錢北五味一錢麥冬二錢白朮一兩杜仲五錢酒煎服批健腰丹此方雖妙非立飲不能直達於腎宮此又立治之妙也人知之乎張公曰立治之症無多止此二症不再論華君曰與余同臥治法論痛風論風懿論風痱論痿廢論痙症天師曰臥治者因其臥而臥治之也如痛風之人風懿風痱痿廢之症是也痛風之病乃中濕也濕氣入於關節骨髓之中則痛不可忍手足牽掣腰脊傴僂經歲周年不起床席欲其坐起且不可得欲其不臥而治得乎方用薏仁一兩芡實一兩茯苓三錢車前子一錢白朮五錢肉桂一分不可多水煎服批解濕湯此方妙在去濕而不走氣尤妙在用肉桂一分得桂之氣而不得桂之味始能入諸關節之間以引去其水濕之氣也此方常服當用作湯不可責其近功此臥治之一法風懿之症奄忽不知人不疼不痛臥於床褥之上亦終歲經年此亦風濕之症入之皮肉之內而手足不為用者也方用白朮五錢薏仁一兩芡實五錢山藥三錢車前子一錢人參三錢甘草一錢陳皮一錢柴胡一錢白芍三錢白芥子三錢水煎服批健胃散濕丹此方亦去濕之神劑水去而又不耗氣則皮肉自然血活而風症可痊但不可責之以近功此又臥治之一法風痱之症乃火熱也火之有餘由於腎水之不足補水則火自消亡於烏有方用熟地四兩山茱萸三錢北五味二錢麥冬二兩元參一兩附子一分白芥子三錢水煎服批息火湯此方妙在純是補水之味水足則火自息火息則風痱之患自除此又臥治之一法也痿廢之症乃陽明火症腎水不足以滋之則骨空不能立方用元參三兩麥冬一兩熟地三兩山茱萸二兩水煎服批生陰壯髓丹此方妙在熟地山茱全去滋水而元參去浮游之火麥冬生肺金之陰陰長陽消陽明自然息焰火焰既息金水又生臟腑有津骨髓自滿而兩足有不能步履者乎此又臥治之一法也張公曰臥病固不止此更有痙症亦須臥治者也其症必腳縮筋促不能起立或痛或不痛終年難以下床不得不臥以治之方用薏仁五錢芡實五錢山藥五錢茯苓五錢白朮五錢肉桂一錢水煎服批風濕兩祛散此方乃純是去濕健脾之藥絶不去祛風而祛風已在其中蓋痙病原是濕症而非風症脾健則水濕之氣自消濕去則筋之疼痛自去筋舒則骨節自利矣但此藥必須多服始得華君曰與余同孫真君曰痿症奇方用薏仁三兩熟地三兩麥冬一兩北五味一錢牛膝五錢水煎服此方之妙妙在薏仁用至三兩則熟地不患太濕麥冬不患太寒牛膝不患太走轉能得三味之益可以久服而成功也批妙論妙方我傳子止此天師已發天地之奇又何必吾輩之多事哉我有方俱已傳世今傳子者從前未傳之方也實無可再傳非隱祕之也飢治法論傷寒論蟲痛論霍亂天師曰飢治者不可飽食俟其飢而用藥治之也如傷寒邪火初退之時蟲痛枵腹胃空之候是也傷寒火退邪散則胃氣初轉最忌急與之食一得食則胃氣轉閉不可復開此時即以藥下之則胃氣大傷而火邪復聚反成不可解之症不若禁之不與之食則中州之地自然轉輸漸漸關開搬運不至有阻隔之虞方用陳皮一錢甘草五分白芍三錢神麯五分枳殼五分厚朴五分梔子一錢茯苓一錢麥芽二錢水煎服批退邪消食飲此方藥味平平似無甚奇妙然而此症本不可以大劑出奇得此平調轉能化有事為無事然必待其飢餓之時始可與服若正飽之時服之徒滋滿悶而已矣蟲痛之症得食則痛減無食則痛增以酸梅湯一盞試之飲下而痛即止者乃蟲痛飲下而痛增重或少減者非蟲痛也方用楝樹根一兩黃連三錢烏梅肉三錢吳茱萸三錢炒梔子三錢白薇一兩白朮二兩茯苓三錢甘草三錢鱉甲三錢各為末蜜為丸每服三錢丸如小米大批殺蟲丹此丸必須乘其飢餓思食之時與之此丸服下必痛甚不可與之水蓋蟲得水即生也此方之妙妙在健脾之中而用殺蟲之品既是殺蟲之藥何故必待其飢餓而始殺之蓋腹中無食則蟲無所養蟲口必上向而索食待其飢餓枵腹之時則蟲頭盡向上而不向下矣一與之食彼必以為食也盡來爭食之奈入口拂其性則又亂動而跳躍故轉痛甚也禁與之水則周身上下耳目口鼻無非沾染藥氣內外夾攻有死而已設不知禁忌仍與之水則蟲且借勢而翻騰沐浴藥少水多自然解體止可殺蟲一半而不能剪草除根矣故必堅忍須臾一刻之痛使終身之痛除願人忍之哉此飢治之宜知也大黃亦可加三錢不加亦可腹之上疼不宜加腹之下痛宜加也張公曰飢治之法盡此二條無可增也惟消蟲之法豫尚有一方可傳於世省事而效捷凡人腹中不論生何蟲只消食棐子每日十個不消三日盡化為水矣或用生甘草一兩棐子二兩米飯為丸白滾水飢時送下五錢五日蟲皆便出皆不費錢而又去病之捷急宜載入者也華君曰同然余尚有一法霍亂之症一時而來少頃即定切不可與之食當令其忍飢一日而後以陳皮一錢甘草五分白朮二錢茯苓三錢山楂五粒香薷一錢藿香五分木瓜一錢白芍三錢治之則痛不再發蓋霍亂乃暑之熱氣也暑熱得食復聚而不可解所以必使之餓則暑邪盡散也名為定亂湯蟲系濕熱所生故祛熱是標燥濕是本燥濕是標健脾是本李子永識飽治法論治上焦火論治上焦痰論治胃寒論治脾寒論論治癆蟲論消肺痰天師曰飽治者病在上焦用藥宜飽飯後食之此一法也又病宜吐宜飽食之後用藥以吐之又一法也又有不必吐宜飽食以治之又一法也病在上焦者頭目上之病也用上清丸之類上清丸方世多不妥吾斟酌更定之以治上焦之火俱可服蘇葉二兩薄荷一兩白芷五錢黃芩二兩甘草一兩桔梗三兩麥冬三兩天門冬三兩半夏一兩陳皮一兩蔓荊子五錢柴胡一兩各為末水打成丸每服三錢飽食後服批上清丸此方妙在清火而不傷中氣強弱人感中風邪上焦有風火者服之俱妙上焦痰氣甚盛而下焦又虛者不可下之乃令其飽食後以藥服之即吐吐至飲食即止在下無礙而上焦之痰火一吐而愈此治法之巧者方用瓜蒂七個人參二錢水三大碗煎數沸飲之即大吐批加參瓜蒂散此方妙在瓜蒂散中加入人參蓋吐必傷氣今以瓜蒂吐之而人參仍補其胃中之氣雖大吐而仍不傷胃也故能一吐而即定不必吐飽食以治之者乃胃口寒而痛也手按之而少止者當用此法治之方用人參一兩白朮一兩肉桂一錢肥鴨一隻將藥入鴨腹內煮之極爛外以五味和之蔥椒之類俱不忌更以腐皮同煮恣其飽餐食盡批五香湯如不能食盡亦聽之不必又食米飯也一餐而痛如失矣此飽食之法真有奇效胃寒未有不胃氣虛者若以湯藥與之未免不能久留於胃中各經俱來分取所以難愈今以肥鴨煮藥飽食之必久留於胃中任其獨樂備經不能分取自然一經偏受其益而獨感之寒亦不覺其頓失正氣久留於胃中則邪氣自避於胃外也因陳子之不明余故又廣泄其祕張公曰凡病在上者俱宜飽飯後服之惟飽食用鴨治胃實所創聞真神仙之治法也必飽食之以治病乃脾病也胃寒而痛者在心之上也脾寒而痛者痛在心之下與左右也方用豬肚一個蓮肉一兩紅棗一兩肉桂一錢小茴香二錢白糯米一合將各藥同米俱入肚中以線扎住口外用清水煮之肚未入藥之前先用清水照常洗去穢氣入藥煮熟以極爛為主一氣頓食蘸甜醬油食之批蓮花肚如未飽再用米飯壓之而痛如失矣可與天師方並垂天師方治胃而豫方治脾兩不相妨又方用肥鰻二斤白薇一兩小茴香三錢甘草一錢薏仁五錢棐子十個去殼同在砂鍋內用水煮爛加五味和之乘飢飽餐一頓批作香鰻不可少留些須以食盡為度不必再食飯食亦半日不可茶水凡有癆蟲盡皆死矣我因遠公之問大啓其機我不敢隱之以於天譴也華君曰同余更有一法未備也人患痰病久不愈乃用豬肺頭一個以蘿蔔子五錢研碎白芥子一兩研碎五味調和飯鍋蒸熟飯後頓食之一個即愈此方乃治上焦之痰湯藥不能愈者用此神驗蓋久留於肺上而盡消其膜膈之痰亦治之最巧者
