body:
  text: 卷五書集久治法論虛寒久治天師曰久治者日久歲長而治之也此乃寒虛之人不可日斷藥餌如參苓耆術之類日日煎飲始好否則即昏眩怔忡是也方用人參一錢白朮二錢黃耆二錢茯苓二錢甘草五分白芥子一錢神麯五分肉桂一分麥冬二錢北五味三分蘇子五分水煎服批久道湯心不寧加生棗仁一錢不寐加熟棗仁一錢遠志一錢飽悶加白芍二錢口渴加當歸二錢熟地三錢夢遺加芡實三錢山藥三錢飲食不開加麥芽一錢山楂三四粒有痰加半夏五分咳嗽加桔梗一錢有浮游之火加元參二錢頭痛加蔓荊子七分或川芎一錢有外感加柴胡一錢鼻塞加蘇葉一錢目痛加柴胡一錢心微痛加桅子五分脅痛加芍藥一錢腹痛加肉桂三分此久治之法張公曰妙極暫治法論傷風傷食傷暑傷濕天師曰暫治者乃強壯之人素不服藥一朝得病用藥暫治之也如人外感傷寒用傷寒專門治之茲不再贅其餘傷風傷食傷暑傷濕俱可以暫治而愈傷風則用柴胡三錢荊芥一錢五分白芍三錢蒼朮五分茯苓二錢炒梔子二錢枳殼一錢丹皮一錢白芥子一錢水煎服批祛風散此方發散之藥雖重然因其素不患病則腠理必密故以重劑散之然方中有健脾之藥正不必憂散藥之太重也如傷食作痛胸腹飽悶填脹欲嘔而不得方用白朮三錢枳殼二錢山楂三十粒麥芽三錢半夏一錢甘草一錢砂仁三粒厚朴一錢水煎服批化食湯此方純是攻藥而不至消氣妙用白朮為君故不消氣而轉能消食然亦因其形壯體健而用之倘體弱久病之人不敢以此方投之傷暑者乃暑氣因其勞而感之必非在高堂內寢之中而得之也方用香薷二錢青蒿五錢石膏一錢乾葛一錢車前子一錢茯苓三錢白朮一錢厚朴一錢陳皮一錢甘草一錢水煎服批解暑神奇丹此方純是解暑之藥亦因其氣壯而用之氣虛人最忌傷濕之症兩足浮腫手按之必如泥乃濕侵於脾也急用茯苓五錢豬苓三錢白朮三錢澤瀉三錢肉桂二分治之亦因其體壯氣盛而用之倘氣虛還須斟酌此皆暫治之法遠治法論中風臌脹痿症食炭天師曰遠者病得之年遠而徐以治之也如中風已經歲月臌脹已經年許痿症而臥床者三載如癲癇食炭數年是也此等之症臥床既久起之最難卒效然而治之得法亦可起之於旦夕如中風手足不仁不能起立行步者但得胃氣之健而手足不致反張便足躄者皆可起之方用人參五兩白朮半斤薏仁三兩肉桂三錢附子一錢茯苓一兩半夏一兩南星三錢水二十碗煎四碗批回生神丹分作二次服早晨服二碗即臥上以綿被蓋之令極熱汗出如雨任其口呼大熱不可輕去其被任其自干再用後二碗晚服亦蓋之如前不可輕去其被一夜必將濕氣冷汗盡行外出三日可步履矣後用八味地黃丸四料為丸服完永不再發肢脹經年而不死者必非水臌水臌之症不能越於兩年未有皮毛不流水而死者今二三年不死非水臌乃氣臌血臌食臌蟲臌也但得小便利而胃口開者俱可治方用茯苓五兩人參一兩雷丸三錢甘草二錢蘿蔔子一兩白朮五錢大黃一兩附子一錢水十碗煎湯二碗批消臌至神湯早服一碗必然腹內雷鳴少頃必下惡物滿桶急拿出傾去再換桶即以第二碗繼之又大瀉大下至黃昏而止淡淡米飲湯飲之不再瀉然人弱極矣方用人參一錢茯苓五錢薏仁一兩山藥四錢陳皮五分白芥子一錢水煎服批回春健脾丹一劑即愈忌食鹽者一月犯則無生機矣先須斷明然後用藥治之痿症久不效者陽明火燒盡腎水也然能不死長存者何蓋腎水雖涸而肺金終得胃氣以生之肺金有氣必下生腎水腎雖乾枯終有露氣夜潤腎經常有生機故存而不死也方用麥冬半斤熟地一斤元參七兩五味子一兩水二十碗煎六碗批起廢神丹早晨服三碗下午服二碗半夜服二碗一連二日必能坐起後改用熟地八兩元參三兩麥冬四兩北五味三錢山茱萸四錢牛膝一兩水十碗煎二碗批壯體丹早晨一碗晚服一碗十日即能行步一月即平復如舊矣蓋大滋其肺腎之水則陽明之火不消而自消矣癲癇之症亦纍歲經年而未愈乃痰入於心竅之間而不能出喜食炭者蓋心火為痰所迷不得發泄炭乃火之餘與心火氣味相投病人食之竟甘如飴也方用人參一兩南星三錢鬼箭三錢半夏二錢附子一錢肉桂一錢柴胡三錢白芍三錢菖蒲二錢丹砂末二錢批啓迷奇效湯先將前藥煎湯二碗分作二服將丹砂一半調入藥中與病人服之彼不肯服即以炭飴之服了與汝炭吃彼必欣然服之索炭也不妨仍與之炭第二服亦如前法則彼不若前之欣然當令人急灌之不聽不妨打之以動其怒氣怒則肝木火起以生心反能去痰矣皆絶妙奇法世人未見未聞者吾救世心切不覺盡傳無隱此皆遠治之法最宜熟記張公曰中風之有胃氣則脾健可知但脾胃俱有根源何難用藥天師所用之藥又是健脾之品使脾一旺則氣益旺可知氣旺則濕自難留方中又全是去濕之藥濕去則痰消又有消痰之品痰消則寒自失而又有補火之劑所以奏功也然非大劑煎飲則一抔土安能止汪洋之水而重築其堤岸哉臌脹之症年久不死原是可救所以用下藥以成功非土鬱之中固有水積若果水症早早死矣安能三年之未死也然而雖非水症而水必有壅阻之病方中仍用茯苓為君以雷丸大黃為佐不治水而仍治水所以奏功如神也痿症久不死雖是肺經之潤亦由腎經之有根也倘腎水無根縱肺金有夜氣之生從何處生起吾見立槁而已矣惟其有根所以不死故用大劑補腎之品因之而病愈亦因其有根可救而救之也癲癇之病雖時嘗食物腸中有水穀之氣可以養生不死亦其心之不死也倘心早死即無病之人食谷亦亡況有癲癇之症吾見其早亡不能待於今日惟其中心不死不過胃痰有礙一時癲癇其脾胃猶有生氣也故用人參以治心加附子菖蒲肉桂溫中以祛邪加柴胡舒肝平木加南星鬼箭半夏逐痰蕩邪加丹砂定魂鎮魄自然邪氣少而正氣多也皆天師未言而豫發其奧妙如此方則天師至神至奇豫不能贊一辭也華君曰豫無此之多各有小異不必盡言只言異處可也臌脹方不同傳余之方乃用甘遂三錢牽牛三錢水三碗煎半碗服之則瀉水一桶瀉極用人參一錢茯苓三錢薏仁一兩山藥五錢芡實一兩陳皮五分白芥子一錢水煎服批健脾分水湯一劑即愈亦忌鹽一月痿症方亦不同方用元參一兩熟地三兩麥冬四兩山茱萸一兩沙參三兩五味子五錢水煎服批起痿神湯十日即可起床豫曾親試之神驗不知天師何故不傳此方而更傳新方也想天道之薄而人身亦殊用藥更重也癲癇余未傳方然別有治癲之方亦奇妙方用柴胡五錢白芍三兩人參一兩半夏三錢白芥子五錢南星三錢用牛膽制過者附子一錢茯神三錢菖蒲三錢水十碗煎二碗批天師曰亦奇妙方也二方相較彼更奇於此先與一碗服之必倦怠急再灌一碗必熟睡有睡至一二日者切不可驚醒如死人一般任其自醒醒來病如失即索飲食說從前之病不可即與飲食餓半日與之米粥湯內加人參五分陳皮五分煎粥與之再用人參三錢白朮一兩甘草一錢茯苓五錢陳皮五分白芥子五錢水煎與之彼必欣然自服批加減六君子湯服後再睡亦聽其自醒則永不再發亦奇妙法也天師曰此方未嘗不佳妙近治法論猝倒心傷暴亡腹痛欲死中惡中痰心疼天師曰近治者一時猝來之病而近治之也如一時眼花猝倒不省人事一時心痛暴亡一時腹痛手足青而欲死者是也此等之症如風雨驟至如駿馬奔馳不可一時止遏不可少緩須臾以治之也眼花猝倒非中於惡則中於痰然中惡中痰實可同治蓋正氣之虛而後可以中惡中氣之餒而後可以痰迷然則二症皆氣虛之故故補其氣而中氣正氣自回或加以祛痰之品逐邪之藥無有不奏功頃刻者方用人參三錢白朮五錢附子一錢半夏一錢南星一錢陳皮一錢白薇一錢水煎服批消惡湯下喉即愈此方妙在補氣之藥多於逐痰祛邪中氣健於中邪氣消於外又何懼痰之不速化哉心痛暴亡非寒即火治火之法止消二味用炒梔子五錢白芍五錢煎湯服之批自焚急救湯下喉即愈治寒之藥必須多加方用人參三錢白朮五錢肉桂一錢附子一錢甘草一錢白芍三錢熟地一兩山茱萸四錢良薑一錢水煎服批消冰散二方各有深意前方因火盛而瀉以肝木也後方因大寒而補腎氣也多寡不同而奏功之神則一耳腹痛之症一時痛極甚至手足皆青救若少遲必致立亡此腎經直中寒邪也法當急溫命門之火而佐熱其心包之冷使痛立除而手足之青亦解方用人參三錢白朮五錢熟地五錢附子一錢肉桂一錢吳茱萸五分乾薑五分水煎服即愈批救疼至聖丹此方之妙補火於真陰之中祛寒於真陰之內自然邪去而痛止不致上犯心而中犯肝也此近治之法當於平日留心不致臨症急遽誤人性命也華君曰余亦有傳但不同耳中惡中痰方人參三錢茯苓五錢天南星三錢附子一錢虛人多加人參至一兩水煎服即蘇批解惡仙丹心痛方治有火者神效貫仲三錢白芍三錢梔子三錢甘草二錢水煎服批止痛仙丹一劑即止痛輕治法論小柴胡湯天師曰輕者病不重不必重治而用輕劑以治之也如人咳嗽頭痛眼目痛口舌生瘡皆是小症何必用重劑以補陽用厚味以滋陰哉法當用輕清之品少少散之無不立效如小柴胡之方是也然而小柴胡湯世人不知輕重之法豫再酌定之可永為式方用柴胡一錢黃芩一錢半夏一錢陳皮五分甘草一錢此小柴胡湯豫更加人參五分茯苓二錢更為奇妙蓋氣足則邪易出而汗易發世人見用人參便覺失色匪獨醫者不敢用即病者亦不敢服相沿而不可救藥者滔滔皆是安得布告天下醫人詳察其病源而善用之也此輕治之法極宜究心張公曰天師言小柴胡湯治外感者也豫言治內傷者補中益氣湯是也然補中益氣湯東垣立方之後世人亂用殊失重輕之法豫再酌定之可傳之千古不敝柴胡一錢升麻四分黃耆三錢白朮三錢當歸三錢陳皮八分甘草一錢人參一錢人氣虛者多加可至一兩看人之強弱分多寡耳批酌定補中益氣湯若有痰加半夏一錢有熱加黃芩一錢有寒加桂枝一錢頭痛加蔓荊子八分或川芎一錢兩脅痛加白芍三錢少腹痛亦加白芍三錢有食加麥芽二錢傷肉食加山楂二十粒胸中痛加枳殼五分神麯五分如此加用自合病機無如人不肯用此方以治內傷也法最宜留心大約右手寸口脈與關脈大於左手之脈者急用此湯無不神效小柴胡本是半表半裡少陽經藥內用參苓以病在少陽恐漸逼里乘之於所勝也故先扶胃氣使邪不入而已入者亦得正旺而自退耳李子永識重治法論大渴大汗大吐大瀉陰陽脫天師曰重治者病出非常非輕淡可以奏功或用之數兩或用半斤一斤而後可以獲效如大渴大汗大吐大瀉陰陽脫之症從前俱已罄談而方法亦盡余可不言然而尚未盡者大渴之症必用石膏往往有一晝夜而用至斤許者蓋熱之極藥不得不用之重此時倘守定不可多與之言反必殺之矣第此等症乃萬人中一有之不可執之以治凡有胃火之人也張公曰大渴之症用石膏以平胃火無人不知矣尚有未知其故者胃火沸騰奔越不啻如火之燎原必得傾盆之雨始能滂沛而息滅之原取一時權宜之計故可以暫時用之多能取效必不可久用久用則敗亡也天師曰大汗之症必用參耆往往有用參斤許者然亦偶爾有之不可拘執以治凡有汗亡陽之症蓋陽藥不宜偏多而陰藥可以重用故耳張公曰大汗勢必用補氣之藥以救亡陽之症然而過用補氣之藥仍恐陽旺而陰消服數劑補氣之後即宜改用補陰之品況亡陽之後陰血正枯進以補水之藥正投其所好也陰定則陽生而陰陽無偏勝之弊矣天師曰大吐之症明是虛寒亦有用參至數兩者然而吐不可一類同觀其勢不急不妨少用可以徐加倘寒未深而吐不甚亦以參數兩加之恐增飽滿之症矣張公曰大吐之症虛寒居多然亦有熱而吐者不可不講熱吐者必隨痰而出不若寒吐之純是清水也熱吐不可用參以二陳湯飲之得宜若寒吐必須加人參兩許而雜之辛熱之品始能止嘔而定吐第人參可以暫用而不可日日服之吐多則傷陰暫服人參止吐則可若日日服之必至陽有餘而陰不足胃中乾燥恐成閉結之症矣所以人參可暫而不可常也大瀉之症往往用止瀉之藥至數兩者亦一時權宜之計而不可執之為經久之法大瀉澀之始能止瀉若過於酸收則大腸細小矣下不能出又返而上故止瀉之藥止可一時用之而不可經久用之也陰陽脫亦有用參至數斤者然脫有不同有火盛而脫有水虛而脫水虛者用人參數斤實為對藥倘腎中有火作強而脫止可用多數兩挽回於一時而不可日日用參數斤以奪命於後日也蓋重治之法前已備言其功茲更發明其弊願人斟酌善用之陰陽脫症明是氣虛之症用參最宜最可多服即腎中有火亦可用之但脫後用參以救脫則可救活之後亦當急用熟地山茱大劑作湯飲之使已脫之精重生則未脫之氣可長否則陽旺陰消恐非善後之策不特腎中有火者不宜久服人參也倘能用熟地山茱北五味麥冬之類於人參之中又各各相宜不必避忌人參之不宜用也華君曰前已明言然余尚有方並傳以為臨症之鑑大渴不止方用石膏數兩知母三錢糯米一撮麥冬三兩人參亦數兩與石膏同用半夏三錢甘草一錢竹葉百片元參二兩水煎服大汗方用人參四兩北五味三錢麥冬三兩生地二兩水煎服一劑即止汗更有奇方以救貧乏之人黃耆三兩當歸二兩桑葉十四片北五味三錢麥冬二兩水煎服之批消汗至神丹一劑即止汗大吐方人參一兩陳皮二錢砂仁三粒批止嘔仙丹此治有火之吐倘寒甚而吐加丁香二錢乾薑三錢神效更有腎火沸騰而吐食入即出等症用六味湯一料煎湯二碗服之即止吐更有腎寒之極今日飲食至明日盡情吐出者用六味湯一料加附子一個肉桂二兩煎湯二碗服之即不吐二方豫親試而驗者也大瀉方用白朮一兩茯苓一兩肉桂五分澤瀉三錢豬苓三錢一劑即止瀉更有腎經作瀉五更時痛下七八次者亦用八味地黃湯一料煎湯二碗與之當日即減大半二服愈四服全愈陰陽脫無可說大約必得人參以救之天師之說亦言其變也吐症張公旋覆花湯最妙宜補入李子永識瘟疫治法天師曰瘟疫之症其來無方然而召之亦有其故或人事之錯亂或天時之乖違或尸氣之纏染或毒氣之變蒸皆能成瘟疫之症也症既不同治難畫一然而瘟疫之人大多火熱之氣蘊蓄於房戶則一傢俱病蘊蓄於村落則一鄉俱病蘊蓄於市廛則一城俱病蘊蓄於道路則千里俱病故症雖多但去其火熱之氣而少加祛邪逐穢之品未有不可奏功而共效者也方用大黃三錢元參五錢柴胡一錢石膏二錢麥冬三錢荊芥一錢白芍三錢滑石三錢天花粉三錢水煎服此方可通治瘟疫之病出入加減無不奏功此方之妙用大黃以蕩滌胸腹之邪用荊芥柴胡以散其半表半裡之邪氣用天花粉以消痰去結用石膏以逐其胃中之火用芍藥以平肝木不使來克脾氣則正氣自存而邪氣自出此方最妥最神治瘟疫者以此為枕中祕張公曰瘟疫不可先定方瘟疫來之無方也不可空缺一門天師所以酌定此方可以救世大約可據之以治時氣之病而終不可以治氣數之災也瘴癘治法天師曰瘴癘者乃兩粵之氣鬱蒸而變之者也其氣皆熱而非寒其症皆頭痛而腹滿土人服檳榔無礙者辛以散之也蓋火氣得寒反抑鬱而不伸檳榔氣辛同氣易入其味卻散故適與病相宜然止可救一時之急終不可恃之為長城也今立一方可長治瘴癘之侵人參一錢白朮五錢茯苓三錢陳皮五分甘草五分半夏一錢檳榔一錢枳殼五分柴胡五分五味子五粒麥冬三錢水煎服此方之妙全非治瘴癘之品而服之自消蓋健脾則氣旺氣旺則瘴癘不能相侵即既感者方中已有去瘴癘之藥豈有不奏功立應者乎此瘴癘治法又宜知之也或人有感癘而成大麻風者又不可如是治法蓋大麻風純是熱毒之氣裹於皮膚之間濕氣又藏遏於肌骨之內所以外症皮紅生點鬚眉盡落遍體腐爛臭氣既不可聞人又安肯近而與治豫心痛之乃立一奇方用元參四兩蒼朮四兩熟地四兩蒼耳子四兩薏仁四兩茯苓四兩名為四六湯各為末蜜為丸每日吞用一兩二料必然全愈蓋此方之妙能補腎健脾而加入散風去濕正補則邪自退不必治大風而大風自治矣急宜先刻一張廣行施捨功德又何可量哉止忌房事而已華君曰傳豫方不同用檳榔一錢白芍三錢柴胡八分白朮三錢茯苓三錢車前子二錢枳殼五分白芥子三錢水煎服有火加黃連五分水煎服二劑即瘴消亦妙方也大麻風豫有奇方用蒼朮二兩熟地二兩元參二兩蒼耳子二兩車前子二兩生甘草二兩金銀花十兩蒲公英四兩白芥子二兩各為末蜜為丸料全愈此方中和之中有妙理似勝天師傳方也尚有論二篇並傳之一論真假病有真假則藥豈可無真僞蓋假對假而真乃現苟必真以治假則假症反現真病以惑人故必用假藥以治假症也如上焦極熱而雙足冰涼此下寒乃真寒而上熱乃假熱也設我以涼藥投之下喉自快及至中焦已非其所喜必且反上而不納況藥又不肯久居於中焦勢必行至下焦而後已乃下焦冰涼世界以寒入寒雖同氣相通似乎可藏殊不知陰寒之地又加冰雪必然積而不流成冰結凍何有已時必得大地春回陽和有氣而後化人身假熱之症亦正相同倘以寒藥投之自然違背先以熱藥投之亦未必遂順其性法當用四逆湯加人尿膽汁調涼與服則下喉之時自覺寬快不致相逆其拂抑之氣及至中焦味已變溫性情四合引入下焦則熱性大作不啻如貧子得衣乞兒逢食下既熱矣則龍雷之火有可歸之宅自然如蜃之逢水龍之得珠潛返於淵不知不覺火消烏有矣四逆湯熱藥也亂之以人尿膽汁則熱假為寒以騙症之假寒作熱實有妙用倘執定以熱攻寒之說而不知以假紿熱之方則腎且坐困盡以真熱之藥遽治假熱之病必至扞格而不入此真假之宜知豫所以特為作論此一端之法可通之以治假寒之症矣二論內外治法內病治內外病治外人皆知之矣不知內病可以外治而外病可以內攻也夫外病徒於外治之必致日久而難效必須內治之可旦夕奏功也如癰疽結毒之類是也人見癰疽等症之發於外以鐵箍散圍之以刀圭刺之以膏藥貼之以末藥敷之縱然藥神亦不能速效必用內藥內散不過一二日之間便為分消烏有然則何可徒治其外哉至於內病以藥內散實多奇功不比外症之難愈然而內外兩施表裡兼治其功更捷如引導之奇按摩之異又不可不急講也天師曰二論俱缺明快警切似不必傳得治法天師曰得治者言治之得法也如傷寒而得傳經直中之宜傷暑而得中暑中暍之宜中風而得中氣中火中痰之宜中濕而得中水中氣中食中蟲之宜中燥而得中涼中熱之宜中寒而得中肝中腎中心中脾中臟中腑之宜因病下藥又何至殺人頃刻哉雖得之治無方之可言而得之鑑實為人之幸也吾存得之一門者欲人知得則有功不得則有過也得治之法看病人色澤之真僞看病人脈息之實虛有神無神問病人之喜好若何飲食若何有痰無痰若何痰之色若何再察病人舌之顏色若何滑與不滑若何能食不能食心腹之間痛不痛觀其情意詳審其從違徐聽其聲音再聞其氣息病之症瞭然於心中又何患不得哉失治法天師曰失治者不能知病之真假症之虛實與陰陽寒熱而妄治之也信口雌黃全無見識喜攻人之短炫自己之長不識藥味之溫和動言可用何知方法之大小輒曰難投視熟地人參為冤家仇敵珍黃柏知母為親子嬌兒用寒涼之品全無畏忌之心見平補之施頓作驚疑之色喜攻喜散矜消導為神奇怒抑怒揚薄通塞為怪涎但明瀉火而不悟從治之妙鄙茱萸為無用之材僅曉益水而不曉變症之方笑甘遂為可棄之物消痰而不消痰之本詫病難攻瀉火而不瀉火之原嘆方可廢奇平之法原未曾熟究於胸中正變之機安能即悟於指下無怪動手即錯背謬殊多舉意全非失亂不少以致冤鬼夜號藥匱中無非黑氣陰魂慘結家堂上盡是啼聲願學醫者見失以求得庶可改過以延祥然則求得延祥之法奈何見寒藥投之而拒格即當改用大熱之方見熱藥投之而燥煩即當改用清涼之劑見消導之而轉甚者宜改溫補見祛邪之則更加者宜用平調見利水而水益多者補腎為先見散邪而邪益盛者助正為急此皆補過之文抑亦立功之術臨症切須詳審慎弗忽略意治法天師曰醫者意也因病人之意而用之一法也因病症之意而用之又一法也因藥味之意而用之又一法也因病人之意耐用之奈何如病人喜食寒即以寒物投之病人喜食熱即以熱物投之也隨病人之性而加以順性之方則不違而得大益倘一違其性未必聽信吾言而肯服吾藥也所以古人有問可食蜻蜒胡蝶否而即對曰可食者正順其意耳因病症之意而用之奈何如人見弓蛇之類於懷內必解其疑見鬼祟於庭邊必破其惑是也因時令之意而用之奈何時當春寒而生疫病解散為先時當夏令而生瘟症陰涼為急之類是也因藥味之意而用之又奈何或象形而相制或同氣而相求或相反而成功或相畏而作使各有妙理豈曰輕投此意治之入神人當精思而制方也神治法天師曰神治者通神之治不可思議而測度之以人謀也或剖腹以洗腸或破胸以洗髓或決竇以出鳥雀或用藥以化龜蛇此尤不經之奇未足以取信也惟是尋常之中忽然鬥異死亡之刻頓爾全生藥品是人之同施功效實世之各別非學究天人之奧理通鬼神之玄機何能至此哉洞垣之術飲之上池之水刮骨之療得之青囊之書遠公既神授於今朝豈難通靈於他日願寢食於茲編為天下萬世法岐天師載志於篇終欲遠公極深而研幾之也冬至後六日書於客邸傷寒相舌祕法天師曰我有傷寒相舌法凡見舌系白苔者邪火未甚也用小柴胡湯解之舌系黃苔者心熱也可用黃連梔子以涼之凡見黃而帶灰色者系胃熱也可用石膏知母以涼之凡見黃而帶紅者乃小腸膀胱熱也可用梔子以清之見舌紅而白者乃肺熱也用黃連蘇葉以解之見舌黑而帶紅者乃腎虛而挾邪也用生地元參又入柴胡以和解之見舌紅而有黑星者乃胃熱極也用石膏以治之元參乾葛亦可終不若石膏之妙見舌紅而有白點者乃心中有邪也宜用柴胡黃連以解之心肝同治也見舌紅而有大紅點者乃胃熱而帶濕也須茵陳五苓散以利之蓋水濕必歸膀胱以散邪非肉桂不能引入膀胱但止可用一二分不可多入見舌白苔而帶黑點亦胃熱也宜用石膏以涼之見舌黃而有黑者乃肝經實熱也用柴胡梔子以解之見舌白而黃者邪將入里也急用柴胡梔子以解之不使入里柴胡乃半表半裡不可不用之也見舌中白而外黃者乃邪入大腸也必須五苓散以分水水分則泄止矣見舌中黃而外白者乃邪在內而非外邪在上而非下止可加柴胡枳殼以和解不可驟用大黃以輕下也天水加五苓亦可終不若柴胡枳殼直中病原少加天水則更妥或不加用天水加五苓散亦可也見根黃而光白者亦胃熱而帶濕也亦須用石膏為君而少加去水之品如豬苓澤瀉之味也見舌黃而隔一瓣一瓣者乃邪濕已入大腸急用大黃茵陳下之不必用抵當十棗湯也若下之遲則不得不用之然須辨水與血之分下水用十棗下血用抵當也見舌有紅中如蟲蝕者乃水未升而火來乘也亦須用黃連柴胡以和解之見舌紅而開裂如人字者乃邪初入心宜用石膏黃連以解之見舌有根黑而尖帶紅者乃腎中有邪未散宜用柴胡梔子以解之見舌根黑而舌尖白者乃胃火乘腎宜用石膏知母元參以解之不必論其渴與不渴不必問其下利也舌根黑而舌尖黃者亦邪將入腎須急用大黃下之然須辨其腹痛與不痛按之腹痛而手不能近者急下之否則只用柴胡梔子以和解之見舌純紅而獨尖黑者乃腎虛而邪火來乘也不可用石膏湯腎既虛而又用石膏是速之死也當用元參一兩或二兩以救之多有能生者見舌有中心紅暈而四圍邊防純黑者乃君相之火炎騰急用大黃加生地兩許下而救之十人中亦可救五六人見舌有中央灰黑而四邊微紅者乃邪結於大腸也下之則愈不應則死以腎水枯槁不能潤之推送此時又不可竟用熟地補腎之藥蓋邪未散不可補補則愈加脹急適所以害之也必邪下而後以生地滋之則可然亦不可多用也見舌有純灰色中間獨兩暈黑者亦邪將入腎也急用元參兩許少加柴胡治之見舌有外紅而內黑者此火極似水也急用柴胡梔子大黃枳實以和利之若舌又見刺則火亢熱之極矣尤須多加前藥總之內黑而外白內黑而外黃皆前症也與上同治十中亦可得半生也惟舌中淡黑而外或淡紅外或淡白內或淡黃者較前少輕俱可以前法治之十人中可得八人生也見舌有純紅而露黑紋數條者此水來乘火乃陰症也其舌苔必滑必惡寒惡水下喉必吐倘現純黑之舌乃死症也不須治之水極似火火極似水一帶純黑俱不可治傷寒知舌之驗法便有把握庶不至臨症差誤耳傷寒得仲景而大彰今又得天師而大著又得吾子之補論而無遺蘊矣茲相舌法正天師所傳較金鏡録更備且無誤治之虞誠濟世之慈航救生之實録也願世人細心觀之保無有操藥殺人之禍矣呂道人書於燕市傷寒大成中相舌法較備可參看李子永識雷公真君曰我受廣成夫子之傳深知醫道世人止推我炮製可慨也今得遠公陳子可以盡泄吾祕汝注內經無微不揚無隱不出雖岐公之助然亦妝之靈機足以發之也第其中止可因經發明不能於經外另出手眼祕奧雖岐公傳汝石室祕録實為醫術之奇而其中尚有未備我今罄豫子附於石室祕録之後以廣岐天師之未備使後世知我醫道之神不止以炮製見長亦大快事也當詳言之子細記之可耳一論五行雷公真君曰五行火木土金水配心肝脾肺腎人盡知之也然而生中有克克中有生生不全生克不全克生畏克而不敢生克畏生而不敢克人未必盡知之也何以見生中有克腎生肝也腎之中有火存焉腎水乾枯腎不能生肝木矣火無水制則腎火沸騰肝木必致受焚燒之禍非生中有克乎治法當急補其腎中之水水足而火息腎不剋木而反生木矣肝生心也肝之中有水存焉肝火燥烈肝不能生心火矣木無水養則肝木焦枯心火必有寒冷之虞非生中有克乎治法當急補其肝中之水水足而木旺肝不剋火而反生火矣心中之火君火也心包之火相火也二火之中各有水焉二火無水則心燔灼而包絡自焚矣又何能火生脾胃之土乎火無所養則二火熾盛必有燎原之害此生中有克不信然乎治法當補其心中之水以生君火更當補其腎中之水以滋相火水足而二火皆安不去克脾胃之土而脾胃之土自生矣脾土剋水者也然土必得水以潤之而後可以生金倘土中無水則過於亢熱必有赤地千里煉石流金之災不生金而反剋金矣治法當補其脾陰之水使水足以潤土而金之氣有所資庶幾金有生而無克也肺金生水者也然金亦必得水以濡之而後可以生水倘金中無水則過於剛徑必有煅煉太甚崩爐飛汞之憂不生水而反剋水矣治法當補其肺中之水使水足以濟金而水之源有所出庶幾水有生而無克也以上五者言生中有克實有至理非漫然立論倘腎中無水用六味地黃丸湯大劑與之肝中無水用四物湯心中無水用天王補心丸心包無水用歸脾湯脾胃無水用六君四君肺經無水用生脈散舉一而類推之可也何以見克中有生乎肝剋土也而肝木非土又何以生然而肝木未嘗不能生土土得木以疏通則土有生氣矣脾剋水也而脾土非水又何以生然而脾土未嘗不生水水得土而蓄積則水有根基矣腎剋火也而腎水非火不能生無火則腎無溫暖之氣矣然而心火必得腎水以生之也水生火而火無自焚之禍心剋金也而心火非金不能生無金則心無清肅之氣矣然而肺金必得心火以生之也火生金而金無寒冷之憂肺剋木也而肺金非木不能生無木則金無舒發之氣矣然而肝木必得肺金以生之也金生木而木無痿廢之患以上五者亦存至理知其顛倒之奇則治病自有神異之效何以見生不全生乎腎生肝也而不能全生肝木蓋腎水無一臟不取資也心得腎水而神明始煥發也脾得腎水而精微始化導也肺得腎水而清肅始下行也肝得腎水而謀慮始決斷也六腑亦無不得腎水而後可以分布之此腎經之不全生而無乎不生也何以見克不全克乎腎剋火也而不至全克心火蓋腎火無一臟不焚燒也心得腎火而躁煩生焉脾得腎火而津液干焉肺得腎火而喘嗽病焉肝得腎火而龍雷出焉六腑亦無不得腎火而燥渴枯竭之症見矣此腎經之不全克而無乎不克也何以見生畏克而不敢生乎肝木本生心火也而肝木畏肺金之克不敢去生心火則心氣愈弱不能制肺金之盛而金愈剋木矣心火本生胃土也而心火畏腎水之侵不敢去生胃土則胃氣轉虛不能制腎水之勝而水益侵胃土矣心包之火本生脾土也而心包之火畏腎水之泛不敢去生脾土則脾氣更困不能伏腎水之凌而水益欺脾土矣脾胃之土所以生肺金也而脾胃之土畏肝木之旺不敢去生肺金則肺金轉衰不敢制肝木之犯而木愈侮土矣腎經之水所以生肝木也而腎水畏脾胃之土燥不敢去生肝木則肝木更凋不能制脾胃二土之並而上愈制水矣見其生而制其克則生可全生忘其克而助其生則克且更克此醫道之宜知而用藥者所宜究心也何以見克畏生而不敢克乎金剋木也肺金之克肝又何畏於腎之生肝乎不知腎旺則肝亦旺肝旺則木盛木盛則肺金必衰雖性欲剋木見茂林而自返矣故木衰者當補腎以生肝不必制肺以扶肝木剋土也肝之克脾又何畏於心之生脾乎不知心旺則脾亦旺脾旺則土盛土盛則肝木自弱雖性思剋土遇焦土而自頽矣故土衰者當補心以培土不必制木以救土土製水者也脾之克腎又何畏於肺之生腎乎不知肺旺則腎亦旺腎旺則水盛水盛則脾土自微雖性欲制水見長江而自失矣故水衰者當補肺以益水不必制土以蓄水水制火者也腎水之克心又何畏肝之生心乎不知肝旺則心亦旺心旺則火盛火盛則腎水必虛雖性喜剋火見車薪而自退矣故火衰者當補肝以助心不必制水以援心火制金者也心之克肺又何畏脾之生肺乎不知脾旺則肺亦旺肺旺則金盛金盛則心火自衰雖性欲剋金見頑金而難煅矣故金衰者當補土以滋金不必息火以全金也此五行之妙理實醫道之精微能於此深造之醫不稱神未之前聞也長沙守張真人曰闡發至此精矣神矣自有軒岐之書從未有談五臟之五行顛倒神奇至此實有至理存乎其中用之卻有效莫驚言過創闢可喜而難見施行也二論臟腑雷真君曰五臟六腑人所知也然而五臟不止五六腑不止六人未之知也心肝脾肺腎此五臟也五臟之外胞胎亦為臟雖胞胎系婦人所有然男子未嘗無胞胎之脈其脈上繫於心下連於腎此脈乃通上通下為心腎接續之關人無此脈則水火不能相濟下病則玉門不關上病則怔忡不寧矣若婦人上病與男子同下病則不能受妊是生生之機屬陰而藏於陽實另為一臟也然既為一臟何以不列入五臟之中因五臟分五行而胞胎居水火之兩歧不便分配所以止言五臟而不言六臟也或疑胞胎既是一臟不列入五臟之中何以千古治病者不治胞胎竟得無恙是胞胎亦可有可無之脈其非五臟之可比而不知非也蓋胞胎不列入五臟亦因其兩歧故病在上則治心而心氣自通於胞胎之上病在下則治腎而腎氣自通於胞胎之下故不必更列為一臟而非胞胎之不為臟也或又疑女子有胞胎以懷妊以胞胎為一臟固宜而男子亦曰有胞胎其誰信之不知男子之有胞胎論脈之經絡而非胞之有無也於心之膜膈間有一系下連於兩腎之間與婦人無異惟婦人下大而上細男子上下俱細耳婦人下有口而男子下無口為別此脈男女入房其氣下行而婦人之脈其口大張男子泄精直射其口而胞胎之口始閉而受妊矣若男子精不能射或女子氣不下行或痰塞或火燒或水冷其口俱不敢開斷不能受妊此胞胎之為一臟甚重也至小腸大腸膀胱膽胃三焦此六腑也六腑外更有膻中亦一腑也膻中即心包絡代君火司令者也膻中與心原為一臟一腑兩相表裡今獨稱心而遺膻中非膻中不可為腑尊心為君火不得不抑膻中為相火也或曰千古不治膻中何以治心而皆效不知心與膻中為表裡表病則里亦病故治里而表自愈況膻中為脾胃之母土非火不生心火不動必得相火之往來以生之而後胃氣能入脾氣能出也膻中既為脾胃母謂不足當一腑之位乎此膻中之為一腑人當留意張真君曰六臟七腑今日始明真一快事嘗論五臟各相生相剋實各相成一經之病每兼數經以治此經之邪或向別經而求故用藥不得膠柱過於區別然論其大概亦不可混肺為金臟其質嬌畏寒畏熱而過寒過熱之藥不可以之治肺也脾為土臟其質厚可寒可熱而偏寒偏熱之藥無不可以之治脾也心為火臟體居上忌用熱其有以熱藥治心者乃腎虛而坎不交離本腎病而非心病也腎為水臟體居下忌用寒其有以寒藥治腎者乃心實而陽亢爍陰本心病而非腎病也至於肝為木臟木生於水其源從癸火以木熾其權挾丁用熱不得遠寒用寒不得廢熱古方治肝之藥寒熱配用反佐雜施職此故也其五臟之不同如此謹附志以俟後來者之鑑諸李子永識三論陰陽雷真君曰天地之道不外陰陽人身之病又何能離陰陽也內經論陰陽已無餘義然而止論其細微反未論其大綱也人身之陰陽其最大者無過氣血內經雖略言之究未嘗言其至大也蓋氣血之至大者在氣之有餘與血之不足氣有餘則陽旺而陰消血有餘則陰旺而陽消陽旺而陰消者當補其血陰旺而陽消者當補其氣陽旺而陰消者宜泄其氣陰旺而陽消者宜泄其血欲陰陽補瀉之宜視氣血之有餘不足而已四論晝夜雷真君曰晝夜最可辨病之陰陽然而最難辨也陽病晝重而夜輕謂陽氣與病氣交旺也然亦有陽病而晝不重者蓋陽氣虛之故耳陰病晝輕而夜重陰氣與病氣交旺也然亦有陰病而夜反輕者蓋陰氣虛之故耳夫陽氣與病氣交旺者此陽未虛之症故元陽敢與邪氣相爭而不止雖見之勢重其實病反輕當助其陽氣以祛邪不可但祛邪而不補其陽氣也陰氣與病氣交旺者此陰未衰之症故真陰與邪氣相戰而不已雖見之勢橫其實病未甚也助其陰氣以逐邪不必僅逐邪而不補其陰氣也陽虛則晝不重視其勢若輕而不知其邪實重蓋元陽虛極不敢與陽邪相戰有退縮不前之意非陽旺而不與邪鬥也陰虛而夜反輕視其勢亦淺而不知其邪實深蓋真陰微甚不敢與陰邪相犯有趨避不遑之象非陰旺而不與邪角也此陰相辨於晝夜不可為病之所愚然而尚不可拘於此也或晝重而夜亦重或晝輕而夜亦輕或有時重有時不重或有時輕有時不輕此陰陽之無定而晝夜之難拘又不可泥於補陽之說當峻補於陰而少佐其補陽之品則陰陽有養而邪氣不戰自逃矣張真君曰論陰陽亦不能出經之微五論四時雷真君曰春夏秋冬各有其令得其時則無病失其時則病生內經亦詳言之矣而余更取而言之者勸人宜先時加謹不可後時以恃藥也別有導引法欲傳世久矣知天師已先有之然法未嘗不佳可並行不悖也法開後先春養陽法每日閉目冥心而坐心注定肝中咽津七口送下丹田起立雙手自抱兩脅微搖者三如打恭狀起立俟氣定再坐如前法咽津七口送下丹田永無風症之侵一月行六次可也多多更妙先夏養陰法每日閉目冥心而坐心中注定於心咽津十四口送下心中永無暑氣之侵先秋養陰法每日閉目冥心而坐心注肺中咽津送下丹田者十二口以雙手攀足心者三次候氣定再如前咽津送下丹田者七口而後止永無燥熱之病先冬養陽法每日五更坐起心中注定兩腎口中候有津水送下丹田者三口不必漱津以手擦足心火熱而後已再送津三口至丹田再睡永無傷寒之症而長生之法亦在其中矣長夏不必更有方法張真君曰妙方也惜人不肯行耳行則必能卻疾六論氣色雷真君曰有病必須察色察色必須觀面而各有部位不可不知面之上兩眉心候肺也如色紅則火色青則風色黃則濕色黑則痛色白則寒也兩眼之中為明堂乃心之部位明堂之下在鼻之中乃肝之部位肝位之兩傍以候膽也鼻之尖上以候脾鼻尖兩傍以候胃兩顴之上以候腎腎位之上以候大腸肝膽位下鼻之兩傍以候小腸肺位之上為額以候咽喉額之上以候頭面心位之傍以候膻中鼻之下人中為承漿以候膀胱三焦無部位上焦寄於肺中焦寄於肝下焦寄於膀胱其餘各部位俱照靈樞無差錯也五色之見各出於本部可照五色以斷病一如肺經法斷之無不神驗但其中有生有克如青者而有黃色則木剋土矣紅者而有黑色則水剋火矣黃者而有紅色則火生土矣黑者而有白色則金生水矣克者死生者生也治之法克者救其生生者制其克否則病不能即瘥然其中有從內出外有從外入內從內出外者病欲解而不欲藏從外入內者病欲深而不欲散欲解者病輕欲深者病重也治之法解者助其正深者逐其邪否則病不能遽衰男女同看部位無有分別靈樞誤言也但內外何以別之色之沉而濁者為內色之浮而澤者為外也五色既見於部位必細察其浮沉以知其病之錢深焉細審其枯潤以觀其病之生死焉細辨其聚散以知其病之遠近焉細觀其上下而知其病之臟腑焉其間之更妙者在察五色之有神無神而已色暗而神存雖重病亦生色明而神奪雖無病亦死然有神無神從何辨之辨之於色之黃明倘色黃而有光彩隱於皮毛之內雖五色之分見又何患乎此觀神之法又不可不知之也七論脈訣雷真君曰脈訣內經已暢言矣王叔和又發明之豫又何言雖然尚有未備者不可不一論之脈訣大約言愈多則旨益晦吾獨尚簡要以切脈不必紛紛於七表八里也切脈之最要者在浮沉其次則遲數又其次則大小又其次則虛實又其次則澀滑而已知此十脈則九人之病不能出其範圍至於死脈尤易觀也不過魚蝦之遊禽鳥之喙屋漏彈石劈索水流之異也知十法之常即可知六法之變又何難知人之疾病哉靈樞之形容脈象不可為法也張真君曰脈訣原不必多多則反晦明言十法至簡至要可以為萬世切脈之法八論強弱人有南北之分者分於強弱也南人之弱不及北人之強也遠甚然而南人亦有強於北人者北人亦有弱於南人者亦不可一概而論然而統治強弱又斷斷不可當觀人以治病不可執南北以治強弱也蓋天下有偏陰偏陽之分偏於陽者雖生於南而亦強偏於陰者雖生於北而亦弱故偏於陽者宜用寒涼之劑偏於陰者宜用溫熱之品也張真君曰是九論寒熱雷真君曰病之有寒熱也半成於外來之邪然亦有無邪而身發寒熱者不可不知無邪而身發寒熱乃肝氣鬱而不得宣膽氣亦隨之而鬱木之氣既鬱滯而心之氣自然不舒心肝膽三經皆郁則脾胃之氣不化肺金無養其金不剛上少清肅之氣下行而木寡於畏土且欲發泄而不能於是作寒作熱似瘧非瘧而不能止倘用祛邪之藥則其勢更甚惟有舒其木氣而寒熱自除矣張真君曰亦創論也方宜用逍遙散大加白芍可也十論生死雷真君曰知生死而後可以為醫生中知死死中知生非易易也何以知生中之死如傷寒症七日不汗死是也何以知死中有生如中風中惡中毒是也生中之死而辨其不死死中之生而辨其不生醫道其庶幾乎傷寒至七日猶無汗人皆謂必死矣而豫獨斷其不死者非因其無汗而可生也蓋傷寒邪盛禁汗之不得出其人無煩躁之盛腎水猶存邪不能熬干之也雖無汗必有汗矣七日來復豈虛言哉此生中之死而辨其不死之法也中風不語中惡不出聲中毒致悶亂雖其人之氣猶存似乎不死然而遺尿則腎絶矣手撒則肝絶矣水不下喉則脾胃絶矣舌本強則心絶矣聲如酣則肺絶矣五臟無一生無有不死者倘有一臟之未絶未死也看何臟之絶而救何臟之氣則死猶不死矣然而五臟之中尤最急者莫過心腎心腎之藥莫過人參附子二味二味相合則無經不入救心腎而各臟亦無不救之矣雖將死之人必有痰涎之作祟似祛痰化涎之藥亦不可輕度然不多用人參而止用祛痰化涎之藥適足以死之也即或偶爾生全未幾仍歸於死此死中之生而辨其不生之法也張公曰真奇絶之文十一論真假雷真君曰病之有真有假也大約寒熱之症居多內經已辨之無遺義矣豫再取而論之者以真假之病難知而用藥者不可徒執泛逆之治法也豫有治真寒假熱之法而不必尚夫湯劑也如人下部冰涼上部大熱渴欲飲水下喉即吐此真寒反現假熱之象以欺人自當用八味湯大劑攪冷與飲人或不敢用或用之不多或病人不肯服當用吾法治之以一人強有力者擦其腳心如火之熱不熱不已以大熱為度後用吳茱萸一兩為末附子一錢麝香一分為細末以少少白麵入之打為糊作膏二個貼在腳心之中少頃必睡熟醒來下部身熱而上部之火自息矣急以八味湯與之則病去如失至於治真熱假寒之法則又不然如人外身冰涼內心火熾發寒發熱戰栗不已此內真熱反現假寒之象自當用三黃石膏湯加生薑乘熱飲之醫或信之不真或病家不肯與服豫法亟宜用之也井水一桶以水撲心胸似覺心快撲之至二三十次則內熱自止而外之戰栗不覺頓失急以元參麥冬白芍各二兩煎湯與之任其恣飲則病不至再甚矣張公曰何方法之奇至此遵而行之人無死法矣十二論老少雷真君曰老人與小兒最難治也老人氣血已衰服飲食則不生精而生病小兒精氣未滿食飲食則傷胃而傷脾故老人小兒當另立一門雖岐天師已立有門有方然終覺未全今另留數方半治老人之生精半治小兒之傷胃也生精者生其腎中精也人生腎氣有餘而後脾胃之氣行脾胃氣行而後分精四布於各臟腑俱得相輸以傳化方名養老丸用熟地八兩巴戟天四兩山茱萸四兩北五味一兩薏仁三兩芡實四兩車前子一兩牛膝三兩山藥四兩各為末蜜為丸每日吞五錢自能生精壯氣開胃健脾也又何慮飲食之難化乎小兒之方單顧其胃天師已有神方傳世今再立一方亦治腎以生土也論小兒純陽不宜補腎不知小兒過於飲食必至傷胃久之胃傷而脾亦傷脾傷而肺金亦傷肺金傷而腎水更傷矣小兒至腎水之傷則癆瘵之症起雞胸犬肚之證見苟治之不得法而仍治以治胃之藥未能奏功雜然攻利之藥並進殤人夭年可憫今立一方治小兒腎臟之損實有奇功方名全幼丸用熟地二兩麥冬一兩山藥三兩芡實三兩車前子一兩神麯五錢白朮一兩地栗粉三兩鱉甲三兩生何首烏三兩茯苓二兩各為末蜜為丸每日白滾湯送下三錢一料前症盡愈二方實可佐天師之未逮也張真君曰妙絶之論妙絶之方十三論氣血雷真君曰氣無形也血有形也人知治血必須理氣使無形生有形殊不知治氣必須理血使有形生無形也但無形生有形每在於倉皇危急之日而有形生無形要在於平常安適之時人見用氣分之藥速於見功用血分之藥難於奏效遂信無形能生有形而疑有形不能生無形不知氣血原疊相生長但止有緩急之殊耳故吐血之時不能速生血也亟當補其氣吐血之後不可純補氣也當緩補其血氣生血而血無奔軼之憂血生氣而氣無輕躁之害此氣血之兩相須而兩相得也張真君曰論妙極無弊之道也十四論命門雷真君曰命門為十二經之主內經已詳言之余再取而尚論者蓋命門之經雖彰而命門之旨尚晦也命門既為十二經之主而所主者何主也人非火不能生活有此火而後十二經始得其生化之機命門者先天之火也此火無形而居於水之中天下有形之火水之所克無形之火水之所生火克於水者有形之水也火生於水者無形之水也然而無形之火偏能生無形之水故火不藏於火而轉藏於水也命門之火陽火也一陽陷於二陰之間者也人先生命門而後生心其可專重夫心乎心得命門而神明有主始可以應物肝得命門而謀慮膽得命門而決斷胃得命門而能受納脾得命門而能轉輸肺得命門而准節大腸得命門而傳導小腸得命門而布化腎得命門而作強三焦得命門而決瀆膀胱得命門而收藏無不借命門之火以溫養之也此火宜補而不宜瀉宜於水中以補火尤宜於火中以補水使火生於水而還以藏於水也倘日用寒涼以伐之則命門之火微又何能生養十二經耶此內經所謂主不明則十二官危非重言命門歟張真君曰命門得天師之辨正若日月之經天今又得雷真君之尚論則命門何至於晦而不彰乎萬世之大幸也張景嶽先生謂善補陰者宜於陽中補陰無伐陽以散陰善補陽者宜於陰中補陽無伐陰以救陽深得此意李子永識十五論任督雷真君曰任督之脈在臟腑之外別有經絡也每為世醫之所略不知此二部之脈不可不講非若沖蹻之脈可有可無也任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目此任脈之經絡也督脈起於少腹以下骨中央女子入系廷孔在溺孔之際其絡循陰器合纂間繞纂後即前後二陰之間也別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交顛上入絡腦還出別下項循肩膊挾脊抵腰中入循膂絡腎其男子循莖下至纂與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央此督之經也二經之病各有不同而治法實相同也蓋六經之脈絡原相貫通治任脈之疝瘕而督脈之遺溺脊強亦愈也然此二脈者為胞胎之主脈無則女子不受妊男子難作強以射精此脈之宜補而不宜瀉明矣補則外腎壯大而陽旺瀉則外腎縮細而陽衰補則子宮熱而受妊瀉則子宮冷而難妊矣張真君曰妙絶今人不知任督之至要所以用藥不效也知任督何難治病哉十六論子嗣雷真君曰人生子嗣雖曰天命豈盡非人事哉有男子不能生子者有女子不能生子者男子不能生子有六病女子不能生子有十病六病維何一精寒也一氣衰也一痰多也一相火盛也一精少也一氣鬱也精寒者腎中之精寒雖射入子宮而女子胞胎不納不一月而即墮矣氣衰者陽氣衰也氣衰則不能久戰以動女子之歡心男精已泄而女精未交何能生物乎精少者雖能射而精必衰薄胞胎之口大張細小之入何能饜足故隨入而隨出矣痰多者多濕也多濕則精不純夾雜之精縱然生子必然夭喪相火盛者過於久戰女精已過而男精未施及男精既施而女興已寢又安能生育哉氣鬱者乃肝氣抑塞不能生心包之火則懷抱憂愁而陽事因之不振或臨爐而興已闌對壘而戈忽倒女子之春思正濃而男子之浩嘆頓起則風景蕭條房幃岑寂柴米之心難忘調笑之言絶少又何能種玉於蘭田育麟於蘭室哉故精寒者溫其火氣衰者補其氣痰多者消其痰火盛者補其水精少者添其精氣鬱者舒其氣則男子無子者可以有子不可徒補其相火也十病維何一胎胞冷也一脾胃寒也一帶脈急也一肝氣鬱也一痰氣盛也一相火旺也一腎水衰也一任督病也一膀胱氣化不行也一氣血虛而不能攝也胎胞之脈所以受物者也暖則生物而冷則殺物矣縱男子精熱而射入又安能茹之而不吐乎脾胃虛寒則帶脈之間必然無力精即射入於胞胎又安能勝任乎帶脈宜馳不宜急帶脈急者由於腰臍之不利也腰臍不利則胞胎無力又安能載物乎肝氣鬱則心境不舒何能為歡於床第痰氣盛者必肥婦也毋論身肥則下體過胖子宮縮入難以受精即或男子甚健鼓勇而戰射精直入而濕由膀胱必有泛濫之虞相火旺者則過於焚燒焦乾之地又苦草木之難生腎水衰者則子宮燥涸禾苗無雨露之潤亦成萎黃必有墮胎之嘆任督之間倘有疝瘕之症則精不能施因外有所障也膀胱與胞胎相近倘氣化不行則水濕之氣必且滲入於胎胞而不能受妊矣女子懷胎必氣血足而後能養倘氣虛則陽衰血虛則陰衰氣血雙虛則胞胎下墜而不能升舉小産之不能免也故胎胞冷者溫之脾胃寒者暖之帶脈急者緩之肝氣鬱者開之痰氣盛者消之相火旺者平之腎水衰者補之任督病者除之膀胱氣化不行者助其腎氣氣血不能攝胎者益其氣血也則女子無子者亦可以有子不可徒治其胞胎也種子方莫妙用岐天師之方故不再定張真君曰男女之病各各不同得其病之因用其方之當何患無子哉以男子六病女子十病問人之有無即可知用藥之宜也十七論瘟疫雷真君曰古人云疫來無方非言治疫之無方乃言致疫之無方也然亦未嘗無方疫來既有方而謂治之無方可乎大約瘟疫之來多因人事之相召而天時之氣運適相感也故氣機相侵而地氣又復相應合天地之毒氣而瘟疫成焉侵於一鄉則一鄉之人病釀於一城則一城之人病流於千里則千里之人病甚且死亡相繼闔門闔境無不皆然深可痛也此等病必須符水救之然而符水終不浪傳於世今別定一法用管仲一枚浸於水缸之內加入白礬少許人逐日飲之則瘟疫之病不生矣真至神之法也張真人曰妙方此先制瘟疫之法也岐天師兒科治法天師曰兒科得其要無難治人今傳一法門使萬世小兒盡登仁壽法在先看氣色後看脈小兒有疾某顏色必鮮豔以鼻之上眼之中間中正精明穴上辨之色紅者心熱也紅筋橫直現於山根皆心熱也色紫者心熱之甚而肺亦熱也色青者肝有風也青筋直現者乃肝熱也青筋橫現者亦肝熱也直者風上行橫者風下行也色黑者風甚而腎中有寒色白者肺中有痰色黃者脾胃虛而作瀉黃筋現於山根不論橫直總皆脾胃之症止有此數色無他顏色故一覽而知小兒之病矣大人看脈於寸關尺小兒何獨不然但小兒不必看至數止看其數與不數耳數甚則熱不數則寒也數之中浮者風也沉者寒也緩者濕也澀者邪也滑者痰也如此而已七表八里俱不必去看自知吾訣則脈訣亦不必讀也有止歇者乃痛也余亦不必再談小兒症大約吐瀉厥逆風寒暑熱而已其餘痘疹喑余無他病或心疼腹痛或有痞塊或有瘡疔可一覽而知也然而小兒之病虛者十之九實者十之一故藥宜補為先今立三方通治小兒諸症第一方人參三分白朮五分茯苓一錢甘草一分陳皮二分神麯三分半夏一分此六君子加減也通治小兒脾胃弱病神效如傷肉食者加山楂五粒傷米食者加麥芽五分傷麵食加蘿蔔子三分吐者加白豆蔻一粒去甘草加生薑三片瀉者加乾薑三分豬苓五分第二方治外感也或傷風傷寒或咳嗽或發熱或不發熱或頭痛或鼻塞或痰多或驚悸或角弓反張皆以此方通治之無不神效方用柴胡七分甘草三分桔梗五分半夏三分黃芩三分白芍二錢白朮二錢當歸五分陳皮二分茯苓五分水煎服頭痛加蔓荊子三分心痛手不可按者乃實火也加梔子一錢按之不痛者乃虛火也加甘草八分貫仲五分廣木香三分乳香一分脅痛者加芍藥三錢腹痛者以手按之手按而疼甚者乃食也加大黃一錢按之而不痛者乃寒也非食也加肉桂三分乾薑三分有汗出不止者加桑葉一片眼痛而紅腫者乃火也加黃連三分白蒺藜一分喉痛者加山豆根三分第三方治虛寒之症夜熱出汗夜啼不寐怔忡久嗽不已行遲語遲龜背狗肚將成癆瘵等症方用熟地三錢山茱萸二錢麥冬二錢北五味五分元參二錢白朮二錢茯苓一錢薏仁三錢丹皮一錢沙參二錢地骨皮二錢水煎服倘兼有外感少加柴胡五分白芍三錢白芥子一錢余無可加減矣諸真人傳授兒科痘瘡計日痘瘡壞病疹痘治法天師曰今人看痘為難治不知得其法則無難也初起之時不論身弱身強先以補氣補血之藥為君加之發散之藥則重者必輕而輕者必少無如世人皆以寒涼之品為主又助以劫散之味此所以輕變重重至死也吾今傳五方朝夕服之室七日無不結靨再無回毒之症十人十活不殺一小兒也第一曰方見小兒身熱眼如醉眼者此出痘兆也若不是醉眼則非出痘不可用此方用治外感方治之若見醉眼急投此方則痘點即現必不待三日而自出也方用黃耆三錢白朮一錢甘草一錢當歸二錢川芎二錢茯苓三錢柴胡一錢五分升麻五分麥冬二錢元參三錢陳皮五分荊芥一錢金銀花先用五分水三碗煎湯二碗再煎藥至五分與小兒飲之此方五歲以上俱照此分兩五歲以下減半周歲內者又遞減之服此藥自然神思清爽病家不肯服勸其速服包其速愈不妨身任之服後見點再用第二方第二日方白朮二錢麥冬三錢甘草一錢桔梗二錢當歸五錢生地五錢元參三錢柴胡一錢升麻三分荊芥一錢茯苓二錢白芍三錢白芥子二錢金銀花三錢水煎服服此藥後一身盡現點矣其色必紅而無色白色黑之虞矣第三日方人參五分白芍三錢白朮三錢茯苓三錢元參二錢神麯三分丹皮一錢水煎服此方服後盡皆灌漿無不氣血之足永無退症之虞矣再服第四日方第四日方人參一錢當歸二錢熟地五錢茯苓三錢金銀花三錢陳皮五分甘草一錢元參三錢白朮三錢白芍二錢神麯五分服此方後小兒必然口健要吃食不已不妨少少頻與亦不可多食也第五方可不必用矣然更傳之者恐小兒多食則生他病故又傳此方第五日方人參一錢茯苓三錢白朮二錢甘草一錢有食加麥芽五分山楂五粒若不傷食不必加止加金銀花三錢能服此五方期七日前而回春也以上小兒年歲小者俱照第一方減之如小兒已身熱三日則用第三方四日則用第四方如壞症另用壞症方秦真人傳壞症方治痘瘡壞症已黑者人將棄之下喉即活人參三錢陳皮一錢蟬蛻五分元參二錢當歸二錢荊芥穗一錢水二鍾煎八分灌下喉中即活大約壞症皆元氣虛而火不能發也我用參以助元氣用元參以去浮游之火用陳皮去痰開胃則參無所礙而相得益彰荊芥以發之又能引火歸經當歸以生新去舊消滯氣蟬蛻亦解毒去斑世人如何知此妙法初起不可服必壞症乃可一劑即回春不必再劑也雷真君傳痘瘡壞症方痘瘡壞症最為可憐身如黑團之氣口不能言食不能下世人到此盡棄之溝中醫者到此亦置而不顧誰知盡人皆可生之乎吾有奇方名必全湯人參三錢元參一兩荊芥一錢金銀花一兩陳皮三分水煎五分灌之下喉而眼開少頃而身動久之而神氣回口能言食能下矣不必再服他藥痘瘡自面而生全至奇至神之方也蓋痘瘡壞症皆氣虛而火不能發也火毒留於中而不得泄故形如死狀其實臟腑未壞我用參以固元氣用元參以去火用金銀花以消毒用陳皮以化痰用荊芥以引經而發出於外內中原有生機所以一劑回春也疹治法凡疹初起小兒必發熱口必大渴呼水其發疹之狀如紅雲一片大約發斑相同但斑無頭粒而疹有頭粒也頭如蚤咬之狀無他別也我今傳四時之疹方用元參三錢麥冬二錢蘇葉一錢升麻五分天花粉一錢金銀花三錢陳皮三分甘草一錢生地三錢黃芩八分桂枝二錢水鍾半煎五分熱服凡有疹子無不神效惟夏天加青蒿三錢可也小兒初生數月減半一周外俱照此分兩不必再傳方也服吾方一劑即愈何至三噀張真人傳痘疹門痘疹初起方白芍二錢柴胡一錢當歸一錢陳皮五分荊芥八分防風三分生地二錢甘草一錢桔梗一錢麥冬一錢乾葛一錢水煎服二劑痘瘡惡者必變為良痘瘡出齊方人參一錢黃耆一錢甘草一錢白芍二錢生地二錢麥冬二錢柴胡八分紅花五分水煎服有熱加黃連五分或黃芩一錢梔子一錢亦可有驚加蟬蛻去翅足三分色黑者加肉桂五分大便閉結不通加大黃三分腹痛加芍藥一錢甘草一錢泄瀉加茯苓一錢有汗倍加黃耆有痰加白芥子一錢癢加荊芥子六分身痛者加廣木香三分色白者寒也加肉桂一錢人參黃耆俱多加痘瘡頭不突者氣虛也倍黃耆腰不滿者血虛也加當歸一錢熟地二錢可也痘瘡將回方人參一錢白朮一錢茯苓一錢甘草三分桔梗三分升提其氣而又益肺金使皮毛得諸補藥之益也水煎服有紅紫乾燥黑陷者熱未退也本方加黃芩一錢如痘色白黑灰黑色而陷寒虛也加肉桂三分人參一錢灌膿者倍加人參再加黃耆二錢當歸二錢泄瀉加乾薑五分茯苓一錢心慌悶亂者多加人參嘔吐者亦加人參乾薑身癢者加廣木香三分當靨不靨多加人參大便閉者加大黃三分口渴者熱也加麥冬二錢元參一錢失音者加石菖蒲三分桔梗一錢痘瘡入眼成翳者加蟬蛻五分從前初起方中即加蟬蛻七個則目無痘矣咽喉之中防其生痘者初起方即用桔梗一錢即無比症小兒痘症有此三方再無死法神而通之可謂神醫矣壞症亦以此方治之無不生者總之小兒宜補不宜散一言盡之矣疹乃熱也不可用人參白朮當用補血而不可散血俱宜切記方用當歸二錢元參三錢升麻三分甘草三分乾葛一錢水煎服此治疹奇方也有此奇方為骨又出入加減可也心火熱極加黃連三分肝火加梔子六分肺火加黃芩一錢麥冬一錢辨各經病亦看小兒山根之色然看之時須用洗去面上塵土細看之痘疹全書統諸症以立言而余總祕要以傳方有此四方為骨參之彼書出入加減神奇之極矣錢真人傳痘瘡神方不論初起灌漿收靨俱用之神妙無比人參一兩白朮八錢茯苓五錢陳皮三錢白芍一兩生甘草三錢元參八錢蟬蛻一錢柴胡二錢黃連五分神麯三錢山楂肉二錢各為細末水打成丸如緑豆大遇前症與一錢未起者即起已起者即灌漿不收靨者收靨神奇之極毋視為尋常也願將此方廣傳人世岐天師傳治回毒方名為回毒即消丹金銀花五錢生甘草一錢人參二錢元參三錢水二碗煎三分與小兒服之一劑即消大半二劑全愈不須三劑也付符一道焚在藥中煎汁神效凡服藥不效焚符於藥中煎藥與小兒飲之十人十生而壅咒曰小兒有病病魔作祟吾今施符治無不愈吾奉天師岐真君律令敕書符前後念一遍焚於藥內又念一遍書符時此祕訣也又傳疹方治夏日發疹者神效蘇葉一錢麥冬二錢桔梗一錢生甘草一錢升麻五分生地二錢元參三錢青蒿三錢水煎服岐真人曰張真人治四時之疹余方治夏時熱疹也切記此二方何患疹病之難治哉又傳治水痘方亦治熱症而有水氣也柴胡一錢茯苓二錢桔梗一錢生甘草五分黃芩五分竹葉十片燈草一圓水煎服有痰者加天花粉三分有食加山楂三粒麥芽三分有火加黃連一分余可不必有此一方水痘無難治矣岐天師又傳治回毒歲久不愈方金銀花一兩當歸人參白朮各一兩黃耆二兩薏仁三兩生甘草二錢白芥子三錢柴胡肉桂各五分先將薏仁用水四碗煎湯二碗再煎前藥半碗飢服一劑再用金銀花一兩當歸五錢黃耆薏仁各一兩白朮五錢生甘草白芥子各二錢陳皮五分水三碗煎半碗四服全愈其服藥之時更須用藥洗之金銀花一兩生甘草三錢生蔥三條煎二腕岐真人傳兒科祕法山根之上有青筋直現者乃肝熱也用柴胡三分白芍一錢當歸五分半夏三分白朮五分茯苓一錢山楂三粒甘草一分水煎服有青筋橫現者亦肝熱也但直者風上行橫者風下行亦用前方多加柴胡二分加麥芽一錢乾薑一分有紅筋直現者乃心熱也亦用前方加黃連一分麥冬五分去半夏加桑白皮三分天花粉二分有紅筋斜現者亦心熱也亦用前方加黃連二分蓋熱極於胸中也亦不可用半夏用桑白皮天花粉有黃筋現於山根者不必論橫直總皆脾胃之症或水瀉或上吐或下瀉或腹痛或不思飲食余定一方皆可服服之無不神效如皮黃即黃筋也方用白朮五分茯苓五分陳皮二分人參二分神麯一分麥芽二分甘草一分水一鍾煎半酒盞分二起服加淡竹葉七片有痰加半夏一分或白芥子二分或天花粉二分有熱如口渴者是加麥冬三分黃芩一分有寒者加乾薑一分吐者加白豆蔻一粒瀉者加豬苓五分腹痛者如小兒自家捧腹是須用手按之大叫呼痛者乃食積也加大黃三分枳實一分如按之不痛不呼號者乃寒也再加乾薑三分如身熱者不可用此方豫另立一方萬全湯凡小兒發熱者毋論夜熱早熱晚熱用之無不神效方用柴胡五分白芍一錢當歸五分白朮三分茯苓二分甘草一分山楂三粒黃芩三分蘇葉一分麥冬一錢神麯三分水一鍾煎半酒鍾服或分二起服冬天加麻黃一分夏天加石膏三分春天加青蒿三分秋天加桔梗三分有食加枳殼三分有痰加白芥子三分瀉者加豬苓一錢吐者加白豆蔻一粒小兒諸症不過如此萬不可作驚風治之有驚者此方加人參五分即定驚如神有疳者用脾胃方加蒲黃三分黃芩三分可也長沙張真人傳治小兒感冒風寒方柴胡五分白朮一錢茯苓三分陳皮二分當歸八分白芍一錢炙甘草三分半夏三分水一鍾煎半鍾熱服一劑即愈不必再劑治小兒痢疾神方當歸一錢黃連二分白芍一錢五分枳殼五分檳榔五分甘草三分水一鍾煎半鍾熱服一劑輕二劑愈紅痢加黃連一倍白痢加澤瀉三分腹痛者倍加甘草多加白芍小便赤加木通三分下如豆汁加白朮一錢傷食加山楂麥芽各三分氣虛者加人參三分此方通治小兒痢疾加減之無不神效治小兒瘧疾方柴胡六分白朮一錢茯苓一錢歸身一錢白芍一錢五分半夏五分青皮五分厚朴五分水一鍾煎半鍾露一宿再溫之與服熱多者加人參黃耆各五分寒多者加乾薑三分痰多者加白芥子一錢夜發熱者加何首烏熟地各二錢日間發者不用加腹痛加檳榔三分治小兒咳嗽神方蘇葉五分桔梗一錢甘草一錢水一酒鍾煎五分熱服二劑即全愈有痰加白芥子五分可也治小兒口疳流水口爛神方黃柏二錢人參一錢為末敷口內二日即愈一匙一次一日不過用二次而已小兒之疳皆虛熱也用黃柏以去火人參以健脾土也大人亦可用神效治小兒便蟲神方諸蟲皆可治棐子去殼五個甘草三分為末米飯為丸服完蟲盡化為水矣大人亦用此去蟲蓋棐子最能殺蟲又不耗氣食多則傷脾治小兒蟲積方使君子十個去殼炒香檳榔一錢棐子十個甘草一錢各為細末米飯為丸如梧桐子大與十丸小兒服之二日即便蟲五日全愈神方也兒科驚疳吐瀉生下不肯食乳初生臍汁不幹肚臍突出小兒病驚疳吐瀉盡之矣然而驚疳吐瀉不可不分別言之也世人動曰驚風誰知小兒驚則有之而風則無小兒純陽之體不宜有風之入而狀若有風者蓋小兒陽旺則內熱熱極則生風是風非外來之風乃內出之風也內風何可作外風治之故治風則死矣法當內清其火而外治其驚不可用風藥以表散之也吾今特傳奇方名為清火散驚湯方用白朮三分茯苓二錢陳皮一分甘草一分梔子三分白芍一錢半夏一分柴胡三分水煎三分服此方健脾平肝之聖藥肝平則火散脾健則驚止又加去火散痰之品自然藥下喉而驚風定也疳症乃脾熱也然亦固心熱而脾火旺極遂至口中流涎若不平其心火則脾火更旺而濕熱上蒸口涎正不能遽止治法不可徒清脾火而當先散心火方用止疳散蘆薈一錢黃連三分薄荷三分茯苓二錢甘草一分桑白皮一錢半夏三分水煎服三分此方心脾兩清之聖藥不專清脾引水下行則濕熱自去濕熱去疳病自愈也吐症雖胃氣之弱亦因脾氣之虛蓋小兒恣意飽餐逐至食而不化久而停積於脾中又久之而上衝於胃口又久之而大吐矣故治吐必先治胃而治胃尤先治脾吾有奇方止吐速效方名定吐湯人參一錢砂仁一粒白朮五分茯苓二錢陳皮二分半夏一分乾薑一分麥芽五分山楂三粒水煎服夏月加黃連三分冬月加乾薑一分無不愈者此方即六君子之變方乃治脾胃之聖藥脾胃安而化導速自然下行不至上吐沉方中加減得宜消積有法有不奏功如神者乎瀉症則專責之脾矣論理亦用煎湯可以取效然而瀉有不同有火瀉有寒瀉不可不分火瀉者小兒必然身如火熱口渴舌燥喜冷飲而不喜熱湯若亦以前方投之則益苦矣豫另有奇方名為瀉火止瀉湯方用車前子二錢茯苓一錢白芍一錢黃連三分澤瀉五分豬苓三分麥芽一錢枳殼二分水煎服一劑即止瀉車前茯苓澤瀉豬苓皆止瀉分水之聖藥白芍以平肝使不來克脾黃連清心火不來助脾之熱而麥芽枳殼消滯氣以通水道不必止瀉瀉自止也寒瀉者腹痛而喜手按摩口不幹而舌滑喜熱湯不喜冷飲又不可用瀉火之湯五苓散可也然而五苓尚缺補也盞小兒致於寒瀉未有不大傷脾氣者脾氣既傷非人參不能救五苓散無人參僅能止瀉元氣未能頓復我今傳一奇方名為散寒止瀉湯方用人參一錢白朮一錢茯苓二錢肉桂二分甘草一分乾薑二分砂仁一粒神麯五分水煎服此方參苓白朮乃健脾補氣之神品分濕利水之聖藥也又加肉桂乾薑以祛寒砂仁甘草神麯以調和之則寒風自然越出而泄瀉立止矣雷公真君曰小兒驚症皆本於氣虛一作風治未有不死者或治風而兼補虛可以苟全性命要之斷斷不可作風治也我今特傳奇方名壓驚湯人參五分白朮五分甘草三分茯神一錢半夏三分神麯五分砂仁一粒陳皮一分丹砂三分水煎服此即六君子之變方也小兒止有脾病治脾而驚自定故用六君子以健脾少加壓驚之品奏功如神耳小兒吐瀉傷食之故也蓋飲食飽餐自難一時消化不上吐必下瀉矣亦用前方六君子湯但吐者去甘草加砂仁瀉者加車前子治之自能奏功於俄頃倘不知補脾而惟圖消克非救兒生乃送兒死矣願人敬聽吾言共登兒齡於百歲也小兒生下不肯食乳者乃心熱也蔥煎乳汁令小兒服之亦妙終不若用黃連三分煎湯一分灌小兒數匙即食乳矣神效小兒初生臍汁不幹用車前子炒焦為細末敷之即干神效小兒肚臍突出半寸許此氣旺不收也若不急安之往往變為角弓反張方用茯苓一錢車前子一錢甘草二分陳皮三分通草三分如無通草燈心一圓共煎湯灌之一劑即安神方也
